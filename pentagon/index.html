<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pentagon 提案アプリ ポータル</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --purple:#2b1a52; --purple2:#3a2470; --coral:#ff6f61; --coral-soft:#ff8a7f;
      --ink:#f4f1fb; --sub:#b9aede; --line:#473474;
    }
    * { box-sizing: border-box; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 640px; margin: 0 auto; padding: 72px 24px;
      background: radial-gradient(1200px 600px at 80% -10%, #3a2470 0%, #2b1a52 55%, #1d1138 100%);
      min-height: 100vh; color: var(--ink);
    }
    .brand { display:flex; align-items:center; gap:12px; margin-bottom: 28px; }
    .logo { width:36px; height:36px; }
    .brand .name { font-weight:800; letter-spacing:.06em; font-size:1.05rem; }
    .brand .name span { color: var(--coral); }
    h1 { font-size: 1.7rem; font-weight: 800; margin: 0 0 8px; letter-spacing:.01em; }
    .lead { color: var(--sub); margin-bottom: 44px; font-size:.95rem; line-height:1.6; }
    .grid { display: grid; gap: 16px; }
    a.card {
      display: block; background: rgba(255,255,255,.04);
      border: 1px solid var(--line); border-radius: 16px; padding: 24px 26px;
      text-decoration: none; color: inherit; transition: .18s;
      position: relative; overflow: hidden;
    }
    a.card::before {
      content:""; position:absolute; left:0; top:0; bottom:0; width:4px; background: var(--coral);
      transform: scaleY(0); transform-origin: top; transition: transform .2s;
    }
    a.card:hover { background: rgba(255,255,255,.07); border-color: var(--coral); transform: translateY(-2px); }
    a.card:hover::before { transform: scaleY(1); }
    a.card h2 { margin: 0 0 6px; font-size: 1.15rem; font-weight: 700; }
    a.card p  { margin: 0; font-size: .9rem; color: var(--sub); line-height:1.5; }
    .tag { display:inline-block; font-size:.66rem; font-weight:700; letter-spacing:.1em;
      color: var(--coral); border:1px solid var(--coral); border-radius:999px; padding:3px 9px; margin-bottom:12px; }
    footer { margin-top:48px; font-size:.72rem; color:var(--sub); opacity:.7; }
  </style>
</head>
<body>
  <div class="brand">
    <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <polygon points="50,6 92,37 76,88 24,88 8,37" fill="none" stroke="#ff6f61" stroke-width="7" stroke-linejoin="round"/>
    </svg>
    <div class="name">PENTA<span>GON</span></div>
  </div>

  <h1>提案アプリ ポータル</h1>
  <p class="lead">株式会社Pentagon がご提案するアプリケーションの入口です。<br>クライアント向けのデモ・提案用プロダクトをこちらにまとめています。</p>

  <div class="grid">
    <a class="card" href="./harmony-bridal/">
      <span class="tag">PROPOSAL</span>
      <h2>💍 ハーモニーブライダル</h2>
      <p>結婚相談所向け PWA（LP・会員アプリ・管理画面の3点セット）</p>
    </a>
  </div>

  <footer>© Pentagon Inc. — 提案・デモ用ポータル</footer>
</body>
</html>

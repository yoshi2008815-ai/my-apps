<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ダッシュボード - 管理画面</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-body">

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-icon">💍</div>
    <div class="sidebar-logo-text">ハーモニー<br><span style="font-size:10px;opacity:.6;">管理システム</span></div>
  </div>
  <nav class="sidebar-nav">
    <a href="dashboard.html" class="sidebar-item active"><span class="sidebar-icon">📊</span>ダッシュボード</a>
    <a href="members.html"   class="sidebar-item"><span class="sidebar-icon">👥</span>会員管理</a>
    <a href="events.html"    class="sidebar-item"><span class="sidebar-icon">📅</span>イベント管理</a>
    <a href="notifications.html" class="sidebar-item"><span class="sidebar-icon">🔔</span>お知らせ配信</a>
    <a href="inquiries.html" class="sidebar-item"><span class="sidebar-icon">💬</span>問い合わせ管理</a>
  </nav>
  <div class="sidebar-bottom">
    <button class="sidebar-item" onclick="doLogout()" style="width:100%;text-align:left;background:none;border:none;cursor:pointer;color:rgba(255,255,255,.6);">
      <span class="sidebar-icon">🚪</span>ログアウト
    </button>
  </div>
</aside>

<!-- Main -->
<div class="admin-main">
  <header class="admin-topbar">
    <button class="hamburger" id="hamburger" onclick="toggleSidebar()">☰</button>
    <h1 class="topbar-title">ダッシュボード</h1>
    <div class="topbar-right" id="adminInfo"></div>
  </header>

  <div class="admin-content" id="mainContent">
    <!-- KPI Grid -->
    <div class="kpi-grid" id="kpiGrid"></div>

    <!-- Charts row -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;" id="chartsRow"></div>

    <!-- Tables row -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;" id="tablesRow"></div>
  </div>
</div>

<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

<script src="../js/seed.js"></script>
<script src="../js/store.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/app.js"></script>
<script>
const admin = Auth.requireAdmin();
if (!admin) throw new Error('not logged in');

document.getElementById('adminInfo').innerHTML = `
  <div style="display:flex;align-items:center;gap:8px;">
    <div style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#C45C82,#9C3A62);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;">${admin.name.charAt(0)}</div>
    <div style="font-size:13px;"><div style="font-weight:600;">${admin.name}</div><div style="font-size:11px;color:var(--text-muted);">${admin.role==='admin'?'システム管理者':'マネージャー'}</div></div>
  </div>`;

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

function doLogout() {
  App.confirm('ログアウトしますか？', () => { Auth.logoutAdmin(); location.href = 'login.html'; });
}

function render() {
  const members  = Store.get('members') ?? [];
  const events   = Store.get('events') ?? [];
  const inquiries= Store.get('inquiries') ?? [];
  const regs     = Store.get('eventRegistrations') ?? [];
  const boards   = Store.get('bulletinBoards') ?? [];

  const active   = members.filter(m => m.status === 'active').length;
  const pending  = members.filter(m => m.status === 'pending').length;
  const openInq  = inquiries.filter(i => i.status !== 'answered').length;
  const upcomingEvents = events.filter(e => new Date(e.date) >= new Date()).length;

  // KPI
  document.getElementById('kpiGrid').innerHTML = [
    { label:'総会員数', value: members.length, sub:`アクティブ ${active}名`, icon:'👥', color:'#C45C82' },
    { label:'新規会員（今月）', value: members.filter(m=>m.joinDate?.startsWith('2026')).length, sub:`審査待ち ${pending}名`, icon:'✨', color:'#8B5CF6' },
    { label:'開催予定イベント', value: upcomingEvents, sub:`申込合計 ${regs.length}件`, icon:'📅', color:'#059669' },
    { label:'未対応問い合わせ', value: openInq, sub:`全 ${inquiries.length}件中`, icon:'💬', color:'#D97706' },
  ].map(k => `
    <div class="kpi-card">
      <div class="kpi-icon" style="background:${k.color}20;color:${k.color};">${k.icon}</div>
      <div class="kpi-body">
        <div class="kpi-label">${k.label}</div>
        <div class="kpi-value" style="color:${k.color};">${k.value}</div>
        <div class="kpi-sub">${k.sub}</div>
      </div>
    </div>`).join('');

  // Mini bar chart: members by prefecture (top 5)
  const prefCount = {};
  members.forEach(m => { prefCount[m.prefecture] = (prefCount[m.prefecture]||0)+1; });
  const top5 = Object.entries(prefCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxPref = top5[0]?.[1] || 1;

  document.getElementById('chartsRow').innerHTML = `
    <div class="admin-card">
      <div class="admin-card-header"><h3>📍 エリア別会員数（TOP5）</h3></div>
      <div class="admin-card-body">
        ${top5.map(([pref,cnt])=>`
        <div style="margin-bottom:10px;">
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;"><span>${pref}</span><span style="font-weight:600;">${cnt}名</span></div>
          <div style="height:8px;background:var(--border);border-radius:4px;overflow:hidden;"><div style="height:100%;background:linear-gradient(90deg,#C45C82,#9C3A62);border-radius:4px;width:${Math.round(cnt/maxPref*100)}%;transition:width .4s;"></div></div>
        </div>`).join('')}
      </div>
    </div>
    <div class="admin-card">
      <div class="admin-card-header"><h3>🥧 会員ステータス内訳</h3></div>
      <div class="admin-card-body">
        ${[['active','アクティブ','#059669'],['pending','審査待ち','#D97706'],['suspended','休止中','#6B7280'],['withdrawn','退会済み','#EF4444']].map(([s,l,c])=>{
          const cnt = members.filter(m=>m.status===s).length;
          const pct = members.length ? Math.round(cnt/members.length*100) : 0;
          return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
            <div style="width:12px;height:12px;border-radius:3px;background:${c};flex-shrink:0;"></div>
            <div style="flex:1;font-size:13px;">${l}</div>
            <div style="font-size:13px;font-weight:600;">${cnt}名</div>
            <div style="font-size:12px;color:var(--text-muted);width:36px;text-align:right;">${pct}%</div>
          </div>`;}).join('')}
        <div style="margin-top:14px;display:flex;gap:3px;height:14px;border-radius:7px;overflow:hidden;">
          ${[['active','#059669'],['pending','#D97706'],['suspended','#6B7280'],['withdrawn','#EF4444']].map(([s,c])=>{
            const pct = members.length ? Math.round(members.filter(m=>m.status===s).length/members.length*100) : 0;
            return pct ? `<div style="flex:${pct};background:${c};"></div>` : '';
          }).join('')}
        </div>
      </div>
    </div>`;

  // Recent members
  const recent = [...members].sort((a,b)=>b.joinDate.localeCompare(a.joinDate)).slice(0,6);
  // Recent inquiries
  const recentInq = [...inquiries].sort((a,b)=>b.createdAt.localeCompare(a.createdAt)).slice(0,5);

  document.getElementById('tablesRow').innerHTML = `
    <div class="admin-card">
      <div class="admin-card-header"><h3>👥 最近の新規会員</h3><a href="members.html" class="link-sm">すべて見る</a></div>
      <table class="admin-table">
        <thead><tr><th>氏名</th><th>性別</th><th>入会日</th><th>状態</th></tr></thead>
        <tbody>
          ${recent.map(m=>`<tr>
            <td><div style="font-weight:600;font-size:13px;">${m.name}</div><div style="font-size:11px;color:var(--text-muted);">${m.email}</div></td>
            <td style="font-size:13px;">${m.gender==='female'?'女性':'男性'}</td>
            <td style="font-size:12px;color:var(--text-muted);">${App.fmtDate(m.joinDate,{monthDay:true})}</td>
            <td><span class="chip chip-${m.status==='active'?'ok':m.status==='pending'?'pending':'ng'}">${m.status==='active'?'有効':m.status==='pending'?'審査中':'停止'}</span></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div class="admin-card">
      <div class="admin-card-header"><h3>💬 最近の問い合わせ</h3><a href="inquiries.html" class="link-sm">すべて見る</a></div>
      <table class="admin-table">
        <thead><tr><th>件名</th><th>状態</th><th>日時</th></tr></thead>
        <tbody>
          ${recentInq.map(i=>{
            const m = Store.getById('members', i.memberId);
            return `<tr>
              <td><div style="font-size:13px;font-weight:600;">${i.subject}</div><div style="font-size:11px;color:var(--text-muted);">${m?.name ?? '—'}</div></td>
              <td><span class="chip chip-${i.status==='answered'?'ok':'pending'}">${i.status==='answered'?'回答済':'未回答'}</span></td>
              <td style="font-size:12px;color:var(--text-muted);">${App.fmtDatetime(i.createdAt)}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
}

render();
</script>
</body>
</html>

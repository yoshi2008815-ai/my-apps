<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>イベント - ハーモニーブライダル</title>
<link rel="manifest" href="../manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/member.css">
</head>
<body>
<div class="member-app">
<header class="app-header">
  <div class="header-spacer"></div>
  <h1>📅 イベント</h1>
  <div class="header-spacer"></div>
</header>

<div class="page-tabs">
  <button class="page-tab active" onclick="setTab('upcoming',this)">開催予定</button>
  <button class="page-tab" onclick="setTab('registered',this)">申込済み</button>
  <button class="page-tab" onclick="setTab('past',this)">参加済み</button>
</div>

<div class="filter-bar">
  <button class="filter-chip active" onclick="setCategory('all',this)">すべて</button>
  <button class="filter-chip" onclick="setCategory('party',this)">🎉 パーティー</button>
  <button class="filter-chip" onclick="setCategory('seminar',this)">📚 セミナー</button>
  <button class="filter-chip" onclick="setCategory('lunch',this)">🍽️ ランチ</button>
  <button class="filter-chip" onclick="setCategory('sports',this)">🎾 スポーツ</button>
</div>

<main class="app-main" style="padding-top:8px;" id="mainContent"></main>

<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span><span class="nav-label">ホーム</span></a>
  <a href="introductions.html" class="nav-item"><span class="nav-icon">💌</span><span class="nav-label">紹介書</span></a>
  <a href="search.html" class="nav-item"><span class="nav-icon">🔍</span><span class="nav-label">検索</span></a>
  <a href="events.html" class="nav-item active"><span class="nav-icon">📅</span><span class="nav-label">イベント</span></a>
  <a href="board.html" class="nav-item"><span class="nav-icon">💬</span><span class="nav-label">メッセージ</span></a>
  <a href="mypage.html" class="nav-item"><span class="nav-icon">👤</span><span class="nav-label">マイページ</span></a>
</nav>
</div>

<script src="../js/seed.js"></script>
<script src="../js/store.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/app.js"></script>
<script>
const session = Auth.requireMember();
if (!session) throw new Error('not logged in');
const me = Auth.getCurrentMember();
let currentTab = 'upcoming';
let currentCategory = 'all';
const today = '2026-06-17';

function setTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.page-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function setCategory(cat, el) {
  currentCategory = cat;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
}

function getRegistered() {
  return Store.query('eventRegistrations', r => r.memberId === me.id);
}

function isRegistered(eventId) {
  return getRegistered().some(r => r.eventId === eventId);
}

function render() {
  let events = Store.get('events') ?? [];
  const registered = getRegistered();
  const registeredIds = registered.map(r => r.eventId);

  if (currentTab === 'upcoming') events = events.filter(e => e.date >= today && e.status !== 'closed');
  else if (currentTab === 'registered') events = events.filter(e => registeredIds.includes(e.id) && e.date >= today);
  else if (currentTab === 'past') events = events.filter(e => registeredIds.includes(e.id) && (e.date < today || e.status === 'closed'));

  if (currentCategory !== 'all') events = events.filter(e => e.category === currentCategory);
  events.sort((a,b) => a.date.localeCompare(b.date));

  if (!events.length) {
    document.getElementById('mainContent').innerHTML = `<div class="empty-state"><div class="empty-state-icon">📅</div><div class="empty-state-title">イベントが見つかりません</div></div>`;
    return;
  }

  document.getElementById('mainContent').innerHTML = events.map(e => eventCard(e, registeredIds.includes(e.id))).join('');
}

function eventCard(e, registered) {
  const genderKey = me.gender === 'female' ? 'female' : 'male';
  const remaining = e.capacity[genderKey] - (e.registered[genderKey] || 0);
  const isFull = remaining <= 0;
  return `
  <div class="event-card" onclick="showEventDetail('${e.id}')">
    <div class="event-card-hero" style="background:${eventGrad(e.category)};">${e.emoji}${registered ? '<span class="event-registered-badge">✓ 申込済</span>' : ''}</div>
    <div class="event-card-body">
      <div class="event-date-tag">📅 ${App.fmtDate(e.date,{monthDay:true})} ${e.time}</div>
      <div class="event-name">${e.name}</div>
      <div class="event-meta">
        <span class="event-cap">📍 ${e.location}</span>
        <span class="event-cap">💰 ¥${e.fee.toLocaleString()}</span>
        <span class="event-cap">👥 残${isFull?'0':remaining}名</span>
      </div>
      <div style="display:flex;gap:6px;margin-top:10px;">
        <span class="chip chip-pending">${e.ageRange}</span>
        ${isFull ? '<span class="chip chip-ng">満席</span>' : '<span class="chip chip-ok">受付中</span>'}
      </div>
    </div>
  </div>`;
}

function eventGrad(cat) {
  const g = { party:'linear-gradient(135deg,#C45C82,#9C3A62)', seminar:'linear-gradient(135deg,#5B9BD5,#3D7DC8)', lunch:'linear-gradient(135deg,#E6A817,#C88A00)', sports:'linear-gradient(135deg,#4CAF50,#2E7D32)', tea:'linear-gradient(135deg,#9C6B3C,#7A4F2A)' };
  return g[cat] || g.party;
}

function showEventDetail(id) {
  const e = Store.getById('events', id);
  if (!e) return;
  const registered = isRegistered(id);
  const genderKey = me.gender === 'female' ? 'female' : 'male';
  const remaining = e.capacity[genderKey] - (e.registered[genderKey] || 0);
  const isFull = remaining <= 0;

  App.modal(`
    <div style="background:${eventGrad(e.category)};height:120px;display:flex;align-items:center;justify-content:center;font-size:56px;border-radius:20px 20px 0 0;">${e.emoji}</div>
    <div class="modal-header" style="padding-top:14px;"><h3 style="font-size:16px;">${e.name}</h3><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">×</button></div>
    <div class="modal-body">
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px;">
        ${[['📅 日時',`${App.fmtDate(e.date,{yearMonthDay:true})} ${e.time}`],['📍 場所',e.location],['💰 参加費',`¥${e.fee.toLocaleString()}`],['👥 対象年齢',e.ageRange],['📊 残席数',isFull?'満席':`${remaining}名`]].map(([l,v])=>`<div style="display:flex;gap:12px;font-size:13px;"><span style="color:var(--text-muted);width:90px;flex-shrink:0;">${l}</span><span style="font-weight:600;">${v}</span></div>`).join('')}
      </div>
      <div style="background:var(--bg);border-radius:10px;padding:12px;font-size:13px;color:var(--text-sub);line-height:1.7;">${e.description}</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-full" onclick="this.closest('.modal-overlay').remove()">閉じる</button>
      ${registered ? `<button class="btn btn-danger btn-full" onclick="cancelEvent('${id}')">申込をキャンセル</button>` : (isFull ? `<button class="btn btn-ghost btn-full" disabled>満席</button>` : `<button class="btn btn-primary btn-full" onclick="registerEvent('${id}')">申し込む</button>`)}
    </div>`);
}

function registerEvent(id) {
  const newId = Store.nextId('eventRegistrations','ER');
  Store.create('eventRegistrations', { id: newId, memberId: me.id, eventId: id, registeredAt: new Date().toISOString(), status: 'confirmed', attendance: null });
  document.querySelector('.modal-overlay')?.remove();
  App.toast('✅ イベントの申込が完了しました！', 'success');
  render();
}

function cancelEvent(id) {
  App.confirm('イベントの申込をキャンセルしますか？', () => {
    const reg = Store.query('eventRegistrations', r => r.memberId === me.id && r.eventId === id)[0];
    if (reg) Store.remove('eventRegistrations', reg.id);
    document.querySelector('.modal-overlay')?.remove();
    App.toast('キャンセルしました', 'default');
    render();
  });
}

render();
</script>
</body>
</html>

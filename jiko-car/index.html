function renderKartView(vx,vy,vw,vh,P,vi,t,low){
  ctx.save();
  ctx.beginPath();ctx.rect(vx,vy,vw,vh);ctx.clip();
  ctx.translate(vx,vy);
  const camBack=150,dNear=110;
  const camZ=P.z-camBack;
  const inW=!!course.water||(course.seaDive&&isWaterZ(P.z));
  const night=!!course.night;
  const horY=Math.round(vh*(course.space?.34:.40));
  const KW=vw*1.02; // wide mario-kart style course
  const bend=ktrack
    ?z=>clamp((ktU(z)-ktU(camZ))*1.12,-3.6,3.6)
    :z=>clamp((roadCenterAt(z)-roadCenterAt(camZ))/roadHalf*1.35,-3.2,3.2);
  const camU=P.rel*.92;
  drawKartSky(vw,vh,horY,t,P,camZ,inW);
  // band colors
  const fogMax={fubuki:.85,yuki:.5,uminaka:.6,yoru:.55,uchu:.35}[course.id]||(inW?.6:.4);
  const fogCol=colObj(kartSkyCols(inW)[1]);
  const grassA=colObj(shade(course.ground,inW&&course.seaDive?-.15:(course.space?.015:.045)));
  const grassB=colObj(shade(course.ground,inW&&course.seaDive?-.21:(course.space?-.012:-.035)));
  const roadA=colObj(shade(course.road,.05));
  const roadB=colObj(shade(course.road,-.035));
  const rumA=colObj(course.space?'#38f2ff':(course.snow?'#4d9de0':'#e84a3f'));
  const rumB=colObj(course.space?'#7ef3ff':'#f4f6f9');
  const edgeC=colObj(course.edge);
  const seaC=colObj('#2f9ed4'),sandC=colObj('#f0dda2');
  const N=low?22:32;
  const rows=[];
  for(let j=0;j<=N;j++){
    const y=vh-(vh-horY-2)*(j/N);
    const s=Math.max((y-horY)/(vh-horY),.02);
    const d=dNear/s;
    const z=camZ+d;
    rows.push({y,s,d,z,cx:vw/2+(bend(z)-camU)*KW*s,hw:KW*s});
  }
  const quad=(x1,y1,w1,x2,y2,w2,col)=>{
    ctx.fillStyle=col;
    ctx.beginPath();
    ctx.moveTo(x1-w1,y1+.5);ctx.lineTo(x1+w1,y1+.5);
    ctx.lineTo(x2+w2,y2-.5);ctx.lineTo(x2-w2,y2-.5);
    ctx.closePath();ctx.fill();
  };
  for(let j=0;j<N;j++){
    const a=rows[j],b=rows[j+1]; // a: near(bottom) b: far(top)
    const par=Math.abs(Math.floor(a.z/170))%2;
    const par2=Math.abs(Math.floor(a.z/85))%2;
    const f=Math.min(1,Math.pow(1-a.s,1.7)*fogMax/.9);
    // ground
    ctx.fillStyle=mixCol(par?grassA:grassB,fogCol,f);
    ctx.fillRect(0,b.y-.5,vw,a.y-b.y+1);
    if(course.sea&&!inW){
      const sxA=a.cx-a.hw*1.42,sxB=b.cx-b.hw*1.42;
      quad((a.cx-a.hw*1.2+sxA)/2,a.y,(a.cx-a.hw*1.2-sxA)/2,(b.cx-b.hw*1.2+sxB)/2,b.y,(b.cx-b.hw*1.2-sxB)/2,mixCol(sandC,fogCol,f));
      ctx.fillStyle=mixCol(seaC,fogCol,f);
      ctx.beginPath();
      ctx.moveTo(0,a.y+.5);ctx.lineTo(sxA,a.y+.5);ctx.lineTo(sxB,b.y-.5);ctx.lineTo(0,b.y-.5);
      ctx.closePath();ctx.fill();
    }
    // rumble strips (kerb widens on the inside of a curve)
    const cuRow=ktrack?ktCurv((a.z+b.z)/2):0;
    const kerbIn=.09+Math.min(.13,Math.abs(cuRow)*.55);
    const wL=cuRow<-0.06?kerbIn:.09,wR=cuRow>0.06?kerbIn:.09;
    quad(a.cx-a.hw*1.07,a.y,a.hw*wL,b.cx-b.hw*1.07,b.y,b.hw*wL,mixCol(par2?rumA:rumB,fogCol,f));
    quad(a.cx+a.hw*1.07,a.y,a.hw*wR,b.cx+b.hw*1.07,b.y,b.hw*wR,mixCol(par2?rumA:rumB,fogCol,f));
    // road
    quad(a.cx,a.y,a.hw,b.cx,b.y,b.hw,mixCol(par?roadA:roadB,fogCol,f));
    // edge lines
    quad(a.cx-a.hw*.94,a.y,Math.max(1,a.hw*.02),b.cx-b.hw*.94,b.y,Math.max(.7,b.hw*.02),mixCol(edgeC,fogCol,f));
    quad(a.cx+a.hw*.94,a.y,Math.max(1,a.hw*.02),b.cx+b.hw*.94,b.y,Math.max(.7,b.hw*.02),mixCol(edgeC,fogCol,f));
    // lane dashes (wide course: 4 dashed separators)
    if(par){
      KLANES.forEach(fr=>{
        quad(a.cx+a.hw*fr,a.y,Math.max(1,a.hw*.015),b.cx+b.hw*fr,b.y,Math.max(.7,b.hw*.015),mixCol(colObj('#f6f8fb'),fogCol,f));
      });
    }
    if(course.twoway){
      quad(a.cx,a.y,Math.max(1,a.hw*.014),b.cx,b.y,Math.max(.7,b.hw*.014),mixCol(colObj('#ffb43c'),fogCol,f));
    }
    if(course.snow&&par2===0){
      ctx.fillStyle='rgba(255,255,255,.22)';
      ctx.beginPath();
      ctx.ellipse(a.cx+a.hw*.4*Math.sin(a.z*.01),(a.y+b.y)/2,a.hw*.16,(a.y-b.y)*.4,0,0,TAU);
      ctx.fill();
    }
  }
  const maxD=rows[N].d;
  const proj=z=>{
    const d=z-camZ;
    const s=dNear/d;
    return{d,s,y:horY+(vh-horY)*s,ws:KW*s/roadHalf};
  };
  // collect billboards
  const spr=[];
  for(const d of world.deco){
    if(d.type==='boat')continue;
    if(low&&(d.seed%2))continue;
    const dd=d.z-camZ;
    if(dd<dNear*.8||dd>maxD)continue;
    spr.push({z:d.z,u:d.side*(1+d.off/roadHalf),kind:'deco',ref:d});
  }
  for(const o of world.obstacles){
    const dd=o.z-camZ;
    if(dd<dNear*.6||dd>maxD)continue;
    spr.push({z:o.z,u:o.lane+(o.xOff||0)/RHN,kind:'obs',ref:o});
  }
  for(const b2 of kart.balls){
    const dd=b2.z-camZ;
    if(dd<dNear*.6||dd>maxD)continue;
    spr.push({z:b2.z,u:b2.rel,kind:'ball',ref:b2});
  }
  for(const r of kart.racers){
    if(r===P)continue;
    const dd=r.z-camZ;
    if(dd<dNear*.62||dd>maxD)continue;
    spr.push({z:r.z,u:r.rel,kind:'racer',ref:r});
  }
  if(kart.goal-camZ>dNear*.6&&kart.goal-camZ<maxD)spr.push({z:kart.goal,u:0,kind:'goal'});
  spr.sort((p,q)=>q.z-p.z);
  for(const sp of spr){
    const pj=proj(sp.z);
    const x=vw/2+(bend(sp.z)+sp.u-camU)*KW*pj.s;
    const fog=Math.min(1,Math.pow(1-pj.s,1.7)*fogMax/.9);
    ctx.globalAlpha=Math.max(.1,1-fog*.9);
    if(sp.kind==='goal'){
      // checker band on the road
      const hw=KW*pj.s,cx2=vw/2+(bend(sp.z)-camU)*KW*pj.s;
      const n2=12,sq=hw*2/n2,bh2=Math.max(4,hw*.09);
      for(let r2=0;r2<2;r2++)for(let i2=0;i2<n2;i2++){
        ctx.fillStyle=(i2+r2)%2?'#f4f6f9':'#23252b';
        ctx.fillRect(cx2-hw+i2*sq,pj.y-bh2*(r2+1),sq+.5,bh2);
      }
      // poles + banner
      const ph2=hw*.62;
      ctx.fillStyle='#8f97a5';
      ctx.fillRect(cx2-hw*1.06-hw*.025,pj.y-ph2,hw*.05,ph2);
      ctx.fillRect(cx2+hw*1.06-hw*.025,pj.y-ph2,hw*.05,ph2);
      ctx.fillStyle='#e8452f';
      ctx.fillRect(cx2-hw*1.12,pj.y-ph2,hw*2.24,hw*.16);
      ctx.fillStyle='#fff';
      const fs=Math.max(6,hw*.11);
      ctx.font='900 '+fs+'px sans-serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('ゴール',cx2,pj.y-ph2+hw*.08);
      ctx.textAlign='left';ctx.textBaseline='alphabetic';
      ctx.globalAlpha=1;
      continue;
    }
    ctx.save();
    ctx.translate(x,pj.y);
    if(sp.kind==='deco'){
      const d=sp.ref,sc=pj.ws*1.35;
      ctx.scale(sc,sc);
      switch(d.type){
        case 'tree':fvTree(ctx,d.seed,false);break;
        case 'snowtree':fvTree(ctx,d.seed,true);break;
        case 'palm':fvPalm(ctx,d.seed,t);break;
        case 'building':fvBuilding(ctx,d.seed,false);break;
        case 'nbuilding':fvBuilding(ctx,d.seed,true);break;
        case 'signal':drawSignal(ctx,0,-46,1.7,d.seed,t);break;
        case 'streetlight':fvStreetlight(ctx,d.side,night);break;
        case 'sign':drawSign(ctx,0,-26,1.7,d.seed);break;
        case 'bush':drawBush(ctx,0,-9,1.6,d.seed);break;
        case 'rock':drawRockCluster(ctx,0,-11,1.5,d.seed);break;
        case 'snowman':drawSnowman(ctx,0,-17,1.6,d.seed);break;
        case 'parasol':fvParasol(ctx,d.seed);break;
        case 'coral':drawCoral(ctx,0,-7,1.8,d.seed);break;
        case 'seaweed':drawSeaweed(ctx,0,-4,1.9,d.seed,t);break;
        case 'shell':drawShell(ctx,0,-9,1.7,d.seed);break;
        case 'planet':drawPlanet(ctx,0,-95,1.6,d.seed);break;
        case 'chev':fvChevron(ctx,d.seed?1:-1,t);break;
      }
    }else if(sp.kind==='obs'){
      const o=sp.ref,sc=pj.ws*1.15;
      if(o.hit){
        const k=Math.cos(o.spin*1.5);
        ctx.scale(Math.max(.25,Math.abs(k))*(k<0?-1:1)*sc,sc);
        ctx.rotate(Math.sin(o.spin*3)*.15);
      }else ctx.scale(sc,sc);
      const front=o.dir<0;
      if(o.type==='item')drawItemBox(ctx,0,-26,1.25,t);
      else if(o.type==='ball')drawBall(ctx,0,-24,1.1);
      else if(o.type==='rockobs')drawRockCluster(ctx,0,-12,1.5,o.seed||3);
      else if(o.type==='snowpile')drawSnowPile(ctx,0,-12,1.4);
      else if(o.type==='cone')fvCone(ctx);
      else if(o.kind==='sub')drawSubBB(ctx,o.seed||0,front,t);
      else if(o.kind==='rocket')drawRocketBB(ctx,front,t);
      else if(o.kind==='ufo')drawUfoBB(ctx,t);
      else if(o.spec)drawCarBB(ctx,o.spec,front,t);
    }else if(sp.kind==='ball'){
      const sc=Math.max(.14,pj.ws);
      ctx.scale(sc,sc);
      ctx.rotate(sp.ref.spin);
      starPath(ctx,26);
      ctx.fillStyle='#ffe066';ctx.fill();
      ctx.strokeStyle='#f08c00';ctx.lineWidth=4;ctx.stroke();
    }else if(sp.kind==='racer'){
      const r=sp.ref;
      const sc=pj.ws*.85;
      if(r.invT>0)ctx.globalAlpha*= .55+.35*Math.sin(t*24);
      // ground shadow
      ctx.fillStyle='rgba(15,25,45,.3)';
      ctx.beginPath();ctx.ellipse(0,-4*sc,118*sc,16*sc,0,0,TAU);ctx.fill();
      ctx.scale(sc,sc);
      drawKartRear(ctx,r.spec,r.ch,{
        steer:clamp(r.tilt/.18,-1,1),tilt:r.tilt,
        spin:r.spinT>0?r.spin:0,
        jump:r.jumpT>0?Math.sin(Math.PI*(1-r.jumpT/KJUMP)):0,
        pedal:r.sp>40?1:0,t
      });
      if(r.spinT>0){
        for(let i=0;i<3;i++){
          const a2=t*7+i*TAU/3;
          ctx.save();ctx.translate(Math.cos(a2)*110,-150+Math.sin(a2)*34);ctx.rotate(a2);
          starPath(ctx,22);
          ctx.fillStyle='#ffd43b';ctx.fill();
          ctx.strokeStyle='#f59f00';ctx.lineWidth=3;ctx.stroke();
          ctx.restore();
        }
      }
      // name chip
      if(pj.ws>.4){
        ctx.font='900 26px sans-serif';
        ctx.textAlign='center';
        ctx.lineWidth=7;ctx.strokeStyle='rgba(255,255,255,.9)';
        ctx.strokeText(r.ch.name,0,-248);
        ctx.fillStyle=r.cpu?'#5d6675':(r.pi===1?'#e8551e':'#3f8fe8');
        ctx.fillText(r.ch.name,0,-248);
        ctx.textAlign='left';
      }
    }
    ctx.restore();
    ctx.globalAlpha=1;
  }
  // night headlight cone
  if(night){
    ctx.fillStyle='rgba(8,10,38,.30)';
    ctx.fillRect(0,horY,vw,vh-horY);
    const farP=proj(camZ+1100);
    const fx=vw/2+(bend(camZ+1100)-camU)*KW*farP.s;
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const hg=ctx.createLinearGradient(0,vh,0,farP.y);
    hg.addColorStop(0,'rgba(255,240,180,.25)');hg.addColorStop(1,'rgba(255,240,180,0)');
    ctx.fillStyle=hg;
    ctx.beginPath();
    ctx.moveTo(vw/2-90,vh);ctx.lineTo(vw/2+90,vh);
    ctx.lineTo(fx+KW*farP.s*.5,farP.y);ctx.lineTo(fx-KW*farP.s*.5,farP.y);
    ctx.closePath();ctx.fill();
    ctx.restore();
  }
  // player kart
  const jumpK=P.jumpT>0?Math.sin(Math.PI*(1-P.jumpT/KJUMP)):0;
  const kW=clamp(vw*.40,200,330),ksc=kW/200;
  const bounce=(kart.phase==='run'&&P.sp>30)?Math.sin(t*10)*2:0;
  const rum=(P.rumbleT||0)>0&&P.sp>40;
  const kx=vw/2+P.tilt*46+(rum?Math.sin(t*47)*3:0);
  const ky=vh-10+bounce+(rum?Math.sin(t*61)*3.2:0);
  // shadow stays on the ground
  ctx.fillStyle='rgba(15,25,45,'+(0.32-jumpK*.15)+')';
  ctx.beginPath();ctx.ellipse(kx,vh-14,(118-jumpK*24)*ksc,(16-jumpK*4)*ksc,0,0,TAU);ctx.fill();
  // exhaust puffs
  if(kart.phase!=='count'&&P.sp>20){
    for(let i=0;i<3;i++){
      const ph=(t*2.1+i*.37)%1;
      ctx.fillStyle='rgba(210,214,224,'+(0.4*(1-ph)).toFixed(2)+')';
      ctx.beginPath();
      ctx.arc(kx-30*ksc+Math.sin(ph*9+i)*8,ky-6*ksc+ph*30,(5+ph*15)*ksc,0,TAU);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(kx+30*ksc+Math.sin(ph*9+i+2)*8,ky-6*ksc+ph*30,(4+ph*13)*ksc,0,TAU);
      ctx.fill();
    }
  }
  // offroad dust
  if(Math.abs(P.rel)>.94&&P.sp>60){
    ctx.fillStyle='rgba(190,170,130,.5)';
    for(let i=0;i<4;i++){
      const ph=(t*3.7+i*.25)%1;
      ctx.beginPath();
      ctx.arc(kx+(P.rel>0?1:-1)*95*ksc+ph*22,ky-14*ksc-ph*36,(4+ph*13)*ksc,0,TAU);
      ctx.fill();
    }
  }
  ctx.save();
  ctx.translate(kx,ky-jumpK*120*ksc);
  if(P.invT>0)ctx.globalAlpha=.55+.35*Math.sin(t*24);
  ctx.scale(ksc,ksc);
  drawKartRear(ctx,P.spec,P.ch,{
    steer:clamp(P.tilt/.18,-1,1),tilt:P.tilt*.7,
    spin:P.spinT>0?P.spin:0,
    jump:jumpK,pedal:P.sp>40?1:0,t
  });
  ctx.restore();
  ctx.globalAlpha=1;
  if(P.spinT>0){
    for(let i=0;i<4;i++){
      const a2=t*7+i*TAU/4;
      ctx.save();
      ctx.translate(kx+Math.cos(a2)*130*ksc,ky-160*ksc+Math.sin(a2)*40*ksc);
      ctx.rotate(a2);
      starPath(ctx,15*ksc);
      ctx.fillStyle='#ffd43b';ctx.fill();
      ctx.strokeStyle='#f59f00';ctx.lineWidth=2.5;ctx.stroke();
      ctx.restore();
    }
  }
  // weather / water overlays
  if(inW){
    ctx.fillStyle='rgba(15,70,130,.18)';
    ctx.fillRect(0,0,vw,vh);
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    for(let i=0;i<3;i++){
      const bx=vw*(.18+.3*i)+Math.sin(t*.25+i*1.7)*40;
      const rg=ctx.createLinearGradient(0,0,0,vh*.8);
      rg.addColorStop(0,'rgba(200,240,255,.13)');rg.addColorStop(1,'rgba(200,240,255,0)');
      ctx.fillStyle=rg;
      ctx.beginPath();
      ctx.moveTo(bx-22,-8);ctx.lineTo(bx+26,-8);
      ctx.lineTo(bx+130,vh*.8);ctx.lineTo(bx+36,vh*.8);
      ctx.closePath();ctx.fill();
    }
    ctx.restore();
    if(world.fx&&world.fx.bubbles){
      ctx.fillStyle='rgba(225,245,255,.6)';
      for(const b2 of world.fx.bubbles){
        ctx.beginPath();
        ctx.arc(b2.x/W*vw,b2.y/H*vh,b2.r,0,TAU);
        ctx.fill();
      }
    }
  }
  if(world.fx&&world.fx.flakes&&world.fx.flakes.length){
    ctx.fillStyle='rgba(255,255,255,.85)';
    for(const f2 of world.fx.flakes){
      ctx.beginPath();ctx.arc(f2.x/W*vw,f2.y/H*vh,f2.r,0,TAU);ctx.fill();
    }
    if(course.blizzard){
      ctx.fillStyle='rgba(235,242,250,.1)';
      ctx.fillRect(0,0,vw,vh);
    }
  }
  // speed streaks
  if(kart.phase==='run'&&P.sp>baseSpeed()*.9){
    ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=3;ctx.lineCap='round';
    for(let i=0;i<6;i++){
      const sy2=((t*P.sp*1.5+i*163)%(vh*.5));
      const sx2=i<3?12+i*13:vw-12-(i-3)*13;
      ctx.beginPath();ctx.moveTo(sx2,sy2);ctx.lineTo(sx2,sy2+40+i*7);ctx.stroke();
    }
  }
  // versus star attacks (projected)
  if(kart.versus){
    for(const a2 of kart.attacks){
      if(a2.from===vi&&a2.phase==='fly'){
        const k=a2.t/.8;
        const ax=vw/2+(1-k)* (a2.srcRel-camU)*KW*.9;
        const ay=vh*.72-(vh*.72-horY)*k;
        ctx.save();ctx.translate(ax,ay);ctx.rotate(t*12);
        starPath(ctx,26-k*16);
        ctx.fillStyle='#ffe066';ctx.fill();
        ctx.strokeStyle='#f08c00';ctx.lineWidth=3;ctx.stroke();
        ctx.restore();
      }
      if(a2.tgt===vi&&(a2.phase==='warn'||a2.phase==='hit')){
        const dd=a2.z-camZ;
        if(dd>dNear*.5&&dd<maxD){
          const pj2=proj(a2.z);
          const ax=vw/2+(bend(a2.z)+a2.rel-camU)*KW*pj2.s;
          if(a2.phase==='warn'){
            const k=clamp((a2.t-.8)/.7,0,1);
            ctx.strokeStyle='rgba(255,80,60,'+(0.5+0.4*Math.sin(t*14)).toFixed(2)+')';
            ctx.lineWidth=4;
            ctx.beginPath();
            ctx.ellipse(ax,pj2.y,KW*pj2.s*.2*(1.2-k*.4),KW*pj2.s*.06*(1.2-k*.4),0,0,TAU);
            ctx.stroke();
            const fy=pj2.y-(1-k)*(vh*.5);
            ctx.save();ctx.translate(ax,fy);ctx.rotate(t*12);
            starPath(ctx,14+pj2.ws*20);
            ctx.fillStyle='#ffe066';ctx.fill();
            ctx.strokeStyle='#f08c00';ctx.lineWidth=2.5;ctx.stroke();
            ctx.restore();
          }else{
            const k=clamp((a2.t-1.5)/.4,0,1);
            ctx.strokeStyle='rgba(255,210,80,'+(0.8*(1-k)).toFixed(2)+')';
            ctx.lineWidth=5;
            ctx.beginPath();ctx.arc(ax,pj2.y,(16+80*k)*Math.max(.4,pj2.ws),0,TAU);ctx.stroke();
          }
        }
      }
    }
  }
  ctx.restore();
}
function renderRace3D(t){
  ctx.clearRect(0,0,W,H);
  const P=kart.racers[0];
  if(!P){return;}
  renderKartView(0,0,W,H,P,0,t,false);
  drawRaceHUD(t);
  drawConfetti();
  if(state==='play')updateRaceChip();
}
function renderVersus3D(t){
  ctx.clearRect(0,0,W,H);
  const horiz=W>H;
  document.body.classList.toggle('vs-landscape',horiz);
  const views=horiz
    ?[[0,0,W/2,H],[W/2,0,W/2,H]]
    :[[0,H/2,W,H/2],[0,0,W,H/2]];
  for(let i=0;i<2;i++){
    const v=views[i],P=kart.racers[i];
    if(!P)continue;
    renderKartView(v[0],v[1],v[2],v[3],P,i,t,true);
    // per-view HUD (screen-space)
    ctx.save();
    ctx.beginPath();ctx.rect(v[0],v[1],v[2],v[3]);ctx.clip();
    ctx.translate(v[0],v[1]);
    const sw=W,sh=H;W=v[2];H=v[3];
    drawViewHUD(i,t,((horiz&&i===0)||(!horiz&&i===1))?52:0,(!horiz&&i===1)?104:0);
    W=sw;H=sh;
    ctx.restore();
  }
  ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=9;
  ctx.beginPath();
  if(horiz){ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);}
  else{ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);}
  ctx.stroke();
  ctx.strokeStyle='#fff';ctx.lineWidth=5;
  ctx.beginPath();
  if(horiz){ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);}
  else{ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);}
  ctx.stroke();
  drawConfetti();
  updateRaceChip();
}
/* rear-view kart preview used by the selection screens */
function drawKartPreviewOn(cv,spec,ch,mul){
  const c=cv.getContext('2d');
  c.setTransform(1,0,0,1,0,0);
  c.clearRect(0,0,cv.width,cv.height);
  c.translate(cv.width/2,cv.height*.96);
  const sc=(cv.width/250)*(mul||1);
  c.scale(sc,sc);
  c.fillStyle='rgba(20,30,50,.25)';
  c.beginPath();c.ellipse(0,0,120,15,0,0,TAU);c.fill();
  drawKartRear(c,spec,ch,{steer:0,tilt:0,jump:0,pedal:0,t:0});
}

function showRaceResult(){
  const R=kart.racers.slice();
  R.sort((a,b)=>{
    const fa=a.fRank||99,fb=b.fRank||99;
    if(fa!==fb)return fa-fb;
    return b.z-a.z;
  });
  const rows=$('#race-result-rows');
  rows.innerHTML='';
  R.forEach((r,i)=>{
    const row=document.createElement('div');
    row.className='race-row'+((kart.versus?i===0:!r.cpu)?' me':'');
    const rk=document.createElement('span');rk.className='rk';rk.textContent=(i+1)+'い';
    const cv=document.createElement('canvas');
    cv.width=90;cv.height=90;cv.style.width='45px';cv.style.height='45px';
    const c=cv.getContext('2d');
    c.setTransform(1,0,0,1,45,50);
    drawCharHead(c,r.ch,0,0,28);
    const nm=document.createElement('span');nm.className='rn';
    nm.textContent=r.ch.name+(r.cpu?'':(kart.versus?'（P'+(r.pi+1)+'）':'（きみ）'));
    row.appendChild(rk);row.appendChild(cv);row.appendChild(nm);
    rows.appendChild(row);
  });
  const title=$('#race-result-title');
  if(kart.versus)title.textContent='P'+(kart.winner+1)+'の かち！';
  else{
    const mr=kartRank(kart.racers[0]);
    title.textContent=mr===1?'1い！ やったー！':'ゴール！ '+mr+'い';
    if(mr===1)setTimeout(sndFanfare,300);
  }
  setState('raceres');
}

/* test hooks (harmless in production) */
window.__test={
  give:n=>{world.items=clamp(n,0,3);updateItemHUD();},
  items:()=>world.items,
  bonus:()=>world.bonus,
  spawnItemAhead:dz=>{
    const z=world.dist+(dz||420);
    world.obstacles.push({z,lane:clamp((world.carX-roadCenterAt(z))/roadHalf,-.7,.7),type:'item',sp:0,dir:1,kind:'item',seed:0});
  },
  spawnCarAhead:dz=>{
    const z=world.dist+(dz||520);
    const kind=course.vehicle==='sub'?'sub':(course.vehicle==='space'?'ufo':'car');
    world.obstacles.push({z,lane:clamp((world.carX-roadCenterAt(z))/roadHalf,-.7,.7),
      type:'car',kind,spec:CARS[7],sp:world.speed*.3,dir:1,seed:3});
  },
  throwNow:()=>throwItem(),
  setDist:v=>{
    world.dist=v;
    world.nextObsZ=v+PY+600;
    world.nextItemZ=v+PY+900;
    world.deco=[];world.obstacles=[];
    world.nextDecoZ=v;
    if(course.deco)while(world.nextDecoZ<v+PY+300)spawnDeco();
  },
  inWater:()=>world.inWater,
  jumpY:()=>world.jumpY,
  jump:()=>doJump(),
  airT:()=>world.airT,
  jumpCd:()=>world.jumpCd,
  landG:()=>world.landG,
  zoneKind:()=>world.zoneKind,
  boostT:()=>world.boostT,
  speedNow:()=>world.speed,
  steerV:()=>world.steerV,
  carX:()=>world.carX,
  spawnZoneAhead:(kind,dz,len,wf)=>{
    const w=wf||1;
    const off=clamp((world.carX-roadCenterAt(world.dist))/roadHalf,-(1-w)-.4,(1-w)+.4);
    world.zones.push({z:world.dist+(dz||300),len:len||360,wf:w,off:w>=1?0:off,
      kind:kind||'mud',seed:11,used:false});
  },
  clearZones:()=>{world.zones=[];world.nextZoneZ=world.dist+PY+5000;world.zoneKind=null;world.boostT=0;},
  clearSide:()=>{world.sideObs=[];world.nextObsZ=world.dist+W+4000;world.airItems=[];world.nextAirZ=world.dist+W+4000;},
  sideObstacle:dz=>{world.sideObs.push({z:world.dist+(dz||420),type:'pipe',w:64,h:66});},
  sideCar:dz=>{world.sideObs.push({z:world.dist+(dz||460),type:'car',spec:CARS[7],w:CARS[7].l,h:44});},
  airStar:(dz,h)=>{world.airItems.push({z:world.dist+(dz||300),h:h||110,kind:'star'});},
  obstacleDx:()=>{
    let m=1e9;
    world.sideObs.forEach(o=>{if(!o.hit){const dx=o.z-world.dist;if(dx>-40&&dx<m)m=dx;}});
    return m;
  },
  airDx:()=>{
    let m=1e9;
    world.airItems.forEach(o=>{if(!o.got){const dx=o.z-world.dist;if(dx>-40&&dx<m)m=dx;}});
    return m;
  },
  lives:()=>world.lives,
  livesTotal:()=>world.livesTotal,
  selLives:()=>selLives,
  setLives:n=>{world.lives=clamp(n,1,world.livesTotal||10);updateLivesHUD();},
  forceCrash:()=>doCrash(false),
  clearInv:()=>{world.invT=0;},
  invT:()=>world.invT,
  clearRoad:()=>{world.obstacles=[];world.nextObsZ=world.dist+PY+3000;world.nextItemZ=world.dist+PY+3000;},
  sirenOn:()=>!!siren,
  acOn:()=>!!AC,
  acState:()=>AC?AC.state:'none',
  autopilot:v=>{TEST_AUTO=!!v;},
  sideX:()=>world.sideX,
  sideVx:()=>world.sideVx,
  bgmOn:()=>!!bgm,
  bgmMode:()=>bgm?bgm.mode:'',
  bgmBar:()=>bgm?bgm.bar:-1,
  bgmNotes:()=>bgmNotesScheduled,
  bgmEnabled:()=>bgmEnabled,
  padOn:()=>pad.on,
  padUsing:()=>pad.using,
  padFocus:()=>{
    const el=pad.focusEl;
    if(!el)return null;
    return el.id||el.dataset.car||el.dataset.course||el.dataset.diff||el.dataset.lives||'el';
  },
  go:(car,co,d)=>{if(car)selectCar(car);if(co)selectCourse(co);if(d)selectDiff(d);startGame();},
  /* kart mode hooks */
  kartBegin:()=>kartBegin(),
  kartStartRace:(car,co,d)=>{
    if(co)selectCourse(co);
    if(d)selectDiff(d);
    kart.sel[0].ch=kart.sel[0].ch||charById('boy');
    kart.sel[0].car=CARS.find(c=>c.id===car)||selCar;
    selCar=kart.sel[0].car;
    startRace();
  },
  kartStartVersus:(c1,c2,co,d)=>{
    if(co)selectCourse(co);
    if(d)selectDiff(d);
    kart.sel[0].ch=charById('boy');
    kart.sel[1].ch=charById('cat');
    kart.sel[0].car=CARS.find(c=>c.id===c1)||CARS[0];
    kart.sel[1].car=CARS.find(c=>c.id===c2)||CARS[7];
    selCar=kart.sel[0].car;
    startVersus();
  },
  kartSkipCount:()=>{kart.countT=.01;},
  kartActive:()=>kart.active,
  kartVersus:()=>kart.versus,
  kartPhase:()=>kart.phase,
  kartRankNow:()=>kart.racers.length?kartRank(kart.racers[0]):0,
  kartZ:i=>kart.racers[i]?Math.round(kart.racers[i].z):-1,
  kartRel:i=>kart.racers[i]?+kart.racers[i].rel.toFixed(3):0,
  kartSpinT:i=>kart.racers[i]?kart.racers[i].spinT:0,
  kartItems:i=>kart.racers[i]?kart.racers[i].items:-1,
  kartGive:(i,n)=>{if(kart.racers[i]){kart.racers[i].items=n;updateKartItemHUD();}},
  kartThrowP:i=>kartThrow(i),
  kartSetZ:(i,z)=>{if(kart.racers[i])kart.racers[i].z=z;},
  kartSetRel:(i,v)=>{if(kart.racers[i])kart.racers[i].rel=v;},
  kartGoal:()=>kart.goal,
  kartWinner:()=>kart.winner,
  kartCpuAhead:()=>{
    const R=kart.racers,c=R.find(r=>r.cpu);
    if(c){c.z=R[0].z+330;c.rel=R[0].rel;}
  },
  kartAttackCount:()=>kart.attacks.length,
  kartRacerCount:()=>kart.racers.length,
  kartJumpNow:()=>kartJump(kart.racers[0]),
  kartJumpT:i=>kart.racers[i]?kart.racers[i].jumpT:0,
  pixel:(x,y)=>{
    try{
      const d=ctx.getImageData(Math.round(x*DPR),Math.round(y*DPR),1,1).data;
      return[d[0],d[1],d[2]];
    }catch(e){return null;}
  },
  charCount:()=>allChars().length,
  charAddTest:name=>{
    const ch={id:'c'+Date.now(),name:name||'てすと',kind:'human',skin:ED_SKINS[2],hair:'bob',
      hairCol:ED_HAIRCOLS[3],hat:'cap',hatCol:ED_HATCOLS[1],eyes:'happy',shirt:'#4d9de0',custom:true};
    customChars.push(ch);saveChars();buildCharGrid();
    return ch.id;
  },
  charDelete:id=>deleteChar(id),
  customCount:()=>customChars.length
};
let last=performance.now();
function frame(now){
  requestAnimationFrame(frame);
  let dt=(now-last)/1000;last=now;
  dt=Math.min(dt,.05);
  pollPad(dt);
  update(dt,now/1000);
  render(now/1000);
}
requestAnimationFrame(frame);
</script>

      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(st.x,yy,st.r,0,TAU);ctx.fill();
    }
    ctx.globalAlpha=1;
    for(const sh of world.fx.shots){
      const a=1-sh.t/sh.life;
      ctx.strokeStyle='rgba(255,255,255,'+(0.85*a).toFixed(3)+')';
      ctx.lineWidth=2.5;ctx.lineCap='round';

  }
  if(course.sea){
    sideFill(pts,roadHalf+18,-1,'#f0dda2');

      const y=PY-(wz-world.dist)%1600;

      const cx=roadCenterAt(world.dist+(PY-yy));
      const xx=cx-roadHalf-110-(i%4)*46;

        ctx.beginPath();ctx.moveTo(xx-16,yy);ctx.quadraticCurveTo(xx-8,yy-5,xx,yy);

  for(let i=pts.length-1;i>=0;i--){ctx.lineTo(pts[i][1]+roadHalf,pts[i][0]);}
  ctx.closePath();ctx.fillStyle=course.road;ctx.fill();
  if(course.snow){ // snow patches on road
    ctx.fillStyle='rgba(255,255,255,.35)';
    for(let i=0;i<7;i++){
      const pz=Math.floor((world.dist+i*257)/900)*900+i*197;

      if(y>-60&&y<H+60){

    else if(o.type==='item')drawItemBox(ctx,x,y,CS,t);

    else if(o.type==='rockobs')drawRockCluster(ctx,x,y,CS);
    else if(o.type==='snowpile')drawSnowPile(ctx,x,y,CS);

  }
  if(kart.active)drawRacersTop(t);

        ctx.fillStyle=g;
        ctx.beginPath();
        ctx.moveTo(bx-24,-10);ctx.lineTo(bx+28,-10);
        ctx.lineTo(bx+140,H*.9);ctx.lineTo(bx+40,H*.9);
        ctx.closePath();ctx.fill();
      }
      ctx.restore();
      // foam edges
      ctx.lineCap='round';
      bands.forEach(b=>{
        [b[0],b[1]].forEach(fy=>{
          if(fy<-10||fy>H+10)return;
          ctx.strokeStyle='rgba(255,255,255,.85)';ctx.lineWidth=5;
          ctx.beginPath();
          for(let x=0;x<=W;x+=16){
            const yy=fy+Math.sin(x*.045+t*3)*3.5;
            x?ctx.lineTo(x,yy):ctx.moveTo(x,yy);
          }
          ctx.stroke();
          ctx.strokeStyle='rgba(210,240,255,.5)';ctx.lineWidth=2;
          ctx.beginPath();
          for(let x=0;x<=W;x+=16){
            const yy=fy+7+Math.sin(x*.05+t*3+1)*3;
            x?ctx.lineTo(x,yy):ctx.moveTo(x,yy);
          }
          ctx.stroke();
        });
      });
    }
  }
  // falling snow on top
  if(world.fx&&world.fx.flakes.length){
    if(course.blizzard){ // wind-streaked flakes
      ctx.strokeStyle='rgba(255,255,255,.85)';ctx.lineCap='round';
      for(const f of world.fx.flakes){
        ctx.lineWidth=f.r;
        ctx.beginPath();ctx.moveTo(f.x,f.y);
        ctx.lineTo(f.x-f.vx*.055,f.y-f.vy*.055);ctx.stroke();
      }
      ctx.fillStyle='rgba(235,242,250,.12)';
      ctx.fillRect(0,0,W,H);
    }else{
      ctx.fillStyle='rgba(255,255,255,.85)';
      for(const f of world.fx.flakes){
        ctx.beginPath();ctx.arc(f.x,f.y,f.r,0,TAU);ctx.fill();
      }
    }
  }
}
/* ---------- side-scroll scene ---------- */
function renderSideScene(t){
  const SS=sideScale(),gy=sideGroundY(),px=sidePlayerX();
  const d=world.dist;
  const mod=(v,m)=>((v%m)+m)%m;
  // sky
  const sg=ctx.createLinearGradient(0,0,0,gy);
  sg.addColorStop(0,course.sky1);sg.addColorStop(1,course.sky2);
  ctx.fillStyle=sg;ctx.fillRect(0,0,W,gy+2);
  if(course.sun){
    const sx=W*.72,sy=gy*.42;
    const g=ctx.createRadialGradient(sx,sy,10,sx,sy,120);
    g.addColorStop(0,'rgba(255,235,150,.9)');g.addColorStop(.35,'rgba(255,210,120,.45)');g.addColorStop(1,'rgba(255,210,120,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(sx,sy,120,0,TAU);ctx.fill();
    ctx.fillStyle='#ffdf8a';ctx.beginPath();ctx.arc(sx,sy,42,0,TAU);ctx.fill();
  }
  // clouds (slow parallax)
  for(let i=0;i<6;i++){
    const cx=mod(i*(W/3+130)+i*97-d*.15,W+400)-200;
    const cy=44+(i%3)*58+((i*31)%36);
    drawCloud(ctx,cx,cy,.7+(i%3)*.28,course.cloud);
  }
  // far hills
  ctx.fillStyle=course.hillFar;
  for(let i=0;i<8;i++){
    const hx=mod(i*440+((i*151)%160)-d*.28,W+880)-440;
    const hh=110+(i%3)*55;
    ctx.beginPath();ctx.ellipse(hx,gy+30,230,hh,0,Math.PI,0);ctx.fill();
  }
  // near hills
  ctx.fillStyle=course.hillNear;
  for(let i=0;i<9;i++){
    const hx=mod(i*380+((i*211)%200)-d*.55,W+760)-380;
    const hh=60+(i%3)*38;
    ctx.beginPath();ctx.ellipse(hx,gy+22,170,hh,0,Math.PI,0);ctx.fill();
  }
  // near ground props (bushes / flowers / trees)
  for(let i=0;i<8;i++){
    const bx=mod(i*430+((i*97)%260)-d,W+560)-280;
    const kind=i%3;
    if(kind===0)drawBush(ctx,bx,gy-6,1.1,i);
    else if(kind===1){ // flower
      ctx.save();ctx.translate(bx,gy-4);
      ctx.strokeStyle='#3f8f34';ctx.lineWidth=2.6;
      ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-14);ctx.stroke();
      for(let k=0;k<5;k++){
        const a=k*TAU/5-Math.PI/2;
        ctx.fillStyle=['#ff8fb0','#ffd23f','#ff9e54'][i%3];
        ctx.beginPath();ctx.ellipse(Math.cos(a)*5.5,-14+Math.sin(a)*5.5,4,4,0,0,TAU);ctx.fill();
      }
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,-14,3,0,TAU);ctx.fill();
      ctx.restore();
    }else drawTree(ctx,bx,gy-26,.8,i*3+1);
  }
  // ground: grass strip + dirt
  const gg=ctx.createLinearGradient(0,gy,0,gy+26);
  gg.addColorStop(0,shade(course.grass,.12));gg.addColorStop(1,shade(course.grass,-.08));
  ctx.fillStyle=gg;ctx.fillRect(0,gy,W,26);
  ctx.fillStyle=shade(course.grass,-.28);ctx.fillRect(0,gy,W,4);
  ctx.fillStyle=course.dirt;ctx.fillRect(0,gy+26,W,H-gy-26);
  ctx.fillStyle=shade(course.dirt,-.16);
  for(let row=0;row<9;row++){
    const yy=gy+44+row*34;
    if(yy>H+10)break;
    for(let x=-34;x<W+34;x+=34){
      const xx=x+mod(-d+(row%2)*17,34);
      ctx.beginPath();ctx.arc(xx,yy,3.2,0,TAU);ctx.fill();
    }
  }
  // air items
  for(const it of world.airItems){
    const ox=px+(it.z-d);
    if(ox<-80||ox>W+80)continue;
    const iy=gy-it.h*SS;
    if(it.kind==='box'){
      drawItemBox(ctx,ox,iy,SS*.85,t);
    }else{
      const g=ctx.createRadialGradient(ox,iy,3,ox,iy,26*SS);
      g.addColorStop(0,'rgba(255,230,120,.5)');g.addColorStop(1,'rgba(255,230,120,0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(ox,iy,26*SS,0,TAU);ctx.fill();
      ctx.save();ctx.translate(ox,iy);ctx.rotate(t*2+it.z*.01);
      starPath(ctx,15*SS);
      ctx.fillStyle='#ffe066';ctx.fill();
      ctx.strokeStyle='#f08c00';ctx.lineWidth=2;ctx.stroke();
      ctx.restore();
    }
  }
  // obstacles
  for(const o of world.sideObs){
    const ox=px+(o.z-d);
    if(ox<-160||ox>W+160)continue;
    ctx.save();
    if(o.hit){
      ctx.translate(ox,gy-24*SS+o.yOff);
      ctx.rotate(o.rot);
      ctx.translate(-ox,-(gy-24*SS));
    }
    if(o.type==='pipe')drawPipeSide(ctx,ox,gy,SS);
    else if(o.type==='rock')drawRockSide(ctx,ox,gy,SS);
    else if(o.type==='cone')drawConeSide(ctx,ox,gy,SS);
    else{
      // parked car (side view)
      ctx.save();ctx.translate(ox,gy);ctx.scale(SS,SS);
      drawCarSide(ctx,o.spec,0,0);
      ctx.restore();
    }
    ctx.restore();
  }
  // thrown stars
  for(const b of world.balls){
    const bx=px+(b.z-d);
    const by=gy-(b.h||30)*1;
    ctx.fillStyle='rgba(255,224,102,.35)';
    ctx.beginPath();ctx.arc(bx-18,by,8,0,TAU);ctx.fill();
    ctx.beginPath();ctx.arc(bx-33,by,5.5,0,TAU);ctx.fill();
    ctx.save();ctx.translate(bx,by);ctx.rotate(b.spin);
    starPath(ctx,13*SS);
    ctx.fillStyle='#ffe066';ctx.fill();
    ctx.strokeStyle='#f08c00';ctx.lineWidth=2;ctx.stroke();
    ctx.restore();
  }
  // puffs (dust)
  for(const p of world.particles){
    if(p.kind!=='puff')continue;
    ctx.fillStyle='rgba(205,190,170,'+(0.55*(1-p.t/p.life)).toFixed(3)+')';
    ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,TAU);ctx.fill();
  }
  // player car
  const jy=world.jumpY;
  const pxx=px+world.sideX;
  // shadow shrinks in air
  const shk=clamp(1-jy/320,.35,1);
  ctx.fillStyle='rgba(20,30,20,'+(0.3*shk).toFixed(3)+')';
  ctx.beginPath();ctx.ellipse(pxx,gy-2,selCar.l*SS*.5*shk,8*shk,0,0,TAU);ctx.fill();
  let tilt=clamp(-world.jumpVy*.00042,-.28,.22)+clamp(world.sideVx*.0004,-.12,.12);
  if(jy<=0)tilt=0;
  let bounce=jy<=0?Math.sin(d*.09)*1.6:0;
  if(state==='crash'){
    const k=world.crashT;
    tilt=Math.sin(k*26)*.4*Math.max(0,1-k);
    bounce=-Math.abs(Math.sin(k*12))*10*Math.max(0,1-k);
  }
  if(world.invT>0)ctx.globalAlpha=.55+.35*Math.sin(t*24); // recovery blink
  drawCarSideAt(ctx,selCar,pxx,gy-jy,SS,d*.11,bounce,tilt);
  ctx.globalAlpha=1;
  // whoosh streaks while steering sideways in the air
  const leanIn=((keys.right?1:0)-(keys.left?1:0))||(pad.on?pad.ax:0);
  if(jy>0&&state==='play'&&(Math.abs(world.sideVx)>120||leanIn)){
    const dir=(Math.abs(world.sideVx)>120?world.sideVx:leanIn)>0?1:-1;
    ctx.strokeStyle='rgba(255,255,255,.6)';ctx.lineWidth=3.5;ctx.lineCap='round';
    for(let i=0;i<3;i++){
      const yy=gy-jy-(8+i*15)*SS;
      ctx.beginPath();
      ctx.moveTo(pxx-dir*(58+i*10)*SS,yy);
      ctx.lineTo(pxx-dir*(30+i*7)*SS,yy);
      ctx.stroke();
    }
  }
  // speed lines
  if(state==='play'&&world.speed>course.base*1.1){
    ctx.strokeStyle='rgba(255,255,255,.35)';ctx.lineWidth=3;ctx.lineCap='round';
    for(let i=0;i<5;i++){
      const xx=W-mod(t*world.speed*1.3+i*230,W+200)+100;
      const yy=60+(i*137)%Math.max(80,(gy-140));
      ctx.beginPath();ctx.moveTo(xx,yy);ctx.lineTo(xx+66,yy);ctx.stroke();
    }
  }
}

/* ============================== screens / flow ============================== */
const SCREENS=['screen-title','screen-cars','screen-courses','screen-diff','screen-over','screen-pause',
  'screen-chars','screen-charedit','screen-racetype','screen-raceresult'];
function showScreen(id){
  SCREENS.forEach(s=>$('#'+s).classList.toggle('hidden',s!==id));
  $('#hud').classList.toggle('hidden',!(id===null));
  $('#btn-throw').classList.toggle('hidden',!(id===null)||(kart.active&&kart.versus));
  $('#btn-jump').classList.toggle('hidden',!(id===null)||(kart.active&&kart.versus));
  $('#btn-jump').style.opacity='';
  const vs=(id===null)&&kart.active&&kart.versus;
  $('#vs-throw1').classList.toggle('hidden',!vs);
  $('#vs-throw2').classList.toggle('hidden',!vs);
  document.body.classList.toggle('vs-on',vs);
  if(id!==null){$('#banner').classList.add('hidden');$('#toast').classList.add('hidden');}
}
function setState(s){
  state=s;
  pointers.clear();keys.left=false;keys.right=false;keys.jump=false;
  kkeys.p1l=kkeys.p1r=kkeys.p2l=kkeys.p2r=false;
  if(s==='title')showScreen('screen-title');
  else if(s==='cars')showScreen('screen-cars');
  else if(s==='courses')showScreen('screen-courses');
  else if(s==='diff')showScreen('screen-diff');
  else if(s==='over')showScreen('screen-over');
  else if(s==='paused')showScreen('screen-pause');
  else if(s==='chars')showScreen('screen-chars');
  else if(s==='charedit')showScreen('screen-charedit');
  else if(s==='racetype')showScreen('screen-racetype');
  else if(s==='raceres')showScreen('screen-raceresult');
  else showScreen(null);
  if(s!=='play'&&s!=='ready'){stopEngine();stopSiren();}
  // BGM: quiet loop on menus, silence during countdown / results / pause
  if(s==='title'||s==='cars'||s==='courses'||s==='diff'||s==='chars'||s==='charedit'||s==='racetype')startBgm('menu');
  else if(s==='ready'||s==='over'||s==='paused'||s==='raceres')stopBgm();
  // controller focus follows the visible screen
  setPadFocus(null);
  if(pad.using&&PAD_MENUS[s])padEnsureFocus();
}
function bestFor(id){return bests[id+':'+diff.id]|0;}
function startGame(){
  computeRoad();
  resetWorld(false);
  $('#dist').textContent='0m';
  $('#bestlab').textContent='べすと '+bestFor(course.id)+'m';
  setState('ready');
}
function showOver(){
  const m=meters();
  const prev=bestFor(course.id);
  const isNew=m>prev;
  if(isNew){bests[course.id+':'+diff.id]=m;lsSet('jikoBest',JSON.stringify(bests));}
  $('#res-dist').textContent=m+'m はしったよ';
  $('#res-best').textContent='べすと '+bestFor(course.id)+'m（'+diff.name+'）';
  $('#newrec').classList.toggle('hidden',!isNew);
  if(isNew)setTimeout(sndFanfare,350);
  setState('over');
  refreshCourseBests();refreshDiffBests();
}

const STARP='M12 2l2.9 6.2 6.6.8-4.9 4.6 1.3 6.6L12 17l-5.9 3.2 1.3-6.6L2.5 9l6.6-.8z';
function starRow(n){
  let h='';

}

/* car select UI */
function buildCarGrid(){
  const grid=$('#car-grid');

    const cv=document.createElement('canvas');

/* course select UI */
function drawCoursePreview(cv,co){
  const c=cv.getContext('2d');
  const w=cv.width,h=cv.height;
  c.setTransform(1,0,0,1,0,0);
  c.clearRect(0,0,w,h);
  if(co.mode==='side'){ // side-scroller preview
    const gy=h*.74;
    const sg=c.createLinearGradient(0,0,0,gy);
    sg.addColorStop(0,co.sky1);sg.addColorStop(1,co.sky2);
    c.fillStyle=sg;c.fillRect(0,0,w,gy);
    if(co.sun){c.fillStyle='#ffdf8a';c.beginPath();c.arc(w*.78,h*.24,26,0,TAU);c.fill();}
    drawCloud(c,w*.25,h*.18,.75,co.cloud);
    drawCloud(c,w*.65,h*.30,.55,co.cloud);
    c.fillStyle=co.hillFar;
    c.beginPath();c.ellipse(w*.2,gy+8,w*.34,h*.42,0,Math.PI,0);c.fill();
    c.fillStyle=co.hillNear;
    c.beginPath();c.ellipse(w*.72,gy+6,w*.3,h*.26,0,Math.PI,0);c.fill();
    c.fillStyle=co.grass;c.fillRect(0,gy,w,10);
    c.fillStyle=co.dirt;c.fillRect(0,gy+10,w,h-gy-10);
    drawPipeSide(c,w*.78,gy+2,.62);
    c.save();c.translate(w*.32,gy+2);c.scale(.62,.62);
    drawCarSide(c,CARS[0],0,0);c.restore();
    c.save();c.translate(w*.52,gy-52);c.rotate(.3);
    starPath(c,10);c.fillStyle='#ffe066';c.fill();c.strokeStyle='#f08c00';c.lineWidth=1.6;c.stroke();
    c.restore();
    return;
  }
  c.fillStyle=co.ground;c.fillRect(0,0,w,h);
  if(co.sea){
    c.fillStyle='#3fa7d6';c.fillRect(0,0,w*.30,h);
    c.fillStyle='#f0dda2';c.fillRect(w*.30,0,w*.12,h);
    c.strokeStyle='rgba(255,255,255,.6)';c.lineWidth=3;c.lineCap='round';
    [0.25,0.55,0.85].forEach((f,i)=>{
      c.beginPath();c.moveTo(w*.05+i*8,h*f);c.quadraticCurveTo(w*.09+i*8,h*f-6,w*.13+i*8,h*f);c.stroke();
    });
  }
  // curved road
  const rw=w*.34;
  c.beginPath();
  c.moveTo(w*.55-rw/2,h+10);
  c.quadraticCurveTo(w*(.55+co.curve*.22)-rw/2,h*.4,w*.5-rw/2,-10);
  c.lineTo(w*.5+rw/2,-10);
  c.quadraticCurveTo(w*(.55+co.curve*.22)+rw/2,h*.4,w*.55+rw/2,h+10);
  c.closePath();
  c.fillStyle=co.road;c.fill();
  c.strokeStyle='rgba(255,255,255,.85)';c.lineWidth=3;c.setLineDash([12,12]);
  c.beginPath();c.moveTo(w*.55,h+10);c.quadraticCurveTo(w*(.55+co.curve*.22),h*.4,w*.5,-10);c.stroke();
  c.setLineDash([]);
  const s=.72;
  if(co.id==='machi'){drawBuilding(c,w*.14,h*.3,s,7,false);drawTree(c,w*.86,h*.62,s,3);drawSignal(c,w*.85,h*.24,s,1,0);}
  if(co.id==='kousoku'){drawSign(c,w*.14,h*.3,s,1);drawBush(c,w*.87,h*.6,s,2);drawTree(c,w*.13,h*.75,s,4);}
  if(co.id==='yama'){drawTree(c,w*.13,h*.25,s,2);drawTree(c,w*.87,h*.5,s,5);drawRockCluster(c,w*.14,h*.72,s,3);}

/* standard mapping: axes[0]=left stick X, buttons 0=A 1=B 2=X 9=Start 12-15=dpad */
const PAD_DEAD=.18;
const pad={on:false,using:false,ax:0,ay:0,a:false,prev:{},rep:{},lastAct:false,focusEl:null};
const PAD_MENUS={title:1,cars:1,courses:1,diff:1,over:1,paused:1,chars:1,charedit:1,racetype:1,raceres:1};
function padGetPad(){
  try{
    const gps=navigator.getGamepads?navigator.getGamepads():[];
    for(const g of gps)if(g&&g.connected)return g;
  }catch(e){}
  return null;
}
function padFound(){showToast('\u{1F3AE} コントローラーせつぞく');}
function padLost(){
  showToast('コントローラーが きれたよ');
  setUsingPad(false);
  pad.ax=0;pad.ay=0;pad.a=false;pad.prev={};pad.rep={};
}
function setUsingPad(v){
  if(pad.using===v)return;
  pad.using=v;
  document.body.classList.toggle('padctl',v);
  if(!v)setPadFocus(null);
  else if(PAD_MENUS[state])padEnsureFocus();
}
function padFocusables(){
  let sels=null;
  if(state==='title')sels=['#btn-start'];
  else if(state==='cars')sels=['#car-grid .card','#btn-cars-back','#btn-cars-next'];
  else if(state==='courses')sels=['#course-grid .card','#btn-courses-back','#btn-courses-next'];
  else if(state==='diff')sels=['#diff-list .diffcard','#lives-row .lifecard','#btn-diff-back','#btn-go'];
  else if(state==='over')sels=['#btn-retry','#btn-change'];
  else if(state==='paused')sels=['#btn-resume','#btn-quit'];
  if(!sels)return[];
  const out=[];
  sels.forEach(s=>document.querySelectorAll(s).forEach(el=>out.push(el)));
  return out;
}
function setPadFocus(el){
  if(pad.focusEl===el)return;
  if(pad.focusEl)pad.focusEl.classList.remove('pfocus');
  pad.focusEl=el||null;
  if(el){
    el.classList.add('pfocus');
    try{el.scrollIntoView({block:'nearest'});}catch(e){}
  }
}
function padDefaultFocus(){
  if(state==='title')return $('#btn-start');
  if(state==='cars')return document.querySelector('#car-grid .card.sel')||document.querySelector('#car-grid .card');
  if(state==='courses')return document.querySelector('#course-grid .card.sel')||document.querySelector('#course-grid .card');
  if(state==='diff')return document.querySelector('#diff-list .diffcard.sel')||document.querySelector('#diff-list .diffcard');
  if(state==='over')return $('#btn-retry');
  if(state==='paused')return $('#btn-resume');
  return null;
}
function padEnsureFocus(){
  const els=padFocusables();
  if(pad.focusEl&&els.indexOf(pad.focusEl)>=0)return true;
  setPadFocus(padDefaultFocus());
  return false;
}
function padMove(dx,dy){
  if(!padEnsureFocus())return; // first press just reveals the ring
  const cur=pad.focusEl;
  if(!cur)return;
  const els=padFocusables();
  const r0=cur.getBoundingClientRect();
  const cx=r0.left+r0.width/2,cy=r0.top+r0.height/2;
  let best=null,bd=1e9;
  for(const el of els){
    if(el===cur)continue;
    const r=el.getBoundingClientRect();
    if(!r.width&&!r.height)continue;
    const vx=r.left+r.width/2-cx,vy=r.top+r.height/2-cy;
    const fwd=vx*dx+vy*dy;      // must lie in the pressed direction
    if(fwd<6)continue;
    const d=fwd+(Math.abs(vx*dy)+Math.abs(vy*dx))*2.4; // prefer straight ahead
    if(d<bd){bd=d;best=el;}
  }
  if(best){setPadFocus(best);blip(760,900,.05,'square',.05);}
}
function padConfirm(){
  padEnsureFocus();
  if(pad.focusEl)pad.focusEl.click();
}
function padBack(){
  if(state==='cars')$('#btn-cars-back').click();
  else if(state==='courses')$('#btn-courses-back').click();
  else if(state==='diff')$('#btn-diff-back').click();
  else if(state==='over')$('#btn-change').click();
  else if(state==='paused')resumeGame();
}
function padNavTick(name,pressed,dt,fn){
  if(!pressed){pad.rep[name]=-1;return;}
  if(pad.rep[name]===-1||pad.rep[name]===undefined){fn();pad.rep[name]=.3;} // first press
  else{
    pad.rep[name]-=dt;
    if(pad.rep[name]<=0){fn();pad.rep[name]=.12;} // key repeat
  }
}
function pollPad(dt){
  const gp=padGetPad();
  if(!gp){
    if(pad.on){pad.on=false;padLost();}
    return;
  }
  if(!pad.on){pad.on=true;padFound();}
  const b=i=>!!(gp.buttons&&gp.buttons[i]&&gp.buttons[i].pressed);
  const dz=v=>{v=v||0;return Math.abs(v)<PAD_DEAD?0:Math.sign(v)*(Math.abs(v)-PAD_DEAD)/(1-PAD_DEAD);};
  const ax=dz(gp.axes&&gp.axes[0]),ay=dz(gp.axes&&gp.axes[1]);
  const cur={
    left:b(14)||ax<-.45,right:b(15)||ax>.45,
    up:b(12)||ay<-.45,down:b(13)||ay>.45,
    a:b(0),b:b(1),x:b(2),start:b(9)
  };
  pad.ax=b(14)?-1:(b(15)?1:ax);
  pad.ay=ay;
  pad.a=cur.a;
  const act=ax!==0||ay!==0||cur.left||cur.right||cur.up||cur.down||cur.a||cur.b||cur.x||cur.start;
  if(act&&!pad.lastAct){setUsingPad(true);initAudio();}
  pad.lastAct=act;
  const edge=k=>cur[k]&&!pad.prev[k];
  if(edge('start')){
    if(state==='play')pauseGame();
    else if(state==='paused')resumeGame();
  }
  if(PAD_MENUS[state]){
    padNavTick('left',cur.left,dt,()=>padMove(-1,0));
    padNavTick('right',cur.right,dt,()=>padMove(1,0));
    padNavTick('up',cur.up,dt,()=>padMove(0,-1));
    padNavTick('down',cur.down,dt,()=>padMove(0,1));
    if(edge('a'))padConfirm();
    if(edge('b'))padBack();
  }else{
    if(edge('a'))doJump();               // A = jump (held A = higher jump in side mode)
    if(edge('b')||edge('x'))throwItem(); // B / X = throw the star item
  }
  pad.prev=cur;
}

window.addEventListener('gamepaddisconnected',()=>{if(pad.on&&!padGetPad()){pad.on=false;padLost();}});

const kart={
  active:false,versus:false,racers:[],goal:0,
  phase:'count',countT:0,lastN:4,finCount:0,doneT:0,winner:null,
  balls:[],attacks:[],confetti:[],viewIdx:0,

};

const kkeys={p1l:false,p1r:false,p2l:false,p2r:false};
const RHN=205; // nominal road half width (rel-unit conversions)
const KLANES=[-.6,-.2,.2,.6]; // kart-road lane separators (5 visual lanes)
const KCF=[.12,.28,.45,.6,.75]; // centrifugal strength per difficulty star
let kartAutoTest=false;

/* ---------- kart track definition (seeded sections of straights & curves) ---------- */
let ktrack=null;
function hashStr(s){
  let h=2166136261;
  for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}
  return h>>>0;
}
function mulberry(a){
  return function(){
    a|=0;a=a+0x6D2B79F5|0;
    let t=Math.imul(a^a>>>15,1|a);
    t=t+Math.imul(t^t>>>7,61|t)^t;
    return((t^t>>>14)>>>0)/4294967296;
  };
}
const KTHEMES={ // d: curve delta range (rel units), len: section length px, st: straight chance, s: S-curve chance
  kousoku:{d:[.5,.9],len:[1500,2500],st:.34,s:.16},
  yama:{d:[1.1,1.9],len:[560,1050],st:.06,s:.42},
  machi:{d:[.8,1.3],len:[750,1300],st:.22,s:.24},
  umi:{d:[.7,1.1],len:[1200,2000],st:.18,s:.28},
  uminaka:{d:[.7,1.1],len:[1100,1900],st:.15,s:.3},
  uchu:{d:[1.2,2.0],len:[1300,2300],st:.1,s:.28},
  yoru:{d:[.8,1.2],len:[800,1400],st:.2,s:.25},
  yuki:{d:[.8,1.4],len:[800,1500],st:.15,s:.3},
  fubuki:{d:[.8,1.4],len:[800,1500],st:.15,s:.3},
};
function buildKartTrack(){
  const th=KTHEMES[course.id]||KTHEMES.machi;
  const rng=mulberry(hashStr(course.id)*31+diff.id*7+9);
  const secs=[{z0:0,len:900,from:0,to:0,kind:'str'}]; // gentle rolling start
  let z=900,cur=0,lastDir=rng()<.5?-1:1;
  const total=Math.max(kartGoalPx()+2600,9000);
  while(z<total){
    const r=rng();
    let len=lerp(th.len[0],th.len[1],rng());
    if(r<th.st){ // straight
      secs.push({z0:z,len,from:cur,to:cur,kind:'str'});
      z+=len;
    }else if(r<th.st+th.s){ // S-curve: two opposite halves
      const d=lerp(th.d[0],th.d[1],rng())*diff.curve;
      let dir=-lastDir;
      let a=clamp(cur+dir*d,-2.2,2.2);
      secs.push({z0:z,len:len*.55,from:cur,to:a,kind:'cv'});
      z+=len*.55;cur=a;lastDir=dir;
      dir=-dir;
      a=clamp(cur+dir*d*lerp(.8,1.2,rng()),-2.2,2.2);
      secs.push({z0:z,len:len*.55,from:cur,to:a,kind:'cv'});
      z+=len*.55;cur=a;lastDir=dir;
    }else{ // single curve (short length + big delta = hairpin feel)
      const d=lerp(th.d[0],th.d[1],rng())*diff.curve;
      const dir=Math.abs(cur)>1.4?(cur>0?-1:1):(rng()<.62?-lastDir:lastDir);
      const to=clamp(cur+dir*d,-2.2,2.2);
      if(Math.abs(to-cur)>1.2*diff.curve&&rng()<.5)len*=.6;
      secs.push({z0:z,len,from:cur,to,kind:'cv'});
      z+=len;cur=to;lastDir=dir;
    }
  }
  ktrack={secs,total:z,ci:0};
}
function ktU(z){ // road center lateral offset at z, in rel (road half-width) units
  if(!ktrack)return 0;
  if(z<0)z=0;
  const S=ktrack.secs;
  let i=ktrack.ci||0;
  if(i>=S.length||S[i].z0>z)i=0;
  while(i<S.length-1&&z>=S[i].z0+S[i].len)i++;
  ktrack.ci=i;
  const s=S[i];
  const f=clamp((z-s.z0)/s.len,0,1);
  const sm=f*f*(3-2*f);
  return s.from+(s.to-s.from)*sm;
}
function ktCurv(z){ // curvature: rel-units per 100px of travel
  return (ktU(z+80)-ktU(z-80))/160*100;
}
window.__ktest={
  kw:()=>1.02,
  track:()=>ktrack&&ktrack.secs.map(s=>({len:Math.round(s.len),from:+s.from.toFixed(2),to:+s.to.toFixed(2),kind:s.kind})),
  curv:(dz)=>ktCurv((kart.racers[0]?kart.racers[0].z:0)+(dz||0)),
  racer:i=>{const r=kart.racers[i];return r?{z:Math.round(r.z),rel:+r.rel.toFixed(3),sp:Math.round(r.sp),spinT:+r.spinT.toFixed(2),fin:r.finished,rumble:+(r.rumbleT||0).toFixed(2)}:null;},
  setRel:(i,v)=>{if(kart.racers[i])kart.racers[i].rel=v;},
  auto:v=>{kartAutoTest=!!v;},
  phase:()=>kart.phase,

const CHAR_PRESETS=[
  {id:'boy',name:'ゆうた',kind:'human',skin:'#ffd9b3',hair:'short',hairCol:'#4a3728',hat:'cap',hatCol:'#e8452f',eyes:'round',shirt:'#4d9de0'},
  {id:'girl',name:'はな',kind:'human',skin:'#ffe0c2',hair:'pigtail',hairCol:'#8a5a2e',hat:'ribbon',hatCol:'#ff6b9e',eyes:'happy',shirt:'#ff8fb3'},
  {id:'cat',name:'にゃんこ',kind:'cat',skin:'#f5c86e',hair:'none',hairCol:'#4a3728',hat:'none',hatCol:'#e8452f',eyes:'round',shirt:'#8fd077'},
  {id:'panda',name:'ぱんぱん',kind:'panda',skin:'#ffffff',hair:'none',hairCol:'#26262c',hat:'none',hatCol:'#e8452f',eyes:'round',shirt:'#57b7e8'},
  {id:'robo',name:'ロボくん',kind:'robot',skin:'#aeb9c6',hair:'none',hairCol:'#5d6675',hat:'none',hatCol:'#37d4e8',eyes:'round',shirt:'#8f99a8'},
  {id:'dino',name:'がおくん',kind:'dino',skin:'#6cc46a',hair:'none',hairCol:'#2c6e2c',hat:'none',hatCol:'#ffd23f',eyes:'round',shirt:'#f5a623'},
];
let customChars=[];
try{customChars=JSON.parse(lsGet('jikoChars')||'[]')||[];}catch(e){customChars=[];}
function saveChars(){lsSet('jikoChars',JSON.stringify(customChars));}
function allChars(){return CHAR_PRESETS.concat(customChars);}
function charById(id){return allChars().find(c=>c.id===id)||CHAR_PRESETS[0];}

function drawCharHead(c,ch,x,y,r){
  c.save();c.translate(x,y);
  const kind=ch.kind||'human';
  const skin=ch.skin||'#ffd9b3';
  const hairCol=ch.hairCol||'#4a3728';
  const hair=ch.hair||'none';
  // behind: ears / spikes / back hair
  if(kind==='cat'){
    [-1,1].forEach(s=>{
      c.beginPath();
      c.moveTo(s*r*.86,-r*.28);c.lineTo(s*r*.55,-r*1.18);c.lineTo(s*r*.12,-r*.82);
      c.closePath();c.fillStyle=skin;c.fill();
      c.strokeStyle=shade(skin,-.3);c.lineWidth=r*.07;c.stroke();
      c.beginPath();
      c.moveTo(s*r*.62,-r*.44);c.lineTo(s*r*.48,-r*.92);c.lineTo(s*r*.24,-r*.68);
      c.closePath();c.fillStyle='#ff9db0';c.fill();
    });
  }
  if(kind==='panda'){
    [-1,1].forEach(s=>{
      c.beginPath();c.arc(s*r*.72,-r*.72,r*.38,0,TAU);c.fillStyle='#26262c';c.fill();
    });
  }
  if(kind==='dino'){
    [-.55,0,.55].forEach(f=>{
      c.beginPath();
      c.moveTo(f*r-r*.24,-r*.8);c.lineTo(f*r,-r*1.28+Math.abs(f)*r*.18);c.lineTo(f*r+r*.24,-r*.8);
      c.closePath();c.fillStyle='#3e8f3e';c.fill();
      c.strokeStyle='#2c6e2c';c.lineWidth=r*.06;c.stroke();
    });
  }
  if(kind==='human'){
    if(hair==='bob'||hair==='pigtail'){
      c.beginPath();c.arc(0,r*.08,r*1.12,0,TAU);c.fillStyle=hairCol;c.fill();
    }
    if(hair==='pigtail'){
      [-1,1].forEach(s=>{
        c.beginPath();c.arc(s*r*1.16,r*.12,r*.34,0,TAU);c.fillStyle=hairCol;c.fill();
        c.strokeStyle=shade(hairCol,-.25);c.lineWidth=r*.06;c.stroke();
      });
    }
  }
  // head base
  if(kind==='robot'){
    rr(c,-r,-r*.95,r*2,r*1.9,r*.42);
    const g=c.createLinearGradient(-r,0,r,0);
    g.addColorStop(0,'#8f99a8');g.addColorStop(.45,'#dfe6ee');g.addColorStop(1,'#8792a2');
    c.fillStyle=g;c.fill();
    c.strokeStyle='#5d6675';c.lineWidth=r*.08;c.stroke();
    c.strokeStyle='#5d6675';c.lineWidth=r*.09;
    c.beginPath();c.moveTo(0,-r*.95);c.lineTo(0,-r*1.32);c.stroke();
    c.beginPath();c.arc(0,-r*1.42,r*.14,0,TAU);c.fillStyle='#ff5a63';c.fill();
    [-1,1].forEach(s=>{
      c.beginPath();c.arc(s*r*1.02,0,r*.16,0,TAU);c.fillStyle='#6a727e';c.fill();
    });
  }else{
    const g=c.createRadialGradient(-r*.3,-r*.35,r*.2,0,0,r*1.05);
    g.addColorStop(0,shade(skin,.12));g.addColorStop(1,shade(skin,-.08));
    c.beginPath();c.arc(0,0,r,0,TAU);c.fillStyle=g;c.fill();
    c.strokeStyle=shade(skin,-.35);c.lineWidth=r*.06;c.stroke();
  }
  if(kind==='panda'){
    [-1,1].forEach(s=>{
      c.beginPath();c.ellipse(s*r*.42,-r*.05,r*.28,r*.36,s*.35,0,TAU);
      c.fillStyle='#26262c';c.fill();
    });
  }
  // bangs
  if(kind==='human'&&hair!=='none'){
    c.fillStyle=hairCol;
    if(hair==='short'){
      c.beginPath();c.arc(0,0,r*1.01,Math.PI*1.02,Math.PI*1.98);
      c.quadraticCurveTo(r*.55,-r*.32,r*.22,-r*.44);
      c.quadraticCurveTo(0,-r*.26,-r*.24,-r*.46);
      c.quadraticCurveTo(-r*.6,-r*.3,-r*.99,-r*.1);
      c.closePath();c.fill();
    }else if(hair==='spiky'){
      c.beginPath();c.arc(0,0,r*1.0,Math.PI,TAU);
      c.quadraticCurveTo(r*.5,-r*.4,0,-r*.42);
      c.quadraticCurveTo(-r*.5,-r*.4,-r,0);
      c.closePath();c.fill();
      for(let i=0;i<4;i++){
        const a=Math.PI+((i+.5)/4)*Math.PI;
        const bx=Math.cos(a)*r,by=Math.sin(a)*r;
        c.beginPath();c.moveTo(bx*.78,by*.78);
        c.lineTo(bx*1.32,by*1.32);
        c.lineTo(Math.cos(a+.3)*r*.82,Math.sin(a+.3)*r*.82);
        c.closePath();c.fill();
      }
    }else if(hair==='bob'){
      c.beginPath();c.arc(0,0,r*1.03,Math.PI*.8,Math.PI*2.2);c.closePath();c.fill();
      c.fillStyle=skin;
      c.beginPath();c.ellipse(0,-r*.14,r*.52,r*.44,0,0,TAU);c.fill();
    }else if(hair==='pigtail'){
      c.fillStyle=hairCol;
      c.beginPath();c.arc(0,0,r*1.0,Math.PI*.95,Math.PI*2.05);c.closePath();c.fill();
      c.fillStyle=skin;
      c.beginPath();c.ellipse(0,-r*.16,r*.5,r*.4,0,0,TAU);c.fill();
    }else if(hair==='curly'){
      for(let i=0;i<6;i++){
        const a=Math.PI+(i/5)*Math.PI;
        c.beginPath();c.arc(Math.cos(a)*r*.85,Math.sin(a)*r*.85,r*.35,0,TAU);c.fill();
      }
    }
  }
  // face
  const eyes=ch.eyes||'round';
  const ey=kind==='robot'?-r*.08:r*.02;
  if(kind==='robot'){
    [-1,1].forEach(s=>{
      c.beginPath();c.arc(s*r*.42,ey,r*.18,0,TAU);c.fillStyle='#37d4e8';c.fill();
      c.strokeStyle='#1f7f92';c.lineWidth=r*.05;c.stroke();
      c.fillStyle='rgba(255,255,255,.7)';
      c.beginPath();c.arc(s*r*.42-r*.06,ey-r*.06,r*.05,0,TAU);c.fill();
    });
    c.strokeStyle='#5d6675';c.lineWidth=r*.07;c.lineCap='round';
    for(let i=-1;i<=1;i++){
      c.beginPath();c.moveTo(i*r*.16,r*.36);c.lineTo(i*r*.16,r*.55);c.stroke();
    }
  }else{
    if(eyes==='happy'){
      c.strokeStyle='#2c2c34';c.lineWidth=r*.11;c.lineCap='round';
      [-1,1].forEach(s=>{
        c.beginPath();c.arc(s*r*.4,ey+r*.1,r*.18,Math.PI*1.12,Math.PI*1.88);c.stroke();
      });
    }else if(eyes==='wink'){
      c.fillStyle='#2c2c34';
      c.beginPath();c.ellipse(-r*.4,ey,r*.13,r*.17,0,0,TAU);c.fill();
      c.fillStyle='#fff';
      c.beginPath();c.arc(-r*.45,ey-r*.06,r*.05,0,TAU);c.fill();
      c.strokeStyle='#2c2c34';c.lineWidth=r*.1;c.lineCap='round';
      c.beginPath();c.arc(r*.4,ey+r*.08,r*.16,Math.PI*1.12,Math.PI*1.88);c.stroke();
    }else{
      [-1,1].forEach(s=>{
        c.fillStyle=kind==='panda'?'#fff':'#2c2c34';
        c.beginPath();c.ellipse(s*r*.4,ey,r*(kind==='panda'?.11:.14),r*(kind==='panda'?.13:.18),0,0,TAU);c.fill();
        if(kind!=='panda'){
          c.fillStyle='#fff';
          c.beginPath();c.arc(s*r*.4-r*.05,ey-r*.07,r*.05,0,TAU);c.fill();
        }
      });
    }
    c.fillStyle='rgba(255,130,150,.4)';
    [-1,1].forEach(s=>{
      c.beginPath();c.ellipse(s*r*.62,r*.3,r*.16,r*.1,0,0,TAU);c.fill();
    });
    if(kind==='cat'){
      c.fillStyle='#ff9db0';
      c.beginPath();c.moveTo(0,r*.16);c.lineTo(r*.1,r*.3);c.lineTo(-r*.1,r*.3);c.closePath();c.fill();
      c.strokeStyle='#2c2c34';c.lineWidth=r*.05;c.lineCap='round';
      c.beginPath();c.moveTo(0,r*.3);c.quadraticCurveTo(r*.12,r*.46,r*.24,r*.36);c.stroke();
      c.beginPath();c.moveTo(0,r*.3);c.quadraticCurveTo(-r*.12,r*.46,-r*.24,r*.36);c.stroke();
      c.lineWidth=r*.045;
      [-1,1].forEach(s=>{
        for(let i=0;i<2;i++){
          c.beginPath();c.moveTo(s*r*.55,r*(.14+i*.14));c.lineTo(s*r*1.08,r*(.06+i*.22));c.stroke();
        }
      });
    }else if(kind==='dino'){
      c.fillStyle='#2c6e2c';
      [-1,1].forEach(s=>{
        c.beginPath();c.arc(s*r*.12,r*.26,r*.05,0,TAU);c.fill();
      });
      c.strokeStyle='#2c2c34';c.lineWidth=r*.08;c.lineCap='round';
      c.beginPath();c.arc(0,r*.3,r*.3,Math.PI*.15,Math.PI*.85);c.stroke();
    }else{
      c.strokeStyle=kind==='panda'?'#26262c':'#b3543f';c.lineWidth=r*.08;c.lineCap='round';
      c.beginPath();c.arc(0,r*.3,r*.26,Math.PI*.15,Math.PI*.85);c.stroke();
    }
  }
  // hat
  const hat=ch.hat||'none',hatCol=ch.hatCol||'#e8452f';
  if(hat==='cap'){
    c.beginPath();c.arc(0,-r*.36,r*.84,Math.PI,TAU);c.closePath();
    const g=c.createLinearGradient(-r,0,r,0);
    g.addColorStop(0,shade(hatCol,-.2));g.addColorStop(.5,shade(hatCol,.15));g.addColorStop(1,shade(hatCol,-.25));
    c.fillStyle=g;c.fill();
    c.strokeStyle=shade(hatCol,-.4);c.lineWidth=r*.06;c.stroke();
    c.beginPath();c.ellipse(0,-r*.36,r*.9,r*.18,0,0,Math.PI);
    c.fillStyle=shade(hatCol,-.15);c.fill();c.stroke();
    c.beginPath();c.arc(0,-r*1.05,r*.1,0,TAU);c.fillStyle=shade(hatCol,-.35);c.fill();
  }else if(hat==='helmet'){
    c.beginPath();c.arc(0,-r*.14,r*.98,Math.PI*.97,Math.PI*2.03);c.closePath();
    const g=c.createLinearGradient(-r,0,r,0);
    g.addColorStop(0,shade(hatCol,-.22));g.addColorStop(.45,shade(hatCol,.2));g.addColorStop(1,shade(hatCol,-.28));
    c.fillStyle=g;c.fill();
    c.strokeStyle=shade(hatCol,-.45);c.lineWidth=r*.07;c.stroke();
    c.fillStyle='#fff';
    rr(c,-r*.13,-r*1.1,r*.26,r*.7,r*.12);c.fill();
    c.strokeStyle='rgba(0,0,0,.25)';c.lineWidth=r*.06;
    c.beginPath();c.moveTo(-r*.9,-r*.3);c.quadraticCurveTo(0,-r*.12,r*.9,-r*.3);c.stroke();
  }else if(hat==='ribbon'){
    const bx=r*.52,by=-r*.86;
    c.fillStyle=hatCol;
    c.beginPath();c.moveTo(bx,by);c.lineTo(bx-r*.42,by-r*.3);c.lineTo(bx-r*.38,by+r*.24);c.closePath();c.fill();
    c.beginPath();c.moveTo(bx,by);c.lineTo(bx+r*.42,by-r*.3);c.lineTo(bx+r*.38,by+r*.24);c.closePath();c.fill();
    c.strokeStyle=shade(hatCol,-.3);c.lineWidth=r*.05;
    c.beginPath();c.arc(bx,by,r*.14,0,TAU);c.fillStyle=shade(hatCol,-.15);c.fill();c.stroke();
  }else if(hat==='crown'){
    c.beginPath();
    c.moveTo(-r*.6,-r*.72);
    c.lineTo(-r*.6,-r*1.12);c.lineTo(-r*.3,-r*.88);c.lineTo(0,-r*1.2);
    c.lineTo(r*.3,-r*.88);c.lineTo(r*.6,-r*1.12);c.lineTo(r*.6,-r*.72);
    c.closePath();
    c.fillStyle='#ffd23f';c.fill();
    c.strokeStyle='#c9971b';c.lineWidth=r*.06;c.stroke();
    c.fillStyle='#ff5a63';
    c.beginPath();c.arc(0,-r*.9,r*.08,0,TAU);c.fill();
  }
  c.restore();
}
function drawCharBust(c,ch,x,y,r){
  c.save();c.translate(x,y);
  const shirt=ch.shirt||'#4d9de0';
  rr(c,-r*1.05,r*.6,r*2.1,r*1.15,r*.55);
  const g=c.createLinearGradient(-r,0,r,0);
  g.addColorStop(0,shade(shirt,-.15));g.addColorStop(.5,shade(shirt,.15));g.addColorStop(1,shade(shirt,-.2));
  c.fillStyle=g;c.fill();
  c.strokeStyle=shade(shirt,-.4);c.lineWidth=r*.06;c.stroke();
  drawCharHead(c,ch,0,-r*.08,r);
  c.restore();
}
function headYFrac(spec){
  switch(spec.arch){
    case 'sedan':return .02;
    case 'van':return -.24;
    case 'fire':return -.25;
    case 'bus':return -.36;
    case 'truck':return -.38;
    case 'dump':return -.36;
    case 'tanker':return -.4;
    case 'garbage':return -.36;
    case 'wrecker':return -.44;
    case 'carrier':return -.44;
    case 'crane':return -.45;
    case 'shovel':return -.02;
    case 'shinkansen':return -.42;
    case 'densha':return -.44;
    case 'limo':return -.4;
    default:return 0;
  }
}
function drawCharHeadTop(c,ch,spec,x,y,rot,scale){
  c.save();c.translate(x,y);
  if(rot)c.rotate(rot);
  c.scale(scale,scale);
  const r=Math.min(spec.w*.21,14);
  const yf=headYFrac(spec)*spec.l;
  c.fillStyle='rgba(15,20,32,.4)';
  c.beginPath();c.ellipse(0,yf+r*.35,r*1.3,r*1.05,0,0,TAU);c.fill();
  drawCharHead(c,ch,0,yf,r);
  c.restore();
}

/* ---------- char select UI ---------- */
function kartCurPi(){return kartFlow?kartFlow.pi:0;}
function buildCharGrid(){
  const grid=$('#char-grid');
  grid.innerHTML='';
  allChars().forEach(ch=>{
    const card=document.createElement('div');
    card.className='card char-card';card.dataset.char=ch.id;
    const cv=document.createElement('canvas');cv.width=200;cv.height=164;
    const c=cv.getContext('2d');
    c.setTransform(1,0,0,1,100,78);
    drawCharBust(c,ch,0,-6,42);
    const nm=document.createElement('div');nm.className='nm';nm.textContent=ch.name;
    card.appendChild(cv);card.appendChild(nm);
    if(ch.custom){
      const mb=document.createElement('div');mb.className='mini-btns';
      const eb=document.createElement('button');eb.textContent='へんしゅう';
      eb.addEventListener('click',ev=>{ev.stopPropagation();initAudio();sndTap();openCharEdit(ch.id);});
      const db=document.createElement('button');db.className='del';db.textContent='さくじょ';
      db.addEventListener('click',ev=>{ev.stopPropagation();initAudio();sndTap();deleteChar(ch.id);});
      mb.appendChild(eb);mb.appendChild(db);
      card.appendChild(mb);
    }
    card.addEventListener('click',()=>{initAudio();selectChar(ch.id);sndSelect();});
    grid.appendChild(card);
  });
  const nc=document.createElement('div');
  nc.className='card newchar';
  nc.innerHTML='<div class="plus">＋</div><div class="nm">キャラを つくる</div>';
  nc.addEventListener('click',()=>{initAudio();sndTap();openCharEdit(null);});
  grid.appendChild(nc);
  const cur=kart.sel[kartCurPi()].ch;
  selectChar(cur?cur.id:(lsGet('jikoSelChar')||'boy'));
}
function selectChar(id){
  const pi=kartCurPi();
  const ch=charById(id);
  kart.sel[pi].ch=ch;
  lsSet(pi===0?'jikoSelChar':'jikoSelChar2',ch.id);
  document.querySelectorAll('#char-grid .card').forEach(el=>{
    el.classList.toggle('sel',el.dataset.char===ch.id);
  });
  drawCharSelPreview();
}
function drawCharSelPreview(){
  const pi=kartCurPi();
  const ch=kart.sel[pi].ch||CHAR_PRESETS[0];
  const spec=kart.sel[pi].car||selCar;
  // rear-view kart with the character riding it (the "on board" look)
  drawKartPreviewOn($('#char-preview'),spec,ch,1);
  $('#char-preview-name').textContent=ch.name;
}
function deleteChar(id){
  customChars=customChars.filter(c=>c.id!==id);
  saveChars();
  [0,1].forEach(pi=>{
    if(kart.sel[pi].ch&&kart.sel[pi].ch.id===id)kart.sel[pi].ch=CHAR_PRESETS[0];
  });
  buildCharGrid();
}

/* ---------- char editor ---------- */
const ED_SKINS=['#ffd9b3','#ffe0c2','#f2b98a','#c98a5a','#8a5a3a','#f5c86e','#aeb9c6','#8fb3ff','#6cc46a'];
const ED_HAIRS=['none','short','spiky','bob','pigtail','curly'];
const ED_HAIRCOLS=['#2c2c34','#4a3728','#8a5a2e','#c9973b','#e8e2d5','#d94f7e','#3f7fd9','#3fae62'];
const ED_HATS=['none','cap','helmet','ribbon','crown'];
const ED_HATCOLS=['#e8452f','#3f7fd9','#ffd23f','#ff6b9e','#3fae62','#8a7ff0'];
const ED_EYES=['round','happy','wink'];
const ED_NAMES=['ゆう','さくら','たろう','ももか','けん','みい','そら','りん'];
let editCh=null,editId=null;
function edSwatchCanvas(ch){
  const cv=document.createElement('canvas');cv.width=80;cv.height=80;
  const c=cv.getContext('2d');
  c.setTransform(1,0,0,1,40,46);
  drawCharHead(c,ch,0,0,21);
  return cv;
}
function buildEdRows(){
  const wrap=$('#ed-rows');wrap.innerHTML='';
  const addRow=(label,opts,key,type)=>{
    const row=document.createElement('div');row.className='ed-row';
    const lb=document.createElement('span');lb.className='lb';lb.textContent=label;
    row.appendChild(lb);
    const box=document.createElement('div');box.className='ed-opts';
    opts.forEach(v=>{
      const sw=document.createElement('div');
      sw.className='swatch'+(editCh[key]===v?' sel':'');
      if(type==='color')sw.style.background=v;
      else{
        const m=Object.assign({},editCh);m[key]=v;
        if(key==='hair')m.hat='none'; // don't hide the hairstyle under the hat
        sw.appendChild(edSwatchCanvas(m));
      }
      sw.addEventListener('click',()=>{initAudio();sndSelect();editCh[key]=v;buildEdRows();drawEdPreview();});
      box.appendChild(sw);
    });
    row.appendChild(box);
    wrap.appendChild(row);
  };
  addRow('はだのいろ',ED_SKINS,'skin','color');
  addRow('かみがた',ED_HAIRS,'hair','icon');
  addRow('かみのいろ',ED_HAIRCOLS,'hairCol','color');
  addRow('ぼうし',ED_HATS,'hat','icon');
  addRow('ぼうしのいろ',ED_HATCOLS,'hatCol','color');
  addRow('おめめ',ED_EYES,'eyes','icon');
  const nb=$('#ed-namechips');nb.innerHTML='';
  ED_NAMES.forEach(n=>{
    const b=document.createElement('button');
    b.className='namechip'+(editCh.name===n?' sel':'');
    b.textContent=n;
    b.addEventListener('click',()=>{
      initAudio();sndSelect();editCh.name=n;$('#ed-name').value=n;
      nb.querySelectorAll('.namechip').forEach(x=>x.classList.toggle('sel',x.textContent===n));
    });
    nb.appendChild(b);
  });
}
function drawEdPreview(){
  const cv=$('#ed-preview'),c=cv.getContext('2d');
  c.setTransform(1,0,0,1,0,0);c.clearRect(0,0,cv.width,cv.height);
  c.setTransform(1,0,0,1,180,150);
  drawCharBust(c,editCh,0,0,86);
  const cv2=$('#ed-carprev');
  const spec=kart.sel[kartCurPi()].car||selCar;
  drawKartPreviewOn(cv2,spec,editCh,1);
}
function openCharEdit(id){
  editId=id;
  if(id){
    const src=customChars.find(c=>c.id===id);
    editCh=JSON.parse(JSON.stringify(src));
  }else{
    editCh={id:'c'+Date.now(),name:'',kind:'human',skin:ED_SKINS[0],hair:'short',
      hairCol:ED_HAIRCOLS[1],hat:'none',hatCol:ED_HATCOLS[0],eyes:'round',shirt:'#4d9de0',custom:true};
  }
  buildEdRows();
  $('#ed-name').value=editCh.name||'';
  drawEdPreview();
  setState('charedit');
}
$('#btn-ed-save').addEventListener('click',()=>{
  initAudio();
  editCh.name=(($('#ed-name').value||'').trim()||'ぼく').slice(0,8);
  if(editId){
    const i=customChars.findIndex(c=>c.id===editId);
    if(i>=0)customChars[i]=editCh;else customChars.push(editCh);
  }else customChars.push(editCh);
  saveChars();
  buildCharGrid();
  selectChar(editCh.id);
  sndFanfare();
  setState('chars');
});

/* ---------- race engine ---------- */
function kartRacerBase(ch,spec,cpu,pi){
  return {ch,spec,cpu,pi,z:0,rel:0,sp:0,tilt:0,spin:0,spinT:0,invT:0,items:0,
    throwCd:cpu?rand(3,6):0,steer:0,dragDX:0,finished:false,fRank:0,
    jumpT:0,jumpCd:0,
    persona:rand(.93,1.04),ph:rand(0,TAU),homeRel:0};
}
function kartGoalPx(){return [500,650,800,1000,1200][((diff&&diff.id)||3)-1]*14;}
function kartCommonStart(){
  if(course.mode==='side')selectCourse('machi');
  kart.active=true;kartFlow=null;
  selCar=kart.sel[0].car||selCar;
  computeRoad();
  resetWorld(false);
  $('#lives').innerHTML='';
  kart.goal=kartGoalPx();
  kart.phase='count';kart.countT=3.3;kart.lastN=4;
  kart.finCount=0;kart.doneT=0;kart.winner=null;
  kart.balls=[];kart.attacks=[];kart.confetti=[];kart.viewIdx=0;
  world.nextItemZ=PY+500;
  world.nextChevZ=0;
  world.rumbleCount=0;
  buildKartTrack();
  stopBgm();
}
function startRace(){
  kart.versus=false;
  kartCommonStart();
  const slots=course.twoway?[-.82,-.5,-.18,.14]:[-.75,-.28,.22,.72];
  const pr=kartRacerBase(kart.sel[0].ch||CHAR_PRESETS[0],selCar,false,0);
  pr.rel=slots[0];pr.homeRel=slots[0];pr.z=0;
  kart.racers=[pr];
  const pool=CHAR_PRESETS.filter(c=>c.id!==pr.ch.id).slice();
  const carPool=CARS.filter(c=>!c.norand&&!c.rail);
  for(let i=0;i<3;i++){
    const ch=pool.splice(Math.floor(Math.random()*pool.length),1)[0];
    const r=kartRacerBase(ch,carPool[Math.floor(Math.random()*carPool.length)],true,-1);
    r.rel=slots[i+1];r.homeRel=slots[i+1];r.z=75*(i+1);
    kart.racers.push(r);
  }
  updateKartItemHUD();
  setState('play');
}
function startVersus(){
  kart.versus=true;
  kartCommonStart();
  const base=course.twoway?-.47:0;
  const p1=kartRacerBase(kart.sel[0].ch||CHAR_PRESETS[0],kart.sel[0].car||CARS[0],false,0);
  const p2=kartRacerBase(kart.sel[1].ch||CHAR_PRESETS[1],kart.sel[1].car||CARS[7],false,1);
  p1.rel=clamp(base-.25,-.85,.85);p1.homeRel=p1.rel;
  p2.rel=clamp(base+.25,-.85,.85);p2.homeRel=p2.rel;
  kart.racers=[p1,p2];
  updateKartItemHUD();
  setState('play');
}
function kartThrow(i){
  const r=kart.racers[i];
  if(!r||r.cpu||kart.phase!=='run'||r.finished)return;
  if(r.items<=0||r.throwCd>0)return;
  r.items--;r.throwCd=.7;
  updateKartItemHUD();
  sndThrow();
  if(kart.versus){
    kart.attacks.push({from:i,tgt:1-i,t:0,phase:'fly',srcRel:r.rel,rel:0,z:0});
  }else{
    kart.balls.push({z:r.z+r.spec.l*.7,rel:r.rel,vz:r.sp+430,owner:r,spin:0});
  }
}
function doSpinR(r){
  if(r.invT>0||r.spinT>0||r.finished)return;
  r.spinT=1.05;r.spin=0;r.invT=2.3;
  r.sp*=.4;
  blip(430,120,.3,'sine',.14);
  blip(210,70,.3,'triangle',.1,.05);
}
function updateKartItemHUD(){
  const R=kart.racers;
  if(!R.length)return;
  if(!kart.versus){
    world.items=R[0].items;
    updateItemHUD();
  }else{
    [0,1].forEach(i=>{
      const el=$('#vs-cnt'+(i+1));
      if(el)el.textContent=R[i].items;
      const b=$('#vs-throw'+(i+1));
      if(b){b.classList.toggle('off',R[i].items<=0);b.classList.toggle('ready',R[i].items>0);}
    });
  }
}
function vsRoadHalf(){
  const horiz=W>H;
  const vw=horiz?W/2:W;
  let rh=clamp(vw*.31,130,285)*(course.roadW||1);
  return Math.min(rh,vw*.42);
}
function kartSteering(dt){
  const R=kart.racers;
  R.forEach(r=>{if(!r.cpu){r.steer=0;r.dragDX=0;}});
  const horiz=W>H;
  pointers.forEach(p=>{
    let idx=0;
    if(kart.versus)idx=horiz?(p.sx<W/2?0:1):(p.sy>H/2?0:1);
    const r=R[idx];
    if(!r||r.cpu)return;
    if(p.drag){
      if(p.kx===undefined)p.kx=p.x;
      r.dragDX+=(p.x-p.kx);
      p.kx=p.x;
    }else{
      const x0=(kart.versus&&horiz&&idx===1)?W/2:0;
      const vw=(kart.versus&&horiz)?W/2:W;
      r.steer=(p.x-x0)<vw/2?-1:1;
    }
  });
  const p1=R[0];
  if(p1&&!p1.cpu){
    if(kkeys.p1l)p1.steer=-1;
    if(kkeys.p1r)p1.steer=1;
    if(!kart.versus){
      if(keys.left)p1.steer=-1;
      if(keys.right)p1.steer=1;
      if(pad.on&&pad.ax)p1.steer=pad.ax;
    }
  }
  if(kart.versus){
    const p2=R[1];
    if(keys.left||kkeys.p2l)p2.steer=-1;
    if(keys.right||kkeys.p2r)p2.steer=1;
  }
  const canMove=kart.phase==='run'||kart.phase==='done';
  R.forEach(r=>{
    if(r.cpu)return;
    if(!canMove||r.finished){r.tilt=lerp(r.tilt,0,Math.min(1,dt*6));return;}
    const prev=r.rel;
    const rh=kart.versus?vsRoadHalf():roadHalf;
    if(r.dragDX)r.rel+=r.dragDX/rh;
    else if(r.steer)r.rel+=r.steer*1.15*dt;
    if(r.spinT>0)r.rel=prev+(r.rel-prev)*.3;
    r.tilt=lerp(r.tilt,clamp((r.rel-prev)/Math.max(dt,.001)*.5,-.18,.18),Math.min(1,dt*10));
  });
}
function cpuDrive(r,dt,t){
  if(kart.phase!=='run'||r.finished)return;
  let target=r.homeRel+Math.sin(t*.5+r.ph)*.14;
  let bestItem=null,bi=1e9,danger=null,dd=1e9;
  for(const o of world.obstacles){
    if(o.hit||o.got)continue;
    const dz=o.z-r.z;
    if(dz<40||dz>460)continue;
    const orel=o.lane+(o.xOff||0)/RHN;
    if(o.type==='item'){
      if(Math.abs(orel-r.rel)<.5&&dz<bi){bi=dz;bestItem=orel;}
    }else if(Math.abs(orel-r.rel)<.36&&dz<dd){dd=dz;danger=orel;}
  }
  if(danger!==null)target=r.rel+(r.rel<=danger?-.55:.55);
  else if(bestItem!==null)target=bestItem;
  target+=clamp(ktCurv(r.z+180)*1.15,-.34,.34); // racing line: hug the inside of the curve
  target=clamp(target,-.88,.88);
  if(course.twoway)target=clamp(target,-.88,.12);
  const prev=r.rel;
  r.rel+=clamp(target-r.rel,-1,1)*Math.min(1,dt*2.0);
  r.tilt=clamp((r.rel-prev)/Math.max(dt,.001)*.35,-.18,.18);
  if(diff.id>=3&&r.items>0&&r.throwCd<=0){
    for(const o of kart.racers){
      if(o===r||o.finished)continue;
      const dz=o.z-r.z;
      if(dz>140&&dz<650&&Math.abs(o.rel-r.rel)<.4){
        r.throwCd=rand(7,12);r.items--;
        kart.balls.push({z:r.z+r.spec.l*.7,rel:r.rel,vz:r.sp+430,owner:r,spin:0});
        sndThrow();
        break;
      }
    }
  }
}
function updateKart(dt,t){
  if(state==='paused')return;
  const R=kart.racers;
  if(!R.length)return;
  if(kart.phase==='count'){
    kart.countT-=dt;
    const n=Math.ceil(kart.countT);
    if(n>0&&n!==kart.lastN){kart.lastN=n;showBanner(String(n));sndCount(false);}
    if(kart.countT<=0){
      kart.phase='run';
      showBanner('GO！',800);
      sndCount(true);sndFanfare();
      startEngine();startBgm('play');
    }
  }
  const running=kart.phase==='run'||kart.phase==='done';
  kartSteering(dt);
  for(const r of R){
    let target=0;
    if(r.finished)target=70;
    else if(running){
      target=baseSpeed()*(r.cpu?r.persona:1.05);
      if(r.cpu&&!kart.versus){
        const pz=R[0].z;
        if(r.z<pz-260)target*=1.13;
        else if(r.z>pz+430)target*=.86;
      }
      if(r.spinT>0)target*=.22;
      if(Math.abs(r.rel)>.98)target*=.55; // curb rumble slows the kart
    }
    r.sp=lerp(r.sp,target,Math.min(1,dt*2.4));
    const u0=ktU(r.z);
    r.z+=r.sp*dt;
    // centrifugal drift: the road slides away under the kart in curves
    if(running&&!r.finished&&r.spinT<=0)r.rel-=(ktU(r.z)-u0)*KCF[((diff&&diff.id)||3)-1];
    if(r.spinT>0){r.spinT-=dt;r.spin+=dt*11;if(r.spinT<=0)r.spin=0;}
    if(r.invT>0)r.invT-=dt;
    if(r.throwCd>0)r.throwCd-=dt;
    if(r.jumpT>0)r.jumpT-=dt;
    if(r.jumpCd>0)r.jumpCd-=dt;
    r.rel=clamp(r.rel,-1.15,1.15);
  }
  for(const r of R){if(r.cpu||(kartAutoTest&&r.pi===0))cpuDrive(r,dt,t);}
  // camera / world sync
  if(!kart.versus){
    const P=R[0];
    world.dist=P.z;
    world.carX=roadCenterAt(P.z)+P.rel*roadHalf;
    world.tilt=P.tilt+(P.spinT>0?P.spin:0);
    world.speed=P.sp;
    world.invT=P.invT>0?1:0;
  }else{
    world.dist=Math.max(R[0].z,R[1].z);
    world.speed=(R[0].sp+R[1].sp)/2;
  }
  updateEngine(world.speed);
  // spawns / cleanup
  const ahead=world.dist+Math.max(W,H)*.85+400;
  while(world.nextObsZ<ahead)spawnObstacle();
  while(world.nextItemZ<ahead){spawnItemBox(world.nextItemZ);world.nextItemZ+=rand(430,760);}
  if(course.deco)while(world.nextDecoZ<ahead)spawnDeco();
  // chevron boards announcing curves (outside edge, pointing into the turn)
  if(world.nextChevZ===undefined)world.nextChevZ=world.dist;
  while(world.nextChevZ<ahead){
    const cz=world.nextChevZ;world.nextChevZ+=150;
    const cu=ktCurv(cz+240);
    if(Math.abs(cu)>.16)world.deco.push({z:cz,side:cu>0?-1:1,off:46,type:'chev',seed:cu>0?1:0});
  }
  const back=Math.min.apply(null,R.map(r=>r.z))-480;
  world.deco=world.deco.filter(d=>d.z>back);
  world.obstacles.forEach(o=>{
    o.z+=o.sp*dt;
    if(o.hit){o.hitT+=dt;o.spin+=dt*13;o.xOff+=o.slide*300*dt;}
  });
  world.obstacles=world.obstacles.filter(o=>o.z>back&&o.z<ahead+300&&!(o.hit&&o.hitT>1.35)&&!o.got);
  // racer vs obstacles / items / offroad
  for(const r of R){
    if(!running||r.finished)continue;
    const rl=Math.min(r.spec.l,160);
    for(const o of world.obstacles){
      const dz=o.z-r.z;
      if(Math.abs(dz)>240)continue;
      const orel=o.lane+(o.xOff||0)/RHN;
      if(o.type==='item'){
        if(!o.got&&Math.abs(dz)<80&&Math.abs(r.rel-orel)<.24){
          o.got=true;
          if(r.items<3)r.items++;
          if(!r.cpu){sndGet();updateKartItemHUD();}
        }
      }else if(!o.hit&&r.invT<=0&&r.spinT<=0&&r.jumpT<=0){
        const ow=o.type==='car'?(o.spec?o.spec.w:54):46;
        const ol=o.type==='car'?Math.min(o.kind==='ufo'?66:(o.spec?o.spec.l:110),160):44;
        const lat=(r.spec.w+ow)*.5*.6/RHN;
        const lon=(rl+ol)*.5*.6;
        if(Math.abs(dz)<lon&&Math.abs(r.rel-orel)<lat){doSpinR(r);break;}
      }
    }
    // curb rumble: rattle + slowdown + gentle push back (never a course-out crash)
    if(Math.abs(r.rel)>.98){
      r.rumbleT=(r.rumbleT||0)+dt;
      const push=diff.id===1?2.4:1.1; // star 1: bounce right back on the road
      r.rel-=Math.sign(r.rel)*push*dt;
      r.rel=clamp(r.rel,-1.18,1.18);
      if(!r.cpu){
        r.tik=(r.tik||0)-dt;
        if(r.tik<=0){r.tik=.11;blip(95,55,.05,'square',.09);}
        if(!r.rumbled){r.rumbled=true;world.rumbleCount=(world.rumbleCount||0)+1;}
      }
    }else{r.rumbleT=0;r.rumbled=false;if(r.tik>0)r.tik-=dt;}
  }
  // kart-kart gentle push
  for(let i=0;i<R.length;i++)for(let j=i+1;j<R.length;j++){
    const a=R[i],b=R[j];
    if(Math.abs(a.z-b.z)<(Math.min(a.spec.l,160)+Math.min(b.spec.l,160))*.5*.7
      &&Math.abs(a.rel-b.rel)<.22){
      const s=a.rel<b.rel?-1:1;
      a.rel+=s*dt*.9;b.rel-=s*dt*.9;
    }
  }
  // flying stars
  kart.balls.forEach(b=>{b.z+=b.vz*dt;b.spin+=dt*14;});
  for(const b of kart.balls){
    if(b.dead)continue;
    for(const r of R){
      if(r===b.owner||r.invT>0||r.spinT>0||r.finished)continue;
      if(Math.abs(b.z-r.z)<95&&Math.abs(b.rel-r.rel)<.28){
        b.dead=true;doSpinR(r);sndHit();
        break;
      }
    }
    if(b.dead)continue;
    for(const o of world.obstacles){
      if(o.type!=='car'||o.hit)continue;
      const orel=o.lane+(o.xOff||0)/RHN;
      if(Math.abs(b.z-o.z)<((o.spec?Math.min(o.spec.l,160):110)*.5+24)&&Math.abs(b.rel-orel)<.26){
        b.dead=true;
        o.hit=true;o.spin=0;o.hitT=0;o.xOff=0;
        o.slide=o.lane>=0?1:-1;o.sp*=.3;
        sndHit();
        break;
      }
    }
  }
  kart.balls=kart.balls.filter(b=>!b.dead&&b.z<ahead+200&&b.z>back);
  // versus targeted attacks
  for(const a of kart.attacks){
    a.t+=dt;
    if(a.phase==='fly'&&a.t>=.8){
      a.phase='warn';
      const T=R[a.tgt];
      a.rel=T.rel;a.z=T.z+T.sp*.7;
    }else if(a.phase==='warn'&&a.t>=1.5){
      a.phase='hit';
      const T=R[a.tgt];
      if(Math.abs(T.rel-a.rel)<.34&&Math.abs(T.z-a.z)<150){doSpinR(T);sndHit();}
      else blip(300,150,.15,'sine',.08);
    }
  }
  kart.attacks=kart.attacks.filter(a=>a.t<1.9);
  // finish
  for(const r of R){
    if(!r.finished&&r.z>=kart.goal){
      r.finished=true;r.fRank=++kart.finCount;
      if(!r.cpu)sndFanfare();
    }
  }
  if(kart.phase==='run'){
    const done=kart.versus?(R[0].finished||R[1].finished):R[0].finished;
    if(done){
      kart.phase='done';kart.doneT=0;
      stopEngine();stopBgm();
      if(kart.versus){
        kart.winner=R[0].finished?0:1;
        showBanner('P'+(kart.winner+1)+'の かち！',2000);
        spawnConfetti(150);
      }else{
        showBanner('ゴール！',1400);
        if(R[0].fRank===1)spawnConfetti(150);
      }
    }
  }else if(kart.phase==='done'){
    kart.doneT+=dt;
    if(kart.doneT>1.8&&state==='play')showRaceResult();
  }
  kart.confetti.forEach(p=>{
    p.t+=dt;
    p.x+=p.vx*dt+Math.sin(t*3+p.rot)*22*dt;
    p.y+=p.vy*dt;p.rot+=p.vr*dt;
  });
  kart.confetti=kart.confetti.filter(p=>p.t<p.life&&p.y<H+40);
  updateParticles(dt);
  updateFx(dt,t);
}
function kartRank(r){
  if(r.fRank)return r.fRank;
  let k=1;
  for(const o of kart.racers){
    if(o===r)continue;
    if(o.fRank||o.z>r.z)k++;
  }
  return k;
}

/* ---------- race rendering ---------- */
function drawSpinStars(x,y,r,t){
  for(let i=0;i<3;i++){
    const a=t*7+i*TAU/3;
    const sx=x+Math.cos(a)*r.spec.w*CS*.85;
    const sy=y+Math.sin(a)*r.spec.w*CS*.55-14;
    ctx.save();ctx.translate(sx,sy);ctx.rotate(a);
    starPath(ctx,8);
    ctx.fillStyle='#ffd43b';ctx.fill();
    ctx.strokeStyle='#f59f00';ctx.lineWidth=1.4;ctx.stroke();
    ctx.restore();
  }
}
function drawRacersTop(t){
  // finish line
  const gy=PY-(kart.goal-world.dist);
  if(gy>-90&&gy<H+90){
    const cx=roadCenterAt(kart.goal);
    const sq=roadHalf/7;
    for(let row=0;row<2;row++)for(let i=0;i<14;i++){
      ctx.fillStyle=(i+row)%2?'#fff':'#23252b';
      ctx.fillRect(cx-roadHalf+i*sq,gy-14+row*14,sq+.5,14);
    }
    [-1,1].forEach(s=>{
      const px2=cx+s*(roadHalf+16);
      ctx.strokeStyle='#8f97a5';ctx.lineWidth=5;
      ctx.beginPath();ctx.moveTo(px2,gy-46);ctx.lineTo(px2,gy+8);ctx.stroke();
      ctx.fillStyle='#ff5a63';
      ctx.beginPath();ctx.moveTo(px2,gy-46);ctx.lineTo(px2-s*26,gy-38);ctx.lineTo(px2,gy-30);
      ctx.closePath();ctx.fill();
    });
  }
  const R=kart.racers;
  for(let i=0;i<R.length;i++){
    if(i===kart.viewIdx)continue;
    const r=R[i];
    const y=PY-(r.z-world.dist);
    if(y<-180||y>H+180)continue;
    const x=roadCenterAt(r.z)+r.rel*roadHalf;
    const rot=r.tilt+(r.spinT>0?r.spin:0);
    if(r.invT>0)ctx.globalAlpha=.6+.3*Math.sin(t*24);

    ctx.globalAlpha=1;

  const me=R[kart.viewIdx];
  if(me&&me.spinT>0)drawSpinStars(world.carX,PY,me,t);
  for(const b of kart.balls){
    const y=PY-(b.z-world.dist);
    if(y<-60||y>H+60)continue;

    ctx.beginPath();ctx.arc(x,y+18,8,0,TAU);ctx.fill();

function drawConfetti(){

    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
    ctx.globalAlpha=clamp((p.life-p.t)/.5,0,1);

function drawVsAttacks(i,t){
  const R=kart.racers,P=R[i];
  for(const a of kart.attacks){
    if(a.from===i&&a.phase==='fly'){
      const k=a.t/.8;
      const x=roadCenterAt(P.z)+a.srcRel*roadHalf;
      const y=PY-k*(PY+70);
      ctx.save();ctx.translate(x,y);ctx.rotate(t*12);
      starPath(ctx,14+k*8);
      ctx.fillStyle='#ffe066';ctx.fill();
      ctx.strokeStyle='#f08c00';ctx.lineWidth=2;ctx.stroke();
      ctx.restore();
    }
    if(a.tgt===i&&(a.phase==='warn'||a.phase==='hit')){
      const y=PY-(a.z-P.z);
      const x=roadCenterAt(a.z)+a.rel*roadHalf;
      if(y<-80||y>H+140)continue;
      if(a.phase==='warn'){
        const k=clamp((a.t-.8)/.7,0,1);
        ctx.strokeStyle='rgba(255,80,60,'+(0.5+0.4*Math.sin(t*14)).toFixed(2)+')';
        ctx.lineWidth=5;
        ctx.beginPath();ctx.ellipse(x,y,34-10*k,22-6*k,0,0,TAU);ctx.stroke();
        const fy=y-(1-k)*420;
        ctx.save();ctx.translate(x,fy);ctx.rotate(t*12);
        starPath(ctx,16);
        ctx.fillStyle='#ffe066';ctx.fill();
        ctx.strokeStyle='#f08c00';ctx.lineWidth=2;ctx.stroke();
        ctx.restore();
      }else{
        const k=clamp((a.t-1.5)/.4,0,1);
        ctx.strokeStyle='rgba(255,210,80,'+(0.8*(1-k)).toFixed(2)+')';
        ctx.lineWidth=6;

function renderVersus(t){
  ctx.clearRect(0,0,W,H);
  const horiz=W>H;
  document.body.classList.toggle('vs-landscape',horiz);
  const views=horiz
    ?[{x:0,y:0,w:W/2,h:H},{x:W/2,y:0,w:W/2,h:H}]
    :[{x:0,y:H/2,w:W,h:H/2},{x:0,y:0,w:W,h:H/2}];
  const sv={W:W,H:H,PY:PY,dist:world.dist,carX:world.carX,tilt:world.tilt,
    invT:world.invT,speed:world.speed,car:selCar};
  for(let i=0;i<2;i++){
    const v=views[i],P=kart.racers[i];
    if(!P)continue;
    kart.viewIdx=i;
    ctx.save();
    ctx.beginPath();ctx.rect(v.x,v.y,v.w,v.h);ctx.clip();
    ctx.translate(v.x,v.y);
    W=v.w;H=v.h;PY=H*.74;
    computeRoad();
    selCar=P.spec;
    world.dist=P.z;
    world.carX=roadCenterAt(P.z)+P.rel*roadHalf;
    world.tilt=P.tilt+(P.spinT>0?P.spin:0);
    world.invT=P.invT>0?1:0;
    world.speed=P.sp;
    renderTopScene(t);
    drawVsAttacks(i,t);
    // dodge the DOM back-button row / throw button where they overlap this half
    drawViewHUD(i,t,((horiz&&i===0)||(!horiz&&i===1))?52:0,(!horiz&&i===1)?104:0);
    ctx.restore();
  }
  kart.viewIdx=0;
  W=sv.W;H=sv.H;PY=sv.PY;
  selCar=sv.car;
  computeRoad();
  world.dist=sv.dist;world.carX=sv.carX;world.tilt=sv.tilt;
  world.invT=sv.invT;world.speed=sv.speed;
  // divider
  ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=9;
  ctx.beginPath();
  if(horiz){ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);}
  else{ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);}
  ctx.stroke();
  ctx.strokeStyle='#fff';ctx.lineWidth=5;
  ctx.beginPath();
  if(horiz){ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);}
  else{ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);}
  ctx.stroke();
  drawConfetti();
  updateRaceChip();
}
/* ============================================================
   pseudo-3D rear-view renderer (kart mode) - OutRun style road,

const KJUMP=.75;
function kartJump(r){
  if(!kart.active||!r||r.cpu||kart.phase!=='run'||r.finished)return;
  if(r.jumpT>0||r.jumpCd>0||r.spinT>0)return;
  r.jumpT=KJUMP;r.jumpCd=1.15;
  sndJump();
}
function colObj(col){
  if(col[0]==='#'){const n=parseInt(col.slice(1),16);return{r:n>>16&255,g:n>>8&255,b:n&255};}
  const m=/(\d+)[^\d]+(\d+)[^\d]+(\d+)/.exec(col);
  return m?{r:+m[1],g:+m[2],b:+m[3]}:{r:128,g:128,b:128};
}
function mixCol(a,b,f){
  return 'rgb('+Math.round(a.r+(b.r-a.r)*f)+','+Math.round(a.g+(b.g-a.g)*f)+','+Math.round(a.b+(b.b-a.b)*f)+')';
}
/* ---- back of the character's head (hair / hat / skin reflected) ---- */
function drawCharHeadBack(c,ch,r,turn){
  const kind=ch.kind||'human';
  const skin=ch.skin||'#ffd9b3';
  const hairCol=ch.hairCol||'#4a3728';
  let hair=ch.hair||'none';
  const hat=ch.hat||'none',hatCol=ch.hatCol||'#e8452f';
  if(kind!=='human')hair='none';
  turn=clamp(turn||0,-1.2,1.2);
  c.save();
  c.translate(turn*r*.14,0);
  // neck
  c.fillStyle=shade(skin,-.06);
  rr(c,-r*.28,r*.6,r*.56,r*.52,r*.16);c.fill();
  // behind: species bits
  if(kind==='cat'){
    [-1,1].forEach(s=>{
      c.beginPath();
      c.moveTo(s*r*.82,-r*.3);c.lineTo(s*r*.52,-r*1.16);c.lineTo(s*r*.1,-r*.8);
      c.closePath();c.fillStyle=skin;c.fill();
      c.strokeStyle=shade(skin,-.3);c.lineWidth=r*.07;c.stroke();
    });
  }
  if(kind==='panda'){
    [-1,1].forEach(s=>{c.beginPath();c.arc(s*r*.7,-r*.7,r*.36,0,TAU);c.fillStyle='#26262c';c.fill();});
  }
  if(kind==='dino'){
    [-.5,0,.5].forEach(f=>{
      c.beginPath();
      c.moveTo(f*r-r*.22,-r*.78);c.lineTo(f*r,-r*1.24+Math.abs(f)*r*.16);c.lineTo(f*r+r*.22,-r*.78);
      c.closePath();c.fillStyle='#3e8f3e';c.fill();
      c.strokeStyle='#2c6e2c';c.lineWidth=r*.05;c.stroke();
    });
  }
  if(hair==='pigtail'){
    [-1,1].forEach(s=>{
      c.beginPath();c.arc(s*r*1.06,r*.1,r*.36,0,TAU);
      c.fillStyle=hairCol;c.fill();
      c.strokeStyle=shade(hairCol,-.25);c.lineWidth=r*.06;c.stroke();
    });
  }
  // head base
  if(kind==='robot'){
    rr(c,-r,-r*.95,r*2,r*1.9,r*.42);
    const g=c.createLinearGradient(-r,0,r,0);
    g.addColorStop(0,'#8f99a8');g.addColorStop(.45,'#dfe6ee');g.addColorStop(1,'#8792a2');
    c.fillStyle=g;c.fill();
    c.strokeStyle='#5d6675';c.lineWidth=r*.08;c.stroke();
    rr(c,-r*.55,-r*.5,r*1.1,r*1.1,r*.2);
    c.strokeStyle='rgba(70,80,95,.6)';c.lineWidth=r*.06;c.stroke();
    c.fillStyle='#6a727e';
    c.beginPath();c.arc(-r*.3,r*.28,r*.09,0,TAU);c.fill();
    c.beginPath();c.arc(r*.3,r*.28,r*.09,0,TAU);c.fill();
    c.strokeStyle='#5d6675';c.lineWidth=r*.09;
    c.beginPath();c.moveTo(0,-r*.95);c.lineTo(0,-r*1.32);c.stroke();
    c.beginPath();c.arc(0,-r*1.42,r*.14,0,TAU);c.fillStyle='#ff5a63';c.fill();
    [-1,1].forEach(s=>{c.beginPath();c.arc(s*r*1.02,0,r*.16,0,TAU);c.fillStyle='#6a727e';c.fill();});
  }else{
    const base=(kind==='human'&&hair!=='none')?hairCol:skin;
    const g=c.createRadialGradient(-r*.3,-r*.35,r*.2,0,0,r*1.05);
    g.addColorStop(0,shade(base,.12));g.addColorStop(1,shade(base,-.1));
    c.beginPath();c.arc(0,0,r,0,TAU);c.fillStyle=g;c.fill();
    c.strokeStyle=shade(base,-.35);c.lineWidth=r*.06;c.stroke();
  }
  // human hair from behind
  if(kind==='human'){
    if(hair==='none'){
      c.fillStyle=hairCol;
      c.beginPath();c.arc(0,-r*.42,r*.5,Math.PI,TAU);c.closePath();c.fill();
    }else{
      if(hair==='short'||hair==='spiky'){
        c.fillStyle=skin;
        c.beginPath();
        c.moveTo(-r*.5,r*.84);
        c.quadraticCurveTo(0,r*.5,r*.5,r*.84);
        c.quadraticCurveTo(0,r*1.04,-r*.5,r*.84);
        c.closePath();c.fill();
      }
      if(hair==='spiky'){
        c.fillStyle=hairCol;
        for(let i=0;i<4;i++){
          const a=Math.PI+((i+.5)/4)*Math.PI;
          const bx=Math.cos(a)*r,by=Math.sin(a)*r;
          c.beginPath();c.moveTo(bx*.8,by*.8);c.lineTo(bx*1.3,by*1.3);
          c.lineTo(Math.cos(a+.3)*r*.84,Math.sin(a+.3)*r*.84);
          c.closePath();c.fill();
        }
      }
      if(hair==='curly'){
        c.fillStyle=hairCol;
        for(let i=0;i<7;i++){
          const a=(i/7)*TAU+.4;
          c.beginPath();c.arc(Math.cos(a)*r*.8,Math.sin(a)*r*.8,r*.32,0,TAU);c.fill();
        }
      }
      c.strokeStyle='rgba(255,255,255,.22)';c.lineWidth=r*.1;c.lineCap='round';
      c.beginPath();c.arc(0,0,r*.66,Math.PI*1.15,Math.PI*1.5);c.stroke();
    }
    if(hair==='none'||hair==='short'||hair==='spiky'){
      [-1,1].forEach(s=>{
        c.beginPath();c.arc(s*r*.94,r*.12,r*.2,0,TAU);
        c.fillStyle=skin;c.fill();
        c.strokeStyle=shade(skin,-.3);c.lineWidth=r*.05;c.stroke();
      });
    }
  }
  if(kind==='cat'){ // tabby stripes on the back of the head
    c.strokeStyle=shade(skin,-.28);c.lineWidth=r*.11;c.lineCap='round';
    [-.3,0,.3].forEach(f=>{
      c.beginPath();c.arc(f*r,-r*.06,r*.5,Math.PI*1.28,Math.PI*1.72);c.stroke();
    });
  }
  if(kind==='dino'){ // back scale dots
    c.fillStyle='rgba(30,90,30,.35)';
    c.beginPath();c.arc(-r*.3,r*.2,r*.11,0,TAU);c.fill();
    c.beginPath();c.arc(r*.28,r*.05,r*.11,0,TAU);c.fill();
  }
  // face hint when the head turns with the steering
  if(Math.abs(turn)>.22){
    const s=turn>0?1:-1;
    if(kind==='robot'){
      c.fillStyle='#37d4e8';
      c.beginPath();c.arc(s*r*.8,-r*.05,r*.12,0,TAU);c.fill();
    }else{
      c.fillStyle=skin;
      c.beginPath();c.ellipse(s*r*.78,r*.08,r*.32,r*.42,0,0,TAU);c.fill();
      c.beginPath();c.ellipse(s*r*1.04,r*.04,r*.12,r*.09,0,0,TAU);c.fill();
      c.fillStyle='#2c2c34';
      c.beginPath();c.ellipse(s*r*.68,-r*.02,r*.07,r*.1,0,0,TAU);c.fill();
      c.strokeStyle='rgba(0,0,0,.2)';c.lineWidth=r*.045;
      c.beginPath();c.arc(s*r*.78,r*.26,r*.11,Math.PI*.15,Math.PI*.85);c.stroke();
    }
  }
  // hats from behind
  if(hat==='cap'){
    c.beginPath();c.arc(0,-r*.34,r*.86,Math.PI,TAU);c.closePath();
    const g=c.createLinearGradient(-r,0,r,0);
    g.addColorStop(0,shade(hatCol,-.2));g.addColorStop(.5,shade(hatCol,.15));g.addColorStop(1,shade(hatCol,-.25));
    c.fillStyle=g;c.fill();
    c.strokeStyle=shade(hatCol,-.4);c.lineWidth=r*.06;c.stroke();
    c.fillStyle=shade(hatCol,-.3);
    rr(c,-r*.34,-r*.52,r*.68,r*.17,r*.08);c.fill();
    c.beginPath();c.arc(0,-r*.62,r*.1,0,TAU);c.fillStyle=skin;c.fill();
    c.beginPath();c.arc(0,-r*1.02,r*.1,0,TAU);c.fillStyle=shade(hatCol,-.35);c.fill();
  }else if(hat==='helmet'){
    c.beginPath();c.arc(0,-r*.12,r*.99,Math.PI*.98,Math.PI*2.02);c.closePath();
    const g=c.createLinearGradient(-r,0,r,0);
    g.addColorStop(0,shade(hatCol,-.22));g.addColorStop(.45,shade(hatCol,.2));g.addColorStop(1,shade(hatCol,-.28));
    c.fillStyle=g;c.fill();
    c.strokeStyle=shade(hatCol,-.45);c.lineWidth=r*.07;c.stroke();
    c.fillStyle='#fff';
    rr(c,-r*.13,-r*1.08,r*.26,r*.74,r*.12);c.fill();
    c.strokeStyle='rgba(0,0,0,.22)';c.lineWidth=r*.06;
    c.beginPath();c.moveTo(-r*.9,-r*.26);c.quadraticCurveTo(0,-r*.06,r*.9,-r*.26);c.stroke();
  }else if(hat==='ribbon'){
    const bx=r*.5,by=-r*.84;
    c.fillStyle=hatCol;
    c.beginPath();c.moveTo(bx,by);c.lineTo(bx-r*.4,by-r*.3);c.lineTo(bx-r*.36,by+r*.22);c.closePath();c.fill();
    c.beginPath();c.moveTo(bx,by);c.lineTo(bx+r*.4,by-r*.3);c.lineTo(bx+r*.36,by+r*.22);c.closePath();c.fill();
    c.beginPath();c.arc(bx,by,r*.14,0,TAU);c.fillStyle=shade(hatCol,-.15);c.fill();
  }else if(hat==='crown'){
    c.beginPath();
    c.moveTo(-r*.58,-r*.7);
    c.lineTo(-r*.58,-r*1.1);c.lineTo(-r*.29,-r*.86);c.lineTo(0,-r*1.18);
    c.lineTo(r*.29,-r*.86);c.lineTo(r*.58,-r*1.1);c.lineTo(r*.58,-r*.7);
    c.closePath();
    c.fillStyle='#ffd23f';c.fill();
    c.strokeStyle='#c9971b';c.lineWidth=r*.06;c.stroke();
  }
  c.restore();
}

function drawKartRear(c,spec,ch,o){
  o=o||{};
  const col=spec.color;
  const t=o.t||0;
  const steer=clamp(o.steer||0,-1.2,1.2);
  const jump=o.jump||0;
  const wide=(spec.arch==='bus'||spec.arch==='limo'||spec.arch==='truck'||spec.arch==='carrier'||
    spec.arch==='garbage'||spec.arch==='tanker'||spec.arch==='crane'||spec.arch==='wrecker'||
    spec.arch==='densha'||spec.arch==='dump'||spec.arch==='fire');
  const cw=wide?72:(spec.sporty?58:62);
  const topY=spec.sporty?-74:-84;
  c.save();
  if(o.spin){
    const k=Math.cos(o.spin*1.5);
    c.scale(Math.max(.24,Math.abs(k))*(k<0?-1:1),1);
    c.rotate(Math.sin(o.spin*3)*.1);
  }else{
    c.rotate((o.tilt||0)*1.15);
  }
  // front wheels peeking out ahead
  [-1,1].forEach(s=>{
    c.save();
    c.translate(s*72,-58);
    c.rotate(steer*.3);
    c.fillStyle='#191a20';
    rr(c,-9,-13,18,26,7);c.fill();
    c.fillStyle='#3c3f49';
    rr(c,-4,-8,8,16,3);c.fill();
    c.restore();
  });
  // chassis bar
  c.fillStyle='#23252c';
  rr(c,-74,-26,148,18,8);c.fill();
  // body cowl
  c.beginPath();
  c.moveTo(-cw+6,-12);
  c.quadraticCurveTo(-cw-5,-16,-cw+2,topY+18);
  c.quadraticCurveTo(-cw+8,topY,-cw+26,topY);
  c.lineTo(cw-26,topY);
  c.quadraticCurveTo(cw-8,topY,cw-2,topY+18);
  c.quadraticCurveTo(cw+5,-16,cw-6,-12);
  c.closePath();
  const g=c.createLinearGradient(0,topY,0,-10);
  g.addColorStop(0,shade(col,.22));g.addColorStop(.55,col);g.addColorStop(1,shade(col,-.22));
  c.fillStyle=g;c.fill();

  c.fillStyle='rgba(255,255,255,.28)';
  rr(c,-cw+9,topY+9,9,42,4.5);c.fill();

  kartFeature(c,spec,cw,topY,t);

  sg.addColorStop(0,'#25272e');sg.addColorStop(.5,'#3c404c');sg.addColorStop(1,'#22242b');
  c.fillStyle=sg;c.fill();
  c.strokeStyle='#15161b';c.lineWidth=2.5;c.stroke();
  rr(c,-22,-140,44,56,12);
  c.strokeStyle='rgba(255,255,255,.14)';c.lineWidth=2;c.stroke();
  // rider
  const shirt=ch.shirt||'#4d9de0';
  const skin=ch.skin||'#ffd9b3';
  c.save();
  c.translate(steer*7,jump>0?-jump*10:0);
  c.rotate(steer*.09);
  // steering wheel first (rider's torso overlaps its lower rim)
  const wcx=steer*5,wcy=-142;
  c.save();
  c.translate(wcx,wcy);
  c.rotate(steer*.16);
  c.strokeStyle='#1d1f26';c.lineWidth=9;c.lineCap='round';
  c.beginPath();c.ellipse(0,0,36,14,0,0,TAU);c.stroke();
  c.strokeStyle='#31343e';c.lineWidth=4;
  c.beginPath();c.moveTo(-34,3);c.lineTo(34,3);c.stroke();
  const ma=-Math.PI/2+steer*.8;
  c.fillStyle='#e8452f';
  c.beginPath();c.arc(Math.cos(ma)*36,Math.sin(ma)*14,5,0,TAU);c.fill();
  c.restore();
  // torso (short, so the wheel stays visible above the shoulders)
  rr(c,-34,-122,68,62,24);
  const tg=c.createLinearGradient(-34,0,34,0);
  tg.addColorStop(0,shade(shirt,-.18));tg.addColorStop(.5,shade(shirt,.14));tg.addColorStop(1,shade(shirt,-.22));
  c.fillStyle=tg;c.fill();
  c.strokeStyle=shade(shirt,-.45);c.lineWidth=2.5;c.stroke();
  c.strokeStyle='rgba(0,0,0,.15)';c.lineWidth=2;
  c.beginPath();c.moveTo(0,-116);c.lineTo(0,-68);c.stroke();
  // arms reach around the torso onto the wheel rim (elbows out)
  const up=jump>0;
  const hxL=up?-56:wcx-31, hxR=up?56:wcx+31;
  const hyL=up?-198:wcy+2-steer*9, hyR=up?-198:wcy+2+steer*9;

    c.strokeStyle=style;c.lineWidth=lw;c.lineCap='round';

    c.beginPath();c.moveTo(28,-100);c.quadraticCurveTo(up?56:52,-118,hxR,hyR);c.stroke();

  c.beginPath();c.arc(hxR,hyR,9.5,0,TAU);c.fill();

  c.beginPath();c.arc(hxR,hyR,9.5,0,TAU);c.stroke();
  // head
  c.save();
  c.translate(steer*5,-184);
  c.rotate(steer*.12);
  drawCharHeadBack(c,ch,33,steer);
  c.restore();
  c.restore();
  // rear bumper / plate / lights / mufflers
  c.fillStyle=shade(col,-.34);
  rr(c,-cw+4,-20,cw*2-8,14,7);c.fill();
  c.strokeStyle='rgba(0,0,0,.3)';c.lineWidth=2;
  rr(c,-cw+4,-20,cw*2-8,14,7);c.stroke();
  rr(c,-17,-54,34,22,4);
  c.fillStyle='#fff';c.fill();
  c.strokeStyle='#8a929e';c.lineWidth=2;c.stroke();
  c.save();c.translate(0,-43);starPath(c,7);
  c.fillStyle='#ffd23f';c.fill();
  c.strokeStyle='#e8a020';c.lineWidth=1.5;c.stroke();c.restore();
  [-1,1].forEach(s=>{
    rr(c,s*(cw-16)-7,topY+8,14,10,4);
    c.fillStyle='#e02f2f';c.fill();
    c.fillStyle='rgba(255,170,170,.9)';
    rr(c,s*(cw-16)-5,topY+10,10,3.5,2);c.fill();
  });
  [-1,1].forEach(s=>{
    c.beginPath();c.arc(s*30,-13,8,0,TAU);
    c.fillStyle='#42454f';c.fill();
    c.strokeStyle='#181a20';c.lineWidth=2.5;c.stroke();
    c.beginPath();c.arc(s*30,-13,3.6,0,TAU);c.fillStyle='#101116';c.fill();
  });
  // big rear wheels
  [-1,1].forEach(s=>{
    c.save();c.translate(s*90,-28);
    c.fillStyle='#15161c';
    rr(c,-21,-28,42,56,13);c.fill();
    c.strokeStyle='#000';c.lineWidth=2;
    rr(c,-21,-28,42,56,13);c.stroke();
    c.save();
    rr(c,-21,-28,42,56,13);c.clip();
    c.strokeStyle='rgba(255,255,255,.13)';c.lineWidth=4;
    const ph=o.pedal?(t*9%1)*14:0;
    for(let i=0;i<5;i++){
      const yy=-30+((i*14+ph)%62);
      c.beginPath();c.moveTo(-21,yy);c.lineTo(21,yy);c.stroke();
    }
    c.restore();
    c.beginPath();c.arc(0,4,9,0,TAU);
    c.fillStyle='#c9ced8';c.fill();
    c.strokeStyle='#787f8c';c.lineWidth=2;c.stroke();
    c.restore();
  });
  c.restore();
}

function kartSkyCols(inW){

function drawKartSky(vw,vh,horY,t,P,camZ,inW){
  const cols=kartSkyCols(inW);

  g.addColorStop(0,cols[0]);g.addColorStop(1,cols[1]);

  const id=course.id;
  if(id==='uchu'){
    for(let i=0;i<70;i++){
      const sx=((i*173.3+shift*(.3+(i%5)*.12))%(vw+40)+vw+40)%(vw+40)-20;
      const sy=(i*97.7)%(horY-8);
      ctx.globalAlpha=.4+.5*(0.5+0.5*Math.sin(t*2.4+i));

      ctx.beginPath();ctx.arc(sx,sy,(i%3)*.6+.7,0,TAU);ctx.fill();

      ctx.strokeStyle='rgba(255,255,255,'+(.8*a).toFixed(2)+')';
      ctx.lineWidth=2.5;ctx.lineCap='round';
      const sx=sh.x/W*vw,sy=sh.y/H*horY;
      ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx-sh.vx*.1,sy-sh.vy*.1);ctx.stroke();
    }
    return;
  }
  if(id==='yoru'){
    for(let i=0;i<26;i++){
      const sx=((i*211.7+shift*.3)%(vw+30)+vw+30)%(vw+30)-15;
      const sy=(i*83.3)%(horY*.7);

      ctx.beginPath();ctx.arc(sx,sy,1.1,0,TAU);ctx.fill();

    ctx.globalAlpha=1;

    ctx.beginPath();ctx.arc(vw*.78+shift*.4,horY*.3,26,0,TAU);ctx.fill();

  }else if(!inW&&id!=='fubuki'){

    ctx.fillStyle=sg;
    ctx.beginPath();ctx.arc(sx,sy,54,0,TAU);ctx.fill();
    ctx.fillStyle='#fff3b8';
    ctx.beginPath();ctx.arc(sx,sy,20,0,TAU);ctx.fill();
    // clouds
    ctx.fillStyle='rgba(255,255,255,.85)';
    for(let i=0;i<3;i++){
      const cx2=((i*307+t*9+shift*.6)%(vw+180)+vw+180)%(vw+180)-90;
      const cy=horY*(.2+.18*i);
      ctx.beginPath();
      ctx.arc(cx2-26,cy,15,0,TAU);ctx.arc(cx2,cy-9,20,0,TAU);ctx.arc(cx2+28,cy,15,0,TAU);
      ctx.fill();
    }
  }
  // horizon silhouettes
  if(id==='machi'||id==='yoru'){
    ctx.fillStyle=id==='yoru'?'#1a2038':'rgba(90,120,160,.45)';
    let x=-30+((shift*.7)%70);
    let i=0;
    while(x<vw+30){
      const bw2=34+(i%4)*18,bh2=22+((i*7)%5)*13;
      ctx.fillRect(x,horY-bh2+4,bw2,bh2+4);
      if(id==='yoru'){
        ctx.fillStyle='#ffe28a';
        for(let k=0;k<3;k++){
          ctx.fillRect(x+5+k*9,horY-bh2+9+(k%2)*8,3.5,4.5);
        }
        ctx.fillStyle='#1a2038';
      }
      x+=bw2+10;i++;

  }else if(id==='yama'||id==='yuki'||id==='fubuki'){
    const snow2=id!=='yama';
    ctx.fillStyle=snow2?'rgba(190,205,225,.7)':'rgba(90,140,100,.5)';
    ctx.beginPath();ctx.moveTo(-20,horY+6);
    for(let i=0;i<=6;i++){
      const px=-20+(vw+40)*i/6;
      ctx.lineTo(px,horY+6-(i%2?52:14)-((i*13)%17));
    }
    ctx.lineTo(vw+20,horY+6);ctx.closePath();ctx.fill();
    if(snow2||id==='yama'){
      ctx.fillStyle='rgba(255,255,255,.85)';
      for(let i=1;i<6;i+=2){
        const px=-20+(vw+40)*i/6;

        ctx.beginPath();ctx.moveTo(px-13,py+14);ctx.lineTo(px,py);ctx.lineTo(px+13,py+14);ctx.closePath();ctx.fill();
      }
    }
  }else if(id==='umi'&&!inW){
    ctx.fillStyle='#2e8fc4';
    ctx.fillRect(0,horY-16,vw,22);
    ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=2;ctx.lineCap='round';
    for(let i=0;i<5;i++){
      const wx=((i*197+t*20)%(vw+40))-20;
      ctx.beginPath();ctx.moveTo(wx-8,horY-4+(i%3));ctx.lineTo(wx+8,horY-4+(i%3));ctx.stroke();
    }
    ctx.fillStyle='#fff';
    const bx=((t*12+shift*.5)%(vw+120))-60;
    ctx.beginPath();ctx.moveTo(bx,horY-18);ctx.lineTo(bx,horY-38);ctx.lineTo(bx+16,horY-20);ctx.closePath();ctx.fill();
    ctx.fillStyle='#e8552a';
    ctx.beginPath();ctx.moveTo(bx-12,horY-17);ctx.lineTo(bx+13,horY-17);ctx.lineTo(bx+8,horY-9);ctx.lineTo(bx-8,horY-9);ctx.closePath();ctx.fill();
  }else if(inW||id==='uminaka'){
    ctx.fillStyle='rgba(10,50,90,.5)';
    ctx.beginPath();ctx.moveTo(-10,horY+6);
    for(let i=0;i<=8;i++){

/* mini track map: course shape + racer dots */
function drawTrackMap(mx,my,mw,mh,me){
  if(!ktrack||!kart.goal)return;
  rr(ctx,mx,my,mw,mh,10);
  ctx.fillStyle='rgba(255,255,255,.5)';ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.2)';ctx.lineWidth=2;
  rr(ctx,mx,my,mw,mh,10);ctx.stroke();
  const pad=10,ih=mh-pad*2,cx0=mx+mw/2,sc=mw*.15;
  ctx.beginPath();
  const NP=48;
  for(let k=0;k<=NP;k++){
    const z=kart.goal*k/NP;
    const px=cx0+ktU(z)*sc,py=my+mh-pad-ih*k/NP;
    k?ctx.lineTo(px,py):ctx.moveTo(px,py);
  }
  ctx.strokeStyle='rgba(55,65,85,.8)';ctx.lineWidth=5;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,.9)';ctx.lineWidth=1.8;ctx.stroke();
  // goal marker
  const gx=cx0+ktU(kart.goal)*sc;
  ctx.strokeStyle='#e8452f';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(gx-8,my+pad);ctx.lineTo(gx+8,my+pad);ctx.stroke();
  const cols=['#ff8a3d','#4d9de0','#8a7ff0','#3fae62'];
  for(let i=kart.racers.length-1;i>=0;i--){
    const r=kart.racers[i];
    const f=clamp(r.z/kart.goal,0,1);
    const px=cx0+ktU(clamp(r.z,0,kart.goal))*sc+r.rel*3.5;
    const py=my+mh-pad-ih*f;
    ctx.beginPath();ctx.arc(px,py,r===me?6.5:4.5,0,TAU);
    ctx.fillStyle=r===me?'#e8452f':cols[i];
    ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
  }
}

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>じこアプリ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:#233;}
body{
  font-family:"Hiragino Maru Gothic ProN","Hiragino Kaku Gothic ProN","BIZ UDPGothic","Yu Gothic UI","Meiryo",system-ui,sans-serif;
  -webkit-user-select:none;user-select:none;
  -webkit-touch-callout:none;
  -webkit-tap-highlight-color:transparent;
  touch-action:none;
  overscroll-behavior:none;
}
#app{position:fixed;inset:0;overflow:hidden;background:#8fd077;}
#game{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none;z-index:0;}
.screen{
  position:absolute;inset:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:calc(10px + env(safe-area-inset-top)) 14px calc(12px + env(safe-area-inset-bottom));
}
.hidden{display:none !important;}
.panel{
  background:rgba(255,255,255,.92);
  border:5px solid #ffb63d;
  border-radius:32px;
  box-shadow:0 14px 34px rgba(30,40,80,.30);
  padding:18px 20px;
  width:min(94vw,700px);
  max-height:96%;
  display:flex;flex-direction:column;align-items:center;gap:12px;
  overflow:hidden;
}
.scrolly{overflow-y:auto;touch-action:pan-y;-webkit-overflow-scrolling:touch;width:100%;padding:6px 2px 10px;}
h1.logo{
  font-size:clamp(52px,13vw,96px);font-weight:900;color:#ff4d3a;letter-spacing:.04em;
  text-shadow:0 4px 0 #fff,0 8px 0 rgba(160,40,20,.25);
  animation:wobble 2.4s ease-in-out infinite;
}
@keyframes wobble{0%,100%{transform:rotate(-2deg) scale(1);}50%{transform:rotate(2deg) scale(1.04);}}
.sub{font-size:clamp(17px,4vw,24px);font-weight:700;color:#456;}
h2.head{font-size:clamp(24px,6vw,34px);font-weight:900;color:#2c5f9e;}
.btn{
  font-family:inherit;font-weight:900;color:#5b3600;
  font-size:clamp(22px,5vw,30px);
  padding:14px 40px;border:none;border-radius:999px;
  background:linear-gradient(#ffe066,#ffa62e);
  box-shadow:0 6px 0 #d97b00,0 12px 18px rgba(0,0,0,.22);
  cursor:pointer;touch-action:manipulation;
}
.btn:active{transform:translateY(5px);box-shadow:0 1px 0 #d97b00;}
.btn.big{font-size:clamp(28px,7vw,40px);padding:18px 56px;}
.btn.blue{background:linear-gradient(#9fd4ff,#3f8fe8);color:#fff;box-shadow:0 6px 0 #1d5ea8,0 12px 18px rgba(0,0,0,.22);}
.btn.blue:active{box-shadow:0 1px 0 #1d5ea8;}
.btn.small{font-size:clamp(16px,3.6vw,20px);padding:9px 22px;box-shadow:0 4px 0 #d97b00,0 8px 12px rgba(0,0,0,.18);}
.row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;align-items:center;}
.grid{
  display:grid;gap:12px;width:100%;
  grid-template-columns:repeat(auto-fill,minmax(136px,1fr));
}
.grid.courses{grid-template-columns:repeat(auto-fill,minmax(186px,1fr));}
.card{
  background:#fff;border:4px solid #dfe6f0;border-radius:22px;
  padding:8px 6px 10px;display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;transition:transform .12s;
}
.card:active{transform:scale(.95);}
.card.sel{border-color:#ff8a3d;background:#fff4dd;box-shadow:0 0 0 4px rgba(255,170,60,.35);}
.card canvas{width:100%;height:auto;display:block;}
.card .nm{font-size:clamp(12px,3vw,16px);font-weight:800;color:#334;white-space:nowrap;}
.card .bs{font-size:12px;font-weight:700;color:#e8842a;min-height:15px;}
#car-preview-wrap{display:flex;align-items:center;gap:14px;}
#car-preview{width:150px;height:170px;}
#car-preview-name{font-size:clamp(20px,5vw,30px);font-weight:900;color:#e8551e;}
#hud{
  position:absolute;top:0;left:0;right:0;z-index:5;
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:calc(10px + env(safe-area-inset-top)) 14px 0;
  pointer-events:none;
}
#hud .chip{
  background:rgba(255,255,255,.92);border-radius:999px;border:3px solid #ffb63d;
  padding:6px 20px;text-align:center;box-shadow:0 4px 10px rgba(0,0,0,.18);
}
#dist{font-size:clamp(26px,6vw,38px);font-weight:900;color:#2b4a75;line-height:1.05;}
#bestlab{font-size:clamp(12px,2.8vw,15px);font-weight:800;color:#e8842a;}
#btn-home{pointer-events:auto;}
#banner{
  position:absolute;top:34%;left:0;right:0;z-index:8;text-align:center;pointer-events:none;
  font-size:clamp(56px,14vw,110px);font-weight:900;color:#fff;
  text-shadow:0 0 0 #fff,0 4px 0 #e8842a,0 8px 0 rgba(120,50,0,.35),0 12px 24px rgba(0,0,0,.3);
}
#banner.pop{animation:pop .5s ease-out;}
@keyframes pop{0%{transform:scale(.2);opacity:0;}60%{transform:scale(1.15);}100%{transform:scale(1);opacity:1;}}
#screen-over .panel{border-color:#ff7d6e;background:rgba(255,250,244,.95);}
#jiko-word{
  font-size:clamp(64px,18vw,120px);font-weight:900;color:#ff4d3a;
  text-shadow:0 4px 0 #fff,0 9px 0 rgba(170,40,20,.3);
  animation:jikoswing 1s ease-in-out infinite;
}
@keyframes jikoswing{0%,100%{transform:rotate(-4deg) scale(1);}50%{transform:rotate(4deg) scale(1.08);}}
.result{font-size:clamp(22px,5.5vw,32px);font-weight:900;color:#345;}
#newrec{
  font-size:clamp(18px,4.6vw,26px);font-weight:900;color:#fff;background:linear-gradient(#ffd43b,#ff922b);
  padding:6px 24px;border-radius:999px;box-shadow:0 4px 10px rgba(0,0,0,.2);
  animation:wobble 1s ease-in-out infinite;
}
.stars-deco{display:flex;gap:10px;}
.stars-deco svg{width:34px;height:34px;animation:twinkle 1.2s ease-in-out infinite;}
.stars-deco svg:nth-child(2){animation-delay:.2s;width:44px;height:44px;}
.stars-deco svg:nth-child(3){animation-delay:.4s;}
@keyframes twinkle{0%,100%{transform:scale(1) rotate(-8deg);}50%{transform:scale(1.3) rotate(8deg);}}
.hint{font-size:clamp(13px,3.2vw,16px);font-weight:700;color:#789;}
</style>
</head>
<body>
<div id="app">
  <canvas id="game"></canvas>

  <div id="hud" class="hidden">
    <button class="btn small" id="btn-home">もどる</button>
    <div class="chip"><div id="dist">0m</div><div id="bestlab">べすと 0m</div></div>
    <div style="width:86px"></div>
  </div>

  <div id="banner" class="hidden"></div>

  <div id="screen-title" class="screen">
    <div class="panel">
      <h1 class="logo">じこアプリ</h1>
      <p class="sub">くるまを うんてんして じこに きをつけよう！</p>
      <canvas id="title-car" width="440" height="240" style="width:220px;height:120px;"></canvas>
      <button class="btn big" id="btn-start">すたーと</button>
      <p class="hint">ゆびで うごかして あそんでね</p>
    </div>
  </div>

  <div id="screen-cars" class="screen hidden">
    <div class="panel">
      <h2 class="head">くるまを えらんでね</h2>
      <div id="car-preview-wrap">
        <canvas id="car-preview" width="450" height="510"></canvas>
        <div id="car-preview-name"></div>
      </div>
      <div class="scrolly"><div class="grid" id="car-grid"></div></div>
      <div class="row">
        <button class="btn small blue" id="btn-cars-back">もどる</button>
        <button class="btn" id="btn-cars-next">つぎへ</button>
      </div>
    </div>
  </div>

  <div id="screen-courses" class="screen hidden">
    <div class="panel">
      <h2 class="head">コースを えらんでね</h2>
      <div class="scrolly"><div class="grid courses" id="course-grid"></div></div>
      <div class="row">
        <button class="btn small blue" id="btn-courses-back">もどる</button>
        <button class="btn big" id="btn-go">しゅっぱつ！</button>
      </div>
    </div>
  </div>

  <div id="screen-over" class="screen hidden">
    <div class="panel">
      <div class="stars-deco">
        <svg viewBox="0 0 24 24"><path fill="#ffd43b" stroke="#f59f00" stroke-width="1.2" d="M12 2l2.9 6.2 6.6.8-4.9 4.6 1.3 6.6L12 17l-5.9 3.2 1.3-6.6L2.5 9l6.6-.8z"/></svg>
        <svg viewBox="0 0 24 24"><path fill="#ffd43b" stroke="#f59f00" stroke-width="1.2" d="M12 2l2.9 6.2 6.6.8-4.9 4.6 1.3 6.6L12 17l-5.9 3.2 1.3-6.6L2.5 9l6.6-.8z"/></svg>
        <svg viewBox="0 0 24 24"><path fill="#ffd43b" stroke="#f59f00" stroke-width="1.2" d="M12 2l2.9 6.2 6.6.8-4.9 4.6 1.3 6.6L12 17l-5.9 3.2 1.3-6.6L2.5 9l6.6-.8z"/></svg>
      </div>
      <div id="jiko-word">じこ！</div>
      <div class="result" id="res-dist">0m はしったよ</div>
      <div class="result" id="res-best" style="font-size:clamp(16px,4vw,22px);color:#889;">べすと 0m</div>
      <div id="newrec" class="hidden">しんきろく！</div>
      <button class="btn big" id="btn-retry">もういちど</button>
      <button class="btn small blue" id="btn-change">くるまを かえる</button>
    </div>
  </div>
</div>

<script>
'use strict';
/* ============================== utils ============================== */
const $=s=>document.querySelector(s);
const clamp=(v,a,b)=>v<a?a:(v>b?b:v);
const lerp=(a,b,t)=>a+(b-a)*t;
const rand=(a,b)=>a+Math.random()*(b-a);
const TAU=Math.PI*2;
function shade(col,amt){ // col '#rrggbb', amt -1..1
  const n=parseInt(col.slice(1),16);
  const f=v=>clamp(Math.round(v+amt*255),0,255);
  return 'rgb('+f(n>>16&255)+','+f(n>>8&255)+','+f(n&255)+')';
}
function rr(c,x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  c.beginPath();
  c.moveTo(x+r,y);
  c.arcTo(x+w,y,x+w,y+h,r);
  c.arcTo(x+w,y+h,x,y+h,r);
  c.arcTo(x,y+h,x,y,r);
  c.arcTo(x,y,x+w,y,r);
  c.closePath();
}
function lsGet(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}

/* ============================== audio ============================== */
let AC=null,master=null,engine=null;
function initAudio(){
  try{
    if(!AC){
      AC=new (window.AudioContext||window.webkitAudioContext)();
      master=AC.createGain();master.gain.value=.5;master.connect(AC.destination);
    }
    if(AC.state==='suspended')AC.resume();
    if(state==='play'&&!engine)startEngine();
  }catch(e){}
}
function blip(f0,f1,dur,type,vol,when){
  if(!AC)return;
  try{
    const t=AC.currentTime+(when||0);
    const o=AC.createOscillator(),g=AC.createGain();
    o.type=type;o.frequency.setValueAtTime(f0,t);
    o.frequency.exponentialRampToValueAtTime(Math.max(30,f1),t+dur);
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(.001,t+dur);
    o.connect(g);g.connect(master);o.start(t);o.stop(t+dur+.05);
  }catch(e){}
}
function sndSelect(){blip(620,980,.1,'square',.1);}
function sndTap(){blip(420,560,.08,'sine',.12);}
function sndPoyon(){ // soft bouncy crash
  if(!AC)return;
  try{
    const t=AC.currentTime;
    const o=AC.createOscillator(),g=AC.createGain();
    o.type='sine';
    o.frequency.setValueAtTime(520,t);
    o.frequency.exponentialRampToValueAtTime(130,t+.22);
    o.frequency.exponentialRampToValueAtTime(330,t+.32);
    o.frequency.exponentialRampToValueAtTime(90,t+.55);
    g.gain.setValueAtTime(.3,t);
    g.gain.exponentialRampToValueAtTime(.002,t+.6);
    o.connect(g);g.connect(master);o.start(t);o.stop(t+.7);
    blip(200,60,.35,'triangle',.16,.02);
  }catch(e){}
}
function sndFanfare(){
  [523,659,784,1047].forEach((f,i)=>blip(f,f,.16,'triangle',.14,i*.11));
}
function sndCount(hi){blip(hi?880:440,hi?880:440,.14,'sine',.14);}
function startEngine(){
  if(!AC||engine)return;
  try{
    const o1=AC.createOscillator(),o2=AC.createOscillator();
    const g=AC.createGain(),f=AC.createBiquadFilter();
    o1.type='sawtooth';o2.type='sawtooth';
    o1.frequency.value=55;o2.frequency.value=84;o2.detune.value=8;
    f.type='lowpass';f.frequency.value=260;
    g.gain.value=0;
    o1.connect(f);o2.connect(f);f.connect(g);g.connect(master);
    o1.start();o2.start();
    g.gain.linearRampToValueAtTime(.055,AC.currentTime+.4);
    engine={o1,o2,g};
  }catch(e){}
}
function stopEngine(){
  if(!engine)return;
  try{
    const e=engine;engine=null;
    e.g.gain.linearRampToValueAtTime(0,AC.currentTime+.25);
    setTimeout(()=>{try{e.o1.stop();e.o2.stop();}catch(x){}},400);
  }catch(e){engine=null;}
}
function updateEngine(speed){
  if(!engine||!AC)return;
  try{
    const f=40+speed*.17;
    engine.o1.frequency.setTargetAtTime(f,AC.currentTime,.08);
    engine.o2.frequency.setTargetAtTime(f*1.53+4,AC.currentTime,.08);
  }catch(e){}
}

/* ============================== car drawing ============================== */
const CARS=[
  {id:'sports',name:'すぽーつかー',w:58,l:104,color:'#e6402a',arch:'sedan',sporty:true},
  {id:'police',name:'ぱとかー',w:56,l:104,color:'#f4f6f9',arch:'sedan',police:true},
  {id:'fire',name:'しょうぼうしゃ',w:64,l:188,color:'#e02c1e',arch:'fire'},
  {id:'amb',name:'きゅうきゅうしゃ',w:62,l:142,color:'#f7f9fc',arch:'van'},
  {id:'bus',name:'ばす',w:66,l:196,color:'#f5a623',arch:'bus'},
  {id:'taxi',name:'たくしー',w:56,l:104,color:'#ffd23f',arch:'sedan',taxi:true},
  {id:'truck',name:'とらっく',w:62,l:176,color:'#3069d6',arch:'truck'},
  {id:'blue',name:'あおい くるま',w:56,l:104,color:'#3178dd',arch:'sedan'},
  {id:'wagon',name:'みどりの わごん',w:56,l:112,color:'#3faf62',arch:'sedan',wagon:true},
  {id:'pink',name:'ぴんくの くるま',w:54,l:100,color:'#f27db0',arch:'sedan',cute:true},
];
function carShadow(c,w,l){
  c.save();
  c.fillStyle='rgba(10,20,30,.30)';
  c.beginPath();c.ellipse(2,l*.035,w*.60,l*.535,0,0,TAU);c.fill();
  c.restore();
}
function wheel(c,x,y,ww,wl){
  rr(c,x-ww/2,y-wl/2,ww,wl,ww*.38);c.fillStyle='#15161c';c.fill();
  rr(c,x-ww*.2,y-wl*.3,ww*.4,wl*.6,ww*.16);c.fillStyle='#41444f';c.fill();
}
function carBodyPath(c,w,l,nose,tail){
  const hw=w/2,hl=l/2;
  c.beginPath();
  c.moveTo(-hw*nose,-hl);
  c.quadraticCurveTo(-hw*1.03,-hl+l*.03,-hw,-hl*.5);
  c.lineTo(-hw,hl*.55);
  c.quadraticCurveTo(-hw*1.03,hl,-hw*tail,hl);
  c.lineTo(hw*tail,hl);
  c.quadraticCurveTo(hw*1.03,hl,hw,hl*.55);
  c.lineTo(hw,-hl*.5);
  c.quadraticCurveTo(hw*1.03,-hl+l*.03,hw*nose,-hl);
  c.closePath();
}
function bodyGrad(c,w,col){
  const g=c.createLinearGradient(-w/2,0,w/2,0);
  g.addColorStop(0,shade(col,-.28));
  g.addColorStop(.22,shade(col,.10));
  g.addColorStop(.45,shade(col,.24));
  g.addColorStop(.62,shade(col,.04));
  g.addColorStop(1,shade(col,-.32));
  return g;
}
function glassPanel(c,x,y,w,h,r){
  rr(c,x,y,w,h,r);
  const g=c.createLinearGradient(0,y,0,y+h);
  g.addColorStop(0,'#d6edfd');g.addColorStop(.4,'#7fb6dd');g.addColorStop(1,'#31506e');
  c.fillStyle=g;c.fill();
  c.save();c.clip();
  c.fillStyle='rgba(255,255,255,.4)';
  c.beginPath();
  c.moveTo(x+w*.12,y+h);c.lineTo(x+w*.5,y);c.lineTo(x+w*.68,y);c.lineTo(x+w*.30,y+h);
  c.closePath();c.fill();
  c.restore();
  rr(c,x,y,w,h,r);c.strokeStyle='rgba(15,35,55,.4)';c.lineWidth=1.2;c.stroke();
}
function headlight(c,x,y,w,h){
  rr(c,x,y,w,h,h*.45);
  const g=c.createLinearGradient(0,y,0,y+h);
  g.addColorStop(0,'#ffffff');g.addColorStop(1,'#ffd977');
  c.fillStyle=g;c.fill();
  c.strokeStyle='rgba(90,70,10,.35)';c.lineWidth=1;c.stroke();
}
function taillight(c,x,y,w,h){
  rr(c,x,y,w,h,h*.45);c.fillStyle='#d92c2c';c.fill();
  rr(c,x+1,y+1,w-2,(h-2)*.45,h*.2);c.fillStyle='rgba(255,150,150,.9)';c.fill();
}
function mirrors(c,w,y,col){
  [-1,1].forEach(s=>{
    rr(c,s>0?w/2-1:-w/2-w*.14+1,y,w*.14,w*.09,3);
    c.fillStyle=shade(col,-.2);c.fill();
    c.strokeStyle='rgba(0,0,0,.3)';c.lineWidth=1;c.stroke();
  });
}
function lightbar(c,y,w,h){
  rr(c,-w/2-2,y-1,w+4,h+2,3);c.fillStyle='#c8cdd6';c.fill();
  rr(c,-w/2,y,w,h,3);
  const g=c.createLinearGradient(0,y,0,y+h);
  g.addColorStop(0,'#ff7a6a');g.addColorStop(.5,'#e01414');g.addColorStop(1,'#a80808');
  c.fillStyle=g;c.fill();
  c.fillStyle='rgba(255,255,255,.55)';
  rr(c,-w/2+2,y+1,w-4,h*.3,2);c.fill();
}
function drawSedan(c,s){
  const w=s.w,l=s.l,hw=w/2,hl=l/2,col=s.color;
  carShadow(c,w,l);
  wheel(c,-hw*.94,-l*.29,w*.17,l*.16);wheel(c,hw*.94,-l*.29,w*.17,l*.16);
  wheel(c,-hw*.94,l*.30,w*.17,l*.16);wheel(c,hw*.94,l*.30,w*.17,l*.16);
  carBodyPath(c,w,l,s.sporty?.5:.62,s.sporty?.8:.76);
  c.fillStyle=bodyGrad(c,w,col);c.fill();
  c.strokeStyle=shade(col,-.5);c.lineWidth=1.6;c.stroke();
  // hood contour lines
  c.save();carBodyPath(c,w,l,s.sporty?.5:.62,s.sporty?.8:.76);c.clip();
  c.strokeStyle='rgba(0,0,0,.14)';c.lineWidth=1.4;
  [-1,1].forEach(sd=>{
    c.beginPath();c.moveTo(sd*w*.24,-hl+5);c.quadraticCurveTo(sd*w*.30,-l*.30,sd*w*.30,-l*.17);c.stroke();
  });
  c.beginPath();c.moveTo(-w*.34,hl-l*.075);c.lineTo(w*.34,hl-l*.075);c.stroke();
  if(s.sporty){ // racing stripes
    c.fillStyle='rgba(255,255,255,.88)';
    c.fillRect(-w*.115,-hl+2,w*.075,l-4);
    c.fillRect(w*.04,-hl+2,w*.075,l-4);
  }
  if(s.police){ // black nose band + side skirts
    c.fillStyle='#22252b';
    c.fillRect(-hw,-hl,w,l*.055);
    c.fillRect(-hw,-hl,w*.10,l);
    c.fillRect(hw-w*.10,-hl,w*.10,l);
    c.fillRect(-hw,hl-l*.045,w,l*.045);
  }
  if(s.taxi){ // teal side stripe
    c.fillStyle='rgba(20,120,110,.75)';
    c.fillRect(-hw,-l*.05,w*.075,l*.42);
    c.fillRect(hw-w*.075,-l*.05,w*.075,l*.42);
  }
  c.restore();
  // glass canopy
  const gy=s.sporty?-l*.14:-l*.18;
  const gh=s.wagon?l*.52:(s.sporty?l*.36:l*.42);
  glassPanel(c,-w*.43,gy,w*.86,gh,w*.2);
  // roof
  const ry=gy+gh*.30,rh=s.wagon?gh*.55:gh*.44;
  rr(c,-w*.35,ry,w*.70,rh,w*.13);
  const rg=c.createLinearGradient(-w*.35,0,w*.35,0);
  rg.addColorStop(0,shade(col,-.1));rg.addColorStop(.45,shade(col,.28));rg.addColorStop(1,shade(col,-.16));
  c.fillStyle=rg;c.fill();
  c.strokeStyle='rgba(0,0,0,.22)';c.lineWidth=1.2;c.stroke();
  if(s.wagon){ // roof rails
    c.strokeStyle='rgba(0,0,0,.4)';c.lineWidth=2;

const SPRITES={};
function makeSprite(spec){
  const pad=18,S=3;
  const cv=document.createElement('canvas');
  cv.width=(spec.w+pad*2)*S;cv.height=(spec.l+pad*2)*S;
  const c=cv.getContext('2d');
  c.setTransform(S,0,0,S,(spec.w/2+pad)*S,(spec.l/2+pad)*S);
  drawCarTop(c,spec);
  cv.pw=spec.w+pad*2;cv.pl=spec.l+pad*2;
  return cv;
}
CARS.forEach(s=>SPRITES[s.id]=makeSprite(s));
function drawSprite(c,sp,x,y,rot,scale){
  c.save();c.translate(x,y);

  c.scale(scale,scale);

  c.restore();
}

function laneFractions(co){
  if(co.twoway||co.lanes===4)return[-.7,-.25,.25,.7];
  return[-.62,0,.62];
}
function laneSeparators(co){
  if(co.twoway)return[-.5,.5];
  if(co.lanes===4)return[-.5,0,.5];
  return[-.31,.31];
}

/* ============================== state / world ============================== */
const canvas=$('#game'),ctx=canvas.getContext('2d');
let W=0,H=0,DPR=1,PY=0,roadHalf=200,CS=1;
let state='title'; // title|cars|courses|ready|play|crash|over
let course=COURSES[0];
let selCar=CARS[0];
let bests={};
try{bests=JSON.parse(lsGet('jikoBest')||'{}')||{};}catch(e){bests={};}
const world={
  dist:0,speed:0,carX:0,tilt:0,readyT:0,crashT:0,
  obstacles:[],deco:[],particles:[],
  nextObsZ:0,nextDecoZ:0,exhaustT:0,demoT:0
};
Object.defineProperty(window,'__state',{get:()=>state});
Object.defineProperty(window,'__meters',{get:()=>meters()});
function meters(){return Math.floor(world.dist/14);}
function resize(){
  // remember the car position relative to the road before dimensions change
  let rel=0;
  const had=W>0&&roadHalf>0;
  if(had)rel=clamp((world.carX-roadCenterAt(world.dist))/roadHalf,-1.2,1.2);
  DPR=Math.min(window.devicePixelRatio||1,3);
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=Math.round(W*DPR);canvas.height=Math.round(H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
  PY=H*.76;
  computeRoad();
  if(had&&isFinite(rel))world.carX=roadCenterAt(world.dist)+rel*roadHalf;
}
function computeRoad(){
  roadHalf=clamp(W*.31,130,285)*(course.roadW||1);
  roadHalf=Math.min(roadHalf,W*.42);
  CS=clamp(roadHalf/205,.55,1.4);
}
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',()=>setTimeout(resize,120));
function roadCenterAt(z){
  const maxA=Math.max(0,(W/2-roadHalf-44)/1.7);
  const a=maxA*course.curve;
  const f=.0016*(course.curveFreq||1);
  return W/2+Math.sin(z*f)*a+Math.sin(z*f*.43+1.7)*a*.7;
}
function speedMul(){return 1+clamp(meters()/1000,0,1)*.45;}

function resetWorld(demo){
  world.dist=0;world.speed=0;world.readyT=0;world.crashT=0;world.tilt=0;
  world.obstacles=[];world.deco=[];world.particles=[];
  world.carX=roadCenterAt(0)+(course.twoway?-roadHalf*.47:0);
  world.nextObsZ=PY+520;
  world.nextDecoZ=0;
  world.exhaustT=0;
  // prefill scenery
  while(world.nextDecoZ<PY+300)spawnDeco();
}
function pickWeighted(list){
  let tot=0;list.forEach(e=>tot+=e[1]);
  let r=Math.random()*tot;
  for(const e of list){if((r-=e[1])<=0)return e[0];}
  return list[0][0];
}
function spawnDeco(){
  const z=world.nextDecoZ;
  const type=pickWeighted(course.deco);
  let side=Math.random()<.5?-1:1;
  let off=rand(34,110);
  if(type==='building'||type==='nbuilding')off=rand(55,130);
  if(type==='boat'){side=-1;off=rand(160,310);}
  if(type==='parasol'){side=-1;off=rand(40,74);}
  if(course.sea&&side<0&&(type==='palm'||type==='bush'))side=1;
  world.deco.push({z,side,off,type,seed:Math.floor(Math.random()*997)});
  world.nextDecoZ=z+rand(120,260);
}
function spawnObstacle(){
  const z=world.nextObsZ;
  const type=pickWeighted(course.obs);
  const lanes=laneFractions(course);
  const lane=lanes[Math.floor(Math.random()*lanes.length)];
  const o={z,lane,type,sp:0,dir:1};
  if(type==='car'){
    o.spec=CARS[Math.floor(Math.random()*CARS.length)];
    const base=course.base*speedMul();
    if(course.twoway&&lane>.1){o.dir=-1;o.sp=-base*rand(.45,.6);}
    else{o.dir=1;o.sp=base*rand(.3,.45);}
  }
  world.obstacles.push(o);
  const g=course.gap*(1-.25*clamp(meters()/800,0,1));
  world.nextObsZ=z+g*rand(.8,1.35);
}
function obstacleDims(o){
  if(o.type==='car')return{w:o.spec.w*CS,l:o.spec.l*CS};
  if(o.type==='ball')return{w:44*CS,l:44*CS};
  if(o.type==='rockobs')return{w:48*CS,l:36*CS};
  if(o.type==='snowpile')return{w:52*CS,l:34*CS};
  return{w:40*CS,l:40*CS};
}

/* particles */
function spawnCrashFx(x,y){
  for(let i=0;i<12;i++){
    const a=rand(0,TAU),v=rand(90,300);
    world.particles.push({kind:'star',x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-60,
      rot:rand(0,TAU),vr:rand(-7,7),size:rand(9,20),life:rand(.7,1.2),t:0});
  }
  for(let i=0;i<10;i++){
    const a=rand(0,TAU),v=rand(20,90);
    world.particles.push({kind:'smoke',x:x+rand(-16,16),y:y+rand(-20,20),
      vx:Math.cos(a)*v,vy:Math.sin(a)*v-30,size:rand(10,22),life:rand(.8,1.4),t:0});
  }
}
function starPath(c,r){
  c.beginPath();
  for(let i=0;i<10;i++){
    const a=-Math.PI/2+i*Math.PI/5,rad=i%2?r*.45:r;
    const x=Math.cos(a)*rad,y=Math.sin(a)*rad;
    i?c.lineTo(x,y):c.moveTo(x,y);
  }
  c.closePath();
}

/* ============================== update ============================== */
let keys={left:false,right:false};
const pointers=new Map();
let bannerTimer=0;
function showBanner(txt,dur){
  const b=$('#banner');
  b.textContent=txt;b.classList.remove('hidden','pop');
  void b.offsetWidth;b.classList.add('pop');
  clearTimeout(bannerTimer);
  if(dur)bannerTimer=setTimeout(()=>b.classList.add('hidden'),dur);
}
function playerDims(){return{w:selCar.w*CS,l:selCar.l*CS};}

function update(dt,t){
  const active=(state==='title'||state==='cars'||state==='courses'||state==='ready'||state==='play'||state==='crash');
  if(!active){updateParticles(dt);return;}
  const demo=(state==='title'||state==='cars'||state==='courses');
  // target speed
  let target=0;
  if(demo)target=course.base*.75;
  else if(state==='play')target=course.base*speedMul();
  else if(state==='ready')target=0;
  else if(state==='crash')target=0;
  world.speed=lerp(world.speed,target,Math.min(1,dt*(state==='crash'?6:1.8)));
  world.dist+=world.speed*dt;
  updateEngine(world.speed);

  // ready countdown
  if(state==='ready'){
    const pr=world.readyT;
    world.readyT+=dt;
    if(pr<.05&&world.readyT>=.05){showBanner('よーい…');sndCount(false);}
    if(pr<.9&&world.readyT>=.9){showBanner('すたーと！',900);sndCount(true);sndFanfare();}
    if(world.readyT>=1.6){state='play';startEngine();}
  }
  // steering
  const pd=playerDims();
  const prevX=world.carX;
  if(state==='play'||state==='ready'){
    let drag=null,steer=0;
    pointers.forEach(p=>{
      if(p.drag)drag=p.x;
      else steer=p.x<W/2?-1:1;
    });
    if(keys.left)steer=-1;
    if(keys.right)steer=1;
    if(drag!==null){
      world.carX+=(drag-world.carX)*Math.min(1,dt*9);
    }else if(steer){
      world.carX+=steer*W*.42*dt;
    }
  }else if(demo){
    world.demoT+=dt;
    const dofs=course.twoway?-roadHalf*.47:0;
    const tx=roadCenterAt(world.dist+160)+dofs+Math.sin(world.demoT*.5)*roadHalf*.2;
    world.carX+=(tx-world.carX)*Math.min(1,dt*2);
  }
  world.carX=clamp(world.carX,pd.w*.4,W-pd.w*.4);
  const vx=(world.carX-prevX)/Math.max(dt,.001);
  world.tilt=lerp(world.tilt,clamp(vx/1400,-.18,.18),Math.min(1,dt*10));

  // scenery
  while(world.nextDecoZ<world.dist+PY+320)spawnDeco();
  world.deco=world.deco.filter(d=>d.z>world.dist-260);
  // obstacles
  if(state==='play'){
    while(world.nextObsZ<world.dist+PY+380)spawnObstacle();
  }
  world.obstacles.forEach(o=>{o.z+=o.sp*dt;});
  world.obstacles=world.obstacles.filter(o=>o.z>world.dist-420&&o.z<world.dist+PY+900);

  if(state==='play'){
    // collisions
    const px=world.carX,py=PY;
    for(const o of world.obstacles){
      const oy=PY-(o.z-world.dist);
      if(oy<-80||oy>H+80)continue;
      const ox=roadCenterAt(o.z)+o.lane*roadHalf;
      const od=obstacleDims(o);
      const lax=(pd.w+od.w)*.5*.58,lay=(pd.l+od.l)*.5*.58;
      if(Math.abs(px-ox)<lax&&Math.abs(py-oy)<lay){doCrash();break;}
    }
    // off road
    if(state==='play'){
      const dx=Math.abs(world.carX-roadCenterAt(world.dist));
      if(dx>roadHalf+pd.w*.08)doCrash();
    }
    // exhaust
    world.exhaustT-=dt;
    if(world.exhaustT<=0){
      world.exhaustT=.13;
      world.particles.push({kind:'puff',x:world.carX+rand(-6,6)-pd.w*.2,y:PY+pd.l*.55,
        vx:rand(-8,8),vy:world.speed*.4+20,size:rand(3,6),life:.7,t:0});
    }
  }
  if(state==='crash'){
    world.crashT+=dt;
    if(world.crashT>1.15)showOver();
  }
  updateParticles(dt);
}
function updateParticles(dt){
  world.particles.forEach(p=>{
    p.t+=dt;
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    if(p.kind==='star'){p.vy+=140*dt;p.rot+=p.vr*dt;}
    if(p.kind==='smoke'){p.size+=26*dt;p.vx*=(1-dt);p.vy*=(1-dt);}
    if(p.kind==='puff'){p.size+=14*dt;}
  });
  world.particles=world.particles.filter(p=>p.t<p.life);
}
function doCrash(){
  if(state!=='play')return;
  state='crash';world.crashT=0;
  stopEngine();
  sndPoyon();
  spawnCrashFx(world.carX,PY);
}

/* ============================== render ============================== */
function buildEdgePts(){
  const pts=[];
  for(let y=-30;y<=H+40;y+=16){
    pts.push([y,roadCenterAt(world.dist+(PY-y))]);
  }
  return pts;
}
function sideFill(pts,off,side,color){
  ctx.beginPath();
  pts.forEach((p,i)=>{
    const x=p[1]+side*off;
    i?ctx.lineTo(x,p[0]):ctx.moveTo(x,p[0]);
  });
  const ex=side>0?W+60:-60;
  ctx.lineTo(ex,pts[pts.length-1][0]);
  ctx.lineTo(ex,pts[0][0]);
  ctx.closePath();ctx.fillStyle=color;ctx.fill();
}
function strokeOffset(pts,off,style,lw,dash,dashOff){
  ctx.beginPath();
  pts.forEach((p,i)=>{
    const x=p[1]+off;
    i?ctx.lineTo(x,p[0]):ctx.moveTo(x,p[0]);
  });
  ctx.strokeStyle=style;ctx.lineWidth=lw;
  ctx.setLineDash(dash||[]);
  ctx.lineDashOffset=dashOff||0;
  ctx.stroke();
  ctx.setLineDash([]);
}
function render(t){
  ctx.clearRect(0,0,W,H);
  const pts=buildEdgePts();
  // ground
  ctx.fillStyle=course.ground;
  ctx.fillRect(0,0,W,H);
  if(course.sidewalk){
    sideFill(pts,roadHalf,-1,course.sidewalk);
    sideFill(pts,roadHalf,1,course.sidewalk);
    sideFill(pts,roadHalf+30,-1,course.ground);
    sideFill(pts,roadHalf+30,1,course.ground);
  }
  if(course.sea){
    sideFill(pts,roadHalf+18,-1,'#f0dda2');
    sideFill(pts,roadHalf+86,-1,'#3fa7d6');
    // waves
    ctx.strokeStyle='rgba(255,255,255,.55)';ctx.lineWidth=2.5;ctx.lineCap='round';
    for(let i=0;i<9;i++){
      const wz=Math.floor((world.dist+i*173)/173)*173+i*61;
      const y=PY-(wz-world.dist)%1600;
      const yy=((y%(H+120))+(H+120))%(H+120)-60;
      const cx=roadCenterAt(world.dist+(PY-yy));
      const xx=cx-roadHalf-110-(i%4)*46;
      if(xx>20){
        ctx.beginPath();ctx.moveTo(xx-16,yy);ctx.quadraticCurveTo(xx-8,yy-5,xx,yy);
        ctx.quadraticCurveTo(xx+8,yy+5,xx+16,yy);ctx.stroke();
      }
    }
  }
  // road
  ctx.beginPath();
  pts.forEach((p,i)=>{const x=p[1]-roadHalf;i?ctx.lineTo(x,p[0]):ctx.moveTo(x,p[0]);});
  for(let i=pts.length-1;i>=0;i--){ctx.lineTo(pts[i][1]+roadHalf,pts[i][0]);}
  ctx.closePath();ctx.fillStyle=course.road;ctx.fill();
  if(course.snow){ // snow patches on road
    ctx.fillStyle='rgba(255,255,255,.35)';
    for(let i=0;i<7;i++){
      const pz=Math.floor((world.dist+i*257)/900)*900+i*197;
      const y=PY-(pz-world.dist);
      if(y>-60&&y<H+60){
        const cx=roadCenterAt(pz);
        ctx.beginPath();ctx.ellipse(cx+((i*73)%120)-60,y,34,14,0,0,TAU);ctx.fill();
      }
    }
  }
  // edge lines
  strokeOffset(pts,-(roadHalf-7),course.edge,4);
  strokeOffset(pts,roadHalf-7,course.edge,4);
  // lane dashes
  const seps=laneSeparators(course);
  seps.forEach(f=>{
    strokeOffset(pts,f*roadHalf,'rgba(255,255,255,.85)',4,[26,34],world.dist%60);
  });
  if(course.twoway){ // center line orange
    strokeOffset(pts,0,'rgba(255,180,60,.9)',4);
  }
  if(course.rail){
    [-1,1].forEach(s=>{
      strokeOffset(pts,s*(roadHalf+15),'#b3bac6',3.5);
      strokeOffset(pts,s*(roadHalf+15),'#8f97a5',8,[5,30],world.dist%35);
    });
  }
  // scenery (far first)
  const decoSorted=world.deco.slice().sort((a,b)=>b.z-a.z);
  for(const d of decoSorted){
    const y=PY-(d.z-world.dist);
    if(y<-140||y>H+140)continue;
    const x=roadCenterAt(d.z)+d.side*(roadHalf+d.off);
    if(x<-140||x>W+140)continue;
    if(d.type==='signal')drawSignal(ctx,x,y,CS,d.seed,t);
    else if(d.type==='streetlight')drawStreetlight(ctx,x,y,CS,d.side);
    else DECO_DRAW[d.type](ctx,x,y,CS,d.seed);
  }
  // obstacles
  const obsSorted=world.obstacles.slice().sort((a,b)=>b.z-a.z);
  for(const o of obsSorted){
    const y=PY-(o.z-world.dist);
    if(y<-160||y>H+160)continue;
    const x=roadCenterAt(o.z)+o.lane*roadHalf;
    if(o.type==='car')drawSprite(ctx,SPRITES[o.spec.id],x,y,o.dir<0?Math.PI:0,CS);
    else if(o.type==='ball')drawBall(ctx,x,y,CS);
    else if(o.type==='rockobs')drawRockCluster(ctx,x,y,CS);
    else if(o.type==='snowpile')drawSnowPile(ctx,x,y,CS);
    else drawCone(ctx,x,y,CS);
  }
  // puffs under car
  for(const p of world.particles){
    if(p.kind!=='puff')continue;
    ctx.fillStyle='rgba(190,195,205,'+(0.5*(1-p.t/p.life)).toFixed(3)+')';
    ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,TAU);ctx.fill();
  }
  // player car
  const pd=playerDims();
  let rot=world.tilt,sc=CS,oy=0;
  if(state==='crash'){
    const k=world.crashT;
    rot=Math.sin(k*26)*.32*Math.max(0,1-k);
    sc=CS*(1+Math.sin(k*18)*.1*Math.max(0,1-k));
    oy=-Math.abs(Math.sin(k*12))*14*Math.max(0,1-k);
  }
  drawSprite(ctx,SPRITES[selCar.id],world.carX,PY+oy,rot,sc);
  // speed lines
  if(state==='play'&&world.speed>course.base*1.12){
    ctx.strokeStyle='rgba(255,255,255,.28)';ctx.lineWidth=3;ctx.lineCap='round';
    for(let i=0;i<6;i++){
      const yy=((t*world.speed*1.4+i*197)%(H+160))-80;
      const xx=i<3?18+i*14:W-18-(i-3)*14;
      ctx.beginPath();ctx.moveTo(xx,yy);ctx.lineTo(xx,yy+60+i*10);ctx.stroke();
    }
  }
  // night lighting
  if(course.night){
    ctx.fillStyle='rgba(8,10,38,.38)';
    ctx.fillRect(0,0,W,H);
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    // player headlight cones
    if(state!=='over'){
      const hy=PY-pd.l*.5;
      [-1,1].forEach(s=>{
        const hx=world.carX+s*pd.w*.28;
        const g=ctx.createLinearGradient(0,hy,0,hy-250);
        g.addColorStop(0,'rgba(255,240,180,.30)');g.addColorStop(1,'rgba(255,240,180,0)');
        ctx.fillStyle=g;
        ctx.beginPath();
        ctx.moveTo(hx-6,hy);ctx.lineTo(hx+6,hy);
        ctx.lineTo(hx+s*10+30,hy-250);ctx.lineTo(hx+s*10-30,hy-250);
        ctx.closePath();ctx.fill();
      });
    }
    // vehicle light glows
    for(const o of world.obstacles){
      if(o.type!=='car')continue;
      const y=PY-(o.z-world.dist);
      if(y<-120||y>H+120)continue;
      const x=roadCenterAt(o.z)+o.lane*roadHalf;
      const od=obstacleDims(o);
      const fy=y+(o.dir<0?-1:1)*od.l*.5*-1; // front for dir=1 is up; oncoming front is down
      const gy=o.dir<0?y+od.l*.5:y-od.l*.5;
      const col=o.dir<0?'255,235,170':'255,90,80';
      const g=ctx.createRadialGradient(x,gy,4,x,gy,o.dir<0?68:36);
      g.addColorStop(0,'rgba('+col+',.5)');g.addColorStop(1,'rgba('+col+',0)');
      ctx.fillStyle=g;
      ctx.beginPath();ctx.arc(x,gy,o.dir<0?68:36,0,TAU);ctx.fill();
    }
    // streetlight pools
    for(const d of world.deco){
      if(d.type!=='streetlight')continue;
      const y=PY-(d.z-world.dist);
      if(y<-100||y>H+100)continue;
      const x=roadCenterAt(d.z)+d.side*(roadHalf+d.off)-d.side*20*CS;
      const g=ctx.createRadialGradient(x,y,6,x,y,80);
      g.addColorStop(0,'rgba(255,225,140,.4)');g.addColorStop(1,'rgba(255,225,140,0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,80,0,TAU);ctx.fill();
    }
    ctx.restore();
  }
  // crash particles on top
  for(const p of world.particles){
    const a=1-p.t/p.life;
    if(p.kind==='smoke'){
      ctx.fillStyle='rgba(225,228,235,'+(0.7*a).toFixed(3)+')';
      ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,TAU);ctx.fill();
    }else if(p.kind==='star'){
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
      ctx.globalAlpha=Math.min(1,a*1.6);
      starPath(ctx,p.size);
      ctx.fillStyle='#ffd43b';ctx.fill();
      ctx.strokeStyle='#f59f00';ctx.lineWidth=1.6;ctx.stroke();
      ctx.restore();ctx.globalAlpha=1;
    }
  }
  if(state==='crash'&&world.crashT<.25){
    ctx.fillStyle='rgba(255,255,255,'+(0.5*(1-world.crashT/.25)).toFixed(3)+')';
    ctx.fillRect(0,0,W,H);
  }
  // HUD text
  if(state==='play'||state==='crash'){
    $('#dist').textContent=meters()+'m';
  }
}

/* ============================== screens / flow ============================== */
const SCREENS=['screen-title','screen-cars','screen-courses','screen-over'];
function showScreen(id){
  SCREENS.forEach(s=>$('#'+s).classList.toggle('hidden',s!==id));
  $('#hud').classList.toggle('hidden',!(id===null));
  if(id!==null)$('#banner').classList.add('hidden');
}
function setState(s){
  state=s;
  pointers.clear();keys.left=false;keys.right=false;
  if(s==='title')showScreen('screen-title');
  else if(s==='cars')showScreen('screen-cars');
  else if(s==='courses')showScreen('screen-courses');
  else if(s==='over')showScreen('screen-over');
  else showScreen(null);
  if(s!=='play'&&s!=='ready')stopEngine();
}
function bestFor(id){return bests[id]|0;}
function startGame(){
  computeRoad();
  resetWorld(false);
  $('#dist').textContent='0m';
  $('#bestlab').textContent='べすと '+bestFor(course.id)+'m';
  setState('ready');
}
function showOver(){
  const m=meters();
  const prev=bestFor(course.id);
  const isNew=m>prev;
  if(isNew){bests[course.id]=m;lsSet('jikoBest',JSON.stringify(bests));}
  $('#res-dist').textContent=m+'m はしったよ';
  $('#res-best').textContent='べすと '+bestFor(course.id)+'m';
  $('#newrec').classList.toggle('hidden',!isNew);
  if(isNew)setTimeout(sndFanfare,350);
  setState('over');
  refreshCourseBests();
}

/* car select UI */
function buildCarGrid(){
  const grid=$('#car-grid');
  CARS.forEach(spec=>{
    const card=document.createElement('div');
    card.className='card';card.dataset.car=spec.id;
    const cv=document.createElement('canvas');
    cv.width=260;cv.height=240;
    const c=cv.getContext('2d');
    const sp=SPRITES[spec.id];
    const sc=Math.min(200/sp.pl,180/sp.pw)*1.0;
    c.setTransform(1,0,0,1,130,120);
    c.scale(sc,sc);
    c.drawImage(sp,-sp.pw/2,-sp.pl/2,sp.pw,sp.pl);
    const nm=document.createElement('div');
    nm.className='nm';nm.textContent=spec.name;
    card.appendChild(cv);card.appendChild(nm);
    card.addEventListener('click',()=>{initAudio();selectCar(spec.id);sndSelect();});
    grid.appendChild(card);
  });
}
function selectCar(id){
  selCar=CARS.find(c=>c.id===id)||CARS[0];
  lsSet('jikoSelCar',id);
  document.querySelectorAll('#car-grid .card').forEach(el=>{
    el.classList.toggle('sel',el.dataset.car===id);
  });
  drawCarPreview();
  drawTitleCar();
}
function drawCarPreview(){
  const cv=$('#car-preview'),c=cv.getContext('2d');
  c.setTransform(1,0,0,1,0,0);
  c.clearRect(0,0,cv.width,cv.height);
  const sp=SPRITES[selCar.id];
  const sc=Math.min(470/sp.pl,430/sp.pw);
  c.translate(cv.width/2,cv.height/2);
  c.scale(sc,sc);
  c.drawImage(sp,-sp.pw/2,-sp.pl/2,sp.pw,sp.pl);
  $('#car-preview-name').textContent=selCar.name;
}
function drawTitleCar(){
  const cv=$('#title-car'),c=cv.getContext('2d');
  c.setTransform(1,0,0,1,0,0);
  c.clearRect(0,0,cv.width,cv.height);
  // little road
  c.fillStyle='#8a8f98';
  rr(c,0,60,cv.width,120,20);c.fill();
  c.strokeStyle='rgba(255,255,255,.9)';c.lineWidth=7;c.setLineDash([34,30]);
  c.beginPath();c.moveTo(0,120);c.lineTo(cv.width,120);c.stroke();c.setLineDash([]);
  const sp=SPRITES[selCar.id];
  c.translate(cv.width/2,120);
  c.rotate(Math.PI/2);
  const sc=Math.min(200/sp.pl,120/sp.pw)*1.5;
  c.scale(sc,sc);
  c.drawImage(sp,-sp.pw/2,-sp.pl/2,sp.pw,sp.pl);
}

/* course select UI */
function drawCoursePreview(cv,co){
  const c=cv.getContext('2d');
  const w=cv.width,h=cv.height;
  c.setTransform(1,0,0,1,0,0);
  c.clearRect(0,0,w,h);
  c.fillStyle=co.ground;c.fillRect(0,0,w,h);
  if(co.sea){
    c.fillStyle='#3fa7d6';c.fillRect(0,0,w*.30,h);
    c.fillStyle='#f0dda2';c.fillRect(w*.30,0,w*.12,h);
    c.strokeStyle='rgba(255,255,255,.6)';c.lineWidth=3;c.lineCap='round';
    [0.25,0.55,0.85].forEach((f,i)=>{
      c.beginPath();c.moveTo(w*.05+i*8,h*f);c.quadraticCurveTo(w*.09+i*8,h*f-6,w*.13+i*8,h*f);c.stroke();
    });
  }
  // curved road
  const rw=w*.34;
  c.beginPath();
  c.moveTo(w*.55-rw/2,h+10);
  c.quadraticCurveTo(w*(.55+co.curve*.22)-rw/2,h*.4,w*.5-rw/2,-10);
  c.lineTo(w*.5+rw/2,-10);
  c.quadraticCurveTo(w*(.55+co.curve*.22)+rw/2,h*.4,w*.55+rw/2,h+10);
  c.closePath();
  c.fillStyle=co.road;c.fill();
  c.strokeStyle='rgba(255,255,255,.85)';c.lineWidth=3;c.setLineDash([12,12]);
  c.beginPath();c.moveTo(w*.55,h+10);c.quadraticCurveTo(w*(.55+co.curve*.22),h*.4,w*.5,-10);c.stroke();
  c.setLineDash([]);
  const s=.72;
  if(co.id==='machi'){drawBuilding(c,w*.14,h*.3,s,7,false);drawTree(c,w*.86,h*.62,s,3);drawSignal(c,w*.85,h*.24,s,1,0);}
  if(co.id==='kousoku'){drawSign(c,w*.14,h*.3,s,1);drawBush(c,w*.87,h*.6,s,2);drawTree(c,w*.13,h*.75,s,4);}
  if(co.id==='yama'){drawTree(c,w*.13,h*.25,s,2);drawTree(c,w*.87,h*.5,s,5);drawRockCluster(c,w*.14,h*.72,s,3);}
  if(co.id==='umi'){drawPalm(c,w*.85,h*.3,s,2);drawParasol(c,w*.87,h*.72,s,1);drawBoat(c,w*.13,h*.5,s*.8,1);}
  if(co.id==='yoru'){drawBuilding(c,w*.14,h*.3,s,11,true);drawBuilding(c,w*.86,h*.6,s,5,true);drawStreetlight(c,w*.84,h*.25,s,1);
    c.fillStyle='rgba(8,10,38,.15)';c.fillRect(0,0,w,h);}
  if(co.id==='yuki'){drawSnowTree(c,w*.13,h*.3,s,3);drawSnowman(c,w*.87,h*.55,s,1);drawSnowTree(c,w*.86,h*.85,s,6);}
}
function buildCourseGrid(){
  const grid=$('#course-grid');
  COURSES.forEach(co=>{
    const card=document.createElement('div');
    card.className='card';card.dataset.course=co.id;
    const cv=document.createElement('canvas');
    cv.width=340;cv.height=200;
    const nm=document.createElement('div');
    nm.className='nm';nm.textContent=co.name;
    const bs=document.createElement('div');
    bs.className='bs';
    card.appendChild(cv);card.appendChild(nm);card.appendChild(bs);
    card.addEventListener('click',()=>{initAudio();selectCourse(co.id);sndSelect();});
    grid.appendChild(card);
    drawCoursePreview(cv,co);
  });
  refreshCourseBests();
}
function refreshCourseBests(){
  document.querySelectorAll('#course-grid .card').forEach(el=>{
    const b=bestFor(el.dataset.course);
    el.querySelector('.bs').textContent=b>0?('べすと '+b+'m'):' ';
  });
}
function selectCourse(id){
  course=COURSES.find(c=>c.id===id)||COURSES[0];
  lsSet('jikoSelCourse',id);
  computeRoad();
  // refresh demo scenery so old-course props don't linger
  world.deco=[];world.obstacles=[];
  world.nextDecoZ=world.dist;
  while(world.nextDecoZ<world.dist+PY+300)spawnDeco();
  document.querySelectorAll('#course-grid .card').forEach(el=>{
    el.classList.toggle('sel',el.dataset.course===id);
  });
}

/* buttons */
$('#btn-start').addEventListener('click',()=>{initAudio();sndTap();setState('cars');});
$('#btn-cars-back').addEventListener('click',()=>{sndTap();setState('title');});
$('#btn-cars-next').addEventListener('click',()=>{sndTap();setState('courses');});
$('#btn-courses-back').addEventListener('click',()=>{sndTap();setState('cars');});
$('#btn-go').addEventListener('click',()=>{initAudio();sndTap();startGame();});
$('#btn-retry').addEventListener('click',()=>{initAudio();sndTap();startGame();});
$('#btn-change').addEventListener('click',()=>{sndTap();resetWorld(true);setState('cars');});
$('#btn-home').addEventListener('click',()=>{sndTap();resetWorld(true);setState('title');});

/* ============================== input ============================== */
const app=$('#app');
app.addEventListener('pointerdown',e=>{
  initAudio();
  if((state==='play'||state==='ready'||state==='crash')&&e.target===canvas){
    e.preventDefault();
    pointers.set(e.pointerId,{x:e.clientX,y:e.clientY,sx:e.clientX,sy:e.clientY,drag:false});
    try{canvas.setPointerCapture(e.pointerId);}catch(x){}
  }
},{passive:false});
app.addEventListener('pointermove',e=>{
  const p=pointers.get(e.pointerId);
  if(!p)return;
  p.x=e.clientX;p.y=e.clientY;
  if(Math.abs(p.x-p.sx)>12||Math.abs(p.y-p.sy)>12)p.drag=true;
});
function releasePointer(e){pointers.delete(e.pointerId);}
app.addEventListener('pointerup',releasePointer);
app.addEventListener('pointercancel',releasePointer);
window.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'){keys.left=true;e.preventDefault();}
  if(e.key==='ArrowRight'){keys.right=true;e.preventDefault();}
});
window.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft')keys.left=false;
  if(e.key==='ArrowRight')keys.right=false;
});
document.addEventListener('gesturestart',e=>e.preventDefault());
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('dblclick',e=>e.preventDefault());

/* ============================== boot ============================== */
resize();
buildCarGrid();
buildCourseGrid();
selectCar(lsGet('jikoSelCar')||'sports');
selectCourse(lsGet('jikoSelCourse')||'machi');
resetWorld(true);
let last=performance.now();
function frame(now){
  requestAnimationFrame(frame);
  let dt=(now-last)/1000;last=now;
  dt=Math.min(dt,.05);
  update(dt,now/1000);
  render(now/1000);
}
requestAnimationFrame(frame);
</script>

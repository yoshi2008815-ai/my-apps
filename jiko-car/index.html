/* ---------- road-surface zones (mario-kart style, top-down only) ---------- */
const ZONE_TOAST={mudflat:'ぬかるみ！ ゆっくり！',mud:'どろんこ みち！',puddle:'みずたまり！',ice:'つるつる すべる！',dash:'ダッシュ！'};
function zoneKindFor(){
  if(course.id==='uminaka')return null; // underwater course keeps its own gimmicks
  const table={umi:'mudflat',machi:'puddle',kousoku:'puddle',yama:'mud',
    yuki:'ice',fubuki:'ice',uchu:'dash',yoru:'puddle'};
  let k=table[course.id]||null;
  if(k&&k!=='dash'&&Math.random()<.18)k='dash'; // rare treat panels on every course
  return k;
}
function spawnZone(){
  const z=world.nextZoneZ;
  world.nextZoneZ=z+rand(1000,1750);
  const k=zoneKindFor();
  if(!k)return;
  if(course.seaDive&&(isWaterZ(z)||isWaterZ(z+520)))return; // mudflats only on dry land
  const dash=k==='dash';
  const wf=dash?.34:rand(.55,1);
  const off=(1-wf)>.05?rand(-(1-wf)*.85,(1-wf)*.85):0;
  world.zones.push({z,len:dash?150:rand(220,480),wf,off,kind:k,
    seed:Math.floor(Math.random()*997),used:false});
}
function zoneAtPlayer(){
  for(const q of world.zones){
    if(world.dist>=q.z&&world.dist<=q.z+q.len){
      const cx=roadCenterAt(world.dist)+q.off*roadHalf;
      if(Math.abs(world.carX-cx)<q.wf*roadHalf)return q;
    }
  }
  return null;
}
function updateZoneEffect(dt){
  let q=null;
  if(state==='play'&&world.airT<=0)q=zoneAtPlayer(); // airborne = flies right over
  const zk=q?q.kind:null;
  if(zk!==world.zoneKind){
    world.zoneKind=zk;
    if(zk&&zk!=='dash'){
      if(zk==='ice')sndIce();else sndMud();
      if(!world.zoneToast[zk]){world.zoneToast[zk]=1;showToast(ZONE_TOAST[zk]);}
    }
  }
  if(q&&q.kind==='dash'&&!q.used){
    q.used=true;world.boostT=1.5;
    sndDash();spawnSparkles(world.carX,PY-24);
    if(!world.zoneToast.dash){world.zoneToast.dash=1;showToast(ZONE_TOAST.dash);}
  }
  // splatter while wading through goo / water
  if(state==='play'&&zk&&zk!=='dash'&&zk!=='ice'){
    world.zdropT-=dt;
    if(world.zdropT<=0){
      world.zdropT=.06;
      const pd=playerDims();
      const col=zk==='mud'?'rgba(122,85,45,.9)':(zk==='mudflat'?'rgba(146,120,66,.9)':'rgba(150,205,240,.95)');
      [-1,1].forEach(s=>{
        world.particles.push({kind:'zdrop',col,x:world.carX+s*pd.w*.42,y:PY+pd.l*.3,
          vx:s*rand(30,110),vy:rand(-30,60)+world.speed*.25,size:rand(2.5,5.5),life:rand(.35,.6),t:0});
      });
    }
  }
  // sparkles while dashing
  if(world.boostT>0&&Math.random()<dt*20){
    world.particles.push({kind:'star',x:world.carX+rand(-24,24),y:PY+rand(-10,40),
      vx:rand(-40,40),vy:120+world.speed*.3,rot:rand(0,TAU),vr:rand(-6,6),size:rand(4,8),life:.5,t:0});
  }
}
function landFx(){
  const pd=playerDims();
  const q=zoneAtPlayer();
  const zk=q?q.kind:null;
  let col='rgba(185,175,155,.9)'; // dust
  if(zk==='puddle'||zk==='mudflat')col='rgba(150,205,240,.95)';
  else if(zk==='mud')col='rgba(122,85,45,.95)';
  else if(course.snow)col='rgba(255,255,255,.95)';
  else if(course.water)col='rgba(180,225,250,.9)';
  for(let i=0;i<9;i++){
    world.particles.push({kind:'zdrop',col,x:world.carX+rand(-pd.w*.55,pd.w*.55),y:PY+pd.l*.35,
      vx:rand(-130,130),vy:rand(-150,-10),size:rand(3,6.5),life:rand(.4,.7),t:0});
  }
  blip(150,75,.13,'sine',.13); // soft landing thump
}
function landClear(){
  // fairness: anything under the car at touchdown is bounced away, never a crash
  const pd=playerDims();
  for(const o of world.obstacles){
    if(o.hit||o.gone||o.got)continue;
    const oy=PY-(o.z-world.dist);
    if(oy<-140||oy>H+140)continue;
    const ox=roadCenterAt(o.z)+o.lane*roadHalf+(o.xOff||0);
    const od=obstacleDims(o);
    if(Math.abs(world.carX-ox)<(pd.w+od.w)*.5*.62&&Math.abs(PY-oy)<(pd.l+od.l)*.5*.62){
      if(o.type==='car'){ // spins off the road (no bonus - just a save)
        o.hit=true;o.spin=0;o.hitT=0;o.xOff=0;o.slide=o.lane>=0?1:-1;o.sp*=.3;
        spawnSparkles(ox,oy);
      }else if(o.type==='item'){ // landing on a present still collects it
        o.got=true;
        if(world.items<3)world.items++;
        updateItemHUD();sndGet();spawnSparkles(ox,oy);
      }else{ // rocks / balls / snow piles pop away
        o.gone=true;spawnSparkles(ox,oy);
      }
    }
  }
  world.obstacles=world.obstacles.filter(o=>!o.gone&&!o.got);
}
function updateParticles(dt){
  world.particles.forEach(p=>{
    p.t+=dt;
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    if(p.kind==='star'){p.vy+=140*dt;p.rot+=p.vr*dt;}
    if(p.kind==='smoke'){p.size+=26*dt;p.vx*=(1-dt);p.vy*=(1-dt);}
    if(p.kind==='puff'){p.size+=14*dt;}
    if(p.kind==='drop'){p.vy+=980*dt;}
    if(p.kind==='zdrop'){p.vy+=760*dt;}
    if(p.kind==='ring'){p.size+=260*dt;}
  });
  world.particles=world.particles.filter(p=>p.t<p.life);
}
function clearAfterHit(){
  // spin out / remove everything close by so the restart is safe
  if(course.mode==='side'){
    for(const o of world.sideObs){
      const dxo=o.z-world.dist;
      if(dxo>-320&&dxo<W+240&&!o.hit){
        if(o.type==='car'){o.hit=true;o.hitT=0;o.vy=-360;o.rot=0;o.vr=9;o.yOff=0;}
        else o.gone=true;
      }
    }
    world.sideObs=world.sideObs.filter(o=>!o.gone);
  }else{
    for(const o of world.obstacles){
      const y=PY-(o.z-world.dist);
      if(y>-280&&y<H+140){
        if(o.type==='car'&&!o.hit){
          o.hit=true;o.spin=0;o.hitT=0;o.xOff=0;
          o.slide=o.lane>=0?1:-1;o.sp*=.3;
        }else if(o.type!=='item'&&o.type!=='car')o.gone=true;
      }
    }
    world.obstacles=world.obstacles.filter(o=>!o.gone);
  }
}
function doCrash(offroad){
  if(state!=='play'||world.invT>0)return;
  const side=course.mode==='side';
  const cx=side?sidePlayerX()+world.sideX:world.carX;
  const cy=side?sideGroundY()-30*sideScale()-world.jumpY:PY;
  if(world.lives>1){
    // soft crash: lose one heart, keep on driving (same run, same distance)
    world.lives--;
    updateLivesHUD(true);
    world.invT=1.9;      // invincible + blinking while recovering
    world.speed*=.35;
    spawnCrashFx(cx,cy);
    sndOuch();
    clearAfterHit();
    if(side){ // back to the home position on the ground
      world.sideX=0;world.sideVx=0;
      world.jumpY=0;world.jumpVy=0;world.jumps=0;
    }else if(offroad){ // put the car back on the road
      world.carX=roadCenterAt(world.dist)+(course.twoway?-roadHalf*.47:0);
    }
    showOuchToast();
    if(world.lives===1)sndDoki();
  }else{
    world.lives=0;
    updateLivesHUD(true);
    state='crash';world.crashT=0;
    stopEngine();stopSiren();stopBgm();
    sndPoyon();sndZukkoke();
    spawnCrashFx(cx,cy);
  }
}
function showOuchToast(){
  const el=$('#toast');
  el.textContent=world.lives===1?'いたた！ あと1かい きをつけて！':'いたた！ あと'+world.lives+'かい だいじょうぶ！';
  el.classList.remove('hidden','pop');
  el.classList.add('ouch');
  void el.offsetWidth;el.classList.add('pop');
  clearTimeout(showToast._t);
  showToast._t=setTimeout(()=>{el.classList.add('hidden');el.classList.remove('ouch');},1700);
}

/* ============================== render ============================== */
function buildEdgePts(){
  const pts=[];
  for(let y=-30;y<=H+40;y+=16){
    pts.push([y,roadCenterAt(world.dist+(PY-y))]);
  }
  return pts;
}
function sideFill(pts,off,side,color){
  ctx.beginPath();
  pts.forEach((p,i)=>{
    const x=p[1]+side*off;
    i?ctx.lineTo(x,p[0]):ctx.moveTo(x,p[0]);
  });
  const ex=side>0?W+60:-60;
  ctx.lineTo(ex,pts[pts.length-1][0]);
  ctx.lineTo(ex,pts[0][0]);
  ctx.closePath();ctx.fillStyle=color;ctx.fill();
}
function strokeOffset(pts,off,style,lw,dash,dashOff){
  ctx.beginPath();
  pts.forEach((p,i)=>{
    const x=p[1]+off;
    i?ctx.lineTo(x,p[0]):ctx.moveTo(x,p[0]);
  });
  ctx.strokeStyle=style;ctx.lineWidth=lw;
  ctx.setLineDash(dash||[]);
  ctx.lineDashOffset=dashOff||0;
  ctx.stroke();
  ctx.setLineDash([]);
}
function render(t){
  ctx.clearRect(0,0,W,H);
  if(course.mode==='side')renderSideScene(t);
  else renderTopScene(t);
  drawFxParticles();
  if(state==='crash'&&world.crashT<.25){
    ctx.fillStyle='rgba(255,255,255,'+(0.5*(1-world.crashT/.25)).toFixed(3)+')';
    ctx.fillRect(0,0,W,H);
  }
  if(state==='play'||state==='crash'){
    $('#dist').textContent=meters()+'m';
  }
}
function drawFxParticles(){
  for(const p of world.particles){
    const a=1-p.t/p.life;
    if(p.kind==='smoke'){
      ctx.fillStyle='rgba(225,228,235,'+(0.7*a).toFixed(3)+')';
      ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,TAU);ctx.fill();
    }else if(p.kind==='star'){
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
      ctx.globalAlpha=Math.min(1,a*1.6);
      starPath(ctx,p.size);
      ctx.fillStyle='#ffd43b';ctx.fill();
      ctx.strokeStyle='#f59f00';ctx.lineWidth=1.6;ctx.stroke();
      ctx.restore();ctx.globalAlpha=1;
    }else if(p.kind==='text'){
      ctx.save();ctx.globalAlpha=Math.min(1,a*1.5);
      ctx.font='900 30px sans-serif';ctx.textAlign='center';
      ctx.strokeStyle='#c05a00';ctx.lineWidth=5;ctx.strokeText(p.str,p.x,p.y);
      ctx.fillStyle='#ffe066';ctx.fillText(p.str,p.x,p.y);
      ctx.restore();
    }else if(p.kind==='drop'){
      ctx.fillStyle='rgba(215,242,255,'+(0.9*a).toFixed(3)+')';
      ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,TAU);ctx.fill();
    }else if(p.kind==='zdrop'){ // colored splatter (mud / water / snow)
      ctx.globalAlpha=Math.min(1,a*1.4);
      ctx.fillStyle=p.col;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,TAU);ctx.fill();
      ctx.globalAlpha=1;
    }else if(p.kind==='ring'){
      ctx.strokeStyle='rgba(235,250,255,'+(0.8*a).toFixed(3)+')';
      ctx.lineWidth=5*a+1;
      ctx.beginPath();ctx.ellipse(p.x,p.y,p.size,p.size*.45,0,0,TAU);ctx.stroke();
    }
  }
}
function drawZones(t){
  for(const q of world.zones){
    const yTop=PY-(q.z+q.len-world.dist),yBot=PY-(q.z-world.dist);
    if(yTop>H+60||yBot<-60)continue;
    const step=14,ys=Math.max(-40,yTop),ye=Math.min(H+40,yBot);
    const left=[],right=[];
    for(let y=ys;y<=ye;y+=step){
      const zz=world.dist+(PY-y);
      const de=Math.min(zz-q.z,q.z+q.len-zz);
      // rounded ends: dash panels stay chunky, goo zones taper gently
      let sh=q.kind==='dash'?clamp(de/40,.62,1):clamp(de/90,.18,1);
      sh=sh*sh*(3-2*sh)*.35+sh*.65; // soften the corners
      const cx=roadCenterAt(zz)+q.off*roadHalf;
      const hw=q.wf*roadHalf*sh;
      left.push([cx-hw,y]);right.push([cx+hw,y]);
    }
    if(left.length<2)continue;
    const path=()=>{
      ctx.beginPath();
      left.forEach((p,i)=>i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1]));
      for(let i=right.length-1;i>=0;i--)ctx.lineTo(right[i][0],right[i][1]);
      ctx.closePath();
    };
    if(q.kind==='dash'){ // glowing boost panel with animated chevrons
      path();
      const g=ctx.createLinearGradient(0,ys,0,ye);
      g.addColorStop(0,'#1b6fd6');g.addColorStop(.5,'#2a8ae8');g.addColorStop(1,'#1b6fd6');
      ctx.fillStyle=g;ctx.fill();
      ctx.strokeStyle='rgba(120,240,255,'+(0.55+0.3*Math.sin(t*6)).toFixed(2)+')';
      ctx.lineWidth=5;ctx.stroke();
      ctx.save();path();ctx.clip();
      const n=Math.max(2,Math.floor(q.len/56));
      for(let j=0;j<n;j++){
        const zz=q.z+((j*56+t*90)%Math.max(1,q.len-16))+8;
        const y=PY-(zz-world.dist);
        const cx=roadCenterAt(zz)+q.off*roadHalf;
        const wA=q.wf*roadHalf*.6;
        ctx.fillStyle='rgba(255,240,140,'+(0.82+0.18*Math.sin(t*8+j)).toFixed(2)+')';
        ctx.beginPath();
        ctx.moveTo(cx-wA*.55,y+11);ctx.lineTo(cx,y-12);ctx.lineTo(cx+wA*.55,y+11);
        ctx.closePath();ctx.fill();
        ctx.strokeStyle='rgba(255,255,255,.55)';ctx.lineWidth=2;ctx.stroke();
      }
      ctx.restore();
      continue;
    }
    path();
    if(q.kind==='mudflat')ctx.fillStyle='#d9c288';
    else if(q.kind==='mud')ctx.fillStyle='#8a6238';
    else if(q.kind==='ice')ctx.fillStyle='rgba(214,238,252,.92)';
    else ctx.fillStyle='rgba(70,145,215,.62)'; // puddle
    ctx.fill();
    ctx.lineWidth=3.5;
    ctx.strokeStyle=q.kind==='mudflat'?'#b09a5e':(q.kind==='mud'?'#5f421f':(q.kind==='ice'?'#9fd2ee':'rgba(235,248,255,.75)'));
    ctx.stroke();
    ctx.save();path();ctx.clip();
    if(q.kind==='mudflat'||q.kind==='puddle'){ // wet pools + sheen
      const n=Math.max(3,Math.floor(q.len/70));
      for(let j=0;j<n;j++){
        const zz=q.z+((q.seed*13+j*97)%Math.max(1,q.len-40))+20;
        const y=PY-(zz-world.dist);
        const cx=roadCenterAt(zz)+q.off*roadHalf+(((q.seed*29+j*53)%200)/100-1)*q.wf*roadHalf*.6;
        const rw=22+((q.seed+j*31)%26);
        if(q.kind==='mudflat'){
          ctx.fillStyle='rgba(118,177,214,.75)';
          ctx.beginPath();ctx.ellipse(cx,y,rw,rw*.42,0,0,TAU);ctx.fill();
          ctx.fillStyle='rgba(255,255,255,.5)';
          ctx.beginPath();ctx.ellipse(cx-rw*.3,y-rw*.12,rw*.3,rw*.1,0,0,TAU);ctx.fill();
        }else{
          ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=1.8;
          ctx.beginPath();ctx.ellipse(cx,y,rw*.8,rw*.3,0,0,TAU);ctx.stroke();
        }
      }
    }else if(q.kind==='mud'){ // dark blobs + tire ruts
      const n=Math.max(3,Math.floor(q.len/60));
      ctx.fillStyle='rgba(94,63,30,.55)';
      for(let j=0;j<n;j++){
        const zz=q.z+((q.seed*17+j*89)%Math.max(1,q.len-30))+15;
        const y=PY-(zz-world.dist);
        const cx=roadCenterAt(zz)+q.off*roadHalf+(((q.seed*23+j*71)%200)/100-1)*q.wf*roadHalf*.65;
        ctx.beginPath();ctx.ellipse(cx,y,16+((j*29+q.seed)%18),7+((j*13)%8),0,0,TAU);ctx.fill();
      }
      ctx.strokeStyle='rgba(70,45,20,.5)';ctx.lineWidth=6;ctx.lineCap='round';
      [-.3,.3].forEach(f=>{
        ctx.beginPath();
        for(let y=ys;y<=ye;y+=step){
          const zz=world.dist+(PY-y);
          const x=roadCenterAt(zz)+q.off*roadHalf+f*q.wf*roadHalf;
          y===ys?ctx.moveTo(x,y):ctx.lineTo(x,y);
        }
        ctx.stroke();
      });
    }else if(q.kind==='ice'){ // sheen streaks + twinkling sparkles
      ctx.strokeStyle='rgba(255,255,255,.65)';ctx.lineWidth=3;ctx.lineCap='round';
      const n=Math.max(2,Math.floor(q.len/90));
      for(let j=0;j<n;j++){
        const zz=q.z+((q.seed*11+j*127)%Math.max(1,q.len-50))+25;
        const y=PY-(zz-world.dist);
        const cx=roadCenterAt(zz)+q.off*roadHalf+(((q.seed*37+j*61)%160)/100-.8)*q.wf*roadHalf*.5;
        ctx.beginPath();ctx.moveTo(cx-26,y+12);ctx.lineTo(cx+26,y-12);ctx.stroke();
        ctx.beginPath();ctx.moveTo(cx-6,y+16);ctx.lineTo(cx+34,y-4);ctx.stroke();
      }
      for(let j=0;j<n*2;j++){
        const zz=q.z+((q.seed*7+j*83)%Math.max(1,q.len-20))+10;
        const y=PY-(zz-world.dist);
        const cx=roadCenterAt(zz)+q.off*roadHalf+(((q.seed*41+j*57)%180)/100-.9)*q.wf*roadHalf*.7;
        const a=.4+.5*(0.5+0.5*Math.sin(t*5+j*1.7));
        ctx.strokeStyle='rgba(255,255,255,'+a.toFixed(2)+')';ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(cx-5,y);ctx.lineTo(cx+5,y);ctx.moveTo(cx,y-5);ctx.lineTo(cx,y+5);ctx.stroke();
      }
    }
    ctx.restore();
  }
}
function renderTopScene(t){
  const pts=buildEdgePts();
  // ground
  ctx.fillStyle=course.ground;
  ctx.fillRect(0,0,W,H);
  if(course.space&&world.fx){ // starfield + shooting stars
    for(const st of world.fx.stars){
      const yy=((st.y+world.dist*st.par)%(H+20))-10;
      ctx.globalAlpha=.35+.45*(0.5+0.5*Math.sin(t*3+st.tw));
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(st.x,yy,st.r,0,TAU);ctx.fill();
    }
    ctx.globalAlpha=1;
    for(const sh of world.fx.shots){
      const a=1-sh.t/sh.life;
      ctx.strokeStyle='rgba(255,255,255,'+(0.85*a).toFixed(3)+')';
      ctx.lineWidth=2.5;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(sh.x,sh.y);ctx.lineTo(sh.x-sh.vx*.14,sh.y-sh.vy*.14);ctx.stroke();
    }
  }
  if(course.sidewalk){
    sideFill(pts,roadHalf,-1,course.sidewalk);
    sideFill(pts,roadHalf,1,course.sidewalk);
    sideFill(pts,roadHalf+30,-1,course.ground);
    sideFill(pts,roadHalf+30,1,course.ground);
  }
  if(course.sea){
    sideFill(pts,roadHalf+18,-1,'#f0dda2');
    sideFill(pts,roadHalf+86,-1,'#3fa7d6');
    // waves
    ctx.strokeStyle='rgba(255,255,255,.55)';ctx.lineWidth=2.5;ctx.lineCap='round';
    for(let i=0;i<9;i++){
      const wz=Math.floor((world.dist+i*173)/173)*173+i*61;
      const y=PY-(wz-world.dist)%1600;
      const yy=((y%(H+120))+(H+120))%(H+120)-60;
      const cx=roadCenterAt(world.dist+(PY-yy));
      const xx=cx-roadHalf-110-(i%4)*46;
      if(xx>20){
        ctx.beginPath();ctx.moveTo(xx-16,yy);ctx.quadraticCurveTo(xx-8,yy-5,xx,yy);
        ctx.quadraticCurveTo(xx+8,yy+5,xx+16,yy);ctx.stroke();
      }
    }
  }
  // road
  ctx.beginPath();
  pts.forEach((p,i)=>{const x=p[1]-roadHalf;i?ctx.lineTo(x,p[0]):ctx.moveTo(x,p[0]);});
  for(let i=pts.length-1;i>=0;i--){ctx.lineTo(pts[i][1]+roadHalf,pts[i][0]);}
  ctx.closePath();ctx.fillStyle=course.road;ctx.fill();
  if(course.snow){ // snow patches on road
    ctx.fillStyle='rgba(255,255,255,.35)';
    for(let i=0;i<7;i++){
      const pz=Math.floor((world.dist+i*257)/900)*900+i*197;
      const y=PY-(pz-world.dist);
      if(y>-60&&y<H+60){
        const cx=roadCenterAt(pz);
        ctx.beginPath();ctx.ellipse(cx+((i*73)%120)-60,y,34,14,0,0,TAU);ctx.fill();
      }
    }
  }
  // edge lines
  if(course.space){ // glowing space road edges
    strokeOffset(pts,-(roadHalf-7),'rgba(110,240,255,.30)',16);
    strokeOffset(pts,roadHalf-7,'rgba(110,240,255,.30)',16);
  }
  strokeOffset(pts,-(roadHalf-7),course.edge,4);
  strokeOffset(pts,roadHalf-7,course.edge,4);
  // lane dashes
  const seps=laneSeparators(course);
  const dashCol=course.space?'rgba(160,240,255,.9)':'rgba(255,255,255,.85)';
  seps.forEach(f=>{
    strokeOffset(pts,f*roadHalf,dashCol,4,[26,34],world.dist%60);
  });
  if(course.twoway){ // center line
    strokeOffset(pts,0,course.space?'rgba(255,140,230,.9)':'rgba(255,180,60,.9)',4);
  }
  if(course.rail){
    [-1,1].forEach(s=>{
      strokeOffset(pts,s*(roadHalf+15),'#b3bac6',3.5);
      strokeOffset(pts,s*(roadHalf+15),'#8f97a5',8,[5,30],world.dist%35);
    });
  }
  // road-surface zones (on the asphalt, under everything else)
  drawZones(t);
  // scenery (far first)
  const decoSorted=world.deco.slice().sort((a,b)=>b.z-a.z);
  for(const d of decoSorted){
    const y=PY-(d.z-world.dist);
    if(y<-140||y>H+140)continue;
    const x=roadCenterAt(d.z)+d.side*(roadHalf+d.off);
    if(x<-140||x>W+140)continue;
    if(d.type==='signal')drawSignal(ctx,x,y,CS,d.seed,t);
    else if(d.type==='streetlight')drawStreetlight(ctx,x,y,CS,d.side);
    else if(d.type==='seaweed')drawSeaweed(ctx,x,y,CS,d.seed,t);
    else DECO_DRAW[d.type](ctx,x,y,CS,d.seed);
  }
  // fish swimming across (underwater)
  if(course.water&&world.fx){
    for(const f of world.fx.fish)drawFish(ctx,f,t);
  }
  // obstacles
  const obsSorted=world.obstacles.slice().sort((a,b)=>b.z-a.z);
  for(const o of obsSorted){
    const y=PY-(o.z-world.dist);
    if(y<-160||y>H+160)continue;
    const x=roadCenterAt(o.z)+o.lane*roadHalf+(o.xOff||0);
    if(o.type==='car'){
      const rot=(o.dir<0?Math.PI:0)+(o.hit?o.spin:0);
      if(o.kind==='sub')drawSub(ctx,x,y,CS,rot,o.seed,t);
      else if(o.kind==='rocket')drawRocket(ctx,x,y,CS,rot,t);
      else if(o.kind==='ufo')drawUFO(ctx,x,y,CS,rot,t);
      else drawSprite(ctx,SPRITES[o.spec.id],x,y,rot,CS*(o.hit?1+Math.sin(o.spin*2)*.06:1));
    }
    else if(o.type==='item')drawItemBox(ctx,x,y,CS,t);
    else if(o.type==='ball')drawBall(ctx,x,y,CS);
    else if(o.type==='rockobs')drawRockCluster(ctx,x,y,CS);
    else if(o.type==='snowpile')drawSnowPile(ctx,x,y,CS);
    else drawCone(ctx,x,y,CS);
  }
  // thrown stars
  for(const b of world.balls){
    const y=PY-(b.z-world.dist);
    ctx.fillStyle='rgba(255,224,102,.35)';
    ctx.beginPath();ctx.arc(b.x,y+18,8,0,TAU);ctx.fill();
    ctx.beginPath();ctx.arc(b.x,y+33,5.5,0,TAU);ctx.fill();
    ctx.save();ctx.translate(b.x,y);ctx.rotate(b.spin);
    starPath(ctx,13*CS);
    ctx.fillStyle='#ffe066';ctx.fill();
    ctx.strokeStyle='#f08c00';ctx.lineWidth=2;ctx.stroke();
    ctx.restore();
  }
  // puffs under car
  for(const p of world.particles){
    if(p.kind!=='puff')continue;
    ctx.fillStyle='rgba(190,195,205,'+(0.5*(1-p.t/p.life)).toFixed(3)+')';
    ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,TAU);ctx.fill();
  }
  // player car
  const pd=playerDims();
  let rot=world.tilt,sc=CS,oy=0;
  let sprite=SPRITES[selCar.id];
  if(world.airT>0){ // jumping: car rises + grows, shadow stays small on the road
    const k=clamp(1-world.airT/AIR_DUR,0,1);
    const hf=Math.sin(Math.PI*k);
    sprite=SPRITES_AIR[selCar.id];
    sc=CS*(1+hf*.32);
    oy=-hf*42;
    ctx.fillStyle='rgba(10,20,30,'+(0.30*(1-hf*.5)).toFixed(3)+')';
    ctx.beginPath();
    ctx.ellipse(world.carX+2,PY+pd.l*.05,pd.w*.62*(1-hf*.38),pd.l*.55*(1-hf*.38),0,0,TAU);
    ctx.fill();
  }
  if(state==='crash'){
    const k=world.crashT;
    rot=Math.sin(k*26)*.32*Math.max(0,1-k);
    sc=CS*(1+Math.sin(k*18)*.1*Math.max(0,1-k));
    oy=-Math.abs(Math.sin(k*12))*14*Math.max(0,1-k);
  }
  if(world.invT>0)ctx.globalAlpha=.55+.35*Math.sin(t*24); // recovery blink
  drawSprite(ctx,sprite,world.carX,PY+oy,rot,sc);
  ctx.globalAlpha=1;
  // speed lines
  if(state==='play'&&world.speed>course.base*1.12){
    ctx.strokeStyle='rgba(255,255,255,.28)';ctx.lineWidth=3;ctx.lineCap='round';
    for(let i=0;i<6;i++){
      const yy=((t*world.speed*1.4+i*197)%(H+160))-80;
      const xx=i<3?18+i*14:W-18-(i-3)*14;
      ctx.beginPath();ctx.moveTo(xx,yy);ctx.lineTo(xx,yy+60+i*10);ctx.stroke();
    }
  }
  // night lighting
  if(course.night){
    ctx.fillStyle='rgba(8,10,38,.38)';
    ctx.fillRect(0,0,W,H);
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    // player headlight cones
    if(state!=='over'){
      const hy=PY-pd.l*.5;
      [-1,1].forEach(s=>{
        const hx=world.carX+s*pd.w*.28;
        const g=ctx.createLinearGradient(0,hy,0,hy-250);
        g.addColorStop(0,'rgba(255,240,180,.30)');g.addColorStop(1,'rgba(255,240,180,0)');
        ctx.fillStyle=g;
        ctx.beginPath();
        ctx.moveTo(hx-6,hy);ctx.lineTo(hx+6,hy);
        ctx.lineTo(hx+s*10+30,hy-250);ctx.lineTo(hx+s*10-30,hy-250);
        ctx.closePath();ctx.fill();
      });
    }
    // vehicle light glows
    for(const o of world.obstacles){
      if(o.type!=='car')continue;
      const y=PY-(o.z-world.dist);
      if(y<-120||y>H+120)continue;
      const x=roadCenterAt(o.z)+o.lane*roadHalf+(o.xOff||0);
      const od=obstacleDims(o);
      const fy=y+(o.dir<0?-1:1)*od.l*.5*-1; // front for dir=1 is up; oncoming front is down
      const gy=o.dir<0?y+od.l*.5:y-od.l*.5;
      const col=o.dir<0?'255,235,170':'255,90,80';
      const g=ctx.createRadialGradient(x,gy,4,x,gy,o.dir<0?68:36);
      g.addColorStop(0,'rgba('+col+',.5)');g.addColorStop(1,'rgba('+col+',0)');
      ctx.fillStyle=g;
      ctx.beginPath();ctx.arc(x,gy,o.dir<0?68:36,0,TAU);ctx.fill();
    }
    // streetlight pools
    for(const d of world.deco){
      if(d.type!=='streetlight')continue;
      const y=PY-(d.z-world.dist);
      if(y<-100||y>H+100)continue;
      const x=roadCenterAt(d.z)+d.side*(roadHalf+d.off)-d.side*20*CS;
      const g=ctx.createRadialGradient(x,y,6,x,y,80);
      g.addColorStop(0,'rgba(255,225,140,.4)');g.addColorStop(1,'rgba(255,225,140,0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,80,0,TAU);ctx.fill();
    }
    ctx.restore();
  }
  // underwater tint + rising bubbles + light rays
  if(course.water){
    ctx.fillStyle='rgba(10,70,130,.16)';
    ctx.fillRect(0,0,W,H);
    if(world.fx){
      ctx.strokeStyle='rgba(220,245,255,.7)';ctx.lineWidth=1.6;
      for(const b of world.fx.bubbles){
        ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,TAU);ctx.stroke();
        ctx.fillStyle='rgba(255,255,255,.35)';
        ctx.beginPath();ctx.arc(b.x-b.r*.35,b.y-b.r*.35,b.r*.3,0,TAU);ctx.fill();
      }
    }
    ctx.save();ctx.globalCompositeOperation='lighter';
    for(let i=0;i<4;i++){
      const bx=W*(.12+.24*i)+Math.sin(t*.25+i*1.7)*50;
      const g=ctx.createLinearGradient(0,0,0,H*.85);
      g.addColorStop(0,'rgba(200,240,255,.13)');g.addColorStop(1,'rgba(200,240,255,0)');
      ctx.fillStyle=g;
      ctx.beginPath();
      ctx.moveTo(bx-26,-10);ctx.lineTo(bx+30,-10);
      ctx.lineTo(bx+150,H*.85);ctx.lineTo(bx+40,H*.85);
      ctx.closePath();ctx.fill();
    }
    ctx.restore();
  }
  // underwater sections (umi sea-dive)
  if(course.seaDive){
    const bands=[];
    let start=null;
    for(let y=-20;y<=H+20;y+=10){
      const wet=isWaterZ(world.dist+(PY-y));
      if(wet&&start===null)start=y;
      if(!wet&&start!==null){bands.push([start,y]);start=null;}
    }
    if(start!==null)bands.push([start,H+20]);
    if(bands.length){
      ctx.save();
      ctx.beginPath();
      bands.forEach(b=>ctx.rect(0,b[0],W,b[1]-b[0]));
      ctx.clip();
      ctx.fillStyle='rgba(12,80,150,.30)';
      ctx.fillRect(0,0,W,H);
      if(world.fx){
        ctx.strokeStyle='rgba(220,245,255,.7)';ctx.lineWidth=1.6;
        for(const b of world.fx.bubbles){
          ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,TAU);ctx.stroke();
        }
        for(const f of world.fx.fish)drawFish(ctx,f,t);
      }
      // light rays inside water
      ctx.globalCompositeOperation='lighter';
      for(let i=0;i<3;i++){
        const bx=W*(.2+.3*i)+Math.sin(t*.25+i*1.7)*50;
        const g=ctx.createLinearGradient(0,0,0,H*.9);
        g.addColorStop(0,'rgba(200,240,255,.12)');g.addColorStop(1,'rgba(200,240,255,0)');
        ctx.fillStyle=g;
        ctx.beginPath();
        ctx.moveTo(bx-24,-10);ctx.lineTo(bx+28,-10);
        ctx.lineTo(bx+140,H*.9);ctx.lineTo(bx+40,H*.9);
        ctx.closePath();ctx.fill();
      }
      ctx.restore();
      // foam edges
      ctx.lineCap='round';
      bands.forEach(b=>{
        [b[0],b[1]].forEach(fy=>{
          if(fy<-10||fy>H+10)return;
          ctx.strokeStyle='rgba(255,255,255,.85)';ctx.lineWidth=5;
          ctx.beginPath();
          for(let x=0;x<=W;x+=16){
            const yy=fy+Math.sin(x*.045+t*3)*3.5;
            x?ctx.lineTo(x,yy):ctx.moveTo(x,yy);
          }
          ctx.stroke();
          ctx.strokeStyle='rgba(210,240,255,.5)';ctx.lineWidth=2;
          ctx.beginPath();
          for(let x=0;x<=W;x+=16){
            const yy=fy+7+Math.sin(x*.05+t*3+1)*3;
            x?ctx.lineTo(x,yy):ctx.moveTo(x,yy);
          }
          ctx.stroke();
        });
      });
    }
  }
  // falling snow on top
  if(world.fx&&world.fx.flakes.length){
    if(course.blizzard){ // wind-streaked flakes
      ctx.strokeStyle='rgba(255,255,255,.85)';ctx.lineCap='round';
      for(const f of world.fx.flakes){
        ctx.lineWidth=f.r;
        ctx.beginPath();ctx.moveTo(f.x,f.y);
        ctx.lineTo(f.x-f.vx*.055,f.y-f.vy*.055);ctx.stroke();
      }
      ctx.fillStyle='rgba(235,242,250,.12)';
      ctx.fillRect(0,0,W,H);
    }else{
      ctx.fillStyle='rgba(255,255,255,.85)';
      for(const f of world.fx.flakes){
        ctx.beginPath();ctx.arc(f.x,f.y,f.r,0,TAU);ctx.fill();
      }
    }
  }
}
/* ---------- side-scroll scene ---------- */
function renderSideScene(t){
  const SS=sideScale(),gy=sideGroundY(),px=sidePlayerX();
  const d=world.dist;
  const mod=(v,m)=>((v%m)+m)%m;
  // sky
  const sg=ctx.createLinearGradient(0,0,0,gy);
  sg.addColorStop(0,course.sky1);sg.addColorStop(1,course.sky2);
  ctx.fillStyle=sg;ctx.fillRect(0,0,W,gy+2);
  if(course.sun){
    const sx=W*.72,sy=gy*.42;
    const g=ctx.createRadialGradient(sx,sy,10,sx,sy,120);
    g.addColorStop(0,'rgba(255,235,150,.9)');g.addColorStop(.35,'rgba(255,210,120,.45)');g.addColorStop(1,'rgba(255,210,120,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(sx,sy,120,0,TAU);ctx.fill();
    ctx.fillStyle='#ffdf8a';ctx.beginPath();ctx.arc(sx,sy,42,0,TAU);ctx.fill();
  }
  // clouds (slow parallax)
  for(let i=0;i<6;i++){
    const cx=mod(i*(W/3+130)+i*97-d*.15,W+400)-200;
    const cy=44+(i%3)*58+((i*31)%36);
    drawCloud(ctx,cx,cy,.7+(i%3)*.28,course.cloud);
  }
  // far hills
  ctx.fillStyle=course.hillFar;
  for(let i=0;i<8;i++){
    const hx=mod(i*440+((i*151)%160)-d*.28,W+880)-440;
    const hh=110+(i%3)*55;
    ctx.beginPath();ctx.ellipse(hx,gy+30,230,hh,0,Math.PI,0);ctx.fill();
  }
  // near hills
  ctx.fillStyle=course.hillNear;
  for(let i=0;i<9;i++){
    const hx=mod(i*380+((i*211)%200)-d*.55,W+760)-380;
    const hh=60+(i%3)*38;
    ctx.beginPath();ctx.ellipse(hx,gy+22,170,hh,0,Math.PI,0);ctx.fill();
  }
  // near ground props (bushes / flowers / trees)
  for(let i=0;i<8;i++){
    const bx=mod(i*430+((i*97)%260)-d,W+560)-280;
    const kind=i%3;
    if(kind===0)drawBush(ctx,bx,gy-6,1.1,i);
    else if(kind===1){ // flower
      ctx.save();ctx.translate(bx,gy-4);
      ctx.strokeStyle='#3f8f34';ctx.lineWidth=2.6;
      ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-14);ctx.stroke();
      for(let k=0;k<5;k++){
        const a=k*TAU/5-Math.PI/2;
        ctx.fillStyle=['#ff8fb0','#ffd23f','#ff9e54'][i%3];
        ctx.beginPath();ctx.ellipse(Math.cos(a)*5.5,-14+Math.sin(a)*5.5,4,4,0,0,TAU);ctx.fill();
      }
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,-14,3,0,TAU);ctx.fill();
      ctx.restore();
    }else drawTree(ctx,bx,gy-26,.8,i*3+1);
  }
  // ground: grass strip + dirt
  const gg=ctx.createLinearGradient(0,gy,0,gy+26);
  gg.addColorStop(0,shade(course.grass,.12));gg.addColorStop(1,shade(course.grass,-.08));
  ctx.fillStyle=gg;ctx.fillRect(0,gy,W,26);
  ctx.fillStyle=shade(course.grass,-.28);ctx.fillRect(0,gy,W,4);
  ctx.fillStyle=course.dirt;ctx.fillRect(0,gy+26,W,H-gy-26);
  ctx.fillStyle=shade(course.dirt,-.16);
  for(let row=0;row<9;row++){
    const yy=gy+44+row*34;
    if(yy>H+10)break;
    for(let x=-34;x<W+34;x+=34){
      const xx=x+mod(-d+(row%2)*17,34);
      ctx.beginPath();ctx.arc(xx,yy,3.2,0,TAU);ctx.fill();
    }
  }
  // air items
  for(const it of world.airItems){
    const ox=px+(it.z-d);
    if(ox<-80||ox>W+80)continue;
    const iy=gy-it.h*SS;
    if(it.kind==='box'){
      drawItemBox(ctx,ox,iy,SS*.85,t);
    }else{
      const g=ctx.createRadialGradient(ox,iy,3,ox,iy,26*SS);
      g.addColorStop(0,'rgba(255,230,120,.5)');g.addColorStop(1,'rgba(255,230,120,0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(ox,iy,26*SS,0,TAU);ctx.fill();
      ctx.save();ctx.translate(ox,iy);ctx.rotate(t*2+it.z*.01);
      starPath(ctx,15*SS);
      ctx.fillStyle='#ffe066';ctx.fill();
      ctx.strokeStyle='#f08c00';ctx.lineWidth=2;ctx.stroke();
      ctx.restore();
    }
  }
  // obstacles
  for(const o of world.sideObs){
    const ox=px+(o.z-d);
    if(ox<-160||ox>W+160)continue;
    ctx.save();
    if(o.hit){
      ctx.translate(ox,gy-24*SS+o.yOff);
      ctx.rotate(o.rot);
      ctx.translate(-ox,-(gy-24*SS));
    }
    if(o.type==='pipe')drawPipeSide(ctx,ox,gy,SS);
    else if(o.type==='rock')drawRockSide(ctx,ox,gy,SS);
    else if(o.type==='cone')drawConeSide(ctx,ox,gy,SS);
    else{
      // parked car (side view)
      ctx.save();ctx.translate(ox,gy);ctx.scale(SS,SS);
      drawCarSide(ctx,o.spec,0,0);
      ctx.restore();
    }
    ctx.restore();
  }
  // thrown stars
  for(const b of world.balls){
    const bx=px+(b.z-d);
    const by=gy-(b.h||30)*1;
    ctx.fillStyle='rgba(255,224,102,.35)';
    ctx.beginPath();ctx.arc(bx-18,by,8,0,TAU);ctx.fill();
    ctx.beginPath();ctx.arc(bx-33,by,5.5,0,TAU);ctx.fill();
    ctx.save();ctx.translate(bx,by);ctx.rotate(b.spin);
    starPath(ctx,13*SS);
    ctx.fillStyle='#ffe066';ctx.fill();
    ctx.strokeStyle='#f08c00';ctx.lineWidth=2;ctx.stroke();
    ctx.restore();
  }
  // puffs (dust)
  for(const p of world.particles){
    if(p.kind!=='puff')continue;
    ctx.fillStyle='rgba(205,190,170,'+(0.55*(1-p.t/p.life)).toFixed(3)+')';
    ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,TAU);ctx.fill();
  }
  // player car
  const jy=world.jumpY;
  const pxx=px+world.sideX;
  // shadow shrinks in air
  const shk=clamp(1-jy/320,.35,1);
  ctx.fillStyle='rgba(20,30,20,'+(0.3*shk).toFixed(3)+')';
  ctx.beginPath();ctx.ellipse(pxx,gy-2,selCar.l*SS*.5*shk,8*shk,0,0,TAU);ctx.fill();
  let tilt=clamp(-world.jumpVy*.00042,-.28,.22)+clamp(world.sideVx*.0004,-.12,.12);
  if(jy<=0)tilt=0;
  let bounce=jy<=0?Math.sin(d*.09)*1.6:0;
  if(state==='crash'){
    const k=world.crashT;
    tilt=Math.sin(k*26)*.4*Math.max(0,1-k);
    bounce=-Math.abs(Math.sin(k*12))*10*Math.max(0,1-k);
  }
  if(world.invT>0)ctx.globalAlpha=.55+.35*Math.sin(t*24); // recovery blink
  drawCarSideAt(ctx,selCar,pxx,gy-jy,SS,d*.11,bounce,tilt);
  ctx.globalAlpha=1;
  // whoosh streaks while steering sideways in the air
  const leanIn=((keys.right?1:0)-(keys.left?1:0))||(pad.on?pad.ax:0);
  if(jy>0&&state==='play'&&(Math.abs(world.sideVx)>120||leanIn)){
    const dir=(Math.abs(world.sideVx)>120?world.sideVx:leanIn)>0?1:-1;
    ctx.strokeStyle='rgba(255,255,255,.6)';ctx.lineWidth=3.5;ctx.lineCap='round';
    for(let i=0;i<3;i++){
      const yy=gy-jy-(8+i*15)*SS;
      ctx.beginPath();
      ctx.moveTo(pxx-dir*(58+i*10)*SS,yy);
      ctx.lineTo(pxx-dir*(30+i*7)*SS,yy);
      ctx.stroke();
    }
  }
  // speed lines
  if(state==='play'&&world.speed>course.base*1.1){
    ctx.strokeStyle='rgba(255,255,255,.35)';ctx.lineWidth=3;ctx.lineCap='round';
    for(let i=0;i<5;i++){
      const xx=W-mod(t*world.speed*1.3+i*230,W+200)+100;
      const yy=60+(i*137)%Math.max(80,(gy-140));
      ctx.beginPath();ctx.moveTo(xx,yy);ctx.lineTo(xx+66,yy);ctx.stroke();
    }
  }
}

/* ============================== screens / flow ============================== */
const SCREENS=['screen-title','screen-cars','screen-courses','screen-diff','screen-over','screen-pause'];
function showScreen(id){
  SCREENS.forEach(s=>$('#'+s).classList.toggle('hidden',s!==id));
  $('#hud').classList.toggle('hidden',!(id===null));
  $('#btn-throw').classList.toggle('hidden',!(id===null));
  $('#btn-jump').classList.toggle('hidden',!(id===null));
  $('#btn-jump').style.opacity='';
  if(id!==null){$('#banner').classList.add('hidden');$('#toast').classList.add('hidden');}
}
function setState(s){
  state=s;
  pointers.clear();keys.left=false;keys.right=false;keys.jump=false;
  if(s==='title')showScreen('screen-title');
  else if(s==='cars')showScreen('screen-cars');
  else if(s==='courses')showScreen('screen-courses');
  else if(s==='diff')showScreen('screen-diff');
  else if(s==='over')showScreen('screen-over');
  else if(s==='paused')showScreen('screen-pause');
  else showScreen(null);
  if(s!=='play'&&s!=='ready'){stopEngine();stopSiren();}
  // BGM: quiet loop on menus, silence during countdown / results / pause
  if(s==='title'||s==='cars'||s==='courses'||s==='diff')startBgm('menu');
  else if(s==='ready'||s==='over'||s==='paused')stopBgm();
  // controller focus follows the visible screen
  setPadFocus(null);
  if(pad.using&&PAD_MENUS[s])padEnsureFocus();
}
function bestFor(id){return bests[id+':'+diff.id]|0;}
function startGame(){
  computeRoad();
  resetWorld(false);
  $('#dist').textContent='0m';
  $('#bestlab').textContent='べすと '+bestFor(course.id)+'m';
  setState('ready');
}
function showOver(){
  const m=meters();
  const prev=bestFor(course.id);
  const isNew=m>prev;
  if(isNew){bests[course.id+':'+diff.id]=m;lsSet('jikoBest',JSON.stringify(bests));}
  $('#res-dist').textContent=m+'m はしったよ';
  $('#res-best').textContent='べすと '+bestFor(course.id)+'m（'+diff.name+'）';
  $('#newrec').classList.toggle('hidden',!isNew);
  if(isNew)setTimeout(sndFanfare,350);
  setState('over');
  refreshCourseBests();refreshDiffBests();
}

  c.beginPath();c.moveTo(w*.55,h+10);c.quadraticCurveTo(w*(.55+co.curve*.22),h*.4,w*.5,-10);c.stroke();
  c.setLineDash([]);
  const s=.72;
  if(co.id==='machi'){drawBuilding(c,w*.14,h*.3,s,7,false);drawTree(c,w*.86,h*.62,s,3);drawSignal(c,w*.85,h*.24,s,1,0);}
  if(co.id==='kousoku'){drawSign(c,w*.14,h*.3,s,1);drawBush(c,w*.87,h*.6,s,2);drawTree(c,w*.13,h*.75,s,4);}

    c.fillStyle='rgba(8,10,38,.15)';c.fillRect(0,0,w,h);}
  if(co.id==='yuki'){drawSnowTree(c,w*.13,h*.3,s,3);drawSnowman(c,w*.87,h*.55,s,1);drawSnowTree(c,w*.86,h*.85,s,6);}
  if(co.id==='uminaka'){
    drawCoral(c,w*.13,h*.65,s,2);drawSeaweed(c,w*.87,h*.6,s,4,0);drawShell(c,w*.86,h*.85,s,1);
    drawFish(c,{x:w*.2,y:h*.22,dir:1,n:1,size:.55,hue:15,ph:0},0);
    drawFish(c,{x:w*.8,y:h*.32,dir:-1,n:1,size:.5,hue:200,ph:1},0);
    c.strokeStyle='rgba(220,245,255,.7)';c.lineWidth=1.4;
    [[w*.3,h*.5,4],[w*.72,h*.7,3],[w*.65,h*.2,5]].forEach(b=>{
      c.beginPath();c.arc(b[0],b[1],b[2],0,TAU);c.stroke();});
    c.fillStyle='rgba(10,70,130,.14)';c.fillRect(0,0,w,h);
  }
  if(co.id==='fubuki'){
    drawSnowTree(c,w*.13,h*.35,s,2);drawSnowman(c,w*.86,h*.6,s,1);
    c.fillStyle='rgba(255,255,255,.9)';

const app=$('#app');
app.addEventListener('pointerdown',e=>{
  initAudio();
  setUsingPad(false); // any touch instantly brings the on-screen buttons back
  if((state==='play'||state==='ready'||state==='crash')&&e.target===canvas){
    e.preventDefault();
    pointers.set(e.pointerId,{x:e.clientX,y:e.clientY,sx:e.clientX,sy:e.clientY,
      drag:false,t0:performance.now(),vx:0,lx:e.clientX,tm:performance.now(),flicked:false});
    try{canvas.setPointerCapture(e.pointerId);}catch(x){}
    if(course.mode==='side')doJump(); // tap anywhere = jump
  }
},{passive:false});
app.addEventListener('pointermove',e=>{
  const p=pointers.get(e.pointerId);
  if(!p)return;
  p.x=e.clientX;p.y=e.clientY;
  if(Math.abs(p.x-p.sx)>12||Math.abs(p.y-p.sy)>12)p.drag=true;
  // smoothed horizontal finger velocity (for flick jumps in side mode)
  const now=performance.now();
  const dtm=Math.max(8,now-p.tm);
  p.vx=.6*p.vx+.4*((e.clientX-p.lx)*1000/dtm);
  p.lx=e.clientX;p.tm=now;
  if(course.mode==='side'&&!p.flicked&&now-p.t0<220){
    const dx=p.x-p.sx;
    if(Math.abs(dx)>28&&(world.jumpY>0||world.jumpVy>0)){
      p.flicked=true; // quick flick right after takeoff -> diagonal jump
      world.sideVx=clamp(dx*6,-400,400);
    }
  }
});
function releasePointer(e){
  const p=pointers.get(e.pointerId);
  if(p&&course.mode==='side'&&(world.jumpY>0||world.jumpVy>0)&&Math.abs(p.vx)>240){
    world.sideVx=clamp(p.vx*.75,-430,430); // carry swipe momentum into the air
  }
  pointers.delete(e.pointerId);
}
app.addEventListener('pointerup',releasePointer);
app.addEventListener('pointercancel',releasePointer);
window.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'){keys.left=true;e.preventDefault();}
  if(e.key==='ArrowRight'){keys.right=true;e.preventDefault();}
  if(e.key===' '||e.key==='ArrowUp'){ // jump in every mode
    if(!e.repeat)doJump();
    keys.jump=true;
    e.preventDefault();
  }
  if((e.key==='Enter'||e.key==='x'||e.key==='X')&&!e.repeat)throwItem();
  if((e.key==='Escape'||e.key==='p'||e.key==='P')&&!e.repeat){
    if(state==='play')pauseGame();
    else if(state==='paused')resumeGame();
  }
});

/* standard mapping: axes[0]=left stick X, buttons 0=A 1=B 2=X 9=Start 12-15=dpad */
const PAD_DEAD=.18;
const pad={on:false,using:false,ax:0,ay:0,a:false,prev:{},rep:{},lastAct:false,focusEl:null};
const PAD_MENUS={title:1,cars:1,courses:1,diff:1,over:1,paused:1};
function padGetPad(){
  try{
    const gps=navigator.getGamepads?navigator.getGamepads():[];
    for(const g of gps)if(g&&g.connected)return g;
  }catch(e){}
  return null;
}

  pad.ax=0;pad.ay=0;pad.a=false;pad.prev={};pad.rep={};
}
function setUsingPad(v){
  if(pad.using===v)return;
  pad.using=v;
  document.body.classList.toggle('padctl',v);
  if(!v)setPadFocus(null);
  else if(PAD_MENUS[state])padEnsureFocus();
}
function padFocusables(){
  let sels=null;
  if(state==='title')sels=['#btn-start'];
  else if(state==='cars')sels=['#car-grid .card','#btn-cars-back','#btn-cars-next'];
  else if(state==='courses')sels=['#course-grid .card','#btn-courses-back','#btn-courses-next'];
  else if(state==='diff')sels=['#diff-list .diffcard','#lives-row .lifecard','#btn-diff-back','#btn-go'];
  else if(state==='over')sels=['#btn-retry','#btn-change'];
  else if(state==='paused')sels=['#btn-resume','#btn-quit'];
  if(!sels)return[];
  const out=[];
  sels.forEach(s=>document.querySelectorAll(s).forEach(el=>out.push(el)));
  return out;
}
function setPadFocus(el){
  if(pad.focusEl===el)return;
  if(pad.focusEl)pad.focusEl.classList.remove('pfocus');
  pad.focusEl=el||null;
  if(el){
    el.classList.add('pfocus');
    try{el.scrollIntoView({block:'nearest'});}catch(e){}
  }
}
function padDefaultFocus(){
  if(state==='title')return $('#btn-start');
  if(state==='cars')return document.querySelector('#car-grid .card.sel')||document.querySelector('#car-grid .card');
  if(state==='courses')return document.querySelector('#course-grid .card.sel')||document.querySelector('#course-grid .card');
  if(state==='diff')return document.querySelector('#diff-list .diffcard.sel')||document.querySelector('#diff-list .diffcard');
  if(state==='over')return $('#btn-retry');
  if(state==='paused')return $('#btn-resume');
  return null;
}
function padEnsureFocus(){
  const els=padFocusables();
  if(pad.focusEl&&els.indexOf(pad.focusEl)>=0)return true;
  setPadFocus(padDefaultFocus());
  return false;
}
function padMove(dx,dy){
  if(!padEnsureFocus())return; // first press just reveals the ring
  const cur=pad.focusEl;
  if(!cur)return;
  const els=padFocusables();
  const r0=cur.getBoundingClientRect();
  const cx=r0.left+r0.width/2,cy=r0.top+r0.height/2;
  let best=null,bd=1e9;
  for(const el of els){
    if(el===cur)continue;
    const r=el.getBoundingClientRect();
    if(!r.width&&!r.height)continue;
    const vx=r.left+r.width/2-cx,vy=r.top+r.height/2-cy;
    const fwd=vx*dx+vy*dy;      // must lie in the pressed direction
    if(fwd<6)continue;
    const d=fwd+(Math.abs(vx*dy)+Math.abs(vy*dx))*2.4; // prefer straight ahead
    if(d<bd){bd=d;best=el;}
  }
  if(best){setPadFocus(best);blip(760,900,.05,'square',.05);}
}
function padConfirm(){
  padEnsureFocus();
  if(pad.focusEl)pad.focusEl.click();
}
function padBack(){
  if(state==='cars')$('#btn-cars-back').click();
  else if(state==='courses')$('#btn-courses-back').click();
  else if(state==='diff')$('#btn-diff-back').click();
  else if(state==='over')$('#btn-change').click();
  else if(state==='paused')resumeGame();
}
function padNavTick(name,pressed,dt,fn){
  if(!pressed){pad.rep[name]=-1;return;}
  if(pad.rep[name]===-1||pad.rep[name]===undefined){fn();pad.rep[name]=.3;} // first press
  else{
    pad.rep[name]-=dt;
    if(pad.rep[name]<=0){fn();pad.rep[name]=.12;} // key repeat
  }
}
function pollPad(dt){
  const gp=padGetPad();
  if(!gp){
    if(pad.on){pad.on=false;padLost();}
    return;
  }
  if(!pad.on){pad.on=true;padFound();}
  const b=i=>!!(gp.buttons&&gp.buttons[i]&&gp.buttons[i].pressed);
  const dz=v=>{v=v||0;return Math.abs(v)<PAD_DEAD?0:Math.sign(v)*(Math.abs(v)-PAD_DEAD)/(1-PAD_DEAD);};
  const ax=dz(gp.axes&&gp.axes[0]),ay=dz(gp.axes&&gp.axes[1]);
  const cur={
    left:b(14)||ax<-.45,right:b(15)||ax>.45,
    up:b(12)||ay<-.45,down:b(13)||ay>.45,
    a:b(0),b:b(1),x:b(2),start:b(9)
  };
  pad.ax=b(14)?-1:(b(15)?1:ax);
  pad.ay=ay;
  pad.a=cur.a;
  const act=ax!==0||ay!==0||cur.left||cur.right||cur.up||cur.down||cur.a||cur.b||cur.x||cur.start;
  if(act&&!pad.lastAct){setUsingPad(true);initAudio();}
  pad.lastAct=act;
  const edge=k=>cur[k]&&!pad.prev[k];
  if(edge('start')){
    if(state==='play')pauseGame();
    else if(state==='paused')resumeGame();
  }
  if(PAD_MENUS[state]){
    padNavTick('left',cur.left,dt,()=>padMove(-1,0));
    padNavTick('right',cur.right,dt,()=>padMove(1,0));
    padNavTick('up',cur.up,dt,()=>padMove(0,-1));
    padNavTick('down',cur.down,dt,()=>padMove(0,1));
    if(edge('a'))padConfirm();
    if(edge('b'))padBack();
  }else{
    if(edge('a'))doJump();               // A = jump (held A = higher jump in side mode)
    if(edge('b')||edge('x'))throwItem(); // B / X = throw the star item
  }
  pad.prev=cur;
}
window.addEventListener('gamepadconnected',()=>{if(!pad.on&&padGetPad()){pad.on=true;padFound();}});
window.addEventListener('gamepaddisconnected',()=>{if(pad.on&&!padGetPad()){pad.on=false;padLost();}});

/* ============================== boot ============================== */
resize();
buildCarGrid();
buildCourseGrid();
buildDiffList();
buildLivesRow();
selectCar(lsGet('jikoSelCar')||'sports');
selectCourse(lsGet('jikoSelCourse')||'machi');
selectDiff(parseInt(lsGet('jikoSelDiff')||'3',10)||3);
selectLives(parseInt(lsGet('jikoSelLives')||'5',10)||5);
updateMusicBtn();
resetWorld(true);
/* test hooks (harmless in production) */
window.__test={
  give:n=>{world.items=clamp(n,0,3);updateItemHUD();},
  items:()=>world.items,
  bonus:()=>world.bonus,
  spawnItemAhead:dz=>{
    const z=world.dist+(dz||420);
    world.obstacles.push({z,lane:clamp((world.carX-roadCenterAt(z))/roadHalf,-.7,.7),type:'item',sp:0,dir:1,kind:'item',seed:0});
  },
  spawnCarAhead:dz=>{
    const z=world.dist+(dz||520);
    const kind=course.vehicle==='sub'?'sub':(course.vehicle==='space'?'ufo':'car');
    world.obstacles.push({z,lane:clamp((world.carX-roadCenterAt(z))/roadHalf,-.7,.7),
      type:'car',kind,spec:CARS[7],sp:world.speed*.3,dir:1,seed:3});
  },
  throwNow:()=>throwItem(),
  setDist:v=>{
    world.dist=v;
    world.nextObsZ=v+PY+600;
    world.nextItemZ=v+PY+900;
    world.deco=[];world.obstacles=[];
    world.nextDecoZ=v;
    if(course.deco)while(world.nextDecoZ<v+PY+300)spawnDeco();
  },
  inWater:()=>world.inWater,
  jumpY:()=>world.jumpY,
  jump:()=>doJump(),
  airT:()=>world.airT,
  jumpCd:()=>world.jumpCd,
  landG:()=>world.landG,
  zoneKind:()=>world.zoneKind,
  boostT:()=>world.boostT,
  speedNow:()=>world.speed,
  steerV:()=>world.steerV,
  carX:()=>world.carX,
  spawnZoneAhead:(kind,dz,len,wf)=>{
    const w=wf||1;
    const off=clamp((world.carX-roadCenterAt(world.dist))/roadHalf,-(1-w)-.4,(1-w)+.4);
    world.zones.push({z:world.dist+(dz||300),len:len||360,wf:w,off:w>=1?0:off,
      kind:kind||'mud',seed:11,used:false});
  },
  clearZones:()=>{world.zones=[];world.nextZoneZ=world.dist+PY+5000;world.zoneKind=null;world.boostT=0;},
  clearSide:()=>{world.sideObs=[];world.nextObsZ=world.dist+W+4000;world.airItems=[];world.nextAirZ=world.dist+W+4000;},
  sideObstacle:dz=>{world.sideObs.push({z:world.dist+(dz||420),type:'pipe',w:64,h:66});},
  sideCar:dz=>{world.sideObs.push({z:world.dist+(dz||460),type:'car',spec:CARS[7],w:CARS[7].l,h:44});},
  airStar:(dz,h)=>{world.airItems.push({z:world.dist+(dz||300),h:h||110,kind:'star'});},
  obstacleDx:()=>{
    let m=1e9;
    world.sideObs.forEach(o=>{if(!o.hit){const dx=o.z-world.dist;if(dx>-40&&dx<m)m=dx;}});
    return m;
  },
  airDx:()=>{
    let m=1e9;
    world.airItems.forEach(o=>{if(!o.got){const dx=o.z-world.dist;if(dx>-40&&dx<m)m=dx;}});
    return m;
  },
  lives:()=>world.lives,
  livesTotal:()=>world.livesTotal,
  selLives:()=>selLives,
  setLives:n=>{world.lives=clamp(n,1,world.livesTotal||10);updateLivesHUD();},
  forceCrash:()=>doCrash(false),
  clearInv:()=>{world.invT=0;},
  invT:()=>world.invT,
  clearRoad:()=>{world.obstacles=[];world.nextObsZ=world.dist+PY+3000;world.nextItemZ=world.dist+PY+3000;},
  sirenOn:()=>!!siren,
  acOn:()=>!!AC,
  acState:()=>AC?AC.state:'none',
  autopilot:v=>{TEST_AUTO=!!v;},
  sideX:()=>world.sideX,
  sideVx:()=>world.sideVx,
  bgmOn:()=>!!bgm,
  bgmMode:()=>bgm?bgm.mode:'',
  bgmBar:()=>bgm?bgm.bar:-1,
  bgmNotes:()=>bgmNotesScheduled,
  bgmEnabled:()=>bgmEnabled,
  padOn:()=>pad.on,
  padUsing:()=>pad.using,
  padFocus:()=>{
    const el=pad.focusEl;
    if(!el)return null;
    return el.id||el.dataset.car||el.dataset.course||el.dataset.diff||el.dataset.lives||'el';
  },
  go:(car,co,d)=>{if(car)selectCar(car);if(co)selectCourse(co);if(d)selectDiff(d);startGame();}
};
let last=performance.now();
function frame(now){
  requestAnimationFrame(frame);
  let dt=(now-last)/1000;last=now;
  dt=Math.min(dt,.05);
  pollPad(dt);
  update(dt,now/1000);
  render(now/1000);
}
requestAnimationFrame(frame);
</script>

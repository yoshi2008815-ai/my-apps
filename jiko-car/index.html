<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>じこアプリ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:#233;}
body{
  font-family:"Hiragino Maru Gothic ProN","Hiragino Kaku Gothic ProN","BIZ UDPGothic","Yu Gothic UI","Meiryo",system-ui,sans-serif;
  -webkit-user-select:none;user-select:none;
  -webkit-touch-callout:none;
  -webkit-tap-highlight-color:transparent;
  touch-action:none;
  overscroll-behavior:none;
}
#app{position:fixed;inset:0;overflow:hidden;background:#8fd077;}
#game{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none;z-index:0;}
.screen{
  position:absolute;inset:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:calc(10px + env(safe-area-inset-top)) 14px calc(12px + env(safe-area-inset-bottom));
}
.hidden{display:none !important;}
.panel{
  background:rgba(255,255,255,.92);
  border:5px solid #ffb63d;
  border-radius:32px;
  box-shadow:0 14px 34px rgba(30,40,80,.30);
  padding:18px 20px;
  width:min(94vw,700px);
  max-height:96%;
  display:flex;flex-direction:column;align-items:center;gap:12px;
  overflow:hidden;
}
.scrolly{overflow-y:auto;touch-action:pan-y;-webkit-overflow-scrolling:touch;width:100%;padding:6px 2px 10px;}
h1.logo{
  font-size:clamp(52px,13vw,96px);font-weight:900;color:#ff4d3a;letter-spacing:.04em;
  text-shadow:0 4px 0 #fff,0 8px 0 rgba(160,40,20,.25);
  animation:wobble 2.4s ease-in-out infinite;
}
@keyframes wobble{0%,100%{transform:rotate(-2deg) scale(1);}50%{transform:rotate(2deg) scale(1.04);}}
.sub{font-size:clamp(17px,4vw,24px);font-weight:700;color:#456;}
h2.head{font-size:clamp(24px,6vw,34px);font-weight:900;color:#2c5f9e;}
.btn{
  font-family:inherit;font-weight:900;color:#5b3600;
  font-size:clamp(22px,5vw,30px);
  padding:14px 40px;border:none;border-radius:999px;
  background:linear-gradient(#ffe066,#ffa62e);
  box-shadow:0 6px 0 #d97b00,0 12px 18px rgba(0,0,0,.22);
  cursor:pointer;touch-action:manipulation;
}
.btn:active{transform:translateY(5px);box-shadow:0 1px 0 #d97b00;}
.btn.big{font-size:clamp(28px,7vw,40px);padding:18px 56px;}
.btn.blue{background:linear-gradient(#9fd4ff,#3f8fe8);color:#fff;box-shadow:0 6px 0 #1d5ea8,0 12px 18px rgba(0,0,0,.22);}
.btn.blue:active{box-shadow:0 1px 0 #1d5ea8;}
.btn.small{font-size:clamp(16px,3.6vw,20px);padding:9px 22px;box-shadow:0 4px 0 #d97b00,0 8px 12px rgba(0,0,0,.18);}
.row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;align-items:center;}
.grid{
  display:grid;gap:10px;width:100%;
  grid-template-columns:repeat(auto-fill,minmax(118px,1fr));
}
.grid.courses{grid-template-columns:repeat(auto-fill,minmax(186px,1fr));}
.card{
  background:#fff;border:4px solid #dfe6f0;border-radius:22px;
  padding:8px 6px 10px;display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;transition:transform .12s;position:relative;
}
.card:active{transform:scale(.95);}
.card.sel{border-color:#ff8a3d;background:#fff4dd;box-shadow:0 0 0 4px rgba(255,170,60,.35);}
.card canvas{width:100%;height:auto;display:block;}
.card .nm{font-size:clamp(12px,3vw,16px);font-weight:800;color:#334;white-space:nowrap;max-width:100%;overflow:hidden;}
.card .nm.long{font-size:clamp(10px,2.4vw,12px);letter-spacing:-.03em;}
.card .bs{font-size:12px;font-weight:700;color:#e8842a;min-height:15px;}
#car-preview-wrap{display:flex;align-items:center;gap:14px;}
#car-preview{width:150px;height:170px;}
#car-preview-name{font-size:clamp(20px,5vw,30px);font-weight:900;color:#e8551e;}
.grid.diffs{grid-template-columns:1fr;max-width:520px;margin:0 auto;}
.diffcard{
  display:flex;align-items:center;gap:14px;background:#fff;border:4px solid #dfe6f0;
  border-radius:20px;padding:10px 18px;cursor:pointer;transition:transform .12s;
}
.diffcard:active{transform:scale(.96);}
.diffcard.sel{border-color:#ff8a3d;background:#fff4dd;box-shadow:0 0 0 4px rgba(255,170,60,.35);}
.diffcard .stars{display:flex;gap:3px;flex:0 0 auto;}
.diffcard .stars svg{width:clamp(18px,5vw,26px);height:clamp(18px,5vw,26px);}
.diffcard .dn{font-size:clamp(18px,4.6vw,26px);font-weight:900;color:#334;}
.diffcard .db{font-size:13px;font-weight:700;color:#e8842a;min-height:16px;}
#btn-throw{
  position:absolute;right:calc(16px + env(safe-area-inset-right));bottom:calc(18px + env(safe-area-inset-bottom));
  width:116px;height:116px;border-radius:50%;border:none;z-index:6;
  background:radial-gradient(circle at 35% 30%,#ffe98a,#ffb63d 60%,#f08c1e);
  box-shadow:0 6px 0 #c96f08,0 10px 18px rgba(0,0,0,.28);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;touch-action:none;-webkit-user-select:none;user-select:none;
}
#btn-throw:active{transform:translateY(4px);box-shadow:0 2px 0 #c96f08;}
#btn-throw.off{filter:grayscale(.9);opacity:.55;}
#btn-throw.ready{animation:throbGlow 1s ease-in-out infinite;}
@keyframes throbGlow{
  0%,100%{box-shadow:0 6px 0 #c96f08,0 0 0 0 rgba(255,220,80,.8);}
  50%{box-shadow:0 6px 0 #c96f08,0 0 28px 12px rgba(255,220,80,.8);}
}
#btn-throw svg{width:46px;height:46px;}
#btn-throw .tl{font-size:18px;font-weight:900;color:#5b3600;}
#throw-count{
  position:absolute;top:-4px;right:-4px;background:#ff4d3a;color:#fff;
  font-size:20px;font-weight:900;width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;border:3px solid #fff;
}
#btn-jump{
  position:absolute;left:calc(16px + env(safe-area-inset-left));bottom:calc(18px + env(safe-area-inset-bottom));
  width:124px;height:124px;border-radius:50%;border:none;z-index:6;
  background:radial-gradient(circle at 35% 30%,#b8e6ff,#4d9fe8 60%,#2a6fc2);
  box-shadow:0 6px 0 #1d5391,0 10px 18px rgba(0,0,0,.28);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;touch-action:none;-webkit-user-select:none;user-select:none;
}
#btn-jump:active{transform:translateY(4px);box-shadow:0 2px 0 #1d5391;}
#btn-jump svg{width:44px;height:44px;}
#btn-jump .tl{font-size:19px;font-weight:900;color:#fff;}
#toast{
  position:absolute;top:calc(120px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);
  z-index:6;background:rgba(25,130,200,.92);color:#fff;font-weight:900;
  font-size:clamp(18px,4.5vw,26px);padding:8px 28px;border-radius:999px;
  box-shadow:0 6px 14px rgba(0,0,0,.25);pointer-events:none;white-space:nowrap;
}
#toast.pop{animation:toastpop .4s ease-out;}
@keyframes toastpop{
  0%{transform:translateX(-50%) scale(.2);opacity:0;}
  60%{transform:translateX(-50%) scale(1.12);opacity:1;}
  100%{transform:translateX(-50%) scale(1);opacity:1;}
}
#toast.ouch{background:rgba(232,90,70,.94);}
/* gamepad: focus ring for controller menu navigation */
.pfocus{
  position:relative;z-index:2;
  animation:pfpulse 1.1s ease-in-out infinite;
}
@keyframes pfpulse{
  0%,100%{box-shadow:0 0 0 4px #fff,0 0 0 10px #2f8fe8,0 12px 22px rgba(20,60,140,.4);}
  50%{box-shadow:0 0 0 4px #fff,0 0 0 14px #7cc0ff,0 12px 22px rgba(20,60,140,.4);}
}
/* while the controller is in use, fade the on-screen action buttons (touch instantly restores) */
body.padctl #btn-jump,body.padctl #btn-throw{opacity:.22 !important;filter:grayscale(.5);}
#lives{display:flex;gap:3px;justify-content:center;margin-top:3px;}
#lives .hh{display:block;position:relative;}
#lives .hh svg{width:clamp(17px,4.4vw,23px);height:clamp(17px,4.4vw,23px);display:block;transition:filter .25s,opacity .25s;}
#lives .hh.off svg{filter:grayscale(1);opacity:.28;}
#lives .hh.pop{animation:heartbye .8s ease-out;}
@keyframes heartbye{
  0%{transform:scale(1) translateY(0) rotate(0deg);}
  30%{transform:scale(1.9) translateY(-12px) rotate(-20deg);}
  60%{transform:scale(1.2) translateY(-4px) rotate(12deg);}
  100%{transform:scale(1) translateY(0) rotate(0deg);}
}
#lives .hh.doki{animation:doki .6s ease-in-out infinite;}
@keyframes doki{0%,100%{transform:scale(1);}50%{transform:scale(1.4);}}
#lives.many{flex-wrap:wrap;gap:2px;max-width:92px;margin-left:auto;margin-right:auto;}
#lives.many .hh svg{width:16px;height:16px;}
#lives-head{font-size:clamp(17px,4.2vw,24px);font-weight:900;color:#2c5f9e;text-align:center;margin:16px 0 8px;}
#lives-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding:2px 0 6px;}
.lifecard{
  display:flex;align-items:center;gap:5px;background:#fff;border:4px solid #dfe6f0;
  border-radius:18px;padding:10px 14px;cursor:pointer;transition:transform .12s;
}
.lifecard:active{transform:scale(.94);}
.lifecard.sel{border-color:#ff8a3d;background:#fff4dd;box-shadow:0 0 0 4px rgba(255,170,60,.35);}
.lifecard svg{width:clamp(22px,6vw,30px);height:clamp(22px,6vw,30px);display:block;}
.lifecard .ln{font-size:clamp(19px,4.8vw,26px);font-weight:900;color:#c92a3c;}
#btn-music{
  position:absolute;top:calc(10px + env(safe-area-inset-top));right:calc(14px + env(safe-area-inset-right));
  z-index:11;width:58px;height:58px;border-radius:50%;border:3px solid #ffb63d;
  background:rgba(255,255,255,.92);box-shadow:0 4px 10px rgba(0,0,0,.18);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  touch-action:manipulation;
}
#btn-music:active{transform:scale(.92);}
#btn-music svg{width:32px;height:32px;}
#btn-music.off{opacity:.6;filter:grayscale(.85);}
#btn-music .slash{
  display:none;position:absolute;width:46px;height:5px;background:#e0483f;
  border-radius:3px;transform:rotate(-45deg);pointer-events:none;
}
#btn-music.off .slash{display:block;}
.card .badge{
  position:absolute;top:8px;left:8px;background:#3f8fe8;color:#fff;
  font-size:13px;font-weight:900;padding:3px 12px;border-radius:999px;
  box-shadow:0 2px 6px rgba(0,0,0,.25);z-index:1;
}
#hud{
  position:absolute;top:0;left:0;right:0;z-index:5;
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:calc(10px + env(safe-area-inset-top)) 14px 0;
  pointer-events:none;
}
#hud .chip{
  background:rgba(255,255,255,.92);border-radius:999px;border:3px solid #ffb63d;
  padding:6px 20px;text-align:center;box-shadow:0 4px 10px rgba(0,0,0,.18);
}
#hud .chip.tall{border-radius:28px;} /* two heart rows: rounded card, not an egg */
#dist{font-size:clamp(26px,6vw,38px);font-weight:900;color:#2b4a75;line-height:1.05;}
#bestlab{font-size:clamp(12px,2.8vw,15px);font-weight:800;color:#e8842a;}
#btn-home{pointer-events:auto;}
#banner{
  position:absolute;top:34%;left:0;right:0;z-index:8;text-align:center;pointer-events:none;
  font-size:clamp(56px,14vw,110px);font-weight:900;color:#fff;
  text-shadow:0 0 0 #fff,0 4px 0 #e8842a,0 8px 0 rgba(120,50,0,.35),0 12px 24px rgba(0,0,0,.3);
}
#banner.pop{animation:pop .5s ease-out;}
@keyframes pop{0%{transform:scale(.2);opacity:0;}60%{transform:scale(1.15);}100%{transform:scale(1);opacity:1;}}
#screen-over .panel{border-color:#ff7d6e;background:rgba(255,250,244,.95);}
#jiko-word{
  font-size:clamp(64px,18vw,120px);font-weight:900;color:#ff4d3a;
  text-shadow:0 4px 0 #fff,0 9px 0 rgba(170,40,20,.3);
  animation:jikoswing 1s ease-in-out infinite;
}
@keyframes jikoswing{0%,100%{transform:rotate(-4deg) scale(1);}50%{transform:rotate(4deg) scale(1.08);}}
.result{font-size:clamp(22px,5.5vw,32px);font-weight:900;color:#345;}
#newrec{
  font-size:clamp(18px,4.6vw,26px);font-weight:900;color:#fff;background:linear-gradient(#ffd43b,#ff922b);
  padding:6px 24px;border-radius:999px;box-shadow:0 4px 10px rgba(0,0,0,.2);
  animation:wobble 1s ease-in-out infinite;
}
.stars-deco{display:flex;gap:10px;}
.stars-deco svg{width:34px;height:34px;animation:twinkle 1.2s ease-in-out infinite;}
.stars-deco svg:nth-child(2){animation-delay:.2s;width:44px;height:44px;}
.stars-deco svg:nth-child(3){animation-delay:.4s;}
@keyframes twinkle{0%,100%{transform:scale(1) rotate(-8deg);}50%{transform:scale(1.3) rotate(8deg);}}
.hint{font-size:clamp(13px,3.2vw,16px);font-weight:700;color:#789;}
/* ---------- kart race mode ---------- */
.btn.green{background:linear-gradient(#8fe07a,#2f9e52);color:#fff;box-shadow:0 6px 0 #1c6e36,0 12px 18px rgba(0,0,0,.22);}
.btn.green:active{box-shadow:0 1px 0 #1c6e36;}
.mode-row{display:flex;flex-direction:column;gap:12px;align-items:center;}
.char-card{position:relative;}
.char-card .mini-btns{display:flex;gap:6px;margin-top:2px;}
.char-card .mini-btns button{
  font-family:inherit;font-weight:800;font-size:12px;border:none;border-radius:999px;
  padding:4px 10px;cursor:pointer;background:#dfe6f0;color:#345;
}
.char-card .mini-btns button.del{background:#ffd9d9;color:#a33;}
.card.newchar{justify-content:center;min-height:120px;border-style:dashed;border-color:#b9c4d4;}
.card.newchar .plus{font-size:44px;font-weight:900;color:#7a8aa0;line-height:1;}
#charedit-preview-wrap{display:flex;align-items:center;gap:16px;}
.ed-row{display:flex;align-items:center;gap:8px;width:100%;margin:3px 0;}
.ed-row .lb{flex:0 0 92px;font-size:clamp(13px,3.2vw,16px);font-weight:900;color:#456;}
.ed-opts{display:flex;gap:8px;overflow-x:auto;touch-action:pan-x;-webkit-overflow-scrolling:touch;padding:4px 2px;flex:1;}
.swatch{
  flex:0 0 auto;width:46px;height:46px;border-radius:14px;border:3px solid #dfe6f0;cursor:pointer;
  background:#fff;display:flex;align-items:center;justify-content:center;
}
.swatch.sel{border-color:#ff8a3d;box-shadow:0 0 0 3px rgba(255,170,60,.35);}
.swatch canvas{width:40px;height:40px;display:block;}
.namechip{
  flex:0 0 auto;font-family:inherit;font-weight:900;font-size:15px;border:3px solid #dfe6f0;
  border-radius:999px;padding:7px 14px;background:#fff;color:#345;cursor:pointer;
}
.namechip.sel{border-color:#ff8a3d;background:#fff4dd;}
#ed-name{
  font-family:inherit;font-weight:900;font-size:clamp(16px,4vw,20px);color:#345;
  border:3px solid #b9c4d4;border-radius:14px;padding:8px 12px;width:150px;
  -webkit-user-select:text;user-select:text;
}
.race-row{
  display:flex;align-items:center;gap:12px;width:100%;
  background:#fff;border:3px solid #dfe6f0;border-radius:18px;padding:8px 16px;
}
.race-row.me{border-color:#ff8a3d;background:#fff4dd;}
.race-row .rk{font-size:clamp(24px,6vw,34px);font-weight:900;color:#e8842a;min-width:58px;}
.race-row .rn{font-size:clamp(17px,4.2vw,23px);font-weight:900;color:#334;}
#race-result-title{font-size:clamp(40px,10vw,64px);font-weight:900;color:#ff8a3d;
  text-shadow:0 3px 0 #fff,0 6px 0 rgba(170,90,20,.25);animation:wobble 1.6s ease-in-out infinite;}
.vs-throw{
  position:absolute;z-index:6;width:92px;height:92px;border-radius:50%;border:none;
  background:radial-gradient(circle at 35% 30%,#ffe98a,#ffb63d 60%,#f08c1e);
  box-shadow:0 5px 0 #c96f08,0 8px 14px rgba(0,0,0,.28);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;touch-action:none;-webkit-user-select:none;user-select:none;
}
.vs-throw:active{transform:translateY(3px);box-shadow:0 2px 0 #c96f08;}
.vs-throw.off{filter:grayscale(.9);opacity:.5;}
.vs-throw svg{width:34px;height:34px;}
.vs-throw .tl{font-size:14px;font-weight:900;color:#5b3600;}
.vs-throw .cnt{
  position:absolute;top:-4px;right:-4px;background:#ff4d3a;color:#fff;font-size:16px;font-weight:900;
  width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:3px solid #fff;
}
#vs-throw1{right:calc(14px + env(safe-area-inset-right));bottom:calc(16px + env(safe-area-inset-bottom));}
#vs-throw2{right:calc(14px + env(safe-area-inset-right));top:calc(64px + env(safe-area-inset-top));}
body.vs-landscape #vs-throw1{right:auto;left:calc(14px + env(safe-area-inset-left));}
body.vs-landscape #vs-throw2{top:auto;bottom:calc(16px + env(safe-area-inset-bottom));right:calc(14px + env(safe-area-inset-right));}
body.vs-on #hud .chip{display:none;}
body.vs-on #btn-music{display:none;}
.card.newchar .nm{white-space:normal;text-align:center;line-height:1.3;}
body.padctl .vs-throw{opacity:.25 !important;}
.vs-throw.ready{animation:throbGlow 1s ease-in-out infinite;}
</style>
</head>
<body>
<div id="app">
  <canvas id="game"></canvas>

  <div id="hud" class="hidden">
    <button class="btn small" id="btn-home">もどる</button>
    <div class="chip"><div id="dist">0m</div><div id="bestlab">べすと 0m</div><div id="lives"></div></div>
    <div style="width:86px"></div>
  </div>

  <div id="banner" class="hidden"></div>

  <button id="btn-throw" class="hidden off">
    <svg viewBox="0 0 24 24"><path fill="#fff" stroke="#d98a10" stroke-width="1" d="M12 2l2.9 6.2 6.6.8-4.9 4.6 1.3 6.6L12 17l-5.9 3.2 1.3-6.6L2.5 9l6.6-.8z"/></svg>
    <span class="tl">なげる</span>
    <span id="throw-count">0</span>
  </button>

  <button id="btn-jump" class="hidden">
    <svg viewBox="0 0 24 24"><path fill="#fff" d="M12 4l8 9h-5v7H9v-7H4z"/></svg>
    <span class="tl">ジャンプ</span>
  </button>

  <div id="toast" class="hidden"></div>

  <button id="btn-music">
    <svg viewBox="0 0 24 24"><path fill="#8a5a00" d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h5V3h-7z"/></svg>
    <span class="slash"></span>
  </button>

  <div id="screen-title" class="screen">
    <div class="panel">
      <h1 class="logo">じこアプリ</h1>
      <p class="sub">くるまを うんてんして じこに きをつけよう！</p>
      <canvas id="title-car" width="440" height="240" style="width:220px;height:120px;"></canvas>
      <div class="mode-row">
        <button class="btn big" id="btn-start">ふつうに あそぶ</button>
        <button class="btn big green" id="btn-kart">カートレース</button>
      </div>
      <p class="hint">ゆびで うごかして あそんでね</p>
    </div>
  </div>

  <div id="screen-cars" class="screen hidden">
    <div class="panel">
      <h2 class="head">くるまを えらんでね</h2>
      <div id="car-preview-wrap">
        <canvas id="car-preview" width="450" height="510"></canvas>
        <div id="car-preview-name"></div>
      </div>
      <div class="scrolly"><div class="grid" id="car-grid"></div></div>
      <div class="row">
        <button class="btn small blue" id="btn-cars-back">もどる</button>
        <button class="btn" id="btn-cars-next">つぎへ</button>
      </div>
    </div>
  </div>

  <div id="screen-courses" class="screen hidden">
    <div class="panel">
      <h2 class="head">コースを えらんでね</h2>
      <div class="scrolly"><div class="grid courses" id="course-grid"></div></div>
      <div class="row">
        <button class="btn small blue" id="btn-courses-back">もどる</button>
        <button class="btn" id="btn-courses-next">つぎへ</button>
      </div>
    </div>
  </div>

  <div id="screen-diff" class="screen hidden">
    <div class="panel">
      <h2 class="head">むずかしさを えらんでね</h2>
      <div class="scrolly">
        <div class="grid diffs" id="diff-list"></div>
        <div id="lives-head">ハートの かず</div>

<script>
'use strict';
/* ============================== utils ============================== */
const $=s=>document.querySelector(s);
const clamp=(v,a,b)=>v<a?a:(v>b?b:v);
const lerp=(a,b,t)=>a+(b-a)*t;
const rand=(a,b)=>a+Math.random()*(b-a);
const TAU=Math.PI*2;
function shade(col,amt){ // col '#rrggbb', amt -1..1
  const n=parseInt(col.slice(1),16);
  const f=v=>clamp(Math.round(v+amt*255),0,255);
  return 'rgb('+f(n>>16&255)+','+f(n>>8&255)+','+f(n&255)+')';
}
function rr(c,x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  c.beginPath();
  c.moveTo(x+r,y);
  c.arcTo(x+w,y,x+w,y+h,r);
  c.arcTo(x+w,y+h,x,y+h,r);
  c.arcTo(x,y+h,x,y,r);
  c.arcTo(x,y,x+w,y,r);
  c.closePath();
}
function lsGet(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}

/* ============================== audio ============================== */
let AC=null,master=null,engine=null;
function initAudio(){
  try{
    if(!AC){
      AC=new (window.AudioContext||window.webkitAudioContext)();
      master=AC.createGain();master.gain.value=.5;master.connect(AC.destination);
    }
    if(AC.state==='suspended')AC.resume();
    if(state==='play'&&!engine)startEngine();
    if(state==='play'&&!siren)startSiren();
    if(bgmEnabled&&!bgm){
      if(state==='play')startBgm('play');
      else if(state==='title'||state==='cars'||state==='courses'||state==='diff')startBgm('menu');
    }
  }catch(e){}
}
function blip(f0,f1,dur,type,vol,when){
  if(!AC)return;
  try{
    const t=AC.currentTime+(when||0);
    const o=AC.createOscillator(),g=AC.createGain();
    o.type=type;o.frequency.setValueAtTime(f0,t);
    o.frequency.exponentialRampToValueAtTime(Math.max(30,f1),t+dur);
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(.001,t+dur);
    o.connect(g);g.connect(master);o.start(t);o.stop(t+dur+.05);
  }catch(e){}
}
function sndSelect(){blip(620,980,.1,'square',.1);}
function sndTap(){blip(420,560,.08,'sine',.12);}
function sndPoyon(){ // soft bouncy crash
  if(!AC)return;
  try{
    const t=AC.currentTime;
    const o=AC.createOscillator(),g=AC.createGain();
    o.type='sine';
    o.frequency.setValueAtTime(520,t);
    o.frequency.exponentialRampToValueAtTime(130,t+.22);
    o.frequency.exponentialRampToValueAtTime(330,t+.32);
    o.frequency.exponentialRampToValueAtTime(90,t+.55);
    g.gain.setValueAtTime(.3,t);
    g.gain.exponentialRampToValueAtTime(.002,t+.6);
    o.connect(g);g.connect(master);o.start(t);o.stop(t+.7);
    blip(200,60,.35,'triangle',.16,.02);
  }catch(e){}
}
function sndFanfare(){
  [523,659,784,1047].forEach((f,i)=>blip(f,f,.16,'triangle',.14,i*.11));
}
function sndCount(hi){blip(hi?880:440,hi?880:440,.14,'sine',.14);}
function sndClack(){ // gatan-goton rail joint clatter
  blip(130,72,.055,'triangle',.15);
  blip(105,62,.055,'triangle',.13,.085);
}
function sndGet(){blip(880,880,.07,'square',.12);blip(1320,1320,.1,'square',.12,.07);}
function sndThrow(){blip(950,240,.16,'triangle',.12);}
function sndHit(){
  blip(600,1500,.28,'sine',.09);
  [659,784,1047].forEach((f,i)=>blip(f,f,.09,'triangle',.13,.05+i*.07));
}
function startEngine(){
  if(!AC||engine)return;
  try{
    const o1=AC.createOscillator(),o2=AC.createOscillator();
    const g=AC.createGain(),f=AC.createBiquadFilter();
    o1.type='sawtooth';o2.type='sawtooth';
    o1.frequency.value=55;o2.frequency.value=84;o2.detune.value=8;
    f.type='lowpass';f.frequency.value=260;
    g.gain.value=0;
    o1.connect(f);o2.connect(f);f.connect(g);g.connect(master);
    o1.start();o2.start();
    g.gain.linearRampToValueAtTime(.032,AC.currentTime+.4); // keep engine quiet under the BGM
    engine={o1,o2,g};
  }catch(e){}
}
function stopEngine(){
  if(!engine)return;
  try{
    const e=engine;engine=null;
    e.g.gain.linearRampToValueAtTime(0,AC.currentTime+.25);
    setTimeout(()=>{try{e.o1.stop();e.o2.stop();}catch(x){}},400);
  }catch(e){engine=null;}
}
function updateEngine(speed){
  if(!engine||!AC)return;
  try{
    const f=40+speed*.17;
    engine.o1.frequency.setTargetAtTime(f,AC.currentTime,.08);
    engine.o2.frequency.setTargetAtTime(f*1.53+4,AC.currentTime,.08);
  }catch(e){}
}
/* sirens for emergency vehicles (player car) */
let siren=null;
function startSiren(){
  if(!AC||siren)return;
  let cfg=null;
  if(selCar.id==='police')cfg={base:760,dev:170,rate:.45,lfo:'triangle',vol:.03};   // uuu~uuu~ sweep
  else if(selCar.id==='amb')cfg={base:850,dev:105,rate:.92,lfo:'square',vol:.028};  // pee-poo pee-poo
  else if(selCar.id==='fire')cfg={base:540,dev:150,rate:.36,lfo:'triangle',vol:.032};
  if(!cfg)return;
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    const lf=AC.createOscillator(),lg=AC.createGain();
    o.type='triangle';o.frequency.value=cfg.base;
    lf.type=cfg.lfo;lf.frequency.value=cfg.rate;
    lg.gain.value=cfg.dev;
    lf.connect(lg);lg.connect(o.frequency);
    g.gain.value=0;
    o.connect(g);g.connect(master);
    o.start();lf.start();
    g.gain.linearRampToValueAtTime(cfg.vol,AC.currentTime+.5);
    siren={o,lf,g};
  }catch(e){}
}
function stopSiren(){
  if(!siren)return;
  try{
    const s=siren;siren=null;
    s.g.gain.linearRampToValueAtTime(0,AC.currentTime+.2);
    setTimeout(()=>{try{s.o.stop();s.lf.stop();}catch(x){}},350);
  }catch(e){siren=null;}
}
/* splash + jump */
let noiseBuf=null;
function getNoiseBuf(){
  if(!noiseBuf){
    noiseBuf=AC.createBuffer(1,Math.floor(AC.sampleRate*.5),AC.sampleRate);
    const d=noiseBuf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  }
  return noiseBuf;
}
function sndSplash(inWater){
  if(!AC)return;
  try{
    const t0=AC.currentTime;
    const dur=inWater?.6:.45;
    const src=AC.createBufferSource();src.buffer=getNoiseBuf();src.loop=true;
    const f=AC.createBiquadFilter();f.type='lowpass';
    f.frequency.setValueAtTime(inWater?2400:900,t0);
    f.frequency.exponentialRampToValueAtTime(inWater?320:2600,t0+dur);
    const g=AC.createGain();
    g.gain.setValueAtTime(.0001,t0);
    g.gain.exponentialRampToValueAtTime(.3,t0+.05);
    g.gain.exponentialRampToValueAtTime(.001,t0+dur);
    src.connect(f);f.connect(g);g.connect(master);
    src.start(t0);src.stop(t0+dur+.05);
    if(inWater)blip(220,70,.3,'sine',.2);
    else blip(150,430,.25,'sine',.12);
  }catch(e){}
}
function sndJump(){blip(280,720,.2,'square',.09);}
function sndMud(){ // becha-becha squelch
  blip(170,90,.12,'triangle',.16);
  blip(140,70,.14,'triangle',.14,.09);
  blip(200,110,.1,'triangle',.12,.2);
}
function sndIce(){blip(880,2300,.5,'sine',.06);} // tsuru-
function sndDash(){ // shuiin!
  blip(320,1600,.32,'sawtooth',.08);
  blip(640,1900,.28,'square',.05,.06);
}
function sndOuch(){ // gentle "poyon + zannen" when a heart is lost (not scary)
  if(!AC)return;
  try{
    const t0=AC.currentTime;
    const o=AC.createOscillator(),g=AC.createGain();
    o.type='sine';
    o.frequency.setValueAtTime(480,t0);
    o.frequency.exponentialRampToValueAtTime(150,t0+.16);
    o.frequency.exponentialRampToValueAtTime(300,t0+.24);
    o.frequency.exponentialRampToValueAtTime(120,t0+.34);
    g.gain.setValueAtTime(.22,t0);
    g.gain.exponentialRampToValueAtTime(.002,t0+.4);
    o.connect(g);g.connect(master);o.start(t0);o.stop(t0+.5);
    blip(392,320,.16,'triangle',.11,.2); // small sad note
  }catch(e){}
}
function sndDoki(){ // two soft heartbeats when only one heart is left
  blip(96,70,.1,'sine',.16,0);
  blip(96,70,.1,'sine',.13,.17);
}
function sndZukkoke(){ // comedic "slipped up" descending phrase on crash
  if(!AC)return;
  try{
    [392,349.23,311.13].forEach((f,i)=>blip(f,f*.94,.16,'triangle',.16,.1+i*.17));
    const t=AC.currentTime+.1+3*.17;
    const o=AC.createOscillator(),g=AC.createGain();
    o.type='triangle';
    o.frequency.setValueAtTime(293.66,t);
    o.frequency.exponentialRampToValueAtTime(150,t+.55);
    g.gain.setValueAtTime(.18,t);
    g.gain.exponentialRampToValueAtTime(.001,t+.62);
    o.connect(g);g.connect(master);o.start(t);o.stop(t+.7);
  }catch(e){}
}

/* ============================== BGM: original happy march ==============================
   Fully original melody (composed for this game) - a bright I-IV-V children's march.
   4/4, 136 BPM, 16 bars, C major. NOT a reproduction of any existing song. */
let bgm=null,bgmNotesScheduled=0;
let bgmEnabled=(lsGet('jikoBgm')||'1')!=='0';
const BGM_BPM=136,BGM_BEAT=60/BGM_BPM,BGM_BARS=16;
const NOTEF={C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392,A4:440,B4:493.88,
  C5:523.25,D5:587.33,E5:659.25,F5:698.46,G5:783.99};
const BGM_MELODY=[ // per bar: [beat, note, beats]
  [[0,'G4',1],[1,'E4',1],[2,'G4',1],[3,'E4',1]],
  [[0,'C5',1],[1,'G4',1],[2,'E4',2]],
  [[0,'A4',1],[1,'F4',1],[2,'A4',1],[3,'F4',1]],
  [[0,'G4',1],[1,'E4',1],[2,'C4',2]],
  [[0,'B4',1],[1,'G4',1],[2,'B4',1],[3,'D5',1]],
  [[0,'D5',1],[1,'B4',1],[2,'G4',2]],
  [[0,'E4',.5],[.5,'F4',.5],[1,'G4',1],[2,'E4',1],[3,'C4',1]],
  [[0,'C5',2],[2,'G4',1]],
  [[0,'A4',1],[1,'A4',1],[2,'C5',1],[3,'A4',1]],
  [[0,'F4',1],[1,'A4',1],[2,'C5',2]],
  [[0,'E5',1],[1,'C5',1],[2,'G4',1],[3,'E4',1]],
  [[0,'G4',2],[2,'E4',1],[3,'G4',1]],
  [[0,'D5',1],[1,'B4',1],[2,'G4',1],[3,'B4',1]],
  [[0,'D5',1],[1,'D5',.5],[1.5,'E5',.5],[2,'D5',1],[3,'B4',1]],
  [[0,'C5',1],[1,'G4',1],[2,'E4',1],[3,'G4',1]],
  [[0,'C5',3]],
];
const BGM_CHORDS=['C','C','F','C','G','G','C','C','F','F','C','C','G','G','C','C'];
const CHORD3={C:[261.63,329.63,392],F:[349.23,440,523.25],G:[392,493.88,587.33]};
const BASSN={C:{r:130.81,f:196},F:{r:174.61,f:261.63},G:{r:196,f:293.66}};
function bgmNote(freq,t0,dur,type,vol,vib){
  const o=AC.createOscillator(),g=AC.createGain();
  o.type=type;o.frequency.value=freq;
  if(vib&&bgm)try{bgm.vibG.connect(o.frequency);}catch(e){}
  g.gain.setValueAtTime(.0001,t0);
  g.gain.linearRampToValueAtTime(vol,t0+.018);
  g.gain.setValueAtTime(vol,t0+Math.max(.02,dur*.68));
  g.gain.linearRampToValueAtTime(.0001,t0+dur);
  o.connect(g);g.connect(bgm.g);
  o.start(t0);o.stop(t0+dur+.03);
  bgmNotesScheduled++;
}
function bgmKick(t0){
  const o=AC.createOscillator(),g=AC.createGain();
  o.type='sine';
  o.frequency.setValueAtTime(150,t0);
  o.frequency.exponentialRampToValueAtTime(42,t0+.1);
  g.gain.setValueAtTime(.5,t0);
  g.gain.exponentialRampToValueAtTime(.001,t0+.13);
  o.connect(g);g.connect(bgm.g);
  o.start(t0);o.stop(t0+.16);
  bgmNotesScheduled++;
}
function bgmHat(t0,vol){
  const src=AC.createBufferSource();src.buffer=getNoiseBuf();
  const f=AC.createBiquadFilter();f.type='highpass';f.frequency.value=6500;
  const g=AC.createGain();
  g.gain.setValueAtTime(vol,t0);
  g.gain.exponentialRampToValueAtTime(.001,t0+.045);
  src.connect(f);f.connect(g);g.connect(bgm.g);
  src.start(t0);src.stop(t0+.06);
  bgmNotesScheduled++;
}
function bgmBarSchedule(bi,t0,mode){
  const B=BGM_BEAT;
  for(const n of BGM_MELODY[bi]){
    bgmNote(NOTEF[n[1]],t0+n[0]*B,n[2]*B*.92,mode==='play'?'square':'triangle',mode==='play'?.22:.2,true);
  }
  const ch=BGM_CHORDS[bi];
  bgmNote(BASSN[ch].r,t0,B*.5,'triangle',.5);          // oom
  bgmNote(BASSN[ch].f,t0+2*B,B*.5,'triangle',.42);     // oom
  [1,3].forEach(b=>{                                    // pah (offbeat chord stabs)
    CHORD3[ch].forEach(f=>bgmNote(f,t0+b*B,B*.3,'triangle',.11));
  });
  if(mode==='play'){
    bgmKick(t0);bgmKick(t0+2*B);
    for(let e=0;e<8;e++)bgmHat(t0+e*B*.5,e%2?.05:.09);
  }
}
function bgmScheduler(){
  if(!bgm||!AC)return;
  try{
    while(bgm.next<AC.currentTime+.65){
      bgmBarSchedule(bgm.bar%BGM_BARS,bgm.next,bgm.mode);
      bgm.bar++;bgm.next+=BGM_BEAT*4;
    }
  }catch(e){}
}
function startBgm(mode){
  if(!AC||!bgmEnabled)return;
  if(bgm&&bgm.mode===mode)return;
  stopBgm();
  try{
    const g=AC.createGain();
    g.gain.value=0;g.connect(master);
    g.gain.linearRampToValueAtTime(mode==='play'?.22:.09,AC.currentTime+.5);
    const vib=AC.createOscillator(),vibG=AC.createGain();
    vib.type='sine';vib.frequency.value=5.6;vibG.gain.value=4.5;
    vib.connect(vibG);vib.start();
    bgm={mode,g,vib,vibG,bar:0,next:AC.currentTime+.08,timer:0};
    bgm.timer=setInterval(bgmScheduler,120);
    bgmScheduler();
  }catch(e){bgm=null;}
}
function stopBgm(){
  if(!bgm)return;
  try{
    const b=bgm;bgm=null;
    clearInterval(b.timer);
    b.g.gain.cancelScheduledValues(AC.currentTime);
    b.g.gain.setValueAtTime(b.g.gain.value,AC.currentTime);
    b.g.gain.linearRampToValueAtTime(0,AC.currentTime+.2);
    setTimeout(()=>{try{b.vib.stop();b.g.disconnect();}catch(x){}},400);
  }catch(e){bgm=null;}
}
function updateMusicBtn(){
  $('#btn-music').classList.toggle('off',!bgmEnabled);
}

let SKIP_SHADOW=false; // used to bake shadow-less sprites for the top-down jump
function carShadow(c,w,l){
  if(SKIP_SHADOW)return;
  c.save();
  c.fillStyle='rgba(10,20,30,.30)';
  c.beginPath();c.ellipse(2,l*.035,w*.60,l*.535,0,0,TAU);c.fill();
  c.restore();
}
function wheel(c,x,y,ww,wl){
  rr(c,x-ww/2,y-wl/2,ww,wl,ww*.38);c.fillStyle='#15161c';c.fill();
  rr(c,x-ww*.2,y-wl*.3,ww*.4,wl*.6,ww*.16);c.fillStyle='#41444f';c.fill();
}
function carBodyPath(c,w,l,nose,tail){
  const hw=w/2,hl=l/2;
  c.beginPath();
  c.moveTo(-hw*nose,-hl);
  c.quadraticCurveTo(-hw*1.03,-hl+l*.03,-hw,-hl*.5);
  c.lineTo(-hw,hl*.55);
  c.quadraticCurveTo(-hw*1.03,hl,-hw*tail,hl);
  c.lineTo(hw*tail,hl);
  c.quadraticCurveTo(hw*1.03,hl,hw,hl*.55);
  c.lineTo(hw,-hl*.5);
  c.quadraticCurveTo(hw*1.03,-hl+l*.03,hw*nose,-hl);
  c.closePath();
}
function bodyGrad(c,w,col){
  const g=c.createLinearGradient(-w/2,0,w/2,0);
  g.addColorStop(0,shade(col,-.28));
  g.addColorStop(.22,shade(col,.10));
  g.addColorStop(.45,shade(col,.24));
  g.addColorStop(.62,shade(col,.04));
  g.addColorStop(1,shade(col,-.32));
  return g;
}
function glassPanel(c,x,y,w,h,r){
  rr(c,x,y,w,h,r);
  const g=c.createLinearGradient(0,y,0,y+h);
  g.addColorStop(0,'#d6edfd');g.addColorStop(.4,'#7fb6dd');g.addColorStop(1,'#31506e');
  c.fillStyle=g;c.fill();
  c.save();c.clip();
  c.fillStyle='rgba(255,255,255,.4)';
  c.beginPath();
  c.moveTo(x+w*.12,y+h);c.lineTo(x+w*.5,y);c.lineTo(x+w*.68,y);c.lineTo(x+w*.30,y+h);
  c.closePath();c.fill();
  c.restore();
  rr(c,x,y,w,h,r);c.strokeStyle='rgba(15,35,55,.4)';c.lineWidth=1.2;c.stroke();
}
function headlight(c,x,y,w,h){
  rr(c,x,y,w,h,h*.45);
  const g=c.createLinearGradient(0,y,0,y+h);
  g.addColorStop(0,'#ffffff');g.addColorStop(1,'#ffd977');
  c.fillStyle=g;c.fill();
  c.strokeStyle='rgba(90,70,10,.35)';c.lineWidth=1;c.stroke();
}
function taillight(c,x,y,w,h){
  rr(c,x,y,w,h,h*.45);c.fillStyle='#d92c2c';c.fill();
  rr(c,x+1,y+1,w-2,(h-2)*.45,h*.2);c.fillStyle='rgba(255,150,150,.9)';c.fill();
}
function mirrors(c,w,y,col){
  [-1,1].forEach(s=>{
    rr(c,s>0?w/2-1:-w/2-w*.14+1,y,w*.14,w*.09,3);
    c.fillStyle=shade(col,-.2);c.fill();
    c.strokeStyle='rgba(0,0,0,.3)';c.lineWidth=1;c.stroke();
  });
}
function lightbar(c,y,w,h){
  rr(c,-w/2-2,y-1,w+4,h+2,3);c.fillStyle='#c8cdd6';c.fill();
  rr(c,-w/2,y,w,h,3);
  const g=c.createLinearGradient(0,y,0,y+h);
  g.addColorStop(0,'#ff7a6a');g.addColorStop(.5,'#e01414');g.addColorStop(1,'#a80808');
  c.fillStyle=g;c.fill();
  c.fillStyle='rgba(255,255,255,.55)';
  rr(c,-w/2+2,y+1,w-4,h*.3,2);c.fill();
}
function drawSedan(c,s){
  const w=s.w,l=s.l,hw=w/2,hl=l/2,col=s.color;
  carShadow(c,w,l);
  wheel(c,-hw*.94,-l*.29,w*.17,l*.16);wheel(c,hw*.94,-l*.29,w*.17,l*.16);
  wheel(c,-hw*.94,l*.30,w*.17,l*.16);wheel(c,hw*.94,l*.30,w*.17,l*.16);
  carBodyPath(c,w,l,s.sporty?.5:.62,s.sporty?.8:.76);
  c.fillStyle=bodyGrad(c,w,col);c.fill();
  c.strokeStyle=shade(col,-.5);c.lineWidth=1.6;c.stroke();
  // hood contour lines
  c.save();carBodyPath(c,w,l,s.sporty?.5:.62,s.sporty?.8:.76);c.clip();
  c.strokeStyle='rgba(0,0,0,.14)';c.lineWidth=1.4;
  [-1,1].forEach(sd=>{
    c.beginPath();c.moveTo(sd*w*.24,-hl+5);c.quadraticCurveTo(sd*w*.30,-l*.30,sd*w*.30,-l*.17);c.stroke();
  });
  c.beginPath();c.moveTo(-w*.34,hl-l*.075);c.lineTo(w*.34,hl-l*.075);c.stroke();
  if(s.sporty){ // racing stripes
    c.fillStyle='rgba(255,255,255,.88)';
    c.fillRect(-w*.115,-hl+2,w*.075,l-4);
    c.fillRect(w*.04,-hl+2,w*.075,l-4);
  }
  if(s.police){ // black nose band + side skirts
    c.fillStyle='#22252b';
    c.fillRect(-hw,-hl,w,l*.055);
    c.fillRect(-hw,-hl,w*.10,l);
    c.fillRect(hw-w*.10,-hl,w*.10,l);
    c.fillRect(-hw,hl-l*.045,w,l*.045);
  }
  if(s.taxi){ // teal side stripe
    c.fillStyle='rgba(20,120,110,.75)';
    c.fillRect(-hw,-l*.05,w*.075,l*.42);
    c.fillRect(hw-w*.075,-l*.05,w*.075,l*.42);
  }
  c.restore();
  // glass canopy
  const gy=s.sporty?-l*.14:-l*.18;
  const gh=s.wagon?l*.52:(s.sporty?l*.36:l*.42);
  glassPanel(c,-w*.43,gy,w*.86,gh,w*.2);
  // roof
  const ry=gy+gh*.30,rh=s.wagon?gh*.55:gh*.44;
  rr(c,-w*.35,ry,w*.70,rh,w*.13);
  const rg=c.createLinearGradient(-w*.35,0,w*.35,0);
  rg.addColorStop(0,shade(col,-.1));rg.addColorStop(.45,shade(col,.28));rg.addColorStop(1,shade(col,-.16));
  c.fillStyle=rg;c.fill();
  c.strokeStyle='rgba(0,0,0,.22)';c.lineWidth=1.2;c.stroke();
  if(s.wagon){ // roof rails
    c.strokeStyle='rgba(0,0,0,.4)';c.lineWidth=2;
    c.beginPath();c.moveTo(-w*.30,ry+3);c.lineTo(-w*.30,ry+rh-3);c.stroke();
    c.beginPath();c.moveTo(w*.30,ry+3);c.lineTo(w*.30,ry+rh-3);c.stroke();
  }
  if(s.police)lightbar(c,ry+rh*.28,w*.62,l*.045);
  if(s.taxi){
    rr(c,-w*.12,ry+rh*.22,w*.24,l*.06,4);c.fillStyle='#2fbf71';c.fill();
    c.strokeStyle='#14743f';c.lineWidth=1.4;c.stroke();
    rr(c,-w*.05,ry+rh*.22+l*.015,w*.10,l*.03,3);c.fillStyle='#fff';c.fill();
  }
  if(s.cute){ // little heart on hood
    c.save();c.translate(0,-l*.32);c.scale(w*.01,w*.01);
    c.beginPath();c.moveTo(0,3);
    c.bezierCurveTo(-6,-3,-2,-8,0,-4);c.bezierCurveTo(2,-8,6,-3,0,3);
    c.fillStyle='#fff';c.fill();c.restore();
  }
  if(s.police){ // hood emblem
    c.beginPath();c.arc(0,-l*.33,w*.05,0,TAU);c.fillStyle='#e8c33c';c.fill();
    c.strokeStyle='#8a6d10';c.lineWidth=1;c.stroke();
  }
  if(s.sporty){ // spoiler
    rr(c,-w*.44,hl-l*.075,w*.88,l*.05,4);
    c.fillStyle=shade(col,-.38);c.fill();
    c.strokeStyle='rgba(0,0,0,.35)';c.lineWidth=1;c.stroke();
  }
  mirrors(c,w,gy+2,col);
  headlight(c,-hw*.52,-hl+1.5,w*.2,l*.05);headlight(c,hw*.32,-hl+1.5,w*.2,l*.05);
  rr(c,-w*.14,-hl+2,w*.28,l*.03,2);c.fillStyle='#252830';c.fill();
  taillight(c,-hw*.5,hl-l*.055,w*.19,l*.04);taillight(c,hw*.31,hl-l*.055,w*.19,l*.04);
}

function drawBus(c,s){
  const w=s.w,l=s.l,hw=w/2,hl=l/2,col=s.color;
  carShadow(c,w,l);
  wheel(c,-hw*.94,-l*.32,w*.16,l*.09);wheel(c,hw*.94,-l*.32,w*.16,l*.09);
  wheel(c,-hw*.94,l*.24,w*.17,l*.09);wheel(c,hw*.94,l*.24,w*.17,l*.09);
  wheel(c,-hw*.94,l*.35,w*.17,l*.09);wheel(c,hw*.94,l*.35,w*.17,l*.09);
  carBodyPath(c,w,l,.8,.86);
  c.fillStyle=bodyGrad(c,w,col);c.fill();
  c.strokeStyle=shade(col,-.5);c.lineWidth=1.6;c.stroke();
  // destination sign
  rr(c,-w*.24,-hl+2.5,w*.48,l*.03,3);c.fillStyle='#fff';c.fill();
  c.strokeStyle='rgba(0,0,0,.25)';c.lineWidth=1;c.stroke();
  glassPanel(c,-w*.37,-hl+l*.055,w*.74,l*.08,w*.1);
  // side window strips
  c.save();carBodyPath(c,w,l,.8,.86);c.clip();
  const wg=c.createLinearGradient(0,-hl+l*.16,0,-hl+l*.16+l*.68);
  wg.addColorStop(0,'#7fa8c8');wg.addColorStop(1,'#3a5876');
  c.fillStyle=wg;
  c.fillRect(-hw+1.5,-hl+l*.16,w*.10,l*.68);
  c.fillRect(hw-w*.10-1.5,-hl+l*.16,w*.10,l*.68);
  c.fillStyle=col;
  for(let i=1;i<8;i++){
    const yy=-hl+l*.16+i*l*.085;
    c.fillRect(-hw+1.5,yy,w*.10,2.2);
    c.fillRect(hw-w*.10-1.5,yy,w*.10,2.2);
  }
  c.restore();
  // roof
  rr(c,-w*.33,-hl+l*.17,w*.66,l*.72,10);
  const rg=c.createLinearGradient(-w*.33,0,w*.33,0);
  rg.addColorStop(0,shade(col,-.06));rg.addColorStop(.45,shade(col,.30));rg.addColorStop(1,shade(col,-.12));
  c.fillStyle=rg;c.fill();c.strokeStyle='rgba(0,0,0,.2)';c.lineWidth=1.2;c.stroke();
  // roof hatches + AC
  c.fillStyle='#d9dde3';c.strokeStyle='#9aa2ae';c.lineWidth=1;
  [ -l*.18, l*.02, l*.30 ].forEach(yy=>{rr(c,-w*.14,yy,w*.28,l*.055,4);c.fill();c.stroke();});
  rr(c,-w*.17,-l*.34,w*.34,l*.10,5);c.fillStyle='#c2c8d0';c.fill();c.stroke();
  c.beginPath();c.arc(0,-l*.29,w*.07,0,TAU);c.fillStyle='#aab2bc';c.fill();c.stroke();
  mirrors(c,w,-hl+l*.06,col);
  headlight(c,-hw*.58,-hl+2,w*.2,l*.028);headlight(c,hw*.38,-hl+2,w*.2,l*.028);
  taillight(c,-hw*.56,hl-l*.032,w*.2,l*.024);taillight(c,hw*.36,hl-l*.032,w*.2,l*.024);
}

const SPRITES={},SPRITES_AIR={};
function makeSprite(spec,noShadow){
  const pad=18,S=3;
  const cv=document.createElement('canvas');
  cv.width=(spec.w+pad*2)*S;cv.height=(spec.l+pad*2)*S;
  const c=cv.getContext('2d');
  c.setTransform(S,0,0,S,(spec.w/2+pad)*S,(spec.l/2+pad)*S);
  SKIP_SHADOW=!!noShadow;
  drawCarTop(c,spec);
  SKIP_SHADOW=false;
  cv.pw=spec.w+pad*2;cv.pl=spec.l+pad*2;
  return cv;
}
CARS.forEach(s=>{SPRITES[s.id]=makeSprite(s);SPRITES_AIR[s.id]=makeSprite(s,true);});
function drawSprite(c,sp,x,y,rot,scale){
  c.save();c.translate(x,y);
  if(rot)c.rotate(rot);
  c.scale(scale,scale);
  c.drawImage(sp,-sp.pw/2,-sp.pl/2,sp.pw,sp.pl);
  c.restore();
}

function drawBuilding(c,x,y,s,seed,night){

  c.beginPath();c.arc(-bw*.17,-bh*.12,bw*.055,0,TAU);

const CORALCOLS=['#ff7d9c','#ff9d5c','#e85a8a','#ffb45c'];
function drawCoral(c,x,y,s,seed){
  const col=CORALCOLS[seed%CORALCOLS.length];
  c.save();c.translate(x,y);
  c.fillStyle='rgba(0,20,50,.3)';
  c.beginPath();c.ellipse(3,6*s,20*s,9*s,0,0,TAU);c.fill();
  c.strokeStyle=col;c.lineCap='round';
  for(let i=0;i<5;i++){
    const a=-Math.PI/2+(i-2)*.45;
    const len=(15+((seed+i*37)%10))*s;
    const ex=Math.cos(a)*len,ey=Math.sin(a)*len;
    c.lineWidth=6*s;
    c.beginPath();c.moveTo(0,5*s);c.quadraticCurveTo(ex*.3,ey*.7,ex,ey);c.stroke();
    c.lineWidth=3.6*s;
    c.beginPath();c.moveTo(ex*.55,ey*.55);
    c.quadraticCurveTo(ex*.8,ey*.9,ex*.9+7*s*Math.cos(a+.9),ey*.9+7*s*Math.sin(a+.9));c.stroke();
  }
  c.fillStyle='rgba(255,255,255,.55)';
  for(let i=0;i<5;i++){
    const a=-Math.PI/2+(i-2)*.45;
    const len=(15+((seed+i*37)%10))*s;
    c.beginPath();c.arc(Math.cos(a)*len,Math.sin(a)*len,2.2*s,0,TAU);c.fill();
  }
  c.restore();
}

  c.lineCap='round';
  for(let i=-1;i<=1;i++){

}

function drawPlanet(c,x,y,s,seed){
  const v=seed%4,r=(24+(seed%3)*9)*s;
  c.save();c.translate(x,y);
  const hg=c.createRadialGradient(0,0,r*.6,0,0,r*1.6);
  hg.addColorStop(0,'rgba(160,190,255,.18)');hg.addColorStop(1,'rgba(160,190,255,0)');
  c.fillStyle=hg;c.beginPath();c.arc(0,0,r*1.6,0,TAU);c.fill();
  if(v===0){ // saturn
    const g=c.createRadialGradient(-r*.3,-r*.3,r*.2,0,0,r);
    g.addColorStop(0,'#ffe2b0');g.addColorStop(1,'#c8935a');
    c.beginPath();c.arc(0,0,r,0,TAU);c.fillStyle=g;c.fill();

    c.beginPath();c.ellipse(0,0,r*1.55,r*.42,0,0,TAU);c.stroke();
    c.strokeStyle='rgba(190,150,110,.8)';c.lineWidth=2.5*s;
    c.beginPath();c.ellipse(0,0,r*1.75,r*.5,0,0,TAU);c.stroke();
    c.restore();
  }else if(v===1){ // red planet
    const g=c.createRadialGradient(-r*.3,-r*.3,r*.2,0,0,r);
    g.addColorStop(0,'#ff9d6e');g.addColorStop(1,'#c2452a');
    c.beginPath();c.arc(0,0,r,0,TAU);c.fillStyle=g;c.fill();
    c.fillStyle='rgba(120,40,20,.4)';
    [[-.3,.1,.24],[.3,-.25,.18],[.05,.45,.15]].forEach(k=>{
      c.beginPath();c.arc(r*k[0],r*k[1],r*k[2],0,TAU);c.fill();});
  }else if(v===2){ // earth
    const g=c.createRadialGradient(-r*.3,-r*.3,r*.2,0,0,r);
    g.addColorStop(0,'#8fd4ff');g.addColorStop(1,'#2469b5');
    c.beginPath();c.arc(0,0,r,0,TAU);c.fillStyle=g;c.fill();

function glassSide(c,pts){
  c.beginPath();
  pts.forEach((p,i)=>i?c.lineTo(p[0],p[1]):c.moveTo(p[0],p[1]));
  c.closePath();
  const ys=pts.map(p=>p[1]);
  const y0=Math.min.apply(null,ys),y1=Math.max.apply(null,ys);
  const g=c.createLinearGradient(0,y0,0,y1);
  g.addColorStop(0,'#d9effc');g.addColorStop(1,'#5b87a8');
  c.fillStyle=g;c.fill();
  c.strokeStyle='rgba(15,35,55,.4)';c.lineWidth=1.2;c.stroke();
}
function sideWheel(c,x,r,rot){

  for(let i=0;i<4;i++){
    const a=rot+i*Math.PI/2;
    c.beginPath();c.moveTo(0,0);c.lineTo(Math.cos(a)*r*.48,Math.sin(a)*r*.48);c.stroke();
  }

function drawTracksSide(c,L,wheelRot){ // excavator crawler (side view)

}

function meters(){return Math.floor(world.dist/14)+world.bonus;}
function resize(){
  // remember the car position relative to the road before dimensions change
  let rel=0;
  const had=W>0&&roadHalf>0;
  if(had)rel=clamp((world.carX-roadCenterAt(world.dist))/roadHalf,-1.2,1.2);
  DPR=Math.min(window.devicePixelRatio||1,3);
  W=window.innerWidth;H=window.innerHeight;

function computeRoad(){
  roadHalf=clamp(W*.31,130,285)*(course.roadW||1);

}
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',()=>setTimeout(resize,120));
function roadCenterAt(z){
  const maxA=Math.max(0,(W/2-roadHalf-44)/1.7);
  const a=maxA*Math.min(1,course.curve*diff.curve);
  const f=.0016*(course.curveFreq||1);
  return W/2+Math.sin(z*f)*a+Math.sin(z*f*.43+1.7)*a*.7;
}
function speedMul(){return 1+Math.min(1,clamp(meters()/900,0,1)*.55*diff.accel);}

/* ambient effects (snow / bubbles / fish / stars) */
function initFx(){
  const fx={flakes:[],bubbles:[],fish:[],stars:[],shots:[],bubT:0,fishT:1,shotT:3};
  if(course.snow){
    const bl=course.blizzard;
    const n=bl?140:36;
    for(let i=0;i<n;i++)fx.flakes.push({
      x:rand(0,W),y:rand(0,H),r:bl?rand(1.5,4):rand(1.2,3),
      vx:bl?rand(-140,-50):rand(-24,24),vy:bl?rand(160,290):rand(70,140),ph:rand(0,TAU)});
  }
  if(course.space){
    for(let i=0;i<90;i++)fx.stars.push({x:rand(0,W),y:rand(0,H),r:rand(.5,1.8),tw:rand(0,TAU),par:rand(.15,.45)});
  }
  world.fx=fx;
}
function updateFx(dt,t){
  const fx=world.fx;if(!fx)return;
  for(const f of fx.flakes){
    f.x+=(f.vx+Math.sin(t*2+f.ph)*18)*dt;
    f.y+=(f.vy+world.speed*.25)*dt;
    if(f.y>H+6){f.y=-6;f.x=rand(-40,W+140);}
    if(f.x<-12)f.x+=W+24;
    if(f.x>W+12)f.x-=W+24;
  }
  const waterFx=course.water||(course.seaDive&&world.inWater);
  if(waterFx){
    fx.bubT-=dt;
    if(fx.bubT<=0){
      fx.bubT=rand(.06,.16);
      fx.bubbles.push({x:rand(0,W),y:H+8,r:rand(2,6),vy:rand(50,120),ph:rand(0,TAU)});
    }
    fx.fishT-=dt;
    if(fx.fishT<=0&&fx.fish.length<6){
      fx.fishT=rand(1.2,2.8);
      const dir=Math.random()<.5?1:-1;
      fx.fish.push({x:dir>0?-80:W+80,y:rand(H*.08,H*.85),v:rand(70,150)*dir,dir,
        size:rand(.7,1.25),hue:[15,45,200,320][Math.floor(rand(0,4))],ph:rand(0,TAU),n:Math.random()<.4?3:1});
    }
  }
  if(fx.bubbles.length){
    fx.bubbles.forEach(b=>{b.y-=(b.vy+world.speed*.2)*dt;b.x+=Math.sin(t*3+b.ph)*14*dt;});
    fx.bubbles=fx.bubbles.filter(b=>b.y>-12);
  }
  if(fx.fish.length){
    fx.fish.forEach(f=>{f.x+=f.v*dt;f.y+=Math.sin(t*2+f.ph)*14*dt;});
    fx.fish=fx.fish.filter(f=>f.x>-160&&f.x<W+160);
  }
  if(course.space){
    fx.shotT-=dt;
    if(fx.shotT<=0){
      fx.shotT=rand(2.2,5.5);
      fx.shots.push({x:rand(W*.1,W*.9),y:rand(0,H*.4),vx:rand(260,460)*(Math.random()<.5?-1:1),vy:rand(120,240),life:.8,t:0});
    }
    fx.shots.forEach(s=>{s.t+=dt;s.x+=s.vx*dt;s.y+=s.vy*dt;});
    fx.shots=fx.shots.filter(s=>s.t<s.life);
  }
}
function pickWeighted(list){
  let tot=0;list.forEach(e=>tot+=e[1]);
  let r=Math.random()*tot;
  for(const e of list){if((r-=e[1])<=0)return e[0];}
  return list[0][0];
}
function spawnDeco(){
  const z=world.nextDecoZ;
  const type=pickWeighted(course.deco);
  let side=Math.random()<.5?-1:1;
  let off=rand(34,110);
  if(type==='building'||type==='nbuilding')off=rand(55,130);
  if(type==='boat'){side=-1;off=rand(160,310);}
  if(type==='parasol'){side=-1;off=rand(40,74);}
  if(type==='planet')off=rand(95,260);
  if(course.sea&&side<0&&(type==='palm'||type==='bush'))side=1;
  world.deco.push({z,side,off,type,seed:Math.floor(Math.random()*997)});
  world.nextDecoZ=z+rand(120,260);
}
function spawnObstacle(){
  const z=world.nextObsZ;
  const type=pickWeighted(course.obs);
  const lanes=laneFractions(course);
  let lane=lanes[Math.floor(Math.random()*lanes.length)];
  if(kart.active)lane=clamp(lane*1.2+rand(-.07,.07),-.86,.86); // spread across the wider kart road
  const o={z,lane,type,sp:0,dir:1,kind:'car',seed:Math.floor(Math.random()*97)};
  if(type==='car'){
    const pool=CARS.filter(cs=>!cs.norand); // trains / excavator stay off the road traffic
    o.spec=pool[Math.floor(Math.random()*pool.length)];
    const base=baseSpeed()*speedMul();
    if(course.twoway&&lane>.1){o.dir=-1;o.sp=-base*rand(.45,.6);}
    else{o.dir=1;o.sp=base*rand(.3,.45);}
    if(course.vehicle==='sub')o.kind='sub';
    else if(course.vehicle==='space')o.kind=o.dir<0?'rocket':'ufo';
    else if(course.seaDive&&isWaterZ(z)){ // underwater sections use submarines
      o.kind='sub';
      if(lane<-.3){o.dir=-1;o.sp=-base*rand(.4,.5);}
    }
  }
  world.obstacles.push(o);
  let g=course.gap/diff.density*(1-.25*clamp(meters()/800,0,1));
  if(kart.active)g*=.72; // wider kart road: keep it lively
  g=Math.max(400,world.speed*.95,g); // fairness floor: keep reaction time as speed grows
  world.nextObsZ=z+g*rand(.8,1.35);
}
function spawnItemBox(z){
  const lm=kart.active?.8:.6;
  world.obstacles.push({z,lane:rand(-lm,lm),type:'item',sp:0,dir:1,kind:'item',seed:0});
}
function obstacleDims(o){
  if(o.type==='car'){
    if(o.kind==='sub')return{w:52*CS,l:118*CS};
    if(o.kind==='rocket')return{w:46*CS,l:104*CS};
    if(o.kind==='ufo')return{w:66*CS,l:66*CS};
    return{w:o.spec.w*CS,l:o.spec.l*CS};
  }
  if(o.type==='item')return{w:40*CS,l:40*CS};
  if(o.type==='ball')return{w:44*CS,l:44*CS};
  if(o.type==='rockobs')return{w:48*CS,l:36*CS};
  if(o.type==='snowpile')return{w:52*CS,l:34*CS};
  return{w:40*CS,l:40*CS};
}

const HEARTP='M12 21.3C6.6 17.2 2 13.3 2 8.9 2 5.9 4.4 3.8 7 3.8c1.9 0 3.7 1.1 5 3 1.3-1.9 3.1-3 5-3 2.6 0 5 2.1 5 5.1 0 4.4-4.6 8.3-10 12.4z';
function updateLivesHUD(anim){
  const el=$('#lives');

    el.innerHTML='';

      el.appendChild(sp);

  }
  el.classList.toggle('many',total>5); // 10 hearts: two small rows so the chip never overflows
  const chip=el.closest('.chip');
  if(chip)chip.classList.toggle('tall',total>5);

  for(let i=0;i<total;i++){

function starPath(c,r){
  c.beginPath();
  for(let i=0;i<10;i++){
    const a=-Math.PI/2+i*Math.PI/5,rad=i%2?r*.45:r;
    const x=Math.cos(a)*rad,y=Math.sin(a)*rad;
    i?c.lineTo(x,y):c.moveTo(x,y);
  }
  c.closePath();
}

/* ============================== update ============================== */
let keys={left:false,right:false,jump:false};
let TEST_AUTO=false; // test hook: autopilot steering (top mode)
const pointers=new Map();
let bannerTimer=0;
function showBanner(txt,dur){
  const b=$('#banner');
  b.textContent=txt;b.classList.remove('hidden','pop');
  void b.offsetWidth;b.classList.add('pop');
  clearTimeout(bannerTimer);
  if(dur)bannerTimer=setTimeout(()=>b.classList.add('hidden'),dur);
}
function playerDims(){return{w:selCar.w*CS,l:selCar.l*CS};}

function update(dt,t){
  if(kart.active){updateKart(dt,t);return;}
  const active=(state==='title'||state==='cars'||state==='courses'||state==='diff'||state==='chars'||state==='charedit'||state==='racetype'||state==='ready'||state==='play'||state==='crash');
  if(!active){updateParticles(dt);updateFx(dt,t);return;}
  const demo=(state==='title'||state==='cars'||state==='courses'||state==='diff');
  // target speed
  let target=0;
  if(demo)target=course.base*.75;
  else if(state==='play')target=baseSpeed()*speedMul();
  else if(state==='ready')target=0;
  else if(state==='crash')target=0;
  if(course.seaDive&&world.inWater)target*=.85;
  if(course.mode!=='side'){ // road-surface zone effects (skipped while airborne)
    if(world.boostT>0)target*=1.5;
    else if(world.airT<=0){
      if(world.zoneKind==='mudflat')target*=.6;
      else if(world.zoneKind==='mud')target*=.65;
      else if(world.zoneKind==='puddle')target*=.8;
    }
  }
  world.speed=lerp(world.speed,target,Math.min(1,dt*(state==='crash'?6:(world.boostT>0?4:1.8))));
  world.dist+=world.speed*dt;
  updateEngine(world.speed);
  if(state==='play'&&selCar.rail&&world.speed>40){ // gatan-goton for trains
    world.clackT=(world.clackT||0)-dt*Math.max(.45,world.speed/230);
    if(world.clackT<=0){world.clackT=1;sndClack();}
  }
  if(world.invT>0)world.invT=Math.max(0,world.invT-dt); // recovery time after losing a heart

  // sea-dive transitions (umi): land <-> underwater
  if(course.seaDive){
    const nw=isWaterZ(world.dist);
    if(nw!==world.inWater){
      world.inWater=nw;
      splashFx(world.carX,PY);
      if(state==='play'){
        sndSplash(nw);
        showToast(nw?'ざぶん！ うみのなか！':'ざばっ！ りくに もどったよ！');
      }
    }
  }else if(world.inWater)world.inWater=false;

  // ready countdown
  if(state==='ready'){
    const pr=world.readyT;
    world.readyT+=dt;
    if(pr<.05&&world.readyT>=.05){showBanner('よーい…');sndCount(false);}
    if(pr<.9&&world.readyT>=.9){showBanner('すたーと！',900);sndCount(true);sndFanfare();}
    if(world.readyT>=1.6){state='play';startEngine();startSiren();startBgm('play');}
  }
  if(course.mode==='side'){
    updateSide(dt,t,demo);
  }else{
  // steering
  const pd=playerDims();
  const prevX=world.carX;
  const wf=(course.seaDive&&world.inWater)?.68:1; // floaty handling underwater
  if(state==='play'||state==='ready'){
    let drag=null,steer=0;
    pointers.forEach(p=>{
      if(p.drag)drag=p.x;
      else steer=p.x<W/2?-1:1;
    });
    if(pad.on&&pad.ax)steer=pad.ax; // controller: analog amount steers proportionally
    if(keys.left)steer=-1;
    if(keys.right)steer=1;
    const onIce=(world.zoneKind==='ice'&&world.airT<=0);
    if(TEST_AUTO){ // test hook: follow the road automatically
      world.carX=roadCenterAt(world.dist)+(course.twoway?-roadHalf*.47:0);
      world.steerV=0;
    }else if(drag!==null){
      // on ice the car answers the finger late and keeps sliding
      world.carX+=(drag-world.carX)*Math.min(1,dt*(onIce?2.8:10)*wf);
      world.steerV=0;
    }else{
      const des=steer*W*.5*wf;
      if(onIce)world.steerV=lerp(world.steerV,des,Math.min(1,dt*2.2)); // slippery: delayed + drifting
      else world.steerV=des;
      world.carX+=world.steerV*dt;
    }
  }else if(demo){
    world.demoT+=dt;
    const dofs=course.twoway?-roadHalf*.47:0;
    const tx=roadCenterAt(world.dist+160)+dofs+Math.sin(world.demoT*.5)*roadHalf*.2;
    world.carX+=(tx-world.carX)*Math.min(1,dt*2);
  }
  world.carX=clamp(world.carX,pd.w*.4,W-pd.w*.4);
  const vx=(world.carX-prevX)/Math.max(dt,.001);
  world.tilt=lerp(world.tilt,clamp(vx/1400,-.18,.18),Math.min(1,dt*10));

  // top-down jump timers
  if(world.airT>0){
    world.airT-=dt;
    if(world.airT<=0){ // touchdown
      world.airT=0;world.jumpCd=JUMP_CD;world.landG=.3;
      landFx();
      landClear();
    }
  }
  if(world.jumpCd>0)world.jumpCd=Math.max(0,world.jumpCd-dt);
  if(world.landG>0)world.landG=Math.max(0,world.landG-dt);
  if(world.boostT>0)world.boostT=Math.max(0,world.boostT-dt);
  // road-surface zones
  if(state==='play'){
    while(world.nextZoneZ<world.dist+PY+420)spawnZone();
  }
  world.zones=world.zones.filter(q=>q.z+q.len>world.dist-320);
  updateZoneEffect(dt);

  // scenery
  while(world.nextDecoZ<world.dist+PY+320)spawnDeco();
  world.deco=world.deco.filter(d=>d.z>world.dist-260);
  // obstacles
  if(state==='play'){
    while(world.nextObsZ<world.dist+PY+380)spawnObstacle();
    while(world.nextItemZ<world.dist+PY+380){
      spawnItemBox(world.nextItemZ);
      world.nextItemZ+=rand(640,1100);
    }
  }
  world.obstacles.forEach(o=>{
    o.z+=o.sp*dt;
    if(o.hit){ // spinning out after being hit by a thrown star
      o.hitT+=dt;o.spin+=dt*13;o.xOff+=o.slide*300*dt;
      if(Math.random()<dt*9){
        const oy=PY-(o.z-world.dist),ox=roadCenterAt(o.z)+o.lane*roadHalf+o.xOff;
        world.particles.push({kind:'star',x:ox+rand(-14,14),y:oy+rand(-16,16),
          vx:rand(-60,60),vy:rand(-100,10),rot:rand(0,TAU),vr:rand(-8,8),size:rand(5,11),life:.6,t:0});
      }
    }
  });
  world.obstacles=world.obstacles.filter(o=>o.z>world.dist-420&&o.z<world.dist+PY+900&&!(o.hit&&o.hitT>1.35));

  // thrown stars
  world.balls.forEach(b=>{b.z+=(world.speed+430)*dt;b.spin+=dt*14;});
  for(const b of world.balls){
    for(const o of world.obstacles){
      if(o.type!=='car'||o.hit)continue;
      const od=obstacleDims(o);
      const ox=roadCenterAt(o.z)+o.lane*roadHalf;
      if(Math.abs(b.x-ox)<od.w*.5+16&&Math.abs(b.z-o.z)<od.l*.5+20){
        b.dead=true;hitVehicle(o);break;
      }
    }
  }
  world.balls=world.balls.filter(b=>!b.dead&&b.z<world.dist+PY+120);

  if(state==='play'){
    const px=world.carX,py=PY;
    const airborne=world.airT>0;
    // item pickup (not while flying over them)
    if(!airborne){
      for(const o of world.obstacles){
        if(o.type!=='item'||o.got)continue;
        const oy=PY-(o.z-world.dist);
        const ox=roadCenterAt(o.z)+o.lane*roadHalf;
        if(Math.abs(px-ox)<pd.w*.5+30*CS&&Math.abs(py-oy)<pd.l*.5+30*CS){
          o.got=true;
          if(world.items<3)world.items++;
          updateItemHUD();sndGet();spawnSparkles(ox,oy);
        }
      }
      world.obstacles=world.obstacles.filter(o=>!o.got);
    }
    // collisions (jumping clears everything; short grace after landing)
    if(!airborne&&world.landG<=0){
      for(const o of world.obstacles){
        if(o.type==='item'||o.hit)continue;
        const oy=PY-(o.z-world.dist);
        if(oy<-80||oy>H+80)continue;
        const ox=roadCenterAt(o.z)+o.lane*roadHalf;
        const od=obstacleDims(o);
        // long vehicles: cap the hitbox length so it never feels unfair
        const lax=(pd.w+od.w)*.5*.56;
        const lay=(Math.min(pd.l,155*CS)+Math.min(od.l,155*CS))*.5*.56;
        if(Math.abs(px-ox)<lax&&Math.abs(py-oy)<lay){doCrash();break;}
      }
    }
    // off road (checked on the ground; landing off the road still counts)
    if(state==='play'&&!airborne){
      const dx=Math.abs(world.carX-roadCenterAt(world.dist));
      if(dx>roadHalf+pd.w*.08)doCrash(true);
    }
    // exhaust
    world.exhaustT-=dt;
    if(world.exhaustT<=0&&!airborne){
      world.exhaustT=.13;
      world.particles.push({kind:'puff',x:world.carX+rand(-6,6)-pd.w*.2,y:PY+pd.l*.55,
        vx:rand(-8,8),vy:world.speed*.4+20,size:rand(3,6),life:.7,t:0});
      if(selCar.id==='garbage'&&Math.random()<.24){ // clean-up sparkle behind the packer
        world.particles.push({kind:'star',x:world.carX+rand(-pd.w*.3,pd.w*.3),y:PY+pd.l*.58,
          vx:rand(-26,26),vy:rand(-16,34),rot:rand(0,TAU),vr:rand(-6,6),
          size:rand(4,7),life:rand(.4,.75),t:0});
      }
    }
  }
  } // end top-mode branch
  if(state==='crash'){
    world.crashT+=dt;
    if(world.crashT>1.15)showOver();
  }
  // jump button recharge look (top-down): fades out on use, fades back in
  const jb=$('#btn-jump');
  if(jb){
    if(course.mode!=='side'){
      jb.style.opacity=world.airT>0?'1':(world.jumpCd>0?(0.35+0.6*(1-world.jumpCd/JUMP_CD)).toFixed(2):'');
    }else if(jb.style.opacity)jb.style.opacity='';
  }
  updateParticles(dt);
  updateFx(dt,t);
}
/* ---------- side-scroll (yoko) mode ---------- */
function sideScale(){return clamp(Math.min(W,H)/760,.65,1.25);}
function sideGroundY(){return H*.72;}
function sidePlayerX(){return Math.min(W*.3,330);}
function doJump(vx){
  if(kart.active){ // kart mode: hop (solo; space stays "throw")
    if(!kart.versus)kartJump(kart.racers[0]);
    return;
  }
  if(state!=='play')return;
  if(course.mode!=='side'){ // top-down hop: fly over cars and road zones
    if(world.airT<=0&&world.jumpCd<=0){
      world.airT=AIR_DUR;
      sndJump();
    }
    return;
  }
  if(world.jumpY<=0){
    world.jumpVy=660;world.jumpT=0;world.jumps=1;sndJump();
  }else if(world.jumps===1){
    world.jumpVy=600;world.jumpT=0;world.jumps=2;sndJump();
  }else return;
  if(vx)world.sideVx=vx; // diagonal (flick) jump
}
function spawnSideObstacle(){
  const z=world.nextObsZ;
  const type=pickWeighted([['pipe',2],['rock',2],['cone',2],['car',3]]);
  const o={z,type};
  if(type==='car'){
    const pool=CARS.filter(s=>s.l<=112);
    o.spec=pool[Math.floor(Math.random()*pool.length)];
    o.w=o.spec.l;o.h=44;
  }else{
    o.w=({pipe:64,rock:60,cone:40})[type];
    o.h=({pipe:66,rock:38,cone:36})[type];
  }
  world.sideObs.push(o);
  let g=course.gap/diff.density*(1-.2*clamp(meters()/800,0,1));
  g=Math.max(460,world.speed*1.2,g); // always leave room for a full jump
  world.nextObsZ=z+g*rand(.85,1.4);
}
function spawnAirItems(){
  const z=world.nextAirZ;
  const r=Math.random();
  if(r<.25){
    world.airItems.push({z,h:110,kind:'box'});
  }else if(r<.62){ // arch over the path
    [[0,84],[52,126],[104,84]].forEach(p=>{
      world.airItems.push({z:z+p[0],h:p[1],kind:'star'});
    });
  }else{ // rising diagonal: rewards a forward (flick) jump
    [[0,70],[70,115],[140,160]].forEach(p=>{
      world.airItems.push({z:z+p[0],h:p[1],kind:'star'});
    });
  }
  world.nextAirZ=z+rand(760,1250);
}
function hitSideVehicle(o){
  o.hit=true;o.hitT=0;o.vy=-360;o.rot=0;o.vr=9;o.yOff=0;
  world.bonus+=10;
  const SS=sideScale(),gy=sideGroundY(),px=sidePlayerX();
  const ox=px+(o.z-world.dist);
  for(let i=0;i<9;i++){
    const a=rand(0,TAU),v=rand(80,260);
    world.particles.push({kind:'star',x:ox,y:gy-30,vx:Math.cos(a)*v,vy:Math.sin(a)*v-80,
      rot:rand(0,TAU),vr:rand(-8,8),size:rand(7,15),life:rand(.6,1),t:0});
  }
  world.particles.push({kind:'text',str:'+10',x:ox,y:gy-70,vx:0,vy:-55,life:.95,t:0});
  sndHit();
}
function updateSide(dt,t,demo){
  const SS=sideScale(),gy=sideGroundY(),px=sidePlayerX();
  // jump physics (variable jump while held)
  const held=keys.jump||pointers.size>0||(pad.on&&pad.a);
  const airborne=world.jumpY>0||world.jumpVy>0;
  if(airborne){
    const g=(world.jumpVy>0&&held&&world.jumpT<.32)?520:1500;
    world.jumpVy-=g*dt;
    world.jumpY+=world.jumpVy*dt;
    world.jumpT+=dt;
    if(world.jumpY<=0){
      world.jumpY=0;world.jumpVy=0;world.jumps=0;
      for(let i=0;i<4;i++){
        world.particles.push({kind:'puff',x:px+world.sideX+rand(-24,10),y:gy-4,
          vx:rand(-70,-20),vy:rand(-30,-5),size:rand(3,6),life:.5,t:0});
      }
    }
  }
  // horizontal movement: air control while jumping, ease home on the ground
  if(airborne&&(state==='play'||state==='ready')){
    let ax=0,dragT=null;
    pointers.forEach(p=>{if(p.drag)dragT=p.x;});
    if(keys.left)ax=-1;
    if(keys.right)ax=1;
    if(pad.on&&pad.ax)ax=pad.ax; // stick: analog air control
    if(dragT!==null){ // finger drag: car follows the finger sideways
      world.sideX+=((dragT-px)-world.sideX)*Math.min(1,dt*9);
      world.sideVx*=Math.max(0,1-dt*4);
    }else if(ax){ // arrow keys move sideways in the air
      world.sideX+=ax*370*dt;
      world.sideVx*=Math.max(0,1-dt*3);
    }
    world.sideX+=world.sideVx*dt;   // flick momentum
    world.sideVx*=Math.max(0,1-dt*1.5);
  }else if(!airborne){
    world.sideVx=0;
    world.sideX+=(0-world.sideX)*Math.min(1,dt*2.4); // slowly roll back to home position
    if(Math.abs(world.sideX)<.5)world.sideX=0;
  }
  world.sideX=clamp(world.sideX,W*.15-px,W*.60-px);
  const pxx=px+world.sideX; // player's actual screen x
  if(demo){
    world.demoJumpT-=dt;
    if(world.demoJumpT<=0){
      world.demoJumpT=rand(1.8,3.2);
      if(world.jumpY<=0){world.jumpVy=620;world.jumpT=0;world.jumps=1;}
    }
  }
  if(state==='play'){
    while(world.nextObsZ<world.dist+W+320)spawnSideObstacle();
    while(world.nextAirZ<world.dist+W+320)spawnAirItems();
  }
  // hit vehicles fly away spinning
  world.sideObs.forEach(o=>{
    if(o.hit){
      o.hitT+=dt;o.z+=190*dt;
      o.yOff+=o.vy*dt;o.vy+=760*dt;
      o.rot+=o.vr*dt;
    }
  });
  world.sideObs=world.sideObs.filter(o=>o.z>world.dist-520&&!(o.hit&&o.hitT>1.6));
  world.airItems=world.airItems.filter(it=>it.z>world.dist-320&&!it.got);
  // thrown stars fly right
  world.balls.forEach(b=>{b.z+=(world.speed+470)*dt;b.spin+=dt*14;});
  for(const b of world.balls){
    for(const o of world.sideObs){
      if(o.type!=='car'||o.hit)continue;
      const ox=px+(o.z-world.dist);
      const bx=px+(b.z-world.dist);
      if(Math.abs(bx-ox)<o.w*SS*.5+16&&(b.h||30)<o.h*SS+26){
        b.dead=true;hitSideVehicle(o);break;
      }
    }
  }
  world.balls=world.balls.filter(b=>!b.dead&&b.z<world.dist+W+160);
  if(state==='play'){
    const pw=Math.min(selCar.l,200)*SS; // long vehicles: forgiving side hitbox
    // collect air items
    for(const it of world.airItems){
      if(it.got)continue;
      const ox=px+(it.z-world.dist);
      if(Math.abs(ox-pxx)<58*SS&&Math.abs((world.jumpY+34*SS)-it.h*SS)<62*SS){
        it.got=true;
        const iy=gy-it.h*SS;
        if(it.kind==='box'){
          if(world.items<3)world.items++;
          updateItemHUD();sndGet();
        }else{
          world.bonus+=5;
          blip(1180,1180,.08,'square',.11);
          world.particles.push({kind:'text',str:'+5',x:ox,y:iy-16,vx:0,vy:-50,life:.8,t:0});
        }
        spawnSparkles(ox,iy);
      }
    }
    // obstacle collisions (jump over them)
    for(const o of world.sideObs){
      if(o.hit)continue;
      const ox=px+(o.z-world.dist);
      const ow=o.w*SS;
      if(Math.abs(ox-pxx)<(pw+ow)*.5*.53){
        if(world.jumpY<o.h*SS*.75){doCrash();break;}
      }
    }
    // dust behind wheels while grounded
    world.exhaustT-=dt;
    if(world.exhaustT<=0&&world.jumpY<=0){
      world.exhaustT=.12;
      world.particles.push({kind:'puff',x:pxx-pw*.45,y:gy-5,
        vx:-world.speed*.55,vy:rand(-26,-6),size:rand(3,6),life:.6,t:0});
      if(selCar.id==='garbage'&&Math.random()<.24){ // clean-up sparkle behind the packer
        world.particles.push({kind:'star',x:pxx-pw*.52,y:gy-rand(12,44),
          vx:-world.speed*.35+rand(-18,18),vy:rand(-42,-4),rot:rand(0,TAU),vr:rand(-6,6),
          size:rand(4,7),life:rand(.4,.75),t:0});
      }
    }
  }
}
function splashFx(x,y){
  for(let i=0;i<16;i++){
    const a=rand(-Math.PI*.95,-Math.PI*.05),v=rand(120,380);
    world.particles.push({kind:'drop',x:x+rand(-24,24),y:y+rand(-10,10),
      vx:Math.cos(a)*v*.7,vy:Math.sin(a)*v,size:rand(3,7),life:rand(.5,.85),t:0});
  }
  world.particles.push({kind:'ring',x,y,vx:0,vy:0,size:24,life:.55,t:0});

function showToast(txt){

/* ---------- road-surface zones (mario-kart style, top-down only) ---------- */
const ZONE_TOAST={mudflat:'ぬかるみ！ ゆっくり！',mud:'どろんこ みち！',puddle:'みずたまり！',ice:'つるつる すべる！',dash:'ダッシュ！'};
function zoneKindFor(){
  if(course.id==='uminaka')return null; // underwater course keeps its own gimmicks
  const table={umi:'mudflat',machi:'puddle',kousoku:'puddle',yama:'mud',
    yuki:'ice',fubuki:'ice',uchu:'dash',yoru:'puddle'};
  let k=table[course.id]||null;
  if(k&&k!=='dash'&&Math.random()<.18)k='dash'; // rare treat panels on every course
  return k;
}
function spawnZone(){
  const z=world.nextZoneZ;
  world.nextZoneZ=z+rand(1000,1750);
  const k=zoneKindFor();
  if(!k)return;
  if(course.seaDive&&(isWaterZ(z)||isWaterZ(z+520)))return; // mudflats only on dry land
  const dash=k==='dash';
  const wf=dash?.34:rand(.55,1);
  const off=(1-wf)>.05?rand(-(1-wf)*.85,(1-wf)*.85):0;
  world.zones.push({z,len:dash?150:rand(220,480),wf,off,kind:k,
    seed:Math.floor(Math.random()*997),used:false});
}
function zoneAtPlayer(){
  for(const q of world.zones){
    if(world.dist>=q.z&&world.dist<=q.z+q.len){
      const cx=roadCenterAt(world.dist)+q.off*roadHalf;
      if(Math.abs(world.carX-cx)<q.wf*roadHalf)return q;
    }
  }
  return null;
}
function updateZoneEffect(dt){
  let q=null;
  if(state==='play'&&world.airT<=0)q=zoneAtPlayer(); // airborne = flies right over
  const zk=q?q.kind:null;
  if(zk!==world.zoneKind){
    world.zoneKind=zk;
    if(zk&&zk!=='dash'){
      if(zk==='ice')sndIce();else sndMud();
      if(!world.zoneToast[zk]){world.zoneToast[zk]=1;showToast(ZONE_TOAST[zk]);}
    }
  }
  if(q&&q.kind==='dash'&&!q.used){
    q.used=true;world.boostT=1.5;
    sndDash();spawnSparkles(world.carX,PY-24);
    if(!world.zoneToast.dash){world.zoneToast.dash=1;showToast(ZONE_TOAST.dash);}
  }
  // splatter while wading through goo / water
  if(state==='play'&&zk&&zk!=='dash'&&zk!=='ice'){
    world.zdropT-=dt;
    if(world.zdropT<=0){
      world.zdropT=.06;
      const pd=playerDims();
      const col=zk==='mud'?'rgba(122,85,45,.9)':(zk==='mudflat'?'rgba(146,120,66,.9)':'rgba(150,205,240,.95)');
      [-1,1].forEach(s=>{
        world.particles.push({kind:'zdrop',col,x:world.carX+s*pd.w*.42,y:PY+pd.l*.3,
          vx:s*rand(30,110),vy:rand(-30,60)+world.speed*.25,size:rand(2.5,5.5),life:rand(.35,.6),t:0});
      });
    }
  }
  // sparkles while dashing
  if(world.boostT>0&&Math.random()<dt*20){
    world.particles.push({kind:'star',x:world.carX+rand(-24,24),y:PY+rand(-10,40),
      vx:rand(-40,40),vy:120+world.speed*.3,rot:rand(0,TAU),vr:rand(-6,6),size:rand(4,8),life:.5,t:0});
  }
}
function landFx(){
  const pd=playerDims();
  const q=zoneAtPlayer();
  const zk=q?q.kind:null;
  let col='rgba(185,175,155,.9)'; // dust
  if(zk==='puddle'||zk==='mudflat')col='rgba(150,205,240,.95)';
  else if(zk==='mud')col='rgba(122,85,45,.95)';
  else if(course.snow)col='rgba(255,255,255,.95)';
  else if(course.water)col='rgba(180,225,250,.9)';
  for(let i=0;i<9;i++){
    world.particles.push({kind:'zdrop',col,x:world.carX+rand(-pd.w*.55,pd.w*.55),y:PY+pd.l*.35,
      vx:rand(-130,130),vy:rand(-150,-10),size:rand(3,6.5),life:rand(.4,.7),t:0});
  }
  blip(150,75,.13,'sine',.13); // soft landing thump
}
function landClear(){
  // fairness: anything under the car at touchdown is bounced away, never a crash
  const pd=playerDims();
  for(const o of world.obstacles){
    if(o.hit||o.gone||o.got)continue;
    const oy=PY-(o.z-world.dist);
    if(oy<-140||oy>H+140)continue;
    const ox=roadCenterAt(o.z)+o.lane*roadHalf+(o.xOff||0);
    const od=obstacleDims(o);
    if(Math.abs(world.carX-ox)<(pd.w+od.w)*.5*.62&&Math.abs(PY-oy)<(pd.l+od.l)*.5*.62){
      if(o.type==='car'){ // spins off the road (no bonus - just a save)
        o.hit=true;o.spin=0;o.hitT=0;o.xOff=0;o.slide=o.lane>=0?1:-1;o.sp*=.3;
        spawnSparkles(ox,oy);
      }else if(o.type==='item'){ // landing on a present still collects it
        o.got=true;
        if(world.items<3)world.items++;
        updateItemHUD();sndGet();spawnSparkles(ox,oy);
      }else{ // rocks / balls / snow piles pop away
        o.gone=true;spawnSparkles(ox,oy);
      }
    }
  }
  world.obstacles=world.obstacles.filter(o=>!o.gone&&!o.got);
}
function updateParticles(dt){
  world.particles.forEach(p=>{
    p.t+=dt;
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    if(p.kind==='star'){p.vy+=140*dt;p.rot+=p.vr*dt;}
    if(p.kind==='smoke'){p.size+=26*dt;p.vx*=(1-dt);p.vy*=(1-dt);}
    if(p.kind==='puff'){p.size+=14*dt;}
    if(p.kind==='drop'){p.vy+=980*dt;}
    if(p.kind==='zdrop'){p.vy+=760*dt;}
    if(p.kind==='ring'){p.size+=260*dt;}
  });
  world.particles=world.particles.filter(p=>p.t<p.life);
}
function clearAfterHit(){
  // spin out / remove everything close by so the restart is safe
  if(course.mode==='side'){
    for(const o of world.sideObs){
      const dxo=o.z-world.dist;
      if(dxo>-320&&dxo<W+240&&!o.hit){
        if(o.type==='car'){o.hit=true;o.hitT=0;o.vy=-360;o.rot=0;o.vr=9;o.yOff=0;}
        else o.gone=true;
      }
    }
    world.sideObs=world.sideObs.filter(o=>!o.gone);
  }else{
    for(const o of world.obstacles){
      const y=PY-(o.z-world.dist);
      if(y>-280&&y<H+140){
        if(o.type==='car'&&!o.hit){
          o.hit=true;o.spin=0;o.hitT=0;o.xOff=0;
          o.slide=o.lane>=0?1:-1;o.sp*=.3;
        }else if(o.type!=='item'&&o.type!=='car')o.gone=true;
      }
    }
    world.obstacles=world.obstacles.filter(o=>!o.gone);
  }
}
function doCrash(offroad){
  if(state!=='play'||world.invT>0)return;
  const side=course.mode==='side';
  const cx=side?sidePlayerX()+world.sideX:world.carX;
  const cy=side?sideGroundY()-30*sideScale()-world.jumpY:PY;
  if(world.lives>1){
    // soft crash: lose one heart, keep on driving (same run, same distance)
    world.lives--;
    updateLivesHUD(true);
    world.invT=1.9;      // invincible + blinking while recovering
    world.speed*=.35;
    spawnCrashFx(cx,cy);
    sndOuch();
    clearAfterHit();
    if(side){ // back to the home position on the ground
      world.sideX=0;world.sideVx=0;
      world.jumpY=0;world.jumpVy=0;world.jumps=0;
    }else if(offroad){ // put the car back on the road
      world.carX=roadCenterAt(world.dist)+(course.twoway?-roadHalf*.47:0);
    }
    showOuchToast();
    if(world.lives===1)sndDoki();
  }else{
    world.lives=0;
    updateLivesHUD(true);
    state='crash';world.crashT=0;
    stopEngine();stopSiren();stopBgm();
    sndPoyon();sndZukkoke();
    spawnCrashFx(cx,cy);
  }
}
function showOuchToast(){
  const el=$('#toast');
  el.textContent=world.lives===1?'いたた！ あと1かい きをつけて！':'いたた！ あと'+world.lives+'かい だいじょうぶ！';
  el.classList.remove('hidden','pop');
  el.classList.add('ouch');
  void el.offsetWidth;el.classList.add('pop');
  clearTimeout(showToast._t);
  showToast._t=setTimeout(()=>{el.classList.add('hidden');el.classList.remove('ouch');},1700);
}

/* ============================== render ============================== */
function buildEdgePts(){
  const pts=[];
  for(let y=-30;y<=H+40;y+=16){
    pts.push([y,roadCenterAt(world.dist+(PY-y))]);
  }
  return pts;
}
function sideFill(pts,off,side,color){
  ctx.beginPath();
  pts.forEach((p,i)=>{
    const x=p[1]+side*off;
    i?ctx.lineTo(x,p[0]):ctx.moveTo(x,p[0]);
  });
  const ex=side>0?W+60:-60;
  ctx.lineTo(ex,pts[pts.length-1][0]);
  ctx.lineTo(ex,pts[0][0]);
  ctx.closePath();ctx.fillStyle=color;ctx.fill();
}
function strokeOffset(pts,off,style,lw,dash,dashOff){
  ctx.beginPath();
  pts.forEach((p,i)=>{
    const x=p[1]+off;
    i?ctx.lineTo(x,p[0]):ctx.moveTo(x,p[0]);
  });
  ctx.strokeStyle=style;ctx.lineWidth=lw;
  ctx.setLineDash(dash||[]);
  ctx.lineDashOffset=dashOff||0;
  ctx.stroke();
  ctx.setLineDash([]);
}
function render(t){
  if(kart.active&&kart.versus){renderVersus3D(t);return;}
  if(kart.active){renderRace3D(t);return;}
  ctx.clearRect(0,0,W,H);
  if(course.mode==='side')renderSideScene(t);
  else renderTopScene(t);
  drawFxParticles();
  if(kart.active){drawRaceHUD(t);drawConfetti();}
  if(state==='crash'&&world.crashT<.25){
    ctx.fillStyle='rgba(255,255,255,'+(0.5*(1-world.crashT/.25)).toFixed(3)+')';
    ctx.fillRect(0,0,W,H);
  }
  if(state==='play'||state==='crash'){
    if(kart.active)updateRaceChip();
    else $('#dist').textContent=meters()+'m';
  }
}
function drawFxParticles(){
  for(const p of world.particles){
    const a=1-p.t/p.life;
    if(p.kind==='smoke'){
      ctx.fillStyle='rgba(225,228,235,'+(0.7*a).toFixed(3)+')';
      ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,TAU);ctx.fill();
    }else if(p.kind==='star'){
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
      ctx.globalAlpha=Math.min(1,a*1.6);
      starPath(ctx,p.size);
      ctx.fillStyle='#ffd43b';ctx.fill();
      ctx.strokeStyle='#f59f00';ctx.lineWidth=1.6;ctx.stroke();
      ctx.restore();ctx.globalAlpha=1;
    }else if(p.kind==='text'){
      ctx.save();ctx.globalAlpha=Math.min(1,a*1.5);
      ctx.font='900 30px sans-serif';ctx.textAlign='center';
      ctx.strokeStyle='#c05a00';ctx.lineWidth=5;ctx.strokeText(p.str,p.x,p.y);
      ctx.fillStyle='#ffe066';ctx.fillText(p.str,p.x,p.y);
      ctx.restore();
    }else if(p.kind==='drop'){
      ctx.fillStyle='rgba(215,242,255,'+(0.9*a).toFixed(3)+')';
      ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,TAU);ctx.fill();
    }else if(p.kind==='zdrop'){ // colored splatter (mud / water / snow)
      ctx.globalAlpha=Math.min(1,a*1.4);
      ctx.fillStyle=p.col;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,TAU);ctx.fill();
      ctx.globalAlpha=1;
    }else if(p.kind==='ring'){
      ctx.strokeStyle='rgba(235,250,255,'+(0.8*a).toFixed(3)+')';
      ctx.lineWidth=5*a+1;
      ctx.beginPath();ctx.ellipse(p.x,p.y,p.size,p.size*.45,0,0,TAU);ctx.stroke();
    }
  }
}
function drawZones(t){
  for(const q of world.zones){
    const yTop=PY-(q.z+q.len-world.dist),yBot=PY-(q.z-world.dist);
    if(yTop>H+60||yBot<-60)continue;
    const step=14,ys=Math.max(-40,yTop),ye=Math.min(H+40,yBot);
    const left=[],right=[];
    for(let y=ys;y<=ye;y+=step){
      const zz=world.dist+(PY-y);
      const de=Math.min(zz-q.z,q.z+q.len-zz);
      // rounded ends: dash panels stay chunky, goo zones taper gently
      let sh=q.kind==='dash'?clamp(de/40,.62,1):clamp(de/90,.18,1);
      sh=sh*sh*(3-2*sh)*.35+sh*.65; // soften the corners
      const cx=roadCenterAt(zz)+q.off*roadHalf;
      const hw=q.wf*roadHalf*sh;
      left.push([cx-hw,y]);right.push([cx+hw,y]);
    }
    if(left.length<2)continue;
    const path=()=>{
      ctx.beginPath();
      left.forEach((p,i)=>i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1]));
      for(let i=right.length-1;i>=0;i--)ctx.lineTo(right[i][0],right[i][1]);
      ctx.closePath();
    };
    if(q.kind==='dash'){ // glowing boost panel with animated chevrons
      path();
      const g=ctx.createLinearGradient(0,ys,0,ye);
      g.addColorStop(0,'#1b6fd6');g.addColorStop(.5,'#2a8ae8');g.addColorStop(1,'#1b6fd6');
      ctx.fillStyle=g;ctx.fill();
      ctx.strokeStyle='rgba(120,240,255,'+(0.55+0.3*Math.sin(t*6)).toFixed(2)+')';
      ctx.lineWidth=5;ctx.stroke();
      ctx.save();path();ctx.clip();
      const n=Math.max(2,Math.floor(q.len/56));
      for(let j=0;j<n;j++){
        const zz=q.z+((j*56+t*90)%Math.max(1,q.len-16))+8;
        const y=PY-(zz-world.dist);
        const cx=roadCenterAt(zz)+q.off*roadHalf;
        const wA=q.wf*roadHalf*.6;
        ctx.fillStyle='rgba(255,240,140,'+(0.82+0.18*Math.sin(t*8+j)).toFixed(2)+')';
        ctx.beginPath();
        ctx.moveTo(cx-wA*.55,y+11);ctx.lineTo(cx,y-12);ctx.lineTo(cx+wA*.55,y+11);
        ctx.closePath();ctx.fill();
        ctx.strokeStyle='rgba(255,255,255,.55)';ctx.lineWidth=2;ctx.stroke();
      }
      ctx.restore();
      continue;
    }
    path();
    if(q.kind==='mudflat')ctx.fillStyle='#d9c288';
    else if(q.kind==='mud')ctx.fillStyle='#8a6238';
    else if(q.kind==='ice')ctx.fillStyle='rgba(214,238,252,.92)';
    else ctx.fillStyle='rgba(70,145,215,.62)'; // puddle
    ctx.fill();
    ctx.lineWidth=3.5;
    ctx.strokeStyle=q.kind==='mudflat'?'#b09a5e':(q.kind==='mud'?'#5f421f':(q.kind==='ice'?'#9fd2ee':'rgba(235,248,255,.75)'));
    ctx.stroke();
    ctx.save();path();ctx.clip();
    if(q.kind==='mudflat'||q.kind==='puddle'){ // wet pools + sheen
      const n=Math.max(3,Math.floor(q.len/70));
      for(let j=0;j<n;j++){
        const zz=q.z+((q.seed*13+j*97)%Math.max(1,q.len-40))+20;
        const y=PY-(zz-world.dist);
        const cx=roadCenterAt(zz)+q.off*roadHalf+(((q.seed*29+j*53)%200)/100-1)*q.wf*roadHalf*.6;
        const rw=22+((q.seed+j*31)%26);
        if(q.kind==='mudflat'){
          ctx.fillStyle='rgba(118,177,214,.75)';
          ctx.beginPath();ctx.ellipse(cx,y,rw,rw*.42,0,0,TAU);ctx.fill();
          ctx.fillStyle='rgba(255,255,255,.5)';
          ctx.beginPath();ctx.ellipse(cx-rw*.3,y-rw*.12,rw*.3,rw*.1,0,0,TAU);ctx.fill();
        }else{
          ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=1.8;
          ctx.beginPath();ctx.ellipse(cx,y,rw*.8,rw*.3,0,0,TAU);ctx.stroke();
        }
      }
    }else if(q.kind==='mud'){ // dark blobs + tire ruts
      const n=Math.max(3,Math.floor(q.len/60));
      ctx.fillStyle='rgba(94,63,30,.55)';
      for(let j=0;j<n;j++){
        const zz=q.z+((q.seed*17+j*89)%Math.max(1,q.len-30))+15;
        const y=PY-(zz-world.dist);
        const cx=roadCenterAt(zz)+q.off*roadHalf+(((q.seed*23+j*71)%200)/100-1)*q.wf*roadHalf*.65;
        ctx.beginPath();ctx.ellipse(cx,y,16+((j*29+q.seed)%18),7+((j*13)%8),0,0,TAU);ctx.fill();
      }
      ctx.strokeStyle='rgba(70,45,20,.5)';ctx.lineWidth=6;ctx.lineCap='round';
      [-.3,.3].forEach(f=>{
        ctx.beginPath();
        for(let y=ys;y<=ye;y+=step){
          const zz=world.dist+(PY-y);
          const x=roadCenterAt(zz)+q.off*roadHalf+f*q.wf*roadHalf;
          y===ys?ctx.moveTo(x,y):ctx.lineTo(x,y);
        }
        ctx.stroke();
      });
    }else if(q.kind==='ice'){ // sheen streaks + twinkling sparkles
      ctx.strokeStyle='rgba(255,255,255,.65)';ctx.lineWidth=3;ctx.lineCap='round';
      const n=Math.max(2,Math.floor(q.len/90));
      for(let j=0;j<n;j++){
        const zz=q.z+((q.seed*11+j*127)%Math.max(1,q.len-50))+25;
        const y=PY-(zz-world.dist);
        const cx=roadCenterAt(zz)+q.off*roadHalf+(((q.seed*37+j*61)%160)/100-.8)*q.wf*roadHalf*.5;
        ctx.beginPath();ctx.moveTo(cx-26,y+12);ctx.lineTo(cx+26,y-12);ctx.stroke();
        ctx.beginPath();ctx.moveTo(cx-6,y+16);ctx.lineTo(cx+34,y-4);ctx.stroke();
      }
      for(let j=0;j<n*2;j++){
        const zz=q.z+((q.seed*7+j*83)%Math.max(1,q.len-20))+10;
        const y=PY-(zz-world.dist);
        const cx=roadCenterAt(zz)+q.off*roadHalf+(((q.seed*41+j*57)%180)/100-.9)*q.wf*roadHalf*.7;
        const a=.4+.5*(0.5+0.5*Math.sin(t*5+j*1.7));
        ctx.strokeStyle='rgba(255,255,255,'+a.toFixed(2)+')';ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(cx-5,y);ctx.lineTo(cx+5,y);ctx.moveTo(cx,y-5);ctx.lineTo(cx,y+5);ctx.stroke();
      }
    }
    ctx.restore();
  }
}
function renderTopScene(t){

      const yy=((st.y+world.dist*st.par)%(H+20))-10;

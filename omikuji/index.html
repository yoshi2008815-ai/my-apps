<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>今日のおみくじ</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(160deg, #fef3c7, #fde68a);
      color: #422006;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 28px;
      width: 100%;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 8px 30px rgba(120, 80, 0, .15);
    }
    h1 { font-size: 1.3rem; margin-bottom: 4px; }
    .sub { color: #92722a; font-size: .85rem; margin-bottom: 28px; }
    .result { min-height: 120px; display: grid; place-items: center; }
    .fortune { font-size: 2.6rem; font-weight: 800; margin-bottom: 8px; }
    .message { font-size: .95rem; color: #555; line-height: 1.6; }
    .placeholder { font-size: 3rem; opacity: .35; }
    button {
      margin-top: 28px;
      font-size: 1.05rem;
      font-weight: 700;
      padding: 0.9rem 2.4rem;
      border: none;
      border-radius: 999px;
      background: #d97706;
      color: #fff;
      cursor: pointer;
    }
    button:active { transform: scale(0.96); }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎴 今日のおみくじ</h1>
    <p class="sub">ボタンを引いて運勢をたしかめよう</p>

    <div class="result" id="result">
      <div class="placeholder">？</div>
    </div>

    <button id="draw">おみくじを引く</button>
  </div>

  <script>
    const fortunes = [
      { name: "大吉", emoji: "🌟", msg: "最高の一日。思いきった挑戦が吉。" },
      { name: "中吉", emoji: "✨", msg: "良い流れ。丁寧な準備が実を結ぶ。" },
      { name: "小吉", emoji: "🍀", msg: "穏やかな運気。小さな親切が運を呼ぶ。" },
      { name: "吉",   emoji: "🌿", msg: "平穏な一日。焦らずマイペースで。" },
      { name: "末吉", emoji: "🌤", msg: "後半に運気上昇。あきらめずに。" },
      { name: "凶",   emoji: "☁️", msg: "今日は守りの日。無理せず休もう。" },
    ];

    const resultEl = document.getElementById("result");
    document.getElementById("draw").addEventListener("click", () => {
      const f = fortunes[Math.floor(Math.random() * fortunes.length)];
      resultEl.innerHTML =
        `<div><div class="fortune">${f.emoji} ${f.name}</div>` +
        `<div class="message">${f.msg}</div></div>`;
    });
  </script>
</body>
</html>

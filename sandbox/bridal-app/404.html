<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ページが見つかりません - ハーモニーブライダル</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Noto Sans JP',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#F8EDF3 0%,#fff 100%); padding:24px; color:#2D2D2D; }
.box { text-align:center; max-width:480px; }
.emoji { font-size:72px; margin-bottom:16px; }
h1 { font-size:24px; margin-bottom:10px; color:#C45C82; }
p { font-size:14px; line-height:1.8; color:#6B7280; margin-bottom:24px; }
.btn { display:inline-block; background:linear-gradient(135deg,#C45C82,#9C3A62); color:#fff; padding:12px 28px; border-radius:99px; text-decoration:none; font-weight:600; font-size:14px; transition:transform .2s; }
.btn:hover { transform:translateY(-2px); }
</style>
</head>
<body>
<div class="box">
  <div class="emoji">💐</div>
  <h1>ページが見つかりません</h1>
  <p>お探しのページは移動または削除された可能性があります。<br>トップページからやり直してください。</p>
  <a href="./" class="btn">🏠 トップへ戻る</a>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会員管理 - 管理画面</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-body">

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-icon">💍</div>
    <div class="sidebar-logo-text">ハーモニー<br><span style="font-size:10px;opacity:.6;">管理システム</span></div>
  </div>
  <nav class="sidebar-nav">
    <a href="dashboard.html" class="sidebar-item"><span class="sidebar-icon">📊</span>ダッシュボード</a>
    <a href="members.html"   class="sidebar-item active"><span class="sidebar-icon">👥</span>会員管理</a>
    <a href="events.html"    class="sidebar-item"><span class="sidebar-icon">📅</span>イベント管理</a>
    <a href="notifications.html" class="sidebar-item"><span class="sidebar-icon">🔔</span>お知らせ配信</a>
    <a href="inquiries.html" class="sidebar-item"><span class="sidebar-icon">💬</span>問い合わせ管理</a>
  </nav>
  <div class="sidebar-bottom">
    <button class="sidebar-item" onclick="App.confirm('ログアウトしますか？',()=>{Auth.logoutAdmin();location.href='login.html';})" style="width:100%;text-align:left;background:none;border:none;cursor:pointer;color:rgba(255,255,255,.6);">
      <span class="sidebar-icon">🚪</span>ログアウト
    </button>
  </div>
</aside>

<div class="admin-main">
  <header class="admin-topbar">
    <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show')">☰</button>
    <h1 class="topbar-title">会員管理</h1>
    <div class="topbar-right">
      <button class="btn btn-primary btn-sm" onclick="showAddMember()">＋ 新規会員登録</button>
    </div>
  </header>

  <div class="admin-content">
    <!-- Toolbar -->
    <div class="table-toolbar">
      <div class="table-search-wrap">
        <input type="text" class="table-search" id="searchInput" placeholder="氏名・メール・ID で検索..." oninput="render()">
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <select class="form-control" id="filterStatus" onchange="render()" style="height:38px;font-size:13px;">
          <option value="">ステータス：全件</option>
          <option value="active">アクティブ</option>
          <option value="pending">審査待ち</option>
          <option value="suspended">休止中</option>
          <option value="withdrawn">退会済み</option>
        </select>
        <select class="form-control" id="filterGender" onchange="render()" style="height:38px;font-size:13px;">
          <option value="">性別：全員</option>
          <option value="female">女性</option>
          <option value="male">男性</option>
        </select>
        <select class="form-control" id="filterPlan" onchange="render()" style="height:38px;font-size:13px;">
          <option value="">プラン：全件</option>
          <option value="premium">プレミアム</option>
          <option value="standard">スタンダード</option>
        </select>
      </div>
    </div>

    <!-- Table -->
    <div class="admin-card">
      <div class="admin-card-body" style="padding:0;">
        <table class="admin-table" id="memberTable">
          <thead>
            <tr>
              <th>会員ID</th>
              <th>氏名</th>
              <th>性別</th>
              <th>年齢</th>
              <th>都道府県</th>
              <th>プラン</th>
              <th>ステータス</th>
              <th>書類</th>
              <th>入会日</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
        <div id="emptyState" class="empty-state" style="display:none;padding:40px;">
          <div class="empty-state-icon">🔍</div>
          <div class="empty-state-title">該当する会員が見つかりません</div>
        </div>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>
</div>

<div class="sidebar-overlay" id="overlay" onclick="document.getElementById('sidebar').classList.remove('open');this.classList.remove('show');"></div>

<script src="../js/seed.js"></script>
<script src="../js/store.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/app.js"></script>
<script>
const admin = Auth.requireAdmin();
if (!admin) throw new Error('not logged in');

const PAGE_SIZE = 10;
let currentPage = 1;

const statusLabel = { active:'アクティブ', pending:'審査待ち', suspended:'休止中', withdrawn:'退会済み' };
const statusChip  = { active:'chip-ok', pending:'chip-pending', suspended:'chip-none', withdrawn:'chip-ng' };

function getFiltered() {
  const q   = document.getElementById('searchInput').value.trim().toLowerCase();
  const st  = document.getElementById('filterStatus').value;
  const gen = document.getElementById('filterGender').value;
  const pl  = document.getElementById('filterPlan').value;
  return (Store.get('members') ?? []).filter(m => {
    if (st  && m.status !== st) return false;
    if (gen && m.gender !== gen) return false;
    if (pl  && m.planType !== pl) return false;
    if (q && !(`${m.id} ${m.name} ${m.nameKana} ${m.email}`).toLowerCase().includes(q)) return false;
    return true;
  });
}

function render() {
  const rows = getFiltered();
  const total = rows.length;
  const pages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (currentPage > pages) currentPage = pages;
  const slice = rows.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);

  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('emptyState');
  if (!slice.length) {
    tbody.innerHTML = '';
    empty.style.display = 'flex';
  } else {
    empty.style.display = 'none';
    const docs = Store.get('documents') ?? [];
    tbody.innerHTML = slice.map(m => {
      const age = App.age(m.birthdate);
      const memberDocs = docs.filter(d => d.memberId === m.id);
      const approvedDocs = memberDocs.filter(d => d.status === 'approved').length;
      return `<tr>
        <td style="font-size:12px;color:var(--text-muted);font-family:monospace;">${m.id}</td>
        <td>
          <div style="display:flex;align-items:center;gap:8px;">
            <div style="width:32px;height:32px;border-radius:50%;overflow:hidden;flex-shrink:0;">
              ${App.avatarImg(m.name, m.gender, 32, '')}
            </div>
            <div>
              <div style="font-weight:600;font-size:13px;">${m.name}</div>
              <div style="font-size:11px;color:var(--text-muted);">${m.email}</div>
            </div>
          </div>
        </td>
        <td style="font-size:13px;">${m.gender==='female'?'女':'男'}</td>
        <td style="font-size:13px;">${age}歳</td>
        <td style="font-size:13px;">${m.prefecture}</td>
        <td><span class="chip ${m.planType==='premium'?'chip-approved':'chip-none'}" style="font-size:11px;">${m.planType==='premium'?'⭐プレミアム':'スタンダード'}</span></td>
        <td><span class="chip ${statusChip[m.status]}" style="font-size:11px;">${statusLabel[m.status]}</span></td>
        <td style="font-size:12px;">${approvedDocs}/${memberDocs.length}</td>
        <td style="font-size:12px;color:var(--text-muted);">${App.fmtDate(m.joinDate,{monthDay:true})}</td>
        <td>
          <div style="display:flex;gap:4px;">
            <button class="btn btn-secondary btn-sm" onclick="showDetail('${m.id}')">詳細</button>
            <button class="btn btn-sm" style="background:#FEF2F2;color:#EF4444;border:1px solid #FECACA;" onclick="toggleStatus('${m.id}','${m.status}')">${m.status==='active'?'停止':'解除'}</button>
          </div>
        </td>
      </tr>`;
    }).join('');
  }

  // Pagination
  const pg = document.getElementById('pagination');
  if (pages <= 1) { pg.innerHTML = `<span style="font-size:13px;color:var(--text-muted);">全 ${total}件</span>`; return; }
  let btns = `<span style="font-size:13px;color:var(--text-muted);margin-right:8px;">全 ${total}件</span>`;
  btns += `<button class="page-btn" ${currentPage===1?'disabled':''} onclick="goPage(${currentPage-1})">‹</button>`;
  for (let p = Math.max(1,currentPage-2); p <= Math.min(pages,currentPage+2); p++) {
    btns += `<button class="page-btn${p===currentPage?' active':''}" onclick="goPage(${p})">${p}</button>`;
  }
  btns += `<button class="page-btn" ${currentPage===pages?'disabled':''} onclick="goPage(${currentPage+1})">›</button>`;
  pg.innerHTML = btns;
}

function goPage(p) { currentPage = p; render(); }

function toggleStatus(id, current) {
  const next = current === 'active' ? 'suspended' : 'active';
  const label = next === 'active' ? '有効化' : '停止';
  App.confirm(`この会員を${label}しますか？`, () => {
    Store.update('members', id, { status: next });
    App.toast(`会員を${label}しました`, 'success');
    render();
  });
}

function showDetail(id) {
  const m = Store.getById('members', id);
  if (!m) return;
  const age = App.age(m.birthdate);
  const advisor = Store.getById('advisors', m.advisorId);
  const docs = Store.query('documents', d => d.memberId === id);
  const intros = Store.query('introductions', i => i.fromMemberId === id);
  const boards = Store.query('bulletinBoards', b => b.member1Id===id || b.member2Id===id);
  const evRegs = Store.query('eventRegistrations', r => r.memberId === id);

  App.modal(`
    <div class="modal-header">
      <h3>会員詳細</h3>
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">×</button>
    </div>
    <div class="modal-body" style="max-height:70vh;overflow-y:auto;">
      <div style="display:flex;align-items:center;gap:14px;padding:16px;background:var(--bg);border-radius:10px;margin-bottom:16px;">
        ${App.avatarImg(m.name, m.gender, 56, '')}
        <div>
          <div style="font-size:18px;font-weight:700;">${m.name} <span style="font-size:13px;color:var(--text-muted);">(${m.nameKana})</span></div>
          <div style="font-size:12px;color:var(--text-muted);">${m.id} ／ ${m.email}</div>
          <div style="margin-top:6px;display:flex;gap:6px;">
            <span class="chip ${statusChip[m.status]}">${statusLabel[m.status]}</span>
            <span class="chip ${m.planType==='premium'?'chip-approved':'chip-none'}">${m.planType==='premium'?'プレミアム':'スタンダード'}</span>
            ${m.verified?'<span class="chip chip-ok">書類確認済み</span>':''}
          </div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
        ${[['年齢',`${age}歳`],['性別',m.gender==='female'?'女性':'男性'],['居住地',`${m.prefecture} ${m.city}`],['身長',`${m.height}cm`],['職業',m.occupation],['年収',m.income],['学歴',m.education],['婚姻歴',m.maritalStatus]].map(([l,v])=>`
        <div style="background:var(--bg);border-radius:8px;padding:10px;">
          <div style="font-size:11px;color:var(--text-muted);">${l}</div>
          <div style="font-size:13px;font-weight:600;margin-top:2px;">${v}</div>
        </div>`).join('')}
      </div>

      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;text-align:center;">
        ${[['紹介書',intros.length],['進行中',boards.length],['イベント',evRegs.length],['書類',`${docs.filter(d=>d.status==='approved').length}/${docs.length}`]].map(([l,v])=>`
        <div style="background:var(--primary-light);border-radius:8px;padding:10px 4px;">
          <div style="font-size:18px;font-weight:700;color:var(--primary);">${v}</div>
          <div style="font-size:11px;color:var(--text-muted);">${l}</div>
        </div>`).join('')}
      </div>

      <div style="font-size:12px;color:var(--text-sub);line-height:1.7;padding:10px;background:var(--bg);border-radius:8px;margin-bottom:10px;">
        <strong>担当:</strong> ${advisor?.name ?? '—'} (${advisor?.branch ?? '—'})<br>
        <strong>入会:</strong> ${App.fmtDate(m.joinDate,{yearMonthDay:true})}<br>
        <strong>有効期限:</strong> ${App.fmtDate(m.membershipEndDate,{yearMonthDay:true})}<br>
        <strong>次回引落:</strong> ${App.fmtMoney(m.nextDeductionAmount)} (${App.fmtDate(m.nextDeductionDate,{yearMonthDay:true})})
      </div>

      <div style="font-size:12px;color:var(--text-sub);line-height:1.7;padding:10px;background:var(--bg);border-radius:8px;">
        <strong>自己紹介:</strong><br>${m.selfIntroduction ?? '—'}<br><br>
        <strong>趣味:</strong> ${Array.isArray(m.hobbies)?m.hobbies.join('・'):m.hobbies??'—'}<br>
        <strong>喫煙:</strong> ${m.smoking??'—'} ／ <strong>飲酒:</strong> ${m.drinking??'—'}
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary btn-full" onclick="toggleStatus('${id}','${m.status}');this.closest('.modal-overlay').remove();">${m.status==='active'?'⛔ 停止する':'✅ 有効化する'}</button>
      <button class="btn btn-ghost btn-full" onclick="this.closest('.modal-overlay').remove()">閉じる</button>
    </div>`, { maxWidth:'560px' });
}

function showAddMember() {
  App.modal(`
    <div class="modal-header"><h3>＋ 新規会員登録</h3><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">×</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">氏名 <span style="color:#E53E3E;">*</span></label><input type="text" class="form-control" id="newName" placeholder="田中 花子"></div>
      <div class="form-group"><label class="form-label">メールアドレス <span style="color:#E53E3E;">*</span></label><input type="email" class="form-control" id="newEmail" placeholder="hanako@example.com"></div>
      <div class="form-group"><label class="form-label">パスワード <span style="color:#E53E3E;">*</span></label><input type="password" class="form-control" id="newPw" placeholder="パスワード（8文字以上）"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group"><label class="form-label">性別</label>
          <select class="form-control" id="newGender"><option value="female">女性</option><option value="male">男性</option></select>
        </div>
        <div class="form-group"><label class="form-label">生年月日</label><input type="date" class="form-control" id="newBirth" value="1995-01-01"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group"><label class="form-label">都道府県</label><input type="text" class="form-control" id="newPref" placeholder="東京都"></div>
        <div class="form-group"><label class="form-label">プラン</label>
          <select class="form-control" id="newPlan"><option value="standard">スタンダード</option><option value="premium">プレミアム</option></select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-full" onclick="this.closest('.modal-overlay').remove()">キャンセル</button>
      <button class="btn btn-primary btn-full" onclick="submitNewMember()">登録する</button>
    </div>`, { maxWidth:'500px' });
}

function submitNewMember() {
  const name  = document.getElementById('newName')?.value?.trim();
  const email = document.getElementById('newEmail')?.value?.trim();
  const pw    = document.getElementById('newPw')?.value;
  const gender= document.getElementById('newGender')?.value;
  const birth = document.getElementById('newBirth')?.value;
  const pref  = document.getElementById('newPref')?.value?.trim();
  const plan  = document.getElementById('newPlan')?.value;

  if (!name || !email || !pw || !pref) { App.toast('必須項目を入力してください', 'warning'); return; }
  if (pw.length < 8) { App.toast('パスワードは8文字以上にしてください', 'warning'); return; }

  const newId = Store.nextId('members','M');
  Store.create('members', {
    id: newId, name, nameKana: name, email, password: pw, gender,
    birthdate: birth, height: 160, prefecture: pref, city: '',
    education: '—', maritalStatus: '未婚', children: 'なし',
    occupation: '—', income: '—', selfIntroduction: '',
    hobbies: [], smoking: '吸わない', drinking: '飲まない',
    planType: plan, status: 'pending', verified: false,
    advisorId: 'ADV001', branch: '東京本店',
    joinDate: new Date().toISOString().slice(0,10),
    membershipEndDate: new Date(Date.now()+365*24*3600*1000).toISOString().slice(0,10),
    nextDeductionDate: new Date(Date.now()+30*24*3600*1000).toISOString().slice(0,10),
    nextDeductionAmount: plan === 'premium' ? 32000 : 19800,
    desiredAge: '28〜35歳', desiredPrefecture: '特になし', desiredIncome: '特になし',
    introductionCount: 3, photoCount: 1,
  });
  document.querySelector('.modal-overlay')?.remove();
  App.toast('✅ 会員を登録しました', 'success');
  render();
}

render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自分磨き動画 - ハーモニーブライダル</title>
<link rel="manifest" href="../manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/member.css">
</head>
<body>
<div class="member-app">
<header class="app-header">
  <button class="back-btn" onclick="history.back()">‹</button>
  <h1>🎥 自分磨き動画</h1>
  <div class="header-spacer"></div>
</header>

<div class="filter-bar">
  <button class="filter-chip active" onclick="setCat('all',this)">すべて</button>
  <button class="filter-chip" onclick="setCat('婚活入門',this)">婚活入門</button>
  <button class="filter-chip" onclick="setCat('成婚者の声',this)">成婚者の声</button>
  <button class="filter-chip" onclick="setCat('自分磨き',this)">自分磨き</button>
  <button class="filter-chip" onclick="setCat('プロフィール',this)">プロフィール</button>
</div>

<main class="app-main" style="padding-top:8px;" id="mainContent"></main>

<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span><span class="nav-label">ホーム</span></a>
  <a href="introductions.html" class="nav-item"><span class="nav-icon">💌</span><span class="nav-label">紹介書</span></a>
  <a href="search.html" class="nav-item"><span class="nav-icon">🔍</span><span class="nav-label">検索</span></a>
  <a href="events.html" class="nav-item"><span class="nav-icon">📅</span><span class="nav-label">イベント</span></a>
  <a href="board.html" class="nav-item"><span class="nav-icon">💬</span><span class="nav-label">メッセージ</span></a>
  <a href="mypage.html" class="nav-item"><span class="nav-icon">👤</span><span class="nav-label">マイページ</span></a>
</nav>
</div>

<script src="../js/seed.js"></script>
<script src="../js/store.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/app.js"></script>
<script>
const session = Auth.requireMember();
if (!session) throw new Error('not logged in');
let activeCat = 'all';

function setCat(cat, el) {
  activeCat = cat;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render() {
  let videos = Store.get('videos') ?? [];
  if (activeCat !== 'all') videos = videos.filter(v => v.category === activeCat);

  if (!videos.length) {
    document.getElementById('mainContent').innerHTML = `<div class="empty-state"><div class="empty-state-icon">🎥</div><div class="empty-state-title">動画が見つかりません</div></div>`;
    return;
  }

  document.getElementById('mainContent').innerHTML = videos.map(v => `
    <div class="video-card" onclick="playVideo('${v.youtubeId}','${v.title}')">
      <div class="video-thumb">
        <div style="font-size:56px;">${v.thumbnail}</div>
        <div class="video-play">▶</div>
        <div class="video-dur">${v.duration}</div>
      </div>
      <div class="video-info">
        <div class="video-cat">${v.category}</div>
        <div class="video-title">${v.title}</div>
        <div class="video-meta">${v.instructor} ・ 👁 ${v.views.toLocaleString()}回視聴</div>
      </div>
    </div>`).join('');
}

function playVideo(youtubeId, title) {
  App.modal(`
    <div class="modal-header"><h3 style="font-size:14px;line-height:1.4;">${title}</h3><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">×</button></div>
    <div class="modal-body" style="padding:0;">
      <div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;">
        <iframe src="https://www.youtube.com/embed/${youtubeId}?autoplay=1" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;" allow="autoplay;encrypted-media" allowfullscreen></iframe>
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-ghost btn-full" onclick="this.closest('.modal-overlay').remove()">閉じる</button></div>`,
    { persistent: true });
}

render();
</script>
</body>
</html>

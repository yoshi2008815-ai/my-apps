<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>マイアプリ ポータル</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 600px;
      margin: 80px auto;
      padding: 0 24px;
      background: #f5f5f5;
      color: #222;
    }
    h1 { font-size: 1.6rem; margin-bottom: 8px; }
    p  { color: #555; margin-bottom: 40px; }
    .grid { display: grid; gap: 16px; }
    a.card {
      display: block;
      background: #fff;
      border-radius: 12px;
      padding: 24px 28px;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      transition: box-shadow .15s;
    }
    a.card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.14); }
    a.card h2 { margin: 0 0 6px; font-size: 1.1rem; }
    a.card p  { margin: 0; font-size: .9rem; color: #666; }

  </style>
</head>
<body>
  <h1>マイアプリ ポータル</h1>
  <p>個人用アプリの入口です。</p>
  <div class="grid">
    <a class="card" href="./island-camp/">
      <h2>🏝 島キャンプ思い出マップ</h2>
      <p>20年分の島旅を日本地図でふりかえる旅日記マップ（PWA）</p>
    </a>
    <a class="card" href="./shimanchu-keiba/">
      <h2>🏇 しまんちゅ競馬予想</h2>
      <p>4人それぞれの予想データを切り替えて使えるスマホ優先の競馬予想アプリ（PWA）</p>
    </a>
    <a class="card" href="./claude-usage/">
      <h2>🪙 Claude利用コスト ダッシュボード</h2>
      <p>Claude Codeの利用実績（トークン数・コスト・モデル別比較）を集計表示</p>
    </a>
  </div>
</body>
</html>

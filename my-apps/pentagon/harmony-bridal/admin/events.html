<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>イベント管理 - 管理画面</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-body">

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-icon">💍</div>
    <div class="sidebar-logo-text">ハーモニー<br><span style="font-size:10px;opacity:.6;">管理システム</span></div>
  </div>
  <nav class="sidebar-nav">
    <a href="dashboard.html" class="sidebar-item"><span class="sidebar-icon">📊</span>ダッシュボード</a>
    <a href="members.html"   class="sidebar-item"><span class="sidebar-icon">👥</span>会員管理</a>
    <a href="events.html"    class="sidebar-item active"><span class="sidebar-icon">📅</span>イベント管理</a>
    <a href="notifications.html" class="sidebar-item"><span class="sidebar-icon">🔔</span>お知らせ配信</a>
    <a href="inquiries.html" class="sidebar-item"><span class="sidebar-icon">💬</span>問い合わせ管理</a>
  </nav>
  <div class="sidebar-bottom">
    <button class="sidebar-item" onclick="App.confirm('ログアウトしますか？',()=>{Auth.logoutAdmin();location.href='login.html';})" style="width:100%;text-align:left;background:none;border:none;cursor:pointer;color:rgba(255,255,255,.6);">
      <span class="sidebar-icon">🚪</span>ログアウト
    </button>
  </div>
</aside>

<div class="admin-main">
  <header class="admin-topbar">
    <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show')">☰</button>
    <h1 class="topbar-title">イベント管理</h1>
    <div class="topbar-right">
      <button class="btn btn-primary btn-sm" onclick="showEventForm()">＋ イベント作成</button>
    </div>
  </header>

  <div class="admin-content">
    <!-- KPI row -->
    <div class="kpi-grid" style="--kpi-cols:4;" id="kpiRow"></div>

    <!-- Toolbar -->
    <div class="table-toolbar">
      <input type="text" class="table-search" id="searchInput" placeholder="イベント名・場所で検索..." oninput="render()">
      <div style="display:flex;gap:8px;">
        <select class="form-control" id="filterStatus" onchange="render()" style="height:38px;font-size:13px;">
          <option value="">すべて</option>
          <option value="upcoming">開催予定</option>
          <option value="past">終了済み</option>
        </select>
        <select class="form-control" id="filterCat" onchange="render()" style="height:38px;font-size:13px;">
          <option value="">カテゴリ：全件</option>
          <option value="パーティー">パーティー</option>
          <option value="セミナー">セミナー</option>
          <option value="個別相談">個別相談</option>
          <option value="お見合い">お見合い</option>
        </select>
      </div>
    </div>

    <!-- Cards grid -->
    <div id="eventsGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;"></div>
    <div id="emptyState" class="empty-state" style="display:none;padding:60px;">
      <div class="empty-state-icon">📅</div>
      <div class="empty-state-title">該当するイベントが見つかりません</div>
    </div>
  </div>
</div>

<div class="sidebar-overlay" id="overlay" onclick="document.getElementById('sidebar').classList.remove('open');this.classList.remove('show');"></div>

<script src="../js/seed.js"></script>
<script src="../js/store.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/app.js"></script>
<script>
Auth.requireAdmin();

const catEmoji = { 'パーティー':'🎉','セミナー':'📚','個別相談':'💬','お見合い':'💍' };

function getFiltered() {
  const q   = document.getElementById('searchInput').value.trim().toLowerCase();
  const st  = document.getElementById('filterStatus').value;
  const cat = document.getElementById('filterCat').value;
  const now = new Date();
  return (Store.get('events') ?? []).filter(e => {
    const upcoming = new Date(e.date) >= now;
    if (st === 'upcoming' && !upcoming) return false;
    if (st === 'past' && upcoming) return false;
    if (cat && e.category !== cat) return false;
    if (q && !`${e.title} ${e.location}`.toLowerCase().includes(q)) return false;
    return true;
  }).sort((a,b) => a.date.localeCompare(b.date));
}

function render() {
  const events = Store.get('events') ?? [];
  const regs   = Store.get('eventRegistrations') ?? [];
  const now = new Date();

  // KPI
  document.getElementById('kpiRow').innerHTML = [
    { label:'総イベント数', value: events.length, icon:'📅', color:'#C45C82' },
    { label:'開催予定', value: events.filter(e=>new Date(e.date)>=now).length, icon:'🗓', color:'#059669' },
    { label:'今月の参加者', value: regs.filter(r => r.registeredAt?.startsWith('2026')).length, icon:'👥', color:'#8B5CF6' },
    { label:'申込合計', value: regs.length, icon:'✅', color:'#D97706' },
  ].map(k=>`
    <div class="kpi-card">
      <div class="kpi-icon" style="background:${k.color}20;color:${k.color};">${k.icon}</div>
      <div class="kpi-body">
        <div class="kpi-label">${k.label}</div>
        <div class="kpi-value" style="color:${k.color};">${k.value}</div>
      </div>
    </div>`).join('');

  const filtered = getFiltered();
  const grid = document.getElementById('eventsGrid');
  const empty = document.getElementById('emptyState');

  if (!filtered.length) { grid.innerHTML = ''; empty.style.display = 'flex'; return; }
  empty.style.display = 'none';

  grid.innerHTML = filtered.map(e => {
    const eventRegs = regs.filter(r => r.eventId === e.id);
    const pct = e.capacity ? Math.round(eventRegs.length / e.capacity * 100) : 0;
    const isPast = new Date(e.date) < now;
    const isFull = eventRegs.length >= e.capacity;
    return `
    <div class="admin-card" style="opacity:${isPast?.7:1};">
      <div style="background:linear-gradient(135deg,#1E2438,#2C3553);border-radius:10px 10px 0 0;padding:16px;color:#fff;position:relative;">
        <div style="position:absolute;top:12px;right:12px;">
          ${isPast?'<span class="chip" style="background:rgba(255,255,255,.15);color:#fff;font-size:11px;">終了</span>':
            isFull?'<span class="chip chip-ng" style="font-size:11px;">満員</span>':
            '<span class="chip chip-ok" style="font-size:11px;">受付中</span>'}
        </div>
        <div style="font-size:22px;margin-bottom:6px;">${catEmoji[e.category]??'📅'}</div>
        <div style="font-size:15px;font-weight:700;line-height:1.3;">${e.title}</div>
        <div style="font-size:12px;opacity:.7;margin-top:4px;">${e.category}</div>
      </div>
      <div class="admin-card-body">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px;margin-bottom:12px;">
          <div><div style="color:var(--text-muted);">日時</div><div style="font-weight:600;">${App.fmtDate(e.date,{yearMonthDay:true})}</div></div>
          <div><div style="color:var(--text-muted);">場所</div><div style="font-weight:600;">${e.location}</div></div>
          <div><div style="color:var(--text-muted);">料金</div><div style="font-weight:600;">${App.fmtMoney(e.price)}</div></div>
          <div><div style="color:var(--text-muted);">申込数</div><div style="font-weight:600;color:${isFull?'#EF4444':'inherit'}">${eventRegs.length} / ${e.capacity}名</div></div>
        </div>
        <div style="margin-bottom:12px;">
          <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;"><span>申込率</span><span>${pct}%</span></div>
          <div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden;">
            <div style="height:100%;background:${pct>=90?'#EF4444':pct>=70?'#D97706':'#059669'};border-radius:3px;width:${pct}%;"></div>
          </div>
        </div>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-secondary btn-sm" style="flex:1;" onclick="showRegistrants('${e.id}')">👥 参加者</button>
          <button class="btn btn-sm" style="flex:1;background:#EFF6FF;color:#2563EB;border:1px solid #BFDBFE;" onclick="showEventForm('${e.id}')">✏️ 編集</button>
          <button class="btn btn-sm" style="background:#FEF2F2;color:#EF4444;border:1px solid #FECACA;" onclick="deleteEvent('${e.id}')">🗑</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function showRegistrants(eventId) {
  const e = Store.getById('events', eventId);
  const regs = Store.query('eventRegistrations', r => r.eventId === eventId);
  const members = regs.map(r => {
    const m = Store.getById('members', r.memberId);
    return { ...r, member: m };
  });
  App.modal(`
    <div class="modal-header"><h3>👥 参加者一覧 — ${e?.title}</h3><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">×</button></div>
    <div class="modal-body" style="max-height:60vh;overflow-y:auto;padding:0;">
      ${!members.length ? '<div class="empty-state" style="padding:30px;"><div class="empty-state-icon">👥</div><div class="empty-state-title">申込者はいません</div></div>' :
      `<table class="admin-table">
        <thead><tr><th>氏名</th><th>性別</th><th>年齢</th><th>申込日</th><th>状態</th></tr></thead>
        <tbody>${members.map(r=>`<tr>
          <td><div style="font-weight:600;font-size:13px;">${r.member?.name??'—'}</div><div style="font-size:11px;color:var(--text-muted);">${r.member?.email??''}</div></td>
          <td style="font-size:13px;">${r.member?.gender==='female'?'女':'男'}</td>
          <td style="font-size:13px;">${r.member?App.age(r.member.birthdate)+'歳':'—'}</td>
          <td style="font-size:12px;color:var(--text-muted);">${App.fmtDate(r.registeredAt,{monthDay:true})}</td>
          <td><span class="chip chip-ok" style="font-size:11px;">申込済み</span></td>
        </tr>`).join('')}</tbody>
      </table>`}
    </div>
    <div class="modal-footer"><button class="btn btn-ghost btn-full" onclick="this.closest('.modal-overlay').remove()">閉じる</button></div>`, { maxWidth:'520px' });
}

function showEventForm(id) {
  const e = id ? Store.getById('events', id) : null;
  const isEdit = !!e;
  App.modal(`
    <div class="modal-header"><h3>${isEdit?'✏️ イベント編集':'＋ イベント作成'}</h3><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">×</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">タイトル <span style="color:#E53E3E;">*</span></label><input type="text" class="form-control" id="evTitle" value="${e?.title??''}"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group"><label class="form-label">カテゴリ</label>
          <select class="form-control" id="evCat">
            ${['パーティー','セミナー','個別相談','お見合い'].map(c=>`<option ${c===(e?.category)?' selected':''}>${c}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label class="form-label">日時</label><input type="datetime-local" class="form-control" id="evDate" value="${e?.date?.slice(0,16)??''}"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group"><label class="form-label">場所</label><input type="text" class="form-control" id="evLocation" value="${e?.location??''}"></div>
        <div class="form-group"><label class="form-label">定員</label><input type="number" class="form-control" id="evCap" value="${e?.capacity??20}" min="1"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group"><label class="form-label">料金（円）</label><input type="number" class="form-control" id="evPrice" value="${e?.price??3000}" min="0"></div>
        <div class="form-group"><label class="form-label">対象</label>
          <select class="form-control" id="evTarget">
            ${['全員','女性限定','男性限定'].map(t=>`<option ${t===(e?.targetGender??'全員')?' selected':''}>${t}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-group"><label class="form-label">説明</label><textarea class="form-control" id="evDesc" rows="3">${e?.description??''}</textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-full" onclick="this.closest('.modal-overlay').remove()">キャンセル</button>
      <button class="btn btn-primary btn-full" onclick="saveEvent('${id??''}')">保存する</button>
    </div>`, { maxWidth:'500px' });
}

function saveEvent(id) {
  const title    = document.getElementById('evTitle')?.value?.trim();
  const category = document.getElementById('evCat')?.value;
  const date     = document.getElementById('evDate')?.value;
  const location = document.getElementById('evLocation')?.value?.trim();
  const capacity = parseInt(document.getElementById('evCap')?.value)||20;
  const price    = parseInt(document.getElementById('evPrice')?.value)||0;
  const targetGender = document.getElementById('evTarget')?.value;
  const description  = document.getElementById('evDesc')?.value?.trim();

  if (!title || !date || !location) { App.toast('必須項目を入力してください', 'warning'); return; }

  if (id) {
    Store.update('events', id, { title, category, date: date+'Z', location, capacity, price, targetGender, description });
    App.toast('✅ イベントを更新しました', 'success');
  } else {
    const newId = Store.nextId('events','EV');
    Store.create('events', { id: newId, title, category, date: date+'Z', location, capacity, price, targetGender, description, status:'upcoming' });
    App.toast('✅ イベントを作成しました', 'success');
  }
  document.querySelector('.modal-overlay')?.remove();
  render();
}

function deleteEvent(id) {
  const e = Store.getById('events', id);
  App.confirm(`「${e?.title}」を削除しますか？\n参加申込データも削除されます。`, () => {
    Store.remove('events', id);
    const regs = Store.query('eventRegistrations', r => r.eventId === id);
    regs.forEach(r => Store.remove('eventRegistrations', r.id));
    App.toast('イベントを削除しました', 'default');
    render();
  });
}

render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apps Portal</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 600px;
      margin: 80px auto;
      padding: 0 24px;
      background: #f5f5f5;
      color: #222;
    }
    h1 { font-size: 1.6rem; margin-bottom: 8px; }
    p  { color: #555; margin-bottom: 40px; }
    .grid { display: grid; gap: 16px; }
    a.card {
      display: block;
      background: #fff;
      border-radius: 12px;
      padding: 24px 28px;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      transition: box-shadow .15s;
    }
    a.card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.14); }
    a.card h2 { margin: 0 0 6px; font-size: 1.1rem; }
    a.card p  { margin: 0; font-size: .9rem; color: #666; }
  </style>
</head>
<body>
  <h1>Apps Portal</h1>
  <p>用途別アプリの入口です。</p>
  <div class="grid">
    <a class="card" href="./family/">
      <h2>Family</h2>
      <p>家族で使う共有アプリ</p>
    </a>
    <a class="card" href="./sandbox/">
      <h2>Sandbox</h2>
      <p>実験・試作用の作業スペース</p>
    </a>
    <a class="card" href="./structureLab/">
      <h2>StructureLab</h2>
      <p>StructureLab 専用アプリ</p>
    </a>
  </div>
</body>
</html>
